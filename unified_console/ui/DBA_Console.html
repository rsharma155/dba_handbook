CT d.database_id, d.name\n        FROM sys.databases d\n        INNER JOIN (\n            SELECT LTRIM(RTRIM(value)) AS val\n            FROM STRING_SPLIT(@DatabaseList, N',')\n            WHERE LTRIM(RTRIM(value)) <> N''\n        ) refs ON refs.val = d.name\n        WHERE d.state = 0 AND d.is_in_standby = 0;\n    END\n    ELSE\n    BEGIN\n        INSERT INTO #HC_Dbs (database_id, database_name)\n        SELECT database_id, name\n        FROM sys.databases\n        WHERE state = 0\n          AND is_in_standby = 0\n          AND database_id > 4\n          AND (@IncludeReadOnly = 1 OR is_read_only = 0);\n    END;\n\n    -- ========================================================================\n    -- CPU\n    -- ========================================================================\n    DECLARE @SQLServerCPU INT, @SystemIdle INT, @OtherCPU INT;\n\n    SELECT TOP (1)\n        @SQLServerCPU = SQLProcessUtilization,\n        @SystemIdle = SystemIdle,\n        @OtherCPU = 100 - SystemIdle - SQLProcessUtilization\n    FROM (\n        SELECT\n            record.value(N'(./Record/SchedulerMonitorEvent/SystemHealth/SystemIdle)[1]', N'int') AS SystemIdle,\n            record.value(N'(./Record/SchedulerMonitorEvent/SystemHealth/ProcessUtilization)[1]', N'int') AS SQLProcessUtilization\n        FROM (\n            SELECT TOP (1) CONVERT(XML, record) AS [record]\n            FROM sys.dm_os_ring_buffers\n            WHERE ring_buffer_type = N'RING_BUFFER_SCHEDULER_MONITOR'\n              AND record LIKE N'%<SystemHealth>%'\n            ORDER BY [timestamp] DESC\n        ) AS x\n    ) AS y;\n\n    IF @SQLServerCPU > 80\n    BEGIN\n        INSERT INTO #DBAFindings VALUES (1001, 'CRITICAL', 10, 'CPU',\n            'SQL Server CPU utilization > 80%',\n            'SQLServer=' + CAST(@SQLServerCPU AS VARCHAR) + '%, Other=' + CAST(@OtherCPU AS VARCHAR) + '%',\n            'Identify top CPU consumers. Check MAXDOP, CTFP, and parallelism settings.',\n            'Run: 04_Performance_Diagnostics/top_resource_queries.sql');\n        SET @HealthScore -= 10;\n    END\n    ELSE IF @SQLServerCPU > 70\n    BEGIN\n        INSERT INTO #DBAFindings VALUES (1002, 'MEDIUM', 5, 'CPU',\n            'SQL Server CPU utilization > 70%',\n            'SQLServer=' + CAST(@SQLServerCPU AS VARCHAR) + '%',\n            'Monitor trend. Review parallelism and plan cache.',\n            'Run: 04_Performance_Diagnostics/wait_statistics.sql');\n        SET @HealthScore -= 5;\n    END;\n\n    -- Signal waits\n    DECLARE @TotalWaitTime_ms BIGINT, @SignalWaitTime_ms BIGINT;\n    SELECT\n        @TotalWaitTime_ms = SUM(wait_time_ms),\n        @SignalWaitTime_ms = SUM(signal_wait_time_ms)\n    FROM sys.dm_os_wait_stats\n    WHERE wait_type NOT IN (SELECT wait_type FROM dbo.fn_DBA_ExcludedWaitTypes());\n\n    DECLARE @SignalWaitPct DECIMAL(5,2) = CASE WHEN @TotalWaitTime_ms > 0\n        THEN @SignalWaitTime_ms * 100.0 / @TotalWaitTime_ms ELSE 0 END;\n\n    IF @SignalWaitPct > 25\n    BEGIN\n        INSERT INTO #DBAFindings VALUES (1003, 'CRITICAL', 8, 'CPU',\n            'Signal wait percentage > 25%',\n            'Signal=' + CAST(CAST(@SignalWaitPct AS INT) AS VARCHAR) + '% — CPU bottleneck confirmed',\n            'High signal waits indicate CPU contention. Review MAXDOP, consider hardware upgrade.',\n            'Run: 01_Server_OS/cpu_utilization.sql');\n        SET @HealthScore -= 8;\n    END\n    ELSE IF @SignalWaitPct > 15\n    BEGIN\n        INSERT INTO #DBAFindings VALUES (1004, 'MEDIUM', 4, 'CPU',\n            'Signal wait percentage > 15%',\n            'Signal=' + CAST(CAST(@SignalWaitPct AS INT) AS VARCHAR) + '%',\n            'Elevated CPU pressure. Monitor and review top queries.',\n            'Run: 04_Performance_Diagnostics/top_resource_queries.sql');\n        SET @HealthScore -= 4;\n    END;\n\n    -- ========================================================================\n    -- Memory\n    -- ========================================================================\n    DECLARE @TotalMem BIGINT, @TargetMem BIGINT, @PLE INT;\n    SELECT @TotalMem = cntr_value * 8 FROM sys.dm_os_performance_counters\n        WHERE counter_name = 'Total Server Memory (KB)';\n    SELECT @TargetMem = cntr_value * 8 FROM sys.dm_os_performance_counters\n        WHERE counter_name = 'Target Server Memory (KB)';\n    SELECT @PLE = cntr_value FROM sys.dm_os_performance_counters\n        WHERE counter_name = 'Page life expectancy'\n          AND object_name LIKE '%Buffer Manager%';\n\n    DECLARE @MemGB DECIMAL(10,2) = @TotalMem / 1073741824.0;\n    DECLARE @PLEThreshold INT = CAST((@MemGB / 4.0) * 150 AS INT);\n\n    IF @PLE < @PLEThreshold\n    BEGIN\n        INSERT INTO #DBAFindings VALUES (2001, 'HIGH', 8, 'Memory',\n            'Page Life Expectancy below threshold',\n            'PLE=' + CAST(@PLE AS VARCHAR) + ', Threshold=' + CAST(@PLEThreshold AS VARCHAR),\n            'Investigate memory pressure. Check max server memory setting and memory grants.',\n            'Run: 01_Server_OS/memory_diagnostics.sql');\n        SET @HealthScore -= 8;\n    END;\n\n    -- ========================================================================\n    -- Configuration\n    -- ========================================================================\n    DECLARE @CTFP INT, @MAXDOP INT;\n    SELECT @CTFP = CAST(value_in_use AS INT) FROM sys.configurations WHERE name = 'cost threshold for parallelism';\n    SELECT @MAXDOP = CAST(value_in_use AS INT) FROM sys.configurations WHERE name = 'max degree of parallelism';\n\n    IF @MAXDOP = 0\n    BEGIN\n        INSERT INTO #DBAFindings VALUES (3001, 'MEDIUM', 3, 'Config',\n            'MAXDOP = 0 (unlimited parallelism)',\n            'Default setting may cause excessive parallelism on multi-core systems',\n            'Consider setting MAXDOP to 4-8 based on NUMA topology.',\n            'Run: 02_Instance_Config/server_configuration_audit.sql');\n        SET @HealthScore -= 3;\n    END;\n\n    IF @CTFP < 25\n    BEGIN\n        INSERT INTO #DBAFindings VALUES (3002, 'LOW', 2, 'Config',\n            'Cost Threshold for Parallelism < 25',\n            'Current value: ' + CAST(@CTFP AS VARCHAR),\n            'Low CTFP causes trivial queries to go parallel. Consider 25-50.',\n            'Run: 02_Instance_Config/server_configuration_audit.sql');\n        SET @HealthScore -= 2;\n    END;\n\n    -- ========================================================================\n    -- Backup SLA\n    -- ========================================================================\n    DECLARE @db_id INT, @db_name SYSNAME;\n    DECLARE @LastFull DATETIME2, @LastDiff DATETIME2, @LastLog DATETIME2;\n    DECLARE @RecoveryModelDesc NVARCHAR(20);\n    DECLARE @db_cursor CURSOR;\n\n    SET @db_cursor = CURSOR LOCAL FAST_FORWARD FOR\n        SELECT database_id, database_name FROM #HC_Dbs ORDER BY database_name;\n\n    OPEN @db_cursor;\n    FETCH NEXT FROM @db_cursor INTO @db_id, @db_name;\n\n    WHILE @@FETCH_STATUS = 0\n    BEGIN\n        SELECT @RecoveryModelDesc = recovery_model_desc FROM sys.databases WHERE database_id = @db_id;\n\n        SELECT @LastFull = MAX(backup_finish_date)\n        FROM msdb.dbo.backupset\n        WHERE database_name = @db_name AND type = 'D' AND is_copy_only = 0;\n\n        SELECT @LastLog = MAX(backup_finish_date)\n        FROM msdb.dbo.backupset\n        WHERE database_name = @db_name AND type = 'L' AND is_copy_only = 0;\n\n        IF @LastFull IS NULL OR DATEDIFF(HOUR, @LastFull, GETDATE()) > @BackupHoursSLA\n        BEGIN\n            INSERT INTO #DBAFindings VALUES (4001, 'CRITICAL', 15, 'Backup',\n                'Full backup missing or stale: [' + @db_name + N']',\n                'Last full: ' + ISNULL(CAST(@LastFull AS VARCHAR), 'NEVER')\n                    + ', SLA=' + CAST(@BackupHoursSLA AS VARCHAR) + 'h',\n                'Take a full backup immediately.',\n                'Run: 06_HA_DR/backup_verification.sql');\n            SET @HealthScore -= 15;\n        END;\n\n        IF @RecoveryModelDesc = N'FULL' AND @LastLog IS NOT NULL\n           AND DATEDIFF(MINUTE, @LastLog, GETDATE()) > @BackupHoursSLA * 60\n        BEGIN\n            INSERT INTO #DBAFindings VALUES (4002, 'HIGH', 8, 'Backup',\n                'Log backup stale: [' + @db_name + N']',\n                'Last log: ' + CAST(@LastLog AS VARCHAR) + ', Model=' + @RecoveryModelDesc,\n                'Log backup overdue. Risk of log file growth and broken log chain.',\n                'Run: 06_HA_DR/backup_log_chain.sql');\n            SET @HealthScore -= 8;\n        END;\n\n        FETCH NEXT FROM @db_cursor INTO @db_id, @db_name;\n    END;\n\n    CLOSE @db_cursor;\n    DEALLOCATE @db_cursor;\n\n    -- ========================================================================\n    -- Security\n    -- ========================================================================\n    DECLARE @SysadminCount INT;\n    SELECT @SysadminCount = COUNT(*)\n    FROM sys.server_role_members rm\n    JOIN sys.server_principals p ON p.principal_id = rm.member_principal_id\n    WHERE rm.role_principal_id = SUSER_SID('sysadmin');\n\n    IF @SysadminCount > 5\n    BEGIN\n        INSERT INTO #DBAFindings VALUES (5001, 'MEDIUM', 3, 'Security',\n            'Excessive sysadmin members',\n            CAST(@SysadminCount AS VARCHAR) + ' members in sysadmin role',\n            'Review sysadmin membership. Use principle of least privilege.',\n            'Run: 07_Security/login_audit.sql');\n        SET @HealthScore -= 3;\n    END;\n\n    -- ========================================================================\n    -- AG Health\n    -- ========================================================================\n    DECLARE @IsHadrEnabled INT = CAST(SERVERPROPERTY(N'IsHadrEnabled') AS INT);\n    IF @IsHadrEnabled = 1\n    BEGIN\n        DECLARE @UnhealthyReplicas INT;\n        SELECT @UnhealthyReplicas = COUNT(*)\n        FROM sys.dm_hadr_availability_replica_states\n        WHERE synchronization_health_desc <> 'HEALTHY';\n\n        IF @UnhealthyReplicas > 0\n        BEGIN\n            INSERT INTO #DBAFindings VALUES (6001, 'HIGH', 8, 'HA/DR',\n                'Unhealthy Always On AG replicas detected',\n                CAST(@UnhealthyReplicas AS VARCHAR) + ' replica(s) not healthy',\n                'Investigate AG synchronization state and redo lag.',\n                'Run: 06_HA_DR/alwayson_ag_monitor.sql');\n            SET @HealthScore -= 8;\n        END;\n    END;\n\n    -- ========================================================================\n    -- VLF (per database, 2016+)\n    -- ========================================================================\n    IF @MajorVersion >= 13\n    BEGIN\n        SET @db_cursor = CURSOR LOCAL FAST_FORWARD FOR\n            SELECT database_id, database_name FROM #HC_Dbs ORDER BY database_name;\n\n        OPEN @db_cursor;\n        FETCH NEXT FROM @db_cursor INTO @db_id, @db_name;\n\n        WHILE @@FETCH_STATUS = 0\n        BEGIN\n            DECLARE @VLFCount INT;\n            DECLARE @sql NVARCHAR(MAX);\n            SET @sql = N'SELECT @cnt = COUNT(*) FROM sys.dm_db_log_info(' + CAST(@db_id AS NVARCHAR) + N');';\n            EXEC sp_executesql @sql, N'@cnt INT OUTPUT', @cnt = @VLFCount OUTPUT;\n\n            IF @VLFCount >= 1000\n            BEGIN\n                INSERT INTO #DBAFindings VALUES (7001, 'HIGH', 5, 'Storage',\n                    'Excessive VLF count: [' + @db_name + N']',\n                    'VLF count: ' + CAST(@VLFCount AS VARCHAR),\n                    'High VLF counts slow recovery and log backups.',\n                    'Run: 03_Storage_Engine/vlf_fragmentation.sql');\n                SET @HealthScore -= 5;\n            END\n            ELSE IF @VLFCount >= 200\n            BEGIN\n                INSERT INTO #DBAFindings VALUES (7002, 'MEDIUM', 2, 'Storage',\n                    'Elevated VLF count: [' + @db_name + N']',\n                    'VLF count: ' + CAST(@VLFCount AS VARCHAR),\n                    'Monitor VLF growth. Plan log file maintenance.',\n                    'Run: 03_Storage_Engine/vlf_fragmentation.sql');\n                SET @HealthScore -= 2;\n            END;\n\n            FETCH NEXT FROM @db_cursor INTO @db_id, @db_name;\n        END;\n\n        CLOSE @db_cursor;\n        DEALLOCATE @db_cursor;\n    END;\n\n    -- ========================================================================\n    -- OUTPUT\n    -- ========================================================================\n    -- Result set 1: Dashboard\n    SELECT\n        @@SERVERNAME AS ServerName,\n        SERVERPROPERTY('ProductVersion') AS SQLVersion,\n        @HealthScore AS Health_Score,\n        CASE\n            WHEN @HealthScore >= 85 THEN 'GREEN'\n            WHEN @HealthScore >= 70 THEN 'YELLOW'\n            ELSE 'RED'\n        END AS Health_TrafficLight,\n        @SQLServerCPU AS SQL_CPU_Pct,\n        CAST(@SignalWaitPct AS DECIMAL(5,2)) AS Signal_Wait_Pct,\n        @PLE AS PLE_Seconds,\n        @TotalMem / 1073741824 AS Total_Memory_GB,\n        (SELECT sqlserver_start_time FROM sys.dm_os_sys_info) AS Instance_Start_Time,\n        (SELECT COUNT(*) FROM #DBAFindings WHERE Severity = 'CRITICAL') AS Critical_Count,\n        (SELECT COUNT(*) FROM #DBAFindings WHERE Severity = 'HIGH') AS High_Count,\n        (SELECT COUNT(*) FROM #DBAFindings WHERE Severity = 'MEDIUM') AS Medium_Count,\n        (SELECT COUNT(*) FROM #DBAFindings WHERE Severity = 'LOW') AS Low_Count;\n\n    -- Result set 2: Findings\n    SELECT CheckId, Severity, Weight, Area, Finding, Impact, Recommendation, NextStepCommand\n    FROM #DBAFindings\n    ORDER BY\n        CASE Severity WHEN 'CRITICAL' THEN 1 WHEN 'HIGH' THEN 2 WHEN 'MEDIUM' THEN 3 ELSE 4 END,\n        Weight DESC;\n\n    -- Result set 3: Deep dive (optional)\n    IF @DeepDive = 1\n    BEGIN\n        SELECT TOP (10)\n            wait_type,\n            wait_time_ms / 1000.0 AS wait_time_s,\n            signal_wait_time_ms / 1000.0 AS signal_wait_s,\n            CAST(wait_time_ms * 100.0 / NULLIF(SUM(wait_time_ms) OVER(), 0) AS DECIMAL(5,2)) AS pct_of_top20\n        FROM sys.dm_os_wait_stats\n        WHERE wait_type NOT IN (SELECT wait_type FROM dbo.fn_DBA_ExcludedWaitTypes())\n          AND wait_time_ms > 0\n        ORDER BY wait_time_ms DESC;\n\n        SELECT TOP (10)\n            qs.total_worker_time / 1000 AS total_cpu_ms,\n            qs.execution_count,\n            qs.total_elapsed_time / 1000 AS total_duration_ms,\n            SUBSTRING(st.text, (qs.statement_start_offset/2)+1,\n                ((CASE qs.statement_end_offset\n                    WHEN -1 THEN DATALENGTH(st.text)\n                    ELSE qs.statement_end_offset\n                END - qs.statement_start_offset)/2)+1) AS query_text\n        FROM sys.dm_exec_query_stats qs\n        CROSS APPLY sys.dm_exec_sql_text(qs.sql_handle) st\n        ORDER BY qs.total_worker_time DESC;\n\n        SELECT\n            DB_NAME(vfs.database_id) AS database_name,\n            mf.physical_name,\n            mf.type_desc AS file_type,\n            CASE WHEN num_of_reads = 0 THEN 0\n                ELSE io_stall_read_ms / num_of_reads END AS avg_read_stall_ms,\n            CASE WHEN num_of_writes = 0 THEN 0\n                ELSE io_stall_write_ms / num_of_writes END AS avg_write_stall_ms\n        FROM sys.dm_io_virtual_file_stats(NULL, NULL) vfs\n        JOIN sys.master_files mf\n            ON mf.database_id = vfs.database_id AND mf.file_id = vfs.file_id\n        WHERE (io_stall_read_ms / NULLIF(num_of_reads, 0) > 15\n            OR io_stall_write_ms / NULLIF(num_of_writes, 0) > 15)\n        ORDER BY (io_stall_read_ms + io_stall_write_ms) DESC;\n    END;\n\n    DROP TABLE #DBAFindings;\n    DROP TABLE #HC_Dbs;\nEND;\nGO\n\nPRINT N'  sp_DBA_HealthCheck created.';\nGO\n\n-- ============================================================================\n-- 6. sp_DBA_WaitAnalysis — top wait types with categories and recommendations\n-- ============================================================================\nPRINT N'Creating sp_DBA_WaitAnalysis...';\nGO\n\nIF OBJECT_ID(N'dbo.sp_DBA_WaitAnalysis', N'P') IS NOT NULL\n    DROP PROCEDURE dbo.sp_DBA_WaitAnalysis;\nGO\n\nCREATE PROCEDURE dbo.sp_DBA_WaitAnalysis\n    @TopN                   INT = 20,\n    @IncludeRecommendations BIT = 1,\n    @MinWaitCount           INT = 0\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\n    DECLARE @TotalWaitMs BIGINT;\n    SELECT @TotalWaitMs = SUM(wait_time_ms)\n    FROM sys.dm_os_wait_stats\n    WHERE wait_type NOT IN (SELECT wait_type FROM dbo.fn_DBA_ExcludedWaitTypes())\n      AND waiting_tasks_count > @MinWaitCount;\n\n    SELECT TOP (@TopN)\n        ws.wait_type AS Wait_Type,\n        ws.waiting_tasks_count AS Wait_Count,\n        CAST(ws.wait_time_ms / 1000.0 AS NUMERIC(12,2)) AS Total_Wait_S,\n        CAST((ws.wait_time_ms - ws.signal_wait_time_ms) / 1000.0 AS NUMERIC(12,2)) AS Resource_Wait_S,\n        CAST(ws.signal_wait_time_ms / 1000.0 AS NUMERIC(12,2)) AS Signal_Wait_S,\n        CAST(ws.wait_time_ms * 100.0 / NULLIF(@TotalWaitMs, 0) AS DECIMAL(5,2)) AS Pct_Of_All_Waits,\n        CAST(ws.signal_wait_time_ms * 100.0 / NULLIF(ws.wait_time_ms, 0) AS DECIMAL(5,2)) AS Signal_Pct,\n        CASE\n            WHEN ws.wait_type IN ('CXPACKET','CXCONSUMER','CXPA','EXECSYNC') THEN 'Parallelism'\n            WHEN ws.wait_type IN ('SOS_SCHEDULER_YIELD','THREADPOOL','RESOURCE_POOL') THEN 'CPU'\n            WHEN ws.wait_type LIKE 'PAGEIOLATCH_%' THEN 'Disk I/O'\n            WHEN ws.wait_type IN ('WRITELOG','LOGMGR','LOGBUFFER') THEN 'Transaction Log'\n            WHEN ws.wait_type IN ('RESOURCE_SEMAPHORE','RESOURCE_SEMAPHORE_POOL') THEN 'Memory'\n            WHEN ws.wait_type LIKE 'LCK_%' THEN 'Locking'\n            WHEN ws.wait_type LIKE 'PAGELATCH_%' THEN 'In-Memory Latch'\n            WHEN ws.wait_type IN ('ASYNC_NETWORK_IO','NETWAITFORREPLY','NETWORKIO') THEN 'Network / Client'\n            WHEN ws.wait_type LIKE 'HADR_%' THEN 'AlwaysOn AG'\n            WHEN ws.wait_type LIKE 'REPL_%' THEN 'Replication'\n            WHEN ws.wait_type IN ('PFS_SYNC','GAM_CONTENTION','SGAM_CONTENTION') THEN 'TempDB Allocation'\n            ELSE 'Other'\n        END AS Wait_Category,\n        CASE WHEN @IncludeRecommendations = 1 THEN\n            CASE\n                WHEN ws.wait_type IN ('CXPACKET','CXCONSUMER') THEN 'Review MAXDOP and CTFP settings.'\n                WHEN ws.wait_type LIKE 'PAGEIOLATCH_%' THEN 'Check disk latency and indexing.'\n                WHEN ws.wait_type LIKE 'LCK_%' THEN 'Blocking detected. Run blocking_and_deadlocks.sql.'\n                WHEN ws.wait_type = 'RESOURCE_SEMAPHORE' THEN 'Memory grant pressure. Check memory grants.'\n                WHEN ws.wait_type IN ('ASYNC_NETWORK_IO') THEN 'Client consuming results slowly.'\n                WHEN ws.wait_type LIKE 'HADR_%' THEN 'AG sync bottleneck. Run alwayson_ag_monitor.sql.'\n                ELSE 'Review wait type in Microsoft documentation.'\n            END\n        ELSE NULL END AS Recommendation\n    FROM sys.dm_os_wait_stats AS ws\n    WHERE ws.wait_type NOT IN (SELECT wait_type FROM dbo.fn_DBA_ExcludedWaitTypes())\n      AND ws.waiting_tasks_count > @MinWaitCount\n    ORDER BY ws.wait_time_ms DESC;\nEND;\nGO\n\nPRINT N'  sp_DBA_WaitAnalysis created.';\nGO\n\n-- ============================================================================\n-- 7. sp_DBA_IndexReview — unused, missing indexes, and fragmentation\n-- ============================================================================\nPRINT N'Creating sp_DBA_IndexReview...';\nGO\n\nIF OBJECT_ID(N'dbo.sp_DBA_IndexReview', N'P') IS NOT NULL\n    DROP PROCEDURE dbo.sp_DBA_IndexReview;\nGO\n\nCREATE PROCEDURE dbo.sp_DBA_IndexReview\n    @DatabaseList           NVARCHAR(MAX) = NULL,\n    @IncludeReadOnly        BIT = 0,\n    @MinPageCount           INT = 1000,\n    @IncludeFragmentation   BIT = 1,\n    @IncludeMissingIndexes  BIT = 1,\n    @TopN                   INT = 50\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\n    CREATE TABLE #IRDbs (database_id INT NOT NULL PRIMARY KEY, database_name SYSNAME NOT NULL);\n\n    IF @DatabaseList IS NOT NULL AND LTRIM(RTRIM(@DatabaseList)) <> N''\n    BEGIN\n        INSERT INTO #IRDbs (database_id, database_name)\n        SELECT d.database_id, d.name FROM sys.databases AS d\n        INNER JOIN (SELECT LTRIM(RTRIM(value)) AS v FROM STRING_SPLIT(@DatabaseList, N',') WHERE LTRIM(RTRIM(value)) <> N'') AS r ON r.v = d.name\n        WHERE d.state = 0 AND d.is_in_standby = 0;\n    END\n    ELSE\n    BEGIN\n        INSERT INTO #IRDbs (database_id, database_name)\n        SELECT database_id, name FROM sys.databases\n        WHERE state = 0 AND is_in_standby = 0 AND database_id > 4 AND (@IncludeReadOnly = 1 OR is_read_only = 0);\n    END;\n\n    -- Missing indexes (instance-wide DMV)\n    IF @IncludeMissingIndexes = 1\n    BEGIN\n        SELECT TOP (@TopN)\n            DB_NAME(d.database_id) AS DatabaseName,\n            d.equality_columns, d.inequality_columns, d.included_columns,\n            CAST(gs.avg_user_impact AS DECIMAL(5,1)) AS AvgUserImpact,\n            gs.user_seeks, gs.user_scans,\n            CAST((gs.user_seeks * gs.avg_user_impact * gs.avg_total_user_cost) AS DECIMAL(18,0)) AS ImprovementMeasure\n        FROM sys.dm_db_missing_index_group_stats AS gs\n        INNER JOIN sys.dm_db_missing_index_groups AS g ON gs.group_handle = g.index_group_handle\n        INNER JOIN sys.dm_db_missing_index_details AS d ON g.index_handle = d.index_handle\n        WHERE d.database_id IN (SELECT database_id FROM #IRDbs)\n          AND (gs.user_seeks * gs.avg_user_impact * gs.avg_total_user_cost) > 100000\n        ORDER BY (gs.user_seeks * gs.avg_user_impact * gs.avg_total_user_cost) DESC;\n    END;\n\n    DROP TABLE #IRDbs;\nEND;\nGO\n\nPRINT N'  sp_DBA_IndexReview created.';\nGO\n\n-- ============================================================================\n-- 8. sp_DBA_SecurityAudit — orphaned users, sysadmin, guest, trustworthy\n-- ============================================================================\nPRINT N'Creating sp_DBA_SecurityAudit...';\nGO\n\nIF OBJECT_ID(N'dbo.sp_DBA_SecurityAudit', N'P') IS NOT NULL\n    DROP PROCEDURE dbo.sp_DBA_SecurityAudit;\nGO\n\nCREATE PROCEDURE dbo.sp_DBA_SecurityAudit\n    @DatabaseList           NVARCHAR(MAX) = NULL,\n    @IncludeReadOnly        BIT = 0,\n    @IncludeSysadminCheck   BIT = 1\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\n    IF @IncludeSysadminCheck = 1\n    BEGIN\n        SELECT p.name AS LoginName, p.type_desc, p.is_disabled, p.create_date\n        FROM sys.server_principals AS p\n        INNER JOIN sys.server_role_members AS rm ON p.principal_id = rm.member_principal_id\n        INNER JOIN sys.server_principals AS r ON rm.role_principal_id = r.principal_id\n        WHERE r.name = N'sysadmin' ORDER BY p.name;\n\n        SELECT name AS LoginName, is_policy_checked, is_expiration_checked\n        FROM sys.sql_logins WHERE is_policy_checked = 0 OR is_expiration_checked = 0;\n    END;\n\n    -- Trustworthy databases\n    SELECT d.name AS DatabaseName, d.is_trustworthy_on, SUSER_SNAME(d.owner_sid) AS DBOwner\n    FROM sys.databases AS d WHERE d.is_trustworthy_on = 1 AND d.database_id > 4;\n\n    -- Database owners\n    SELECT d.name AS DatabaseName, SUSER_SNAME(d.owner_sid) AS OwnerLogin\n    FROM sys.databases AS d WHERE d.database_id > 4 AND d.state = 0 ORDER BY d.name;\nEND;\nGO\n\nPRINT N'  sp_DBA_SecurityAudit created.';\nGO\n\n-- ============================================================================\n-- 9. sp_DBA_BackupReview — backup SLA, log chain, recovery model\n-- ============================================================================\nPRINT N'Creating sp_DBA_BackupReview...';\nGO\n\nIF OBJECT_ID(N'dbo.sp_DBA_BackupReview', N'P') IS NOT NULL\n    DROP PROCEDURE dbo.sp_DBA_BackupReview;\nGO\n\nCREATE PROCEDURE dbo.sp_DBA_BackupReview\n    @DatabaseList       NVARCHAR(MAX) = NULL,\n    @IncludeReadOnly    BIT = 0,\n    @BackupHoursSLA     INT = 24,\n    @BackupDaysSLA      INT = 7\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\n    SELECT\n        d.name AS DatabaseName, d.recovery_model_desc AS RecoveryModel,\n        MAX(CASE WHEN b.type = 'D' THEN b.backup_finish_date END) AS LastFullBackup,\n        MAX(CASE WHEN b.type = 'L' THEN b.backup_finish_date END) AS LastLogBackup,\n        DATEDIFF(HOUR, MAX(CASE WHEN b.type = 'D' THEN b.backup_finish_date END), GETDATE()) AS HoursSinceFull,\n        CASE\n            WHEN MAX(b.backup_finish_date) IS NULL THEN 'CRITICAL: No backups'\n            WHEN d.recovery_model_desc = 'FULL' AND DATEDIFF(HOUR, MAX(CASE WHEN b.type = 'L' THEN b.backup_finish_date END), GETDATE()) > @BackupHoursSLA\n                THEN 'CRITICAL: Log backup exceeds SLA'\n            WHEN DATEDIFF(DAY, MAX(b.backup_finish_date), GETDATE()) > @BackupDaysSLA\n                THEN 'HIGH: Last backup exceeds ' + CAST(@BackupDaysSLA AS VARCHAR) + ' days'\n            ELSE 'OK'\n        END AS BackupStatus\n    FROM sys.databases AS d\n    LEFT JOIN msdb.dbo.backupset AS b ON d.name = b.database_name\n    WHERE d.database_id > 4 AND d.state = 0\n      AND (@DatabaseList IS NULL OR d.name IN (SELECT LTRIM(RTRIM(value)) FROM STRING_SPLIT(@DatabaseList, N',') WHERE LTRIM(RTRIM(value)) <> N''))\n    GROUP BY d.name, d.recovery_model_desc\n    ORDER BY CASE WHEN MAX(b.backup_finish_date) IS NULL THEN 0 WHEN DATEDIFF(HOUR, MAX(b.backup_finish_date), GETDATE()) > @BackupHoursSLA THEN 1 ELSE 2 END, d.name;\nEND;\nGO\n\nPRINT N'  sp_DBA_BackupReview created.';\nGO\n\n-- ============================================================================\n-- 10. sp_DBA_BaselineCapture — performance snapshot persistence\n-- ============================================================================\nPRINT N'Creating sp_DBA_BaselineCapture...';\nGO\n\nIF OBJECT_ID(N'dbo.sp_DBA_BaselineCapture', N'P') IS NOT NULL\n    DROP PROCEDURE dbo.sp_DBA_BaselineCapture;\nGO\n\nCREATE PROCEDURE dbo.sp_DBA_BaselineCapture\n    @CaptureWaitStats   BIT = 1,\n    @CaptureCounters    BIT = 1,\n    @CaptureFileStats   BIT = 1,\n    @Notes              NVARCHAR(500) = NULL\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\n    DECLARE @ServerName SYSNAME = @@SERVERNAME;\n    DECLARE @Now DATETIME2(3) = SYSUTCDATETIME();\n\n    IF OBJECT_ID(N'dbo.BaselineSnapshot', N'U') IS NULL\n    BEGIN\n        RAISERROR(N'Run DBARepository_Persistence.sql first to create BaselineSnapshot table.', 16, 1);\n        RETURN;\n    END;\n\n    IF @CaptureWaitStats = 1\n    BEGIN\n        INSERT INTO dbo.BaselineSnapshot (ServerName, SnapshotUtc, SnapshotType, WaitType, WaitTimeMs, SignalWaitMs, WaitingTasks, Notes)\n        SELECT @ServerName, @Now, 'Baseline', wait_type, wait_time_ms, signal_wait_time_ms, waiting_tasks_count, @Notes\n        FROM sys.dm_os_wait_stats WHERE waiting_tasks_count > 0\n          AND wait_type NOT IN (SELECT wait_type FROM dbo.fn_DBA_ExcludedWaitTypes());\n        PRINT CAST(@@ROWCOUNT AS VARCHAR) + N' wait stats captured.';\n    END;\n\n    IF @CaptureCounters = 1\n    BEGIN\n        INSERT INTO dbo.BaselineSnapshot (ServerName, SnapshotUtc, SnapshotType, CounterName, CounterValue, Notes)\n        SELECT @ServerName, @Now, 'Baseline', object_name + '.' + counter_name, CAST(cntr_value AS DECIMAL(18,4)), @Notes\n        FROM sys.dm_os_performance_counters\n        WHERE counter_name IN ('Page life expectancy','Total Server Memory (KB)','Target Server Memory (KB)','Batch Requests/sec');\n        PRINT CAST(@@ROWCOUNT AS VARCHAR) + N' counters captured.';\n    END;\n\n    IF @CaptureFileStats = 1\n    BEGIN\n        INSERT INTO dbo.BaselineSnapshot (ServerName, SnapshotUtc, SnapshotType, DatabaseId, DatabaseName, FileId, NumReads, NumWrites, IoStallReadMs, IoStallWriteMs, Notes)\n        SELECT @ServerName, @Now, 'Baseline', vfs.database_id, DB_NAME(vfs.database_id), vfs.file_id,\n               vfs.num_of_reads, vfs.num_of_writes, vfs.io_stall_read_ms, vfs.io_stall_write_ms, @Notes\n        FROM sys.dm_io_virtual_file_stats(NULL, NULL) AS vfs;\n        PRINT CAST(@@ROWCOUNT AS VARCHAR) + N' file stats captured.';\n    END;\n\n    PRINT N'Baseline capture complete at ' + CONVERT(NVARCHAR(30), @Now, 121);\nEND;\nGO\n\nPRINT N'  sp_DBA_BaselineCapture created.';\nGO\n\n-- ============================================================================\n-- 11. AssessmentFindingTableType — TVP for findings\n-- ============================================================================\nPRINT N'Creating AssessmentFindingTableType...';\nGO\n\nIF TYPE_ID(N'dbo.AssessmentFindingTableType') IS NOT NULL\n    DROP TYPE dbo.AssessmentFindingTableType;\nGO\n\nCREATE TYPE dbo.AssessmentFindingTableType AS TABLE (\n    CheckId INT NOT NULL, Severity VARCHAR(20) NOT NULL, Weight INT NOT NULL DEFAULT 0,\n    Area VARCHAR(50) NOT NULL, Finding VARCHAR(255) NOT NULL,\n    Impact VARCHAR(255) NULL, Recommendation VARCHAR(MAX) NULL,\n    NextStepCommand VARCHAR(MAX) NULL, DatabaseName SYSNAME NULL\n);\nGO\n\nPRINT N'  AssessmentFindingTableType created.';\nGO\n\n-- ============================================================================\n-- 12. sp_DBA_SaveAssessmentRun — persist assessment results\n-- ============================================================================\nPRINT N'Creating sp_DBA_SaveAssessmentRun...';\nGO\n\nIF OBJECT_ID(N'dbo.sp_DBA_SaveAssessmentRun', N'P') IS NOT NULL\n    DROP PROCEDURE dbo.sp_DBA_SaveAssessmentRun;\nGO\n\nCREATE PROCEDURE dbo.sp_DBA_SaveAssessmentRun\n    @ServerName SYSNAME, @Profile VARCHAR(20) = 'Standard', @HealthScore INT = 100,\n    @SqlVersion VARCHAR(50) = NULL, @SqlEdition VARCHAR(100) = NULL,\n    @ToolVersion VARCHAR(20) = NULL, @Notes NVARCHAR(500) = NULL,\n    @SQLCPUPct DECIMAL(5,2) = NULL, @SignalWaitPct DECIMAL(5,2) = NULL,\n    @MinPLEs INT = NULL, @TotalMemMB DECIMAL(18,2) = NULL, @TargetMemMB DECIMAL(18,2) = NULL\nAS\nBEGIN\n    SET NOCOUNT ON;\n\n    IF OBJECT_ID(N'dbo.AssessmentRun', N'U') IS NULL\n    BEGIN\n        RAISERROR(N'Run DBARepository_Persistence.sql first to create history tables.', 16, 1);\n        RETURN;\n    END;\n\n    DECLARE @RunId INT;\n    INSERT INTO dbo.AssessmentRun (ServerName, Profile, HealthScore, SqlVersion, SqlEdition, ToolVersion, Notes)\n    VALUES (@ServerName, @Profile, @HealthScore, @SqlVersion, @SqlEdition, @ToolVersion, @Notes);\n    SET @RunId = SCOPE_IDENTITY();\n\n    IF @SQLCPUPct IS NOT NULL\n        INSERT INTO dbo.AssessmentMetric (RunId, MetricName, MetricValue, Unit) VALUES (@RunId, 'SQL_CPU_Pct', @SQLCPUPct, '%');\n    IF @SignalWaitPct IS NOT NULL\n        INSERT INTO dbo.AssessmentMetric (RunId, MetricName, MetricValue, Unit) VALUES (@RunId, 'Signal_Wait_Pct', @SignalWaitPct, '%');\n    IF @MinPLEs IS NOT NULL\n        INSERT INTO dbo.AssessmentMetric (RunId, MetricName, MetricValue, Unit) VALUES (@RunId, 'Min_PLE_s', @MinPLEs, 's');\n    IF @TotalMemMB IS NOT NULL\n        INSERT INTO dbo.AssessmentMetric (RunId, MetricName, MetricValue, Unit) VALUES (@RunId, 'Total_Mem_MB', @TotalMemMB, 'MB');\n    IF @TargetMemMB IS NOT NULL\n        INSERT INTO dbo.AssessmentMetric (RunId, MetricName, MetricValue, Unit) VALUES (@RunId, 'Target_Mem_MB', @TargetMemMB, 'MB');\n\n    SELECT @RunId AS RunId;\nEND;\nGO\n\nPRINT N'  sp_DBA_SaveAssessmentRun created.';\nGO\n\n-- ============================================================================\n-- NEXT STEPS:\n--   Run CheckIdRegistry.sql to populate the check ID registry\n--   Run DBARepository_Persistence.sql for assessment history tables\n-- ============================================================================\nPRINT N'';\nPRINT N'========================================';\nPRINT N' DBARepository deployment complete.';\nPRINT N' 12 objects installed:';\nPRINT N'   2 functions, 9 procedures, 1 table type';\nPRINT N' Next: Run CheckIdRegistry.sql';\nPRINT N' Next: Run DBARepository_Persistence.sql';\nPRINT N'========================================';\nGO\n", "sql_server/00_Repository/DBARepository_Persistence.sql": "/*\n================================================================================\nDBARepository_Persistence.sql — Assessment history and baseline tables\n================================================================================\nPurpose: Creates tables to persist assessment runs, findings, metrics, and\n         baseline snapshots for trending and delta comparison.\n\nRun after DBARepository_Create.sql. This script is idempotent (IF NOT EXISTS).\n\n    sqlcmd -S YourServer -d DBARepository -i \"00_Repository/DBARepository_Persistence.sql\"\n================================================================================\n*/\nUSE [DBARepository];\nGO\n\nPRINT N'Creating persistence tables...';\nGO\n\n-------------------------------------------------------------------------------\n-- AssessmentRun: Each assessment execution\n-------------------------------------------------------------------------------\nIF OBJECT_ID(N'dbo.AssessmentRun', N'U') IS NULL\nBEGIN\n    CREATE TABLE dbo.AssessmentRun (\n        RunId           INT IDENTITY(1,1) PRIMARY KEY,\n        ServerName      SYSNAME NOT NULL,\n        RunUtc          DATETIME2(3) NOT NULL DEFAULT SYSUTCDATETIME(),\n        Profile         VARCHAR(20) NOT NULL DEFAULT 'Standard',\n        HealthScore     INT NOT NULL DEFAULT 100,\n        SqlVersion      VARCHAR(50) NULL,\n        SqlEdition      VARCHAR(100) NULL,\n        FindingCount    INT NOT NULL DEFAULT 0,\n        CriticalCount   INT NOT NULL DEFAULT 0,\n        HighCount       INT NOT NULL DEFAULT 0,\n        MediumCount     INT NOT NULL DEFAULT 0,\n        LowCount        INT NOT NULL DEFAULT 0,\n        ToolVersion     VARCHAR(20) NULL,\n        Notes           NVARCHAR(500) NULL\n    );\n\n    CREATE INDEX IX_AssessmentRun_Server_Run ON dbo.AssessmentRun (ServerName, RunUtc DESC);\n    PRINT N'  Created dbo.AssessmentRun';\nEND\nELSE\n    PRINT N'  dbo.AssessmentRun already exists. Skipping.';\nGO\n\n-------------------------------------------------------------------------------\n-- AssessmentFinding: Findings per assessment run\n-------------------------------------------------------------------------------\nIF OBJECT_ID(N'dbo.AssessmentFinding', N'U') IS NULL\nBEGIN\n    CREATE TABLE dbo.AssessmentFinding (\n        FindingId       INT IDENTITY(1,1) PRIMARY KEY,\n        RunId           INT NOT NULL REFERENCES dbo.AssessmentRun(RunId),\n        CheckId         INT NOT NULL,\n        Severity        VARCHAR(20) NOT NULL,\n        Weight          INT NOT NULL DEFAULT 0,\n        Area            VARCHAR(50) NOT NULL,\n        Finding         VARCHAR(255) NOT NULL,\n        Impact          VARCHAR(255) NULL,\n        Recommendation  VARCHAR(MAX) NULL,\n        NextStepCommand VARCHAR(MAX) NULL,\n        DatabaseName    SYSNAME NULL,\n        IsNew           BIT NOT NULL DEFAULT 0,\n        ResolvedRunId   INT NULL REFERENCES dbo.AssessmentRun(RunId)\n    );\n\n    CREATE INDEX IX_AssessmentFinding_Run ON dbo.AssessmentFinding (RunId);\n    CREATE INDEX IX_AssessmentFinding_CheckId ON dbo.AssessmentFinding (CheckId, RunId);\n    CREATE INDEX IX_AssessmentFinding_Severity ON dbo.AssessmentFinding (Severity, RunId);\n    PRINT N'  Created dbo.AssessmentFinding';\nEND\nELSE\n    PRINT N'  dbo.AssessmentFinding already exists. Skipping.';\nGO\n\n-------------------------------------------------------------------------------\n-- AssessmentMetric: Dashboard metrics per run\n-------------------------------------------------------------------------------\nIF OBJECT_ID(N'dbo.AssessmentMetric', N'U') IS NULL\nBEGIN\n    CREATE TABLE dbo.AssessmentMetric (\n        MetricId        INT IDENTITY(1,1) PRIMARY KEY,\n        RunId           INT NOT NULL REFERENCES dbo.AssessmentRun(RunId),\n        MetricName      VARCHAR(100) NOT NULL,\n        MetricValue     DECIMAL(18,4) NULL,\n        MetricText      NVARCHAR(500) NULL,\n        Unit            VARCHAR(20) NULL\n    );\n\n    CREATE INDEX IX_AssessmentMetric_Run ON dbo.AssessmentMetric (RunId);\n    CREATE INDEX IX_AssessmentMetric_Name ON dbo.AssessmentMetric (MetricName, RunId);\n    PRINT N'  Created dbo.AssessmentMetric';\nEND\nELSE\n    PRINT N'  dbo.AssessmentMetric already exists. Skipping.';\nGO\n\n-------------------------------------------------------------------------------\n-- BaselineSnapshot: Performance baseline captures\n-------------------------------------------------------------------------------\nIF OBJECT_ID(N'dbo.BaselineSnapshot', N'U') IS NULL\nBEGIN\n    CREATE TABLE dbo.BaselineSnapshot (\n        SnapshotId      INT IDENTITY(1,1) PRIMARY KEY,\n        ServerName      SYSNAME NOT NULL,\n        SnapshotUtc     DATETIME2(3) NOT NULL DEFAULT SYSUTCDATETIME(),\n        SnapshotType    VARCHAR(20) NOT NULL DEFAULT 'Manual',\n        WaitType        VARCHAR(128) NULL,\n        WaitTimeMs      BIGINT NULL,\n        SignalWaitMs    BIGINT NULL,\n        WaitingTasks    BIGINT NULL,\n        CounterName     VARCHAR(200) NULL,\n        CounterValue    DECIMAL(18,4) NULL,\n        DatabaseId      INT NULL,\n        DatabaseName    SYSNAME NULL,\n        FileId          INT NULL,\n        NumReads        BIGINT NULL,\n        NumWrites       BIGINT NULL,\n        IoStallReadMs   BIGINT NULL,\n        IoStallWriteMs  BIGINT NULL,\n        Notes           NVARCHAR(500) NULL\n    );\n\n    CREATE INDEX IX_BaselineSnapshot_Server_Time ON dbo.BaselineSnapshot (ServerName, SnapshotUtc DESC);\n    CREATE INDEX IX_BaselineSnapshot_WaitType ON dbo.BaselineSnapshot (WaitType, SnapshotUtc DESC);\n    CREATE INDEX IX_BaselineSnapshot_Counter ON dbo.BaselineSnapshot (CounterName, SnapshotUtc DESC);\n    PRINT N'  Created dbo.BaselineSnapshot';\nEND\nELSE\n    PRINT N'  dbo.BaselineSnapshot already exists. Skipping.';\nGO\n\n-------------------------------------------------------------------------------\n-- View: Latest assessment per server\n-------------------------------------------------------------------------------\nIF OBJECT_ID(N'dbo.vw_LatestAssessment', N'V') IS NOT NULL\n    DROP VIEW dbo.vw_LatestAssessment;\nGO\n\nCREATE VIEW dbo.vw_LatestAssessment AS\nSELECT\n    r.ServerName,\n    r.RunId,\n    r.RunUtc,\n    r.Profile,\n    r.HealthScore,\n    r.FindingCount,\n    r.CriticalCount,\n    r.HighCount,\n    r.MediumCount,\n    r.LowCount,\n    r.SqlVersion,\n    r.SqlEdition,\n    r.ToolVersion\nFROM dbo.AssessmentRun AS r\nINNER JOIN (\n    SELECT ServerName, MAX(RunId) AS MaxRunId\n    FROM dbo.AssessmentRun\n    GROUP BY ServerName\n) AS latest ON r.ServerName = latest.ServerName AND r.RunId = latest.MaxRunId;\nGO\n\nPRINT N'  Created dbo.vw_LatestAssessment';\nGO\n\n-------------------------------------------------------------------------------\n-- View: Finding trends (new findings vs resolved)\n-------------------------------------------------------------------------------\nIF OBJECT_ID(N'dbo.vw_FindingTrend', N'V') IS NOT NULL\n    DROP VIEW dbo.vw_FindingTrend;\nGO\n\nCREATE VIEW dbo.vw_FindingTrend AS\nSELECT\n    r.ServerName,\n    r.RunUtc,\n    r.HealthScore,\n    f.CheckId,\n    f.Severity,\n    f.Area,\n    f.Finding,\n    f.IsNew,\n    CASE WHEN f.ResolvedRunId IS NOT NULL THEN 1 ELSE 0 END AS IsResolved\nFROM dbo.AssessmentFinding AS f\nINNER JOIN dbo.AssessmentRun AS r ON f.RunId = r.RunId;\nGO\n\nPRINT N'  Created dbo.vw_FindingTrend';\nGO\n\nPRINT N'Persistence tables created successfully.';\nPRINT N'';\nPRINT N'Next step: Run sp_DBA_SaveAssessmentRun to persist assessment data.';\nGO\n", "sql_server/01_Server_OS/cpu_utilization.sql": "/*\n================================================================================\nPurpose:        Analyzes historical CPU usage from OS ring buffers and evaluates \n                current thread scheduling health via Signal Wait ratio.\nProvides:       Historical CPU metrics (last ~256 mins), Signal Wait Pct, \n                Scheduler Health (runnable tasks).\nImportance:     CPU is a critical resource; high utilization or scheduling pressure \n                directly impacts query performance and instance stability.\n Interpretation: Historical CPU > 80% requires investigation. Signal Waits > 25% \n                indicates CPU bottleneck. Runnable tasks > 10 is critical CPU starvation.\nAction:         If Historical CPU > 80%, identify top resource consumers via top_resource_queries.sql. If Signal Wait % > 25%, review MAXDOP and Cost Threshold for Parallelism settings via server_configuration_audit.sql. If Runnable Tasks > 10 sustained, CPU is oversubscribed — reduce parallelism or add cores.\nCriticality:    High\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\nSET QUOTED_IDENTIFIER ON;\n\nIF OBJECT_ID(N'dbo.fn_DBA_ExcludedWaitTypes', N'IF') IS NULL\n    AND NOT EXISTS (SELECT 1 FROM DBARepository.sys.objects WHERE name = N'fn_DBA_ExcludedWaitTypes' AND type = 'IF')\nBEGIN\n    RAISERROR(N'Run 00_Framework/00_Deploy_Framework.ps1 (-ServerInstance . -Database master) to auto-deploy all required objects, or deploy fn_DBA_ExcludedWaitTypes manually.', 16, 1);\n    RETURN;\nEND;\n\n-- 1. Historical CPU Usage from System Health Ring Buffer\nDECLARE @ts_now BIGINT;\nSELECT @ts_now = cpu_ticks / (cpu_ticks / ms_ticks) \nFROM sys.dm_os_sys_info WITH (NOLOCK);\n\nSELECT TOP (256)\n    DATEADD(ms, -1 * (@ts_now - [timestamp]), GETDATE()) AS [Event_Time],\n    SQLProcessUtilization AS [SQL_Server_CPU_Pct],\n    SystemIdle AS [System_Idle_Pct],\n    100 - SystemIdle - SQLProcessUtilization AS [Other_Process_CPU_Pct],\n    CAST('Historical CPU metrics parsed from SQL Server system ring buffers. ' + \n         'Threshold: Sustained CPU > 80% requires investigation. ' +\n         'Recommendation: If Other Process CPU is high, check external processes (e.g., antivirus, backups). ' +\n         'If SQL Server CPU is high, check top resource-consuming queries and missing indexes.' \n         AS VARCHAR(1000)) AS [Metric_Context]\nFROM (\n    SELECT \n        record.value('(./Record/@id)[1]', 'int') AS record_id,\n        record.value('(./Record/SchedulerMonitorEvent/SystemHealth/SystemIdle)[1]', 'int') AS SystemIdle,\n        record.value('(./Record/SchedulerMonitorEvent/SystemHealth/ProcessUtilization)[1]', 'int') AS SQLProcessUtilization,\n        [timestamp]\n    FROM (\n        SELECT [timestamp], CONVERT(xml, record) AS [record]\n        FROM sys.dm_os_ring_buffers WITH (NOLOCK)\n        WHERE ring_buffer_type = N'RING_BUFFER_SCHEDULER_MONITOR'\n          AND record LIKE N'%<SystemHealth>%'\n    ) AS x\n) AS y\nORDER BY [Event_Time] DESC;\n\n-- 2. Signal Wait Ratio (CPU Scheduling Pressure)\nSELECT \n    SUM(signal_wait_time_ms) AS [Signal_Wait_Time_ms],\n    SUM(wait_time_ms) AS [Total_Wait_Time_ms],\n    CAST(CAST(SUM(signal_wait_time_ms) AS NUMERIC(18,2)) / \n         NULLIF(SUM(wait_time_ms), 0) * 100 AS DECIMAL(5,2)) AS [Signal_Wait_Pct],\n    CAST('Signal wait time measures the time a thread had to wait in the runnable queue after its resource became available. ' +\n         'Threshold: Signal Waits > 25% of Total Waits indicates significant CPU bottleneck / scheduling pressure. ' +\n         'Recommendation: If > 25%, look into parallelism configurations (MAXDOP, Cost Threshold), compile locks, or CPU capacity scaling.' \n         AS VARCHAR(1000)) AS [Metric_Context]\nFROM sys.dm_os_wait_stats\nWHERE wait_type NOT IN (\n    SELECT wait_type FROM dbo.fn_DBA_ExcludedWaitTypes()\n);\n\n-- 3. Scheduler Pressure (Runnable Tasks)\nPRINT '--- Scheduler Health & Runnable Tasks ---';\nSELECT \n    parent_node_id,\n    scheduler_id,\n    cpu_id,\n    status,\n    is_online,\n    runnable_tasks_count,\n    current_workers_count,\n    CASE \n        WHEN runnable_tasks_count > 10 THEN '🔴 CRITICAL: High runnable tasks indicating CPU starvation.'\n        WHEN runnable_tasks_count > 0 THEN '🟡 WARNING: Threads are waiting for CPU cycles.'\n        ELSE '🟢 OPTIMAL'\n    END AS [Scheduler_Status]\nFROM sys.dm_os_schedulers\nWHERE status = 'VISIBLE ONLINE';\n", "sql_server/01_Server_OS/disk_latency.sql": "/*\n================================================================================\nPurpose:        Analyzes read and write latencies (stalls) per database and \n                transaction log file.\nProvides:       Average Read, Write, and Total stalls (ms) per file.\nImportance:     Disk I/O is often the slowest component; high latency directly \n                throttles transaction throughput.\n Interpretation: <1ms = Excellent; 1-15ms = Acceptable; 15-20ms = Warning; \n                >20ms = Critical.\nAction:         If Avg_Read_Stall_ms or Avg_Write_Stall_ms > 20ms for data files, move the affected database files to faster storage (SSD/SAN). For log files with > 20ms latency, separate logs from data on different physical drives. Run tempdb_configuration.sql if tempdb files show high latency.\nCriticality:    High\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\n\nSELECT \n    DB_NAME(vfs.database_id) AS [Database_Name],\n    mf.name AS [Logical_File_Name],\n    mf.physical_name AS [Physical_Path],\n    mf.type_desc AS [File_Type],\n    vfs.num_of_reads AS [Total_Reads],\n    vfs.num_of_writes AS [Total_Writes],\n    -- Calculate Average Read Stall\n    CAST(vfs.io_stall_read_ms / NULLIF(vfs.num_of_reads, 0) AS NUMERIC(10,1)) AS [Avg_Read_Stall_ms],\n    -- Calculate Average Write Stall\n    CAST(vfs.io_stall_write_ms / NULLIF(vfs.num_of_writes, 0) AS NUMERIC(10,1)) AS [Avg_Write_Stall_ms],\n    -- Calculate Average Latency Overall\n    CAST(vfs.io_stall / NULLIF(vfs.num_of_reads + vfs.num_of_writes, 0) AS NUMERIC(10,1)) AS [Avg_IO_Stall_ms],\n    CAST('Analyzes disk latency per file. ' + \n         'Threshold: <1ms = Excellent; 1-5ms = Very Good; 5-15ms = Acceptable; 15-20ms = Warning; >20ms = Critical. ' +\n         'Recommendation: If stalls are high on log files, move logs to dedicated fast storage (SSD/NVMe). If data file stalls are high, evaluate memory/buffer pool hit ratios to verify if too much physical read is occurring.'\n         AS VARCHAR(1000)) AS [Metric_Context]\nFROM sys.dm_io_virtual_file_stats(NULL, NULL) AS vfs\nINNER JOIN sys.master_files AS mf WITH (NOLOCK)\n   ON vfs.database_id = mf.database_id \n  AND vfs.file_id = mf.file_id\nORDER BY [Avg_IO_Stall_ms] DESC;\n\n-- 2. Top 10 File-Level Latency Hotspots\nPRINT '--- Top 10 File-Level Latency Hotspots ---';\nSELECT TOP 10\n    DB_NAME(vfs.database_id) AS [DB],\n    mf.name AS [File],\n    vfs.io_stall_read_ms / NULLIF(vfs.num_of_reads, 0) AS [Read_Latency],\n    vfs.io_stall_write_ms / NULLIF(vfs.num_of_writes, 0) AS [Write_Latency],\n    CASE \n        WHEN (vfs.io_stall_read_ms / NULLIF(vfs.num_of_reads, 0) > 50) OR (vfs.io_stall_write_ms / NULLIF(vfs.num_of_writes, 0) > 50) THEN '🔴 CRITICAL'\n        WHEN (vfs.io_stall_read_ms / NULLIF(vfs.num_of_reads, 0) > 20) OR (vfs.io_stall_write_ms / NULLIF(vfs.num_of_writes, 0) > 20) THEN '🟡 WARNING'\n        ELSE '🟢 OPTIMAL'\n    END AS [Disk_Status]\nFROM sys.dm_io_virtual_file_stats(NULL, NULL) AS vfs\nINNER JOIN sys.master_files AS mf WITH (NOLOCK) ON vfs.database_id = mf.database_id AND vfs.file_id = mf.file_id\nORDER BY (vfs.io_stall / NULLIF(vfs.num_of_reads + vfs.num_of_writes, 0)) DESC;\n", "sql_server/01_Server_OS/memory_diagnostics.sql": "/*\n================================================================================\nPurpose:        Analyzes current memory allocation, Page Life Expectancy (PLE), \n                memory clerks, and pending memory grants (Resource Semaphores).\nProvides:       Instance memory overview, PLE per NUMA node, Memory clerk \n                distribution, Pending memory grants.\nImportance:     Memory pressure causes frequent disk I/O (paging), severely \n                degrading performance.\nInterpretation: PLE below dynamic threshold ((Total Memory in GB / 4) * 150) \n                indicates pressure. Any pending memory grants indicate severe starvation.\n Prerequisites: Deploy framework objects first (00_Framework/00_Deploy_Framework.ps1) when using shared wait helpers.\nAction:         If PLE is below threshold, increase max server memory or add RAM. If pending memory grants exist, review queries with large memory grants via top_resource_queries.sql. For high single-page allocators, check for .NET or linked server connections.\nCriticality:    High\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\n\n-- 1. Instance Memory Overview & Configuration Validation\nSELECT \n    physical_memory_in_use_kb / 1024 AS [Memory_In_Use_MB],\n    (SELECT CAST(value_in_use AS INT) FROM sys.configurations WHERE name = 'max server memory (MB)') AS [Max_Server_Memory_MB],\n    (SELECT cntr_value / 1024 FROM sys.dm_os_performance_counters WITH (NOLOCK) WHERE counter_name = 'Target Server Memory (KB)') AS [Target_Memory_MB],\n    (SELECT cntr_value / 1024 FROM sys.dm_os_performance_counters WITH (NOLOCK) WHERE counter_name = 'Total Server Memory (KB)') AS [Total_Memory_MB],\n    CAST('Comparison of Target vs. Total Server memory. ' + \n         'Threshold: Total Server Memory should reach Target Server Memory after warmup. ' +\n         'If Memory In Use is close to Max Server Memory, it is normal behavior as SQL caches data. ' +\n         'Recommendation: If Max Server Memory is set too high (leaving < 10% RAM for OS), reduce it to prevent OS paging.'\n         AS VARCHAR(1000)) AS [Metric_Context]\nFROM sys.dm_os_process_memory WITH (NOLOCK);\n\n-- 2. Page Life Expectancy (PLE) per NUMA Node\nDECLARE @TotalMemGB DECIMAL(18,2) = (\n    SELECT cntr_value / 1024.0 / 1024.0\n    FROM sys.dm_os_performance_counters\n    WHERE counter_name = N'Total Server Memory (KB)'\n);\nDECLARE @PLEThreshold INT = CASE WHEN @TotalMemGB > 0 THEN CAST((@TotalMemGB / 4.0) * 150 AS INT) ELSE 300 END;\n\nSELECT \n    RTRIM(instance_name) AS [NUMA_Node],\n    cntr_value AS [Page_Life_Expectancy_Seconds],\n    @TotalMemGB AS [Total_Memory_GB],\n    @PLEThreshold AS [PLE_Threshold_Seconds],\n    CASE\n        WHEN cntr_value < @PLEThreshold THEN N'WARNING: Below dynamic PLE threshold'\n        ELSE N'OK'\n    END AS [PLE_Status],\n    CAST(N'Page Life Expectancy measures buffer cache retention. Dynamic threshold = (Total Memory GB / 4) * 150.' AS VARCHAR(1000)) AS [Metric_Context]\nFROM sys.dm_os_performance_counters\nWHERE object_name LIKE N'%Buffer Manager%'\n  AND counter_name = N'Page life expectancy';\n\n-- 3. NUMA Node Analysis\nPRINT '--- Memory Nodes (NUMA) Analysis ---';\nSELECT \n    memory_node_id,\n    virtual_address_space_reserved_kb / 1024 AS [VA_Reserved_MB],\n    virtual_address_space_committed_kb / 1024 AS [VA_Committed_MB],\n    locked_page_allocations_kb / 1024 AS [Locked_Pages_MB],\n    pages_kb / 1024 AS [Total_Pages_MB],\n    CASE \n        WHEN pages_kb < 1024 * 1024 THEN '🟡 INFO: Small memory node'\n        ELSE '🟢 OPTIMAL'\n    END AS [Node_Status]\nFROM sys.dm_os_memory_nodes\nWHERE memory_node_id <> 64; -- Exclude DAC node\n\n-- 4. Memory Clerks Distribution (Top 10 consumers)\nSELECT TOP (10)\n    type AS [Memory_Clerk_Type],\n    pages_kb / 1024 AS [Allocated_MB],\n    CAST('Memory clerk distribution identifies what component inside SQL Server is consuming memory. ' +\n         'Threshold: MEMORYCLERK_SQLBUFFERPOOL should normally dominate. ' +\n         'Recommendation: If CACHESTORE_SQLCP (Ad-hoc plans) or CACHESTORE_OBJCP is extremely high, enable \"optimize for ad hoc workloads\" or perform parameterization.'\n         AS VARCHAR(1000)) AS [Metric_Context]\nFROM sys.dm_os_memory_clerks WITH (NOLOCK)\nORDER BY pages_kb DESC;\n\n-- 4. Pending Memory Grants (Resource Semaphore Waits)\nSELECT \n    requested_memory_kb / 1024 AS [Requested_Memory_MB],\n    granted_memory_kb / 1024 AS [Granted_Memory_MB],\n    timeout_sec AS [Timeout_Seconds],\n    query_cost AS [Query_Cost],\n    CAST('Queries waiting for RAM allocation to run. ' +\n         'Threshold: Any active row returned indicates immediate, severe memory resource starvation. ' +\n         'Recommendation: Find execution plans for session_ids returned here, optimize their sorting/hashing operations, or scale server RAM.'\n         AS VARCHAR(1000)) AS [Metric_Context]\nFROM sys.dm_exec_query_memory_grants WITH (NOLOCK);\n", "sql_server/02_Instance_Config/database_compatibility_audit.sql": "/*\n================================================================================\nSQL Server Database Compatibility Level Audit\n================================================================================\nDescription:\n    Flags databases that are not running on the instance's default compatibility\n    level and checks for auto_close, auto_shrink, and orphaned database owners.\n    Running at a lower compatibility level prevents access to new optimizer\n    improvements and query store features.\n\nOutput:\n    List of databases with their current vs. instance-default compatibility level,\n    along with misconfigured settings (auto_close, auto_shrink) and owner info.\n\nAction:\n    For databases with \"WARNING: Below instance level\", test and upgrade the\n    compatibility level during a maintenance window:\n        ALTER DATABASE [DBName] SET COMPATIBILITY_LEVEL = <instance_default>;\n    For auto_close or auto_shrink enabled, disable immediately:\n        ALTER DATABASE [DBName] SET AUTO_CLOSE OFF, AUTO_SHRINK OFF;\n    For orphaned owners, run:\n        EXEC [DBName].dbo.sp_changedbowner @loginame = N'sa';\n\nParameters:\n    @DatabaseList - comma-separated database names or NULL for all user DBs\n\nCriticality: Medium\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\n\nDECLARE @DatabaseList NVARCHAR(MAX) = NULL;\nDECLARE @InstanceCompat INT =\n    COALESCE(\n        CAST(SERVERPROPERTY(N'ProductMajorVersion') AS INT),\n        CAST(PARSENAME(CAST(SERVERPROPERTY(N'ProductVersion') AS NVARCHAR(128)), 4) AS INT)\n    ) * 10;\n\nSELECT\n    d.name AS [Database_Name],\n    d.compatibility_level AS [Compatibility_Level],\n    @InstanceCompat AS [Instance_Default_Compat_Level],\n    d.collation_name,\n    d.is_auto_close_on,\n    d.is_auto_shrink_on,\n    SUSER_SNAME(d.owner_sid) AS [Database_Owner],\n    CASE\n        WHEN d.compatibility_level < @InstanceCompat THEN N'WARNING: Below instance level'\n        WHEN d.compatibility_level > @InstanceCompat THEN N'REVIEW: Above instance level'\n        ELSE N'OK'\n    END AS [Compat_Status],\n    CASE\n        WHEN SUSER_SNAME(d.owner_sid) IS NULL THEN N'CRITICAL: Orphaned database owner'\n        WHEN SUSER_SNAME(d.owner_sid) = N'sa' THEN N'INFO: Owner is sa'\n        ELSE N'OK'\n    END AS [Owner_Status]\nFROM sys.databases AS d\nWHERE d.database_id > 4\n  AND d.state = 0\n  AND (\n        @DatabaseList IS NULL\n        OR d.name IN (\n            SELECT LTRIM(RTRIM(value))\n            FROM STRING_SPLIT(@DatabaseList, N',')\n            WHERE LTRIM(RTRIM(value)) <> N''\n        )\n      )\nORDER BY d.compatibility_level, d.name;\n", "sql_server/02_Instance_Config/os_integration_checks.sql": "/*\n================================================================================\nPurpose:        Verifies if Instant File Initialization (IFI) and Lock Pages in \n                Memory (LPIM) are properly configured for the service account.\nProvides:       IFI enabled status, SQL Server memory model (LPIM status).\nImportance:     IFI speeds up file growth/creation; LPIM prevents OS from paging \n                SQL memory, ensuring stable performance.\n Interpretation: IFI_Enabled should be \"Y\". Memory_Model should be \"LOCK_PAGES\".\nAction:         If IFI_Enabled = 'N', grant 'Perform Volume Maintenance Tasks' to the SQL service account and restart. If Memory_Model is not 'LOCK_PAGES', grant 'Lock Pages in Memory' to the SQL service account and restart.\nCriticality:    Medium\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\n\n-- 1. Check Instant File Initialization (IFI) - Available on SQL Server 2016 SP1 and newer\nIF COL_LENGTH(N'sys.dm_server_services', N'instant_file_initialization_enabled') IS NOT NULL\nBEGIN\n    SELECT \n        servicename AS [Service_Name],\n        startup_type_desc AS [Startup_Type],\n        status_desc AS [Service_Status],\n        instant_file_initialization_enabled AS [IFI_Enabled],\n        CAST('Instant File Initialization allows SQL Server to skip zeroing out disk space for data files. ' +\n             'Threshold: IFI_Enabled should be \"Y\". ' +\n             'Recommendation: If \"N\", grant the service account \"Perform Volume Maintenance Tasks\" privilege (SE_MANAGE_VOLUME_NAME) in local security policy and restart SQL Server.'\n             AS VARCHAR(1000)) AS [Metric_Context]\n    FROM sys.dm_server_services WITH (NOLOCK)\n    WHERE servicename LIKE 'SQL Server (%)' OR servicename = 'MSSQLSERVER';\nEND\nELSE\n    PRINT 'Instant File Initialization status requires SQL Server 2016 SP1 or newer.';\n\n-- 2. Check Lock Pages in Memory (LPIM) Memory Model (sql_memory_model columns: SQL Server 2019+)\nIF COL_LENGTH(N'sys.dm_os_sys_info', N'sql_memory_model_desc') IS NOT NULL\nBEGIN\n    SELECT \n        sql_memory_model AS [Memory_Model_ID],\n        sql_memory_model_desc AS [Memory_Model_Description],\n        CAST('Lock Pages in Memory prevents the operating system from paging SQL Server memory to disk. ' +\n             'Threshold: Ideally \"LOCK_PAGES\" (LPIM enabled) or \"CONVENTIONAL\" (standard memory allocations, check if paging occurs). ' +\n             'Recommendation: If \"CONVENTIONAL\" and OS memory pressure is frequent, grant \"Lock Pages in Memory\" privilege (SE_LOCK_MEMORY_NAME) in local security policy to the service account and restart.'\n             AS VARCHAR(1000)) AS [Metric_Context]\n    FROM sys.dm_os_sys_info WITH (NOLOCK);\nEND\nELSE\n    PRINT 'sql_memory_model_desc is not available on this version (requires SQL Server 2019+). Check LPIM via service account privileges and sys.dm_os_process_memory.';\n\n-- 3. Active Global Trace Flags\nPRINT '--- Global Trace Flags Audit ---';\nDBCC TRACESTATUS(-1);\n\n/*\nExpert Recommended Trace Flags:\n- TF 1222: Capture deadlock graph in error log.\n- TF 3226: Suppress successful backup log messages.\n- TF 2371: Dynamic statistics update threshold (pre-2016).\n*/\n", "sql_server/02_Instance_Config/server_configuration_audit.sql": "/*\n================================================================================\nPurpose:        Audits 20+ critical instance-level configurations (Max Memory, \n                MAXDOP, Cost Threshold, etc.) with detailed rationale.\nProvides:       Current value, expert rationale, and status for each setting.\nImportance:     Misconfigured instance settings are a leading cause of systemic \n                performance issues.\n Interpretation: Follow \"Expert_Rationale\" and \"Status\" columns \n                (Critical/Warning/Optimal).\nAction:         For each setting marked \"Critical\" or \"Warning\", apply the recommended value using sp_configure. For MAXDOP and CTFP changes, test on non-production first. For max server memory, ensure at least 4-8 GB is reserved for the OS.\nCriticality:    High\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\n\nSELECT \n    name AS [Setting],\n    value_in_use AS [Current_Value],\n    CASE name\n        WHEN 'max server memory (MB)' THEN 'Target: 80-90% of RAM. Crucial to prevent OS memory starvation and paging.'\n        WHEN 'min server memory (MB)' THEN 'Target: 0 or low value. Forces SQL to release memory if OS needs it (rarely changed).'\n        WHEN 'cost threshold for parallelism' THEN 'Target: >= 50. Prevents trivial queries from parallelizing and bloating CPU.'\n        WHEN 'max degree of parallelism' THEN 'Target: 8 or NUMA node size. Prevents a single query from saturating all cores.'\n        WHEN 'optimize for ad hoc workloads' THEN 'Target: 1. Reduces plan cache bloat by only caching stubs for single-use queries.'\n        WHEN 'backup compression default' THEN 'Target: 1. Faster backups and significantly less disk usage.'\n        WHEN 'backup checksum default' THEN 'Target: 1. Ensures backup integrity during the write process.'\n        WHEN 'remote admin connections' THEN 'Target: 1. Allows Dedicated Admin Connection (DAC) when the server is hung.'\n        WHEN 'clr enabled' THEN 'Security: Only enable if using .NET assemblies. Potential attack surface.'\n        WHEN 'database mail XPs' THEN 'Management: Required for SQL Agent alerts and DB mail notifications.'\n        WHEN 'show advanced options' THEN 'Info: Must be 1 to see all configurations below.'\n        WHEN 'priority boost' THEN 'Target: 0. Modern OS scheduling makes this obsolete and dangerous.'\n        WHEN 'fill factor (%)' THEN 'Target: 0 or 100. Global setting for index fullness. Lowering this wastes RAM/Disk.'\n        WHEN 'blocked process threshold (s)' THEN 'Target: 5-20. Required for Profiler/Extended Events to capture blocking.'\n        WHEN 'max worker threads' THEN 'Target: 0 (Auto). SQL manages threads based on CPU count.'\n        WHEN 'cursor threshold' THEN 'Legacy: Only affects synchronous cursor generation. Usually left at default.'\n        WHEN 'ad hoc distributed queries' THEN 'Security: Leave 0 unless using OPENROWSET/OPENDATASOURCE (Risk).'\n        WHEN 'contained database authentication' THEN 'Info: Enable if using Contained DBs for easier migration.'\n        WHEN 'clr strict security' THEN 'Security: Target: 1. Forces signed assemblies (SQL 2017+).'\n        ELSE 'Review based on application-specific requirements.'\n    END AS [Expert_Rationale],\n    CASE \n        WHEN name = 'cost threshold for parallelism' AND value_in_use = 5 THEN '🔴 CRITICAL'\n        WHEN name = 'priority boost' AND value_in_use = 1 THEN '🔴 CRITICAL'\n        WHEN name = 'max degree of parallelism' AND value_in_use = 0 THEN '🟡 WARNING'\n        WHEN name = 'optimize for ad hoc workloads' AND value_in_use = 0 THEN '🟡 WARNING'\n        WHEN name = 'backup checksum default' AND value_in_use = 0 THEN '🟡 WARNING'\n        ELSE '🟢 OPTIMAL / REVIEW'\n    END AS [Status]\nFROM sys.configurations WITH (NOLOCK)\nWHERE name IN (\n    'max server memory (MB)', 'min server memory (MB)', 'cost threshold for parallelism', 'max degree of parallelism',\n    'optimize for ad hoc workloads', 'backup compression default', 'backup checksum default', 'remote admin connections',\n    'clr enabled', 'database mail XPs', 'show advanced options', 'priority boost', 'fill factor (%)',\n    'blocked process threshold (s)', 'max worker threads', 'cursor threshold', 'ad hoc distributed queries',\n    'contained database authentication', 'clr strict security'\n)\nORDER BY [Status] ASC, name ASC;\n", "sql_server/03_Storage_Engine/database_files_growth.sql": "/*\n================================================================================\nDatabase File Space, Autogrowth, and Utilization\n================================================================================\nDescription:\n    Reports current file size, space used, free space, and autogrowth settings\n    for all data and log files across user databases. Identifies files that are\n    near capacity or have suboptimal autogrowth configurations.\n\nOutput:\n    File-level details including used space percentage, autogrowth increments,\n    and a status column indicating files that need attention.\n\nAction:\n    For files with UsedPct > 90%, extend the file size immediately:\n        ALTER DATABASE [DBName] MODIFY FILE (NAME = logical_name, SIZE = new_size_MB);\n    For files with percentage-based autogrowth (\"BY_PERCENT\"), switch to fixed-MB\n    growth to prevent uncontrolled growth events:\n        ALTER DATABASE [DBName] MODIFY FILE (NAME = logical_name, FILEGROWTH = 1024MB);\n    Monitor log files closely — logs that grow unexpectedly may indicate\n    long-running transactions or missing log backups.\n\nParameters:\n    @DatabaseList - comma-separated database names or NULL for all user DBs\n    @StalePctThreshold - used space % threshold for warnings (default 80)\n\nCriticality: High\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\n\nDECLARE @DatabaseList NVARCHAR(MAX) = NULL; -- e.g. N'SalesDB,HRDB'\nDECLARE @StalePctThreshold DECIMAL(5,2) = 80.0;\n\nIF OBJECT_ID(N'tempdb..#FileSpaceStats') IS NOT NULL DROP TABLE #FileSpaceStats;\nCREATE TABLE #FileSpaceStats (\n    DatabaseName SYSNAME,\n    LogicalName SYSNAME,\n    PhysicalName NVARCHAR(260),\n    FileType VARCHAR(10),\n    TotalSizeMB DECIMAL(18,2),\n    SpaceUsedMB DECIMAL(18,2),\n    FreeSpaceMB DECIMAL(18,2),\n    AutogrowthSetting VARCHAR(50),\n    UsedPct DECIMAL(5,2),\n    SpaceStatus VARCHAR(20)\n);\n\nIF OBJECT_ID(N'tempdb..#DbTargets') IS NOT NULL DROP TABLE #DbTargets;\nCREATE TABLE #DbTargets (database_name SYSNAME NOT NULL PRIMARY KEY);\n\nIF @DatabaseList IS NOT NULL AND LTRIM(RTRIM(@DatabaseList)) <> N''\nBEGIN\n    INSERT INTO #DbTargets (database_name)\n    SELECT LTRIM(RTRIM(value))\n    FROM STRING_SPLIT(@DatabaseList, N',')\n    WHERE LTRIM(RTRIM(value)) <> N'';\nEND\nELSE\nBEGIN\n    INSERT INTO #DbTargets (database_name)\n    SELECT name FROM sys.databases WHERE database_id > 4 AND state = 0 AND is_in_standby = 0;\nEND;\n\nDECLARE @db_name SYSNAME;\nDECLARE @SQL NVARCHAR(MAX);\n\nDECLARE db_cursor CURSOR LOCAL FAST_FORWARD FOR\n    SELECT database_name FROM #DbTargets ORDER BY database_name;\n\nOPEN db_cursor;\nFETCH NEXT FROM db_cursor INTO @db_name;\n\nWHILE @@FETCH_STATUS = 0\nBEGIN\n    SET @SQL = N'USE ' + QUOTENAME(@db_name) + N';\n    INSERT INTO #FileSpaceStats\n    SELECT\n        DB_NAME(),\n        df.name,\n        df.physical_name,\n        df.type_desc,\n        CAST(df.size * 8.0 / 1024 AS DECIMAL(18,2)),\n        CAST(FILEPROPERTY(df.name, N''SpaceUsed'') * 8.0 / 1024 AS DECIMAL(18,2)),\n        CAST((df.size - FILEPROPERTY(df.name, N''SpaceUsed'')) * 8.0 / 1024 AS DECIMAL(18,2)),\n        CASE WHEN df.is_percent_growth = 1 THEN CAST(df.growth AS VARCHAR(10)) + N''%'' ELSE CAST(df.growth * 8 / 1024 AS VARCHAR(10)) + N'' MB'' END,\n        CAST(FILEPROPERTY(df.name, N''SpaceUsed'') * 100.0 / NULLIF(df.size, 0) AS DECIMAL(5,2)),\n        CASE\n            WHEN CAST(FILEPROPERTY(df.name, N''SpaceUsed'') * 100.0 / NULLIF(df.size, 0) AS DECIMAL(5,2)) >= ' + CAST(@StalePctThreshold AS NVARCHAR(10)) + N' THEN N''WARNING''\n            ELSE N''OK''\n        END\n    FROM sys.database_files AS df;';\n\n    BEGIN TRY\n        EXEC sys.sp_executesql @SQL;\n    END TRY\n    BEGIN CATCH\n        INSERT INTO #FileSpaceStats\n        VALUES (@db_name, N'ERROR', LEFT(ERROR_MESSAGE(), 260), N'N/A', 0, 0, 0, N'N/A', 0, N'ERROR');\n    END CATCH;\n\n    FETCH NEXT FROM db_cursor INTO @db_name;\nEND;\n\nCLOSE db_cursor;\nDEALLOCATE db_cursor;\n\nSELECT * FROM #FileSpaceStats ORDER BY UsedPct DESC, TotalSizeMB DESC;\nDROP TABLE #FileSpaceStats;\nDROP TABLE #DbTargets;\n", "sql_server/03_Storage_Engine/tempdb_configuration.sql": "/*\n================================================================================\nPurpose:        Analyzes TempDB file allocations (file counts, uniformity of \n                sizes/growths) and identifies PAGELATCH allocation bottlenecks.\nProvides:       TempDB file counts, growth uniformity, active PAGELATCH \n                contention.\nImportance:     TempDB is a shared resource; contention here bottlenecks the \n                entire instance.\n Interpretation: Files should match cores (up to 8). Mismatched growth is \n                critical. PAGELATCH waits indicate contention.\nAction:         If file count < @ExpectedFiles, add equal-sized data files (1 per core/CPU up to 8). If file sizes are not uniform, resize all files to the same size. If PAGELATCH waits are detected, adding files often resolves allocation contention. Restart is NOT required after adding TempDB files.\nCriticality:    High\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\n\n-- 1. TempDB File Configuration Analysis\nPRINT '--- TempDB File Configuration & Uniformity ---';\nDECLARE @LogCores INT = (SELECT cpu_count FROM sys.dm_os_sys_info);\nDECLARE @ExpectedFiles INT = CASE WHEN @LogCores <= 8 THEN @LogCores ELSE 8 END;\n\nSELECT \n    name AS [Logical_File_Name],\n    type_desc AS [File_Type],\n    size * 8 / 1024 AS [Size_MB],\n    growth AS [Growth_Value],\n    is_percent_growth AS [Is_Percent_Growth],\n    CASE \n        WHEN is_percent_growth = 1 THEN '🔴 CRITICAL: Use fixed-size growth (e.g. 256MB) to ensure uniformity.'\n        WHEN growth <> (SELECT TOP 1 growth FROM sys.master_files WHERE database_id = 2 AND type = 0 ORDER BY file_id) \n             THEN '🔴 CRITICAL: Mismatched growth increments will break proportional fill.'\n        ELSE '🟢 OPTIMAL'\n    END AS [Growth_Uniformity_Status],\n    (SELECT COUNT(*) FROM sys.master_files WHERE database_id = 2 AND type = 0) AS [Data_Files_Count],\n    @ExpectedFiles AS [Target_Data_Files],\n    CASE \n        WHEN (SELECT COUNT(*) FROM sys.master_files WHERE database_id = 2 AND type = 0) < @ExpectedFiles \n             THEN '🟡 WARNING: File count should match logical cores up to 8.'\n        ELSE '🟢 OPTIMAL'\n    END AS [File_Count_Status]\nFROM sys.master_files WITH (NOLOCK)\nWHERE database_id = 2; -- TempDB database_id is 2\n\n-- 2. Detect TempDB PAGELATCH Contention (PFS, GAM, SGAM)\nPRINT '--- Active TempDB PAGELATCH Contention (Allocation Pages) ---';\nSELECT \n    session_id,\n    wait_type,\n    wait_duration_ms,\n    resource_description,\n    CASE \n        WHEN resource_description LIKE '2:%:1' OR resource_description LIKE '2:%:125440' THEN '🔴 CRITICAL: PFS page contention. More files or uniform growth needed.'\n        WHEN resource_description LIKE '2:%:2' THEN '🔴 CRITICAL: GAM page contention.'\n        WHEN resource_description LIKE '2:%:3' THEN '🔴 CRITICAL: SGAM page contention.'\n        ELSE '⚪ INFO: Other Page Contention'\n    END AS [Expert_Guidance]\nFROM sys.dm_os_waiting_tasks WITH (NOLOCK)\nWHERE wait_type LIKE 'PAGELATCH_%'\n  AND resource_description LIKE '2:%'; -- Database 2 is TempDB\n\n-- 3. Historical Allocation Contention (Waits)\nPRINT '--- Historical Allocation Contention (Waits) ---';\nSELECT \n    wait_type,\n    waiting_tasks_count,\n    wait_time_ms,\n    CASE \n        WHEN wait_type IN ('PAGELATCH_UP', 'PAGELATCH_EX', 'PAGELATCH_SH') THEN '🟡 WARNING: Potential TempDB Metadata/Allocation bottleneck'\n        ELSE '🟢 NORMAL'\n    END AS [Wait_Status]\nFROM sys.dm_os_wait_stats\nWHERE wait_type LIKE 'PAGELATCH_%'\n  AND waiting_tasks_count > 0\nORDER BY wait_time_ms DESC;\n", "sql_server/03_Storage_Engine/vlf_fragmentation.sql": "/*\n================================================================================\nPurpose:        Retrieves VLF count per database to identify transaction log \n                fragmentation across the entire instance.\nProvides:       VLF count and total log size (MB) per database.\nImportance:     High VLF counts degrade replication, backup, and crash recovery \n                speed.\n Interpretation: <200 = Good; 200-500 = Warning; >1000 = Critical.\nAction:         If VLF_Count > 1000 for any database, schedule a log file rebuild during maintenance:\n                    1. Shrink the log file: DBCC SHRINKFILE (logical_name, TRUNCATEONLY)\n                    2. Grow back in large chunks: ALTER DATABASE ... MODIFY FILE (SIZE = <new_size>, FILEGROWTH = <large_increment>)\n                    Use uniform growth increments (e.g., 8GB) to prevent future VLF proliferation.\nCriticality:    Medium\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\n\nSELECT \n    d.name AS [Database_Name],\n    vlf_info.vlf_count AS [VLF_Count],\n    vlf_info.total_log_size_mb AS [Total_Log_Size_MB],\n    CAST('Virtual Log Files (VLFs) partition the physical transaction log file. ' + \n         'Threshold: <200 = Excellent/Good; 200-500 = Warning; >1000 = Critical (high VLF count degrades replication, backup, and crash recovery speed). ' +\n         'Recommendation: If VLF count is critical, shrink the transaction log file during maintenance, then manually grow it back using large, discrete growth increments (e.g., grow by 8GB blocks) to generate fewer, larger VLFs.'\n         AS VARCHAR(1000)) AS [Metric_Context]\nFROM sys.databases AS d WITH (NOLOCK)\nCROSS APPLY (\n    SELECT \n        COUNT(*) AS vlf_count,\n        CAST(SUM(vlf_size_mb) AS NUMERIC(18,2)) AS total_log_size_mb\n    FROM sys.dm_db_log_info(d.database_id)\n) AS vlf_info\nWHERE d.state = 0 AND d.database_id > 4\nORDER BY [VLF_Count] DESC;\n", "sql_server/04_Performance_Diagnostics/blocking_and_deadlocks.sql": "/*\n================================================================================\nPurpose:        Analyzes active requests to construct a hierarchy of blocking \n                sessions and retrieves recent deadlock events from system health.\nProvides:       Lead blockers, suspended sessions, blocking hierarchy (tree), \n                and detailed XML deadlock reports for the last 5 events.\nImportance:     Critical for resolving real-time concurrency issues and \n                diagnosing recurring deadlocks that impact application availability.\nInterpretation: Root blockers have a Blocking_Session_ID = 0. Target these first. \n                 Analyze Deadlock_XML to identify the specific resources contested.\nAction: For active blocking (Blocking_Session_ID > 0), evaluate terminating the head blocker only as a last resort: KILL <session_id>. Investigate the head blocker's query (Open Session_ID query in SSMS) to understand why it holds locks for prolonged periods. For recurring deadlocks, use the Deadlock_XML to identify the objects and lock modes in conflict, then redesign the access pattern.\nCriticality:    Critical\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\nSET QUOTED_IDENTIFIER ON;\n\n-- 1. Identify Lead Blockers and Suspended Sessions\nSELECT \n    r.session_id AS [Session_ID],\n    r.blocking_session_id AS [Blocking_Session_ID],\n    s.login_name AS [Login_Name],\n    s.host_name AS [Client_Host],\n    r.wait_time AS [Wait_Time_ms],\n    r.wait_type AS [Wait_Type],\n    r.wait_resource AS [Wait_Resource],\n    st.text AS [SQL_Statement_Text],\n    CAST('Active blocking trace. ' + \n         'Threshold: Wait_Time_ms > 5000ms represents a user-visible slowdown. Blocking_Session_ID = 0 is the root blocker. ' +\n         'Recommendation: Target the root blocker session. Evaluate its transaction scope, index design (avoid scans causing lock escalations), and verify lock-avoidance strategies like snapshot isolation.'\n         AS VARCHAR(1000)) AS [Metric_Context]\nFROM sys.dm_exec_requests AS r WITH (NOLOCK)\nINNER JOIN sys.dm_exec_sessions AS s WITH (NOLOCK) ON r.session_id = s.session_id\nCROSS APPLY sys.dm_exec_sql_text(r.sql_handle) AS st\nWHERE r.blocking_session_id <> 0 \n   OR r.session_id IN (SELECT DISTINCT blocking_session_id FROM sys.dm_exec_requests WHERE blocking_session_id <> 0)\nORDER BY r.blocking_session_id, r.session_id;\n\n-- 2. Head Blocker & Blocking Chain Hierarchy\nPRINT '--- Head Blocker & Blocking Chain Hierarchy ---';\nWITH [BlockingTree] AS (\n    SELECT \n        session_id,\n        blocking_session_id,\n        0 AS [Level],\n        CAST(session_id AS VARCHAR(MAX)) AS [Path]\n    FROM sys.dm_exec_requests\n    WHERE (blocking_session_id = 0 OR blocking_session_id IS NULL)\n      AND session_id IN (SELECT DISTINCT blocking_session_id FROM sys.dm_exec_requests WHERE blocking_session_id <> 0)\n    \n    UNION ALL\n    \n    SELECT \n        r.session_id,\n        r.blocking_session_id,\n        bt.[Level] + 1,\n        bt.[Path] + ' -> ' + CAST(r.session_id AS VARCHAR(MAX))\n    FROM sys.dm_exec_requests r\n    JOIN [BlockingTree] bt ON r.blocking_session_id = bt.session_id\n)\nSELECT \n    REPLICATE(' | ', [Level]) + CAST(session_id AS VARCHAR) AS [Blocking_Hierarchy],\n    [Path],\n    [Level],\n    CASE WHEN [Level] = 0 THEN '🔴 HEAD BLOCKER' ELSE '🟡 Waiting' END AS [Role]\nFROM [BlockingTree]\nORDER BY [Path];\n\n-- 3. Recent Deadlock Events from System Health Session (last 5 deadlocks)\nSELECT TOP (5)\n    deadlock_event.value('(//deadlock/victim-list/victimProcess/@id)[1]', 'NVARCHAR(50)') AS [Victim_Process_ID],\n    deadlock_event.value('(//deadlock/process-list/process[1]/@spid)[1]', 'INT') AS [Victim_SPID],\n    deadlock_event.value('(//deadlock/process-list/process[1]/@loginname)[1]', 'NVARCHAR(256)') AS [Victim_Login],\n    deadlock_event.value('(//deadlock/process-list/process[1]/@hostname)[1]', 'NVARCHAR(256)') AS [Victim_Host],\n    deadlock_event.value('(//deadlock/process-list/process[1]/@waittime)[1]', 'BIGINT') AS [Victim_Wait_Time_ms],\n    deadlock_event.value('(//deadlock/process-list/process[2]/@spid)[1]', 'INT') AS [Perpetrator_SPID],\n    deadlock_event.value('(//deadlock/process-list/process[2]/@loginname)[1]', 'NVARCHAR(256)') AS [Perpetrator_Login],\n    deadlock_event.value('(//deadlock/process-list/process[2]/@hostname)[1]', 'NVARCHAR(256)') AS [Perpetrator_Host],\n    deadlock_event AS [Deadlock_XML],\n    CAST('Deadlock event details parsed from system_health session. ' +\n         'Threshold: Any deadlock is a concern. Frequent deadlocks indicate transaction contention issues. ' +\n         'Recommendation: Analyze Deadlock_XML to identify the object/resource involved. Common fixes: index tuning, consistent access order, reduced transaction scope, or enabling RCSI.'\n         AS VARCHAR(1000)) AS [Metric_Context]\nFROM (\n    SELECT \n        x.query('.') AS deadlock_event,\n        x.value('(./@timestamp)[1]', 'DATETIME2') AS deadlock_time\n    FROM (\n        SELECT CAST(target_data AS XML) AS target_data\n        FROM sys.dm_xe_session_targets AS st WITH (NOLOCK)\n        INNER JOIN sys.dm_xe_sessions AS s WITH (NOLOCK)\n            ON st.event_session_address = s.address\n        WHERE s.name = 'system_health'\n          AND st.target_name = 'ring_buffer'\n    ) AS ring_data\n    CROSS APPLY target_data.nodes('/RingBuffer/event[@name=\"xml_deadlock_report\"]') AS DeadlockEvent(x)\n) AS deadlocks\nORDER BY deadlock_time DESC;\n", "sql_server/04_Performance_Diagnostics/deadlock_analysis.sql": "/*\n================================================================================\nPurpose:        Advanced deadlock analysis from Extended Events sessions.\n                Extracts and parses deadlock XML from system_health and any\n                custom deadlock XE session, providing victim identification,\n                process details, resource contention, and query text.\nProvides:

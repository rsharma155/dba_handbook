s.\n\nCriticality: Medium\n================================================================================\n*/\n\nSELECT schemaname, relname,\n       n_dead_tup,\n       pg_size_pretty(pg_total_relation_size(relid)) AS size,\n       last_autovacuum,\n       format('VACUUM (ANALYZE) %I.%I;', schemaname, relname) AS suggested_command\nFROM pg_stat_user_tables\nWHERE n_dead_tup > 10000\nORDER BY n_dead_tup DESC\nLIMIT 25;\n", "postgres/10_Capacity_Planning/database_growth_forecast.sql": "/*\n================================================================================\nDatabase Growth Forecast — Size trends from statistics\n================================================================================\nDescription:\n    Current database/table sizes with dead tuple growth indicators.\n    For true trending, schedule dba.sp_baseline_capture() or use monitoring tools.\n\nAction:  Plan disk expansion when largest DB growth rate exceeds capacity runway.\n\nCriticality: Medium\n================================================================================\n*/\n\nSELECT datname,\n       pg_size_pretty(pg_database_size(datname)) AS current_size,\n       pg_database_size(datname) AS size_bytes,\n       (SELECT sum(n_tup_ins + n_tup_upd + n_tup_del) FROM pg_stat_user_tables) AS cluster_write_activity\nFROM pg_database\nWHERE datallowconn AND datname NOT IN ('template0', 'template1')\nORDER BY pg_database_size(datname) DESC;\n\nSELECT date_trunc('day', now()) AS forecast_note,\n       'Capture daily pg_database_size via monitoring for linear growth forecast' AS method;\n", "postgres/11_Query_Analysis/query_regression.sql": "/*\n================================================================================\nQuery Regression — Mean time increase detection\n================================================================================\nDescription:\n    Identifies queries with high execution time variance (proxy for regression).\n    Compare snapshots over time using pg_stat_statements export for true regression.\n\nPrerequisite: pg_stat_statements\n\nCriticality: High\n================================================================================\n*/\n\nSELECT calls,\n       round(min_exec_time::numeric, 2) AS min_ms,\n       round(mean_exec_time::numeric, 2) AS mean_ms,\n       round(max_exec_time::numeric, 2) AS max_ms,\n       round((max_exec_time / nullif(mean_exec_time, 0))::numeric, 2) AS max_to_mean_ratio,\n       left(query, 200) AS query_snippet\nFROM pg_stat_statements\nWHERE calls > 20 AND mean_exec_time > 50\nORDER BY max_exec_time / nullif(mean_exec_time, 0) DESC NULLS LAST\nLIMIT 20;\n", "postgres/12_Extensions/extension_health.sql": "/*\n================================================================================\nExtension Health — Versions, dependencies, and preload status\n================================================================================\nDescription:\n    Extension inventory with upgrade recommendations.\n\nCriticality: Low\n================================================================================\n*/\n\nSELECT e.extname, e.extversion, n.nspname,\n       c.description,\n       EXISTS (\n           SELECT 1 FROM pg_settings\n           WHERE name = 'shared_preload_libraries'\n             AND setting LIKE '%' || e.extname || '%'\n       ) AS in_shared_preload\nFROM pg_extension e\nJOIN pg_namespace n ON n.oid = e.extnamespace\nLEFT JOIN pg_description c ON c.objoid = e.oid AND c.classoid = 'pg_extension'::regclass\nORDER BY e.extname;\n", "postgres/13_Connection_Pooling/connection_pool_audit.sql": "/*\n================================================================================\nConnection Pool Audit — Saturation signals for PgBouncer/pgpool\n================================================================================\nDescription:\n    Indicators that connection pooling should be used or tuned.\n    Run against PostgreSQL; compare with PgBouncer SHOW POOLS separately.\n\nAction:  When numbackends approaches max_connections, deploy PgBouncer in transaction mode.\n\nCriticality: Medium\n================================================================================\n*/\n\nSELECT (SELECT setting::int FROM pg_settings WHERE name = 'max_connections') AS max_connections,\n       (SELECT count(*) FROM pg_stat_activity WHERE backend_type = 'client backend') AS current_connections,\n       round(100.0 * (SELECT count(*) FROM pg_stat_activity WHERE backend_type = 'client backend') /\n             (SELECT setting::int FROM pg_settings WHERE name = 'max_connections'), 2) AS pct_used;\n\nSELECT application_name, count(*) AS sessions,\n       count(*) FILTER (WHERE state = 'idle') AS idle,\n       count(*) FILTER (WHERE state = 'active') AS active\nFROM pg_stat_activity\nWHERE backend_type = 'client backend'\nGROUP BY application_name\nORDER BY sessions DESC;\n\nSELECT 'If using PgBouncer: SHOW POOLS; SHOW STATS; on admin console' AS pgbouncer_note;\n", "postgres/14_Baselines/performance_snapshot.sql": "/*\n================================================================================\nPerformance Snapshot — Point-in-time capture for incidents\n================================================================================\nDescription:\n    Captures key metrics in one run for before/after comparisons.\n    Prefer dba.sp_baseline_capture() when framework is deployed.\n\nCriticality: Medium\n================================================================================\n*/\n\nSELECT now() AS snapshot_utc, pg_postmaster_start_time() AS instance_start;\n\nSELECT 'Connections' AS area, state AS metric, count(*)::text AS value\nFROM pg_stat_activity WHERE backend_type = 'client backend' GROUP BY state\nUNION ALL\nSELECT 'Database', datname, numbackends::text FROM pg_stat_database WHERE datname = current_database()\nUNION ALL\nSELECT 'Buffer Hit %', current_database(),\n       round(100.0 * blks_hit / nullif(blks_hit + blks_read, 0), 2)::text\nFROM pg_stat_database WHERE datname = current_database();\n\nSELECT wait_event_type, wait_event, count(*) AS sessions\nFROM pg_stat_activity\nWHERE wait_event IS NOT NULL AND pid <> pg_backend_pid()\nGROUP BY wait_event_type, wait_event\nORDER BY sessions DESC\nLIMIT 10;\n", "postgres/preventive_measures/01_create_governance_schema.sql": "/*\n================================================================================\nGovernance Schema — Long query and blocking policy tables\n================================================================================\nDescription:\n    Optional schema for capturing policy violations and alerts.\n    Run in dba_repository after 00_create_repository.sql.\n\nCriticality: Low (preventive layer)\n================================================================================\n*/\n\nCREATE TABLE IF NOT EXISTS dba.governance_alert (\n    alert_id        bigserial PRIMARY KEY,\n    alert_utc       timestamptz NOT NULL DEFAULT now(),\n    alert_type      text NOT NULL,\n    severity        text NOT NULL DEFAULT 'WARNING',\n    database_name   text,\n    pid             integer,\n    username        text,\n    duration_sec    numeric,\n    detail          text,\n    query_snippet   text\n);\n\nCREATE INDEX IF NOT EXISTS ix_governance_alert_utc ON dba.governance_alert (alert_utc DESC);\n\nCREATE TABLE IF NOT EXISTS dba.governance_policy (\n    policy_name     text PRIMARY KEY,\n    threshold_sec   integer NOT NULL,\n    action          text NOT NULL DEFAULT 'LOG',\n    is_enabled      boolean NOT NULL DEFAULT true\n);\n\nINSERT INTO dba.governance_policy (policy_name, threshold_sec, action)\nVALUES\n    ('long_running_query', 300, 'LOG'),\n    ('idle_in_transaction', 600, 'LOG'),\n    ('blocking_chain', 60, 'ALERT')\nON CONFLICT (policy_name) DO NOTHING;\n", "postgres/preventive_measures/02_capture_long_queries.sql": "/*\n================================================================================\nCapture Long Queries — Snapshot for policy enforcement\n================================================================================\nDescription:\n    Inserts active queries exceeding threshold into dba.governance_alert.\n\nPrerequisite: preventive_measures/01_create_governance_schema.sql\n\nCriticality: Medium\n================================================================================\n*/\n\nINSERT INTO dba.governance_alert (alert_type, severity, database_name, pid, username, duration_sec, query_snippet)\nSELECT 'long_running_query',\n       CASE WHEN extract(epoch FROM (now() - query_start)) > 600 THEN 'CRITICAL' ELSE 'WARNING' END,\n       datname, pid, usename,\n       round(extract(epoch FROM (now() - query_start))::numeric, 1),\n       left(query, 500)\nFROM pg_stat_activity\nWHERE state = 'active'\n  AND pid <> pg_backend_pid()\n  AND query_start < now() - interval '5 minutes'\n  AND query NOT LIKE '%governance_alert%';\n\nSELECT alert_utc, severity, database_name, pid, duration_sec, left(query_snippet, 80)\nFROM dba.governance_alert\nWHERE alert_utc > now() - interval '24 hours'\nORDER BY alert_utc DESC\nLIMIT 50;\n", "postgres/preventive_measures/03_blocking_detection.sql": "/*\n================================================================================\nBlocking Detection — Log blocking chains to governance_alert\n================================================================================\nDescription:\n    Captures blocking relationships exceeding policy threshold.\n\nPrerequisite: preventive_measures/01_create_governance_schema.sql\n\nCriticality: High\n================================================================================\n*/\n\nINSERT INTO dba.governance_alert (alert_type, severity, database_name, pid, username, duration_sec, detail, query_snippet)\nSELECT 'blocking_chain', 'WARNING',\n       blocked.datname, blocked.pid, blocked.usename,\n       round(extract(epoch FROM (now() - blocked.query_start))::numeric, 1),\n       format('Blocked by PID %s (%s)', blocking.pid, blocking.usename),\n       left(blocked.query, 500)\nFROM pg_stat_activity blocked\nJOIN pg_stat_activity blocking ON blocking.pid = ANY(pg_blocking_pids(blocked.pid))\nWHERE blocked.pid <> pg_backend_pid()\n  AND blocked.query_start < now() - interval '1 minute';\n\nSELECT * FROM dba.governance_alert\nWHERE alert_type = 'blocking_chain' AND alert_utc > now() - interval '24 hours'\nORDER BY alert_utc DESC;\n", "postgres/preventive_measures/04_statement_timeout_policy.sql": "/*\n================================================================================\nStatement Timeout Policy — Recommended role/database settings\n================================================================================\nDescription:\n    Documents and checks statement_timeout and idle_in_transaction_session_timeout.\n\nAction:  ALTER DATABASE ... SET statement_timeout = '30s'; (adjust per workload)\n\nCriticality: Medium\n================================================================================\n*/\n\nSELECT name, setting, unit,\n       CASE name\n           WHEN 'statement_timeout' THEN\n               CASE WHEN setting = '0' THEN 'RECOMMENDED: Set non-zero statement_timeout in production' END\n           WHEN 'idle_in_transaction_session_timeout' THEN\n               CASE WHEN setting = '0' THEN 'RECOMMENDED: Set idle_in_transaction_session_timeout' END\n       END AS policy_note\nFROM pg_settings\nWHERE name IN ('statement_timeout', 'lock_timeout', 'idle_in_transaction_session_timeout');\n\n-- Example (review before running):\n-- ALTER DATABASE mydb SET statement_timeout = '60s';\n-- ALTER DATABASE mydb SET idle_in_transaction_session_timeout = '5min';\n", "postgres/preventive_measures/05_alert_views.sql": "/*\n================================================================================\nAlert Views — Dashboard views for governance monitoring\n================================================================================\nDescription:\n    Creates views summarizing recent governance alerts.\n\nPrerequisite: preventive_measures/01_create_governance_schema.sql\n\nCriticality: Low\n================================================================================\n*/\n\nCREATE OR REPLACE VIEW dba.v_governance_alerts_24h AS\nSELECT alert_type, severity, count(*) AS alert_count,\n       max(alert_utc) AS last_alert\nFROM dba.governance_alert\nWHERE alert_utc > now() - interval '24 hours'\nGROUP BY alert_type, severity\nORDER BY alert_count DESC;\n\nCREATE OR REPLACE VIEW dba.v_governance_long_queries AS\nSELECT alert_utc, database_name, pid, username, duration_sec, query_snippet\nFROM dba.governance_alert\nWHERE alert_type = 'long_running_query'\n  AND alert_utc > now() - interval '24 hours'\nORDER BY duration_sec DESC;\n\nGRANT SELECT ON dba.v_governance_alerts_24h TO PUBLIC;\nGRANT SELECT ON dba.v_governance_long_queries TO PUBLIC;\n", "sql_server/00_Framework/00_Deploy_Framework.sql": "/*\n==============================================================================\n00_Deploy_Framework.sql - Auto-deploy all DBA framework objects\n==============================================================================\nScans the 00_Framework directory for .sql files and executes them in order\nusing xp_cmdshell + sqlcmd. Excludes 00_Install_Framework.sql, README.md,\nand itself.\n\nPrerequisites:\n  - xp_cmdshell must be enabled (script enables it temporarily)\n  - sqlcmd must be available on the server's PATH\n  - Run in the context of your admin database\n\nUsage:\n    1. Update @TargetDB to your admin database name\n    2. Execute in SSMS / sqlcmd\n==============================================================================\n*/\nSET NOCOUNT ON;\n\nDECLARE @TargetDB       SYSNAME         = N'master';   -- Change to your admin DB\nDECLARE @FrameworkDir   NVARCHAR(500)   = N'C:\\Users\\Admin\\Documents\\dba_essential_scripts\\dba_essential_scripts\\00_Framework';\nDECLARE @ServerName     SYSNAME         = @@SERVERNAME;\n\n-- Step 1: Enable xp_cmdshell if not already\nPRINT N'Enabling xp_cmdshell...';\nEXEC sp_configure 'show advanced options', 1;\nRECONFIGURE;\nEXEC sp_configure 'xp_cmdshell', 1;\nRECONFIGURE;\n\n-- Step 2: Gather .sql files (sorted by name)\nIF OBJECT_ID(N'tempdb..#Files') IS NOT NULL DROP TABLE #Files;\nCREATE TABLE #Files (\n    Id        INT IDENTITY(1,1) PRIMARY KEY,\n    FileName  NVARCHAR(500),\n    FullPath  NVARCHAR(1000)\n);\n\nDECLARE @file_list TABLE (line NVARCHAR(4000));\nDECLARE @cmd NVARCHAR(4000) = N'dir /b \"' + @FrameworkDir + N'\\*.sql\"';\n\nINSERT INTO @file_list\nEXEC xp_cmdshell @cmd;\n\nINSERT INTO #Files (FileName)\nSELECT RTRIM(LTRIM(line))\nFROM @file_list\nWHERE line IS NOT NULL\n  AND line NOT LIKE N'00_Install_Framework%'\n  AND line NOT LIKE N'00_Deploy_Framework%'\n  AND line NOT LIKE N'README%'\nORDER BY line;\n\n-- Step 3: Execute each file via sqlcmd\nDECLARE @Id INT, @FileName NVARCHAR(500), @FullPath NVARCHAR(1000);\nDECLARE @sqlcmd NVARCHAR(4000);\nDECLARE @result TABLE (output NVARCHAR(4000));\n\nSELECT @Id = MIN(Id) FROM #Files;\n\nWHILE @Id IS NOT NULL\nBEGIN\n    SELECT @FileName = FileName FROM #Files WHERE Id = @Id;\n    SET @FullPath = @FrameworkDir + N'\\' + @FileName;\n\n    PRINT N'--- Deploying: ' + @FileName + N' ---';\n\n    SET @sqlcmd = N'sqlcmd -S \"' + @ServerName + N'\" -E -d \"' + @TargetDB + N'\" -i \"' + @FullPath + N'\" -b';\n\n    DELETE FROM @result;\n    INSERT INTO @result\n    EXEC xp_cmdshell @sqlcmd;\n\n    -- Print output\n    SELECT output FROM @result WHERE output IS NOT NULL;\n\n    SELECT @Id = MIN(Id) FROM #Files WHERE Id > @Id;\nEND;\n\n-- Step 4: Cleanup\nDROP TABLE #Files;\n\nPRINT N'';\nPRINT N'==============================================================================';\nPRINT N'Deployment complete.';\nPRINT N'All framework objects have been deployed to [' + @TargetDB + N'].';\nPRINT N'==============================================================================';\nGO\n", "sql_server/00_Framework/00_Install_Framework.sql": "/*\n================================================================================\n00_Install_Framework.sql - Deploy shared DBA framework objects\n================================================================================\nExecute in order against your admin database:\n\n    1. fn_DBA_ExcludedWaitTypes.sql\n    2. fn_DBA_AgentRunDurationSeconds.sql\n    3. sp_DBA_ForEachDatabase.sql          (00_Framework/)\n    4. sp_DBA_QueryStoreRegressions.sql    (00_Framework/)\n    5. sp_DBA_HealthCheck.sql              (00_Framework/)\n    6. sp_DBA_WaitAnalysis.sql             (00_Framework/)\n    7. sp_DBA_IndexReview.sql              (00_Framework/)\n    8. sp_DBA_SecurityAudit.sql            (00_Framework/)\n    9. sp_DBA_BackupReview.sql             (00_Framework/)\n    10. sp_DBA_ActiveSessions.sql          (00_Framework/)\n    11. sp_DBA_PlanCacheAnalyzer.sql       (00_Framework/)\n    12. sp_DBA_BaselineCapture.sql         (00_Framework/)\n    13. sp_DBA_SaveAssessmentRun.sql       (00_Framework/)\n================================================================================\n*/\nPRINT N'Deploy framework objects from 00_Framework and repo root .sql files (see README.md).';\nGO\n", "sql_server/00_Framework/fn_DBA_AgentRunDurationSeconds.sql": "/*\n================================================================================\nfn_DBA_AgentRunDurationSeconds - Convert msdb sysjobhistory.run_duration to seconds\n================================================================================\nmsdb stores run_duration as HHMMSS encoded integer (e.g. 000500 = 5 minutes).\n================================================================================\n*/\nIF OBJECT_ID(N'dbo.fn_DBA_AgentRunDurationSeconds', N'FN') IS NOT NULL\n    DROP FUNCTION dbo.fn_DBA_AgentRunDurationSeconds;\nGO\n\nCREATE FUNCTION dbo.fn_DBA_AgentRunDurationSeconds (@run_duration INT)\nRETURNS INT\nAS\nBEGIN\n    IF @run_duration IS NULL OR @run_duration < 0\n        RETURN NULL;\n\n    RETURN ((@run_duration / 10000) * 3600)\n         + (((@run_duration % 10000) / 100) * 60)\n         + (@run_duration % 100);\nEND;\nGO\n", "sql_server/00_Framework/fn_DBA_ExcludedWaitTypes.sql": "/*\n================================================================================\nfn_DBA_ExcludedWaitTypes - Centralized benign wait type filter\n================================================================================\nUsage:\n    WHERE wait_type NOT IN (SELECT wait_type FROM dbo.fn_DBA_ExcludedWaitTypes())\n================================================================================\n*/\nIF OBJECT_ID(N'dbo.fn_DBA_ExcludedWaitTypes', N'IF') IS NOT NULL\n    DROP FUNCTION dbo.fn_DBA_ExcludedWaitTypes;\nGO\n\nCREATE FUNCTION dbo.fn_DBA_ExcludedWaitTypes()\nRETURNS TABLE\nAS\nRETURN\n(\n    SELECT wait_type\n    FROM (VALUES\n        (N'CLR_SEMAPHORE'),\n        (N'LAZYWRITER_SLEEP'),\n        (N'RESOURCE_QUEUE'),\n        (N'SLEEP_TASK'),\n        (N'SLEEP_SYSTEMTASK'),\n        (N'SQLTRACE_BUFFER_FLUSH'),\n        (N'WAITFOR'),\n        (N'LOGMGR_QUEUE'),\n        (N'CHECKPOINT_QUEUE'),\n        (N'REQUEST_FOR_DEADLOCK_SEARCH'),\n        (N'XE_TIMER_EVENT'),\n        (N'XE_DISPATCHER_JOIN'),\n        (N'XE_DISPATCHER_WAIT'),\n        (N'FT_IFTS_SCHEDULER_VAL_KEEP_ALIVE'),\n        (N'DIRTY_PAGE_TABLE_RELEASE'),\n        (N'SP_SERVER_DIAGNOSTICS_SLEEP'),\n        (N'QDS_CLEANUP_STALE_QUERIES_TASK_MAIN_LOOP_SLEEP'),\n        (N'QDS_PERSIST_TASK_MAIN_LOOP_SLEEP'),\n        (N'REDO_THREAD_PENDING_WORK'),\n        (N'WAIT_FOR_RESULTS'),\n        (N'HADR_FILESTREAM_IOMGR_IOCOMPLETION'),\n        (N'BROKER_EVENTHANDLER'),\n        (N'BROKER_RECEIVE_WAITFOR'),\n        (N'BROKER_TRANSMITTER'),\n        (N'BROKER_TO_FLUSH'),\n        (N'ONDEMAND_TASK_QUEUE'),\n        (N'PREEMPTIVE_OS_AUTHENTICATIONOPS'),\n        (N'HADR_FABRIC_CALLBACK_EVENT'),\n        (N'HADR_NOTIFICATION_DEQUEUE'),\n        (N'HADR_TIMER_TASK'),\n        (N'HADR_LOGCAPTURE_WAIT')\n    ) AS excluded(wait_type)\n);\nGO\n", "sql_server/00_Framework/sp_DBA_ActiveSessions.sql": "/*\n================================================================================\nsp_DBA_ActiveSessions — Real-time active session monitor\n================================================================================\nShows what queries are running RIGHT NOW, how long they've been running, what\nthey're waiting on, and how much CPU/memory/IO they've consumed. Think of this\nas a \"live snapshot\" of your server's current workload.\n\nKey differences from sp_who2 / sp_whoisactive:\n  - Includes memory grants, tempdb usage, and wait chain visualization\n  - Groups sessions by wait type so you can see patterns at a glance\n  - Provides blocking hierarchy with visual tree\n  - Shows per-session CPU, reads, writes, and duration in human-readable format\n\nUsage:\n    EXEC dbo.sp_DBA_ActiveSessions;\n    EXEC dbo.sp_DBA_ActiveSessions @FilterDatabase = N'SalesDB';\n    EXEC dbo.sp_DBA_ActiveSessions @FilterWaitType = N'LCK%';\n    EXEC dbo.sp_DBA_ActiveSessions @MinCPUSeconds = 10;\n    EXEC dbo.sp_DBA_ActiveSessions @IncludeSystemSessions = 1;\n    EXEC dbo.sp_DBA_ActiveSessions @OutputMode = 'DETAIL';  -- DETAIL | SUMMARY | BLOCKING\n================================================================================\n*/\nIF OBJECT_ID(N'dbo.sp_DBA_ActiveSessions', N'P') IS NULL\n    EXEC(N'CREATE PROCEDURE dbo.sp_DBA_ActiveSessions AS RETURN 0;');\nGO\n\nALTER PROCEDURE dbo.sp_DBA_ActiveSessions\n    @FilterDatabase       NVARCHAR(128) = NULL,\n    @FilterWaitType       NVARCHAR(128) = NULL,\n    @MinCPUSeconds        INT = 0,\n    @IncludeSystemSessions BIT = 0,\n    @OutputMode           VARCHAR(20) = 'DETAIL'\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SET QUOTED_IDENTIFIER ON;\n    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\n    ------------------------------------------------------------\n    -- Parameter validation\n    ------------------------------------------------------------\n    IF @OutputMode NOT IN ('DETAIL', 'SUMMARY', 'BLOCKING')\n    BEGIN\n        RAISERROR(N'@OutputMode must be DETAIL, SUMMARY, or BLOCKING.', 16, 1);\n        RETURN;\n    END;\n\n    ------------------------------------------------------------\n    -- SECTION 1: DETAIL MODE — Every active session with context\n    ------------------------------------------------------------\n    IF @OutputMode = 'DETAIL'\n    BEGIN\n        SELECT\n            r.session_id                                          AS [Session_ID],\n            s.login_name                                          AS [Login_Name],\n            s.host_name                                           AS [Client_Host],\n            s.program_name                                        AS [Program_Name],\n            DB_NAME(r.database_id)                                AS [Database_Name],\n            r.status                                              AS [Status],\n            r.command                                             AS [Command_Type],\n            r.start_time                                          AS [Request_Start_Time],\n            DATEDIFF(SECOND, r.start_time, SYSUTCDATETIME())     AS [Duration_Seconds],\n            r.wait_type                                           AS [Wait_Type],\n            r.wait_time                                           AS [Wait_Time_ms],\n            r.wait_resource                                       AS [Wait_Resource],\n            r.blocking_session_id                                 AS [Blocking_Session_ID],\n            CASE\n                WHEN r.blocking_session_id = 0 OR r.blocking_session_id IS NULL THEN NULL\n                ELSE (\n                    SELECT TOP (1) s2.login_name + N' (' + CAST(r.blocking_session_id AS NVARCHAR(10)) + N')'\n                    FROM sys.dm_exec_sessions s2\n                    WHERE s2.session_id = r.blocking_session_id\n                )\n            END AS [Blocking_Source],\n            r.cpu_time                                            AS [CPU_ms],\n            r.reads * 8 / 1024                                   AS [Reads_MB],\n            r.writes * 8 / 1024                                  AS [Writes_MB],\n            r.total_elapsed_time / 1000                           AS [Total_Elapsed_Sec],\n            r.granted_query_memory * 8 / 1024                    AS [Memory_Grant_MB],\n            r.open_transaction_count                              AS [Open_Tran_Count],\n            r.transaction_isolation_level                         AS [Isolation_Level],\n            SUBSTRING(st.text, (r.statement_start_offset / 2) + 1,\n                ((CASE r.statement_end_offset\n                    WHEN -1 THEN DATALENGTH(st.text)\n                    ELSE r.statement_end_offset\n                 END - r.statement_start_offset) / 2) + 1)      AS [Current_Statement],\n            -- Blocked session info\n            CASE\n                WHEN r.blocking_session_id <> 0 AND r.blocking_session_id IS NOT NULL\n                THEN (\n                    SELECT SUBSTRING(st2.text, (r2.statement_start_offset / 2) + 1,\n                        ((CASE r2.statement_end_offset\n                            WHEN -1 THEN DATALENGTH(st2.text)\n                            ELSE r2.statement_end_offset\n                         END - r2.statement_start_offset) / 2) + 1)\n                    FROM sys.dm_exec_requests r2\n                    CROSS APPLY sys.dm_exec_sql_text(r2.sql_handle) st2\n                    WHERE r2.session_id = r.blocking_session_id\n                )\n                ELSE NULL\n            END AS [Blocking_Statement],\n            qp.query_plan                                        AS [Query_Plan]\n        FROM sys.dm_exec_requests AS r\n        INNER JOIN sys.dm_exec_sessions AS s ON r.session_id = s.session_id\n        OUTER APPLY sys.dm_exec_sql_text(r.sql_handle) AS st\n        OUTER APPLY sys.dm_exec_query_plan(r.plan_handle) AS qp\n        WHERE r.session_id <> @@SPID\n          AND (@IncludeSystemSessions = 1 OR s.is_user_process = 1)\n          AND (@FilterDatabase IS NULL OR DB_NAME(r.database_id) LIKE @FilterDatabase)\n          AND (@FilterWaitType IS NULL OR r.wait_type LIKE @FilterWaitType)\n          AND (r.cpu_time / 1000) >= @MinCPUSeconds\n        ORDER BY r.cpu_time DESC;\n    END;\n\n    ------------------------------------------------------------\n    -- SECTION 2: SUMMARY MODE — Aggregated by wait type + database\n    ------------------------------------------------------------\n    IF @OutputMode = 'SUMMARY'\n    BEGIN\n        -- 2a. Wait type distribution\n        SELECT N'WAIT TYPE DISTRIBUTION' AS [Section];\n        SELECT\n            r.wait_type                                         AS [Wait_Type],\n            COUNT(*)                                            AS [Session_Count],\n            SUM(r.cpu_time) / 1000                              AS [Total_CPU_Sec],\n            SUM(r.wait_time) / 1000                             AS [Total_Wait_Sec],\n            SUM(r.granted_query_memory * 8 / 1024)             AS [Total_Memory_Grant_MB],\n            SUM(r.blocking_session_id) AS [Blocking_Sessions_Agg],\n            CASE\n                WHEN r.wait_type LIKE 'LCK_%' THEN 'Blocking — check blocking_and_deadlocks.sql'\n                WHEN r.wait_type = 'CXPACKET' THEN 'Parallelism — review MAXDOP/CTFP settings'\n                WHEN r.wait_type = 'PAGEIOLATCH_%' THEN 'Disk I/O — run disk_latency.sql'\n                WHEN r.wait_type = 'RESOURCE_SEMAPHORE' THEN 'Memory — check memory grants'\n                WHEN r.wait_type = 'ASYNC_NETWORK_IO' THEN 'Client — app consuming slowly'\n                WHEN r.wait_type LIKE 'HADR_%' THEN 'AlwaysOn AG — check sync latency'\n                WHEN r.wait_type = 'SOS_SCHEDULER_YIELD' THEN 'CPU — check top CPU queries'\n                ELSE 'Review Microsoft Docs for this wait type'\n            END AS [Investigation_Note]\n        FROM sys.dm_exec_requests AS r\n        INNER JOIN sys.dm_exec_sessions AS s ON r.session_id = s.session_id\n        WHERE r.session_id <> @@SPID\n          AND (@IncludeSystemSessions = 1 OR s.is_user_process = 1)\n          AND r.wait_type IS NOT NULL\n        GROUP BY r.wait_type\n        ORDER BY COUNT(*) DESC;\n\n        -- 2b. Database workload distribution\n        SELECT N'DATABASE WORKLOAD DISTRIBUTION' AS [Section];\n        SELECT\n            DB_NAME(r.database_id)                              AS [Database_Name],\n            COUNT(*)                                            AS [Active_Sessions],\n            SUM(r.cpu_time) / 1000                              AS [Total_CPU_Sec],\n            SUM(r.reads * 8 / 1024)                             AS [Total_Reads_MB],\n            SUM(r.writes * 8 / 1024)                            AS [Total_Writes_MB],\n            SUM(r.granted_query_memory * 8 / 1024)             AS [Total_Memory_Grant_MB],\n            MAX(DATEDIFF(SECOND, r.start_time, SYSUTCDATETIME())) AS [Longest_Running_Sec]\n        FROM sys.dm_exec_requests AS r\n        INNER JOIN sys.dm_exec_sessions AS s ON r.session_id = s.session_id\n        WHERE r.session_id <> @@SPID\n          AND (@IncludeSystemSessions = 1 OR s.is_user_process = 1)\n        GROUP BY r.database_id\n        ORDER BY SUM(r.cpu_time) DESC;\n\n        -- 2c. Client application distribution\n        SELECT N'APPLICATION WORKLOAD DISTRIBUTION' AS [Section];\n        SELECT\n            s.program_name                                      AS [Application_Name],\n            COUNT(*)                                            AS [Active_Sessions],\n            SUM(r.cpu_time) / 1000                              AS [Total_CPU_Sec],\n            SUM(r.reads * 8 / 1024)                             AS [Total_Reads_MB],\n            SUM(r.granted_query_memory * 8 / 1024)             AS [Total_Memory_Grant_MB],\n            MAX(DATEDIFF(SECOND, r.start_time, SYSUTCDATETIME())) AS [Longest_Running_Sec]\n        FROM sys.dm_exec_requests AS r\n        INNER JOIN sys.dm_exec_sessions AS s ON r.session_id = s.session_id\n        WHERE r.session_id <> @@SPID\n          AND (@IncludeSystemSessions = 1 OR s.is_user_process = 1)\n        GROUP BY s.program_name\n        ORDER BY SUM(r.cpu_time) DESC;\n    END;\n\n    ------------------------------------------------------------\n    -- SECTION 3: BLOCKING MODE — Visual blocking tree\n    ------------------------------------------------------------\n    IF @OutputMode = 'BLOCKING'\n    BEGIN\n        -- Check if there is any active blocking\n        IF NOT EXISTS (\n            SELECT 1 FROM sys.dm_exec_requests\n            WHERE blocking_session_id <> 0 AND blocking_session_id IS NOT NULL\n        )\n        BEGIN\n            PRINT N'No active blocking detected. All sessions are running freely.';\n            RETURN;\n        END;\n\n        -- 3a. Blocking hierarchy tree\n        SELECT N'BLOCKING HIERARCHY TREE' AS [Section];\n        WITH BlockingTree AS (\n            SELECT\n                r.session_id,\n                r.blocking_session_id,\n                0 AS [Level],\n                CAST(CAST(r.session_id AS NVARCHAR(10)) AS NVARCHAR(MAX)) AS [Path]\n            FROM sys.dm_exec_requests r\n            WHERE (r.blocking_session_id = 0 OR r.blocking_session_id IS NULL)\n              AND r.session_id IN (\n                  SELECT DISTINCT blocking_session_id\n                  FROM sys.dm_exec_requests\n                  WHERE blocking_session_id <> 0 AND blocking_session_id IS NOT NULL\n              )\n\n            UNION ALL\n\n            SELECT\n                r.session_id,\n                r.blocking_session_id,\n                bt.[Level] + 1,\n                bt.[Path] + N' -> ' + CAST(CAST(r.session_id AS NVARCHAR(10)) AS NVARCHAR(MAX))\n            FROM sys.dm_exec_requests r\n            INNER JOIN BlockingTree bt ON r.blocking_session_id = bt.session_id\n        )\n        SELECT\n            REPLICATE(N'  ', [Level]) + N'[' + CAST(session_id AS NVARCHAR(10)) + N']'\n                + CASE WHEN [Level] = 0 THEN N' <-- ROOT BLOCKER' ELSE N'' END  AS [Blocking_Tree],\n            [Path] AS [Full_Chain],\n            [Level] AS [Depth]\n        FROM BlockingTree\n        ORDER BY [Path];\n\n        -- 3b. Root blocker details\n        SELECT N'ROOT BLOCKER DETAILS' AS [Section];\n        SELECT\n            r.session_id                                        AS [Root_Blocker_Session],\n            s.login_name                                        AS [Login_Name],\n            s.host_name                                         AS [Client_Host],\n            s.program_name                                      AS [Program_Name],\n            DB_NAME(r.database_id)                              AS [Database_Name],\n            r.start_time                                        AS [Request_Start_Time],\n            DATEDIFF(SECOND, r.start_time, SYSUTCDATETIME())   AS [Duration_Seconds],\n            r.cpu_time / 1000                                   AS [CPU_Sec],\n            r.open_transaction_count                            AS [Open_Tran_Count],\n            SUBSTRING(st.text, (r.statement_start_offset / 2) + 1,\n                ((CASE r.statement_end_offset\n                    WHEN -1 THEN DATALENGTH(st.text)\n                    ELSE r.statement_end_offset\n                 END - r.statement_start_offset) / 2) + 1)    AS [Blocking_Statement]\n        FROM sys.dm_exec_requests r\n        INNER JOIN sys.dm_exec_sessions s ON r.session_id = s.session_id\n        CROSS APPLY sys.dm_exec_sql_text(r.sql_handle) st\n        WHERE r.session_id IN (\n            SELECT DISTINCT blocking_session_id\n            FROM sys.dm_exec_requests\n            WHERE blocking_session_id <> 0 AND blocking_session_id IS NOT NULL\n        );\n\n        -- 3c. All blocked sessions\n        SELECT N'BLOCKED SESSIONS (victims)' AS [Section];\n        SELECT\n            r.session_id                                        AS [Blocked_Session],\n            r.blocking_session_id                               AS [Blocked_By],\n            s.login_name                                        AS [Blocked_Login],\n            DB_NAME(r.database_id)                              AS [Database_Name],\n            r.wait_type                                         AS [Wait_Type],\n            r.wait_time                                         AS [Wait_Time_ms],\n            r.wait_resource                                     AS [Wait_Resource],\n            DATEDIFF(SECOND, r.start_time, SYSUTCDATETIME())   AS [Duration_Seconds],\n            SUBSTRING(st.text, (r.statement_start_offset / 2) + 1,\n                ((CASE r.statement_end_offset\n                    WHEN -1 THEN DATALENGTH(st.text)\n                    ELSE r.statement_end_offset\n                 END - r.statement_start_offset) / 2) + 1)    AS [Blocked_Statement]\n        FROM sys.dm_exec_requests r\n        INNER JOIN sys.dm_exec_sessions s ON r.session_id = s.session_id\n        CROSS APPLY sys.dm_exec_sql_text(r.sql_handle) st\n        WHERE r.blocking_session_id <> 0 AND r.blocking_session_id IS NOT NULL\n        ORDER BY r.wait_time DESC;\n    END;\nEND;\nGO\n", "sql_server/00_Framework/sp_DBA_BackupReview.sql": "/*\n================================================================================\nsp_DBA_BackupReview — Backup health and log chain integrity\n================================================================================\nReviews last backup dates by type (full/diff/log), checks recovery model\nalignment, detects potential log chain breaks, and flags databases missing\nrequired backups based on SLA.\n\nUsage:\n    EXEC dbo.sp_DBA_BackupReview;\n    EXEC dbo.sp_DBA_BackupReview @BackupHoursSLA = 48;\n    EXEC dbo.sp_DBA_BackupReview @DatabaseList = N'SalesDB,HRDB';\n================================================================================\n*/\nIF OBJECT_ID(N'dbo.sp_DBA_BackupReview', N'P') IS NULL\n    EXEC(N'CREATE PROCEDURE dbo.sp_DBA_BackupReview AS RETURN 0;');\nGO\n\nALTER PROCEDURE dbo.sp_DBA_BackupReview\n    @DatabaseList       NVARCHAR(MAX) = NULL,\n    @IncludeReadOnly    BIT = 0,\n    @BackupHoursSLA     INT = 24,\n    @BackupDaysSLA      INT = 7\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\n    -- Section 1: Backup Summary per Database\n    PRINT '--- Backup Summary by Database ---';\n    SELECT\n        d.name AS DatabaseName,\n        d.recovery_model_desc AS RecoveryModel,\n        d.state_desc AS State,\n        MAX(CASE WHEN b.type = 'D' THEN b.backup_finish_date END) AS LastFullBackup,\n        MAX(CASE WHEN b.type = 'I' THEN b.backup_finish_date END) AS LastDiffBackup,\n        MAX(CASE WHEN b.type = 'L' THEN b.backup_finish_date END) AS LastLogBackup,\n        MAX(b.backup_finish_date) AS LastAnyBackup,\n        DATEDIFF(HOUR, MAX(CASE WHEN b.type = 'D' THEN b.backup_finish_date END), GETDATE()) AS HoursSinceFull,\n        DATEDIFF(HOUR, MAX(CASE WHEN b.type = 'L' THEN b.backup_finish_date END), GETDATE()) AS HoursSinceLog,\n        CASE\n            WHEN MAX(b.backup_finish_date) IS NULL THEN 'CRITICAL: No backups found'\n            WHEN d.recovery_model_desc = 'FULL'\n                 AND DATEDIFF(HOUR, MAX(CASE WHEN b.type = 'L' THEN b.backup_finish_date END), GETDATE()) > @BackupHoursSLA\n                THEN 'CRITICAL: Log backup exceeds SLA'\n            WHEN d.recovery_model_desc = 'FULL'\n                 AND MAX(CASE WHEN b.type = 'L' THEN b.backup_finish_date END) IS NULL\n                THEN 'HIGH: FULL recovery but no log backups'\n            WHEN DATEDIFF(DAY, MAX(b.backup_finish_date), GETDATE()) > @BackupDaysSLA\n                THEN 'HIGH: Last backup exceeds ' + CAST(@BackupDaysSLA AS VARCHAR) + ' days'\n            ELSE 'OK'\n        END AS BackupStatus\n    FROM sys.databases AS d\n    LEFT JOIN msdb.dbo.backupset AS b ON d.name = b.database_name\n    WHERE d.database_id > 4\n      AND d.state = 0\n      AND (\n          @DatabaseList IS NULL\n          OR d.name IN (\n              SELECT LTRIM(RTRIM(value))\n              FROM STRING_SPLIT(@DatabaseList, N',')\n              WHERE LTRIM(RTRIM(value)) <> N''\n          )\n      )\n    GROUP BY d.name, d.recovery_model_desc, d.state_desc\n    ORDER BY\n        CASE\n            WHEN MAX(b.backup_finish_date) IS NULL THEN 0\n            WHEN DATEDIFF(HOUR, MAX(b.backup_finish_date), GETDATE()) > @BackupHoursSLA THEN 1\n            ELSE 2\n        END,\n        d.name;\n\n    -- Section 2: Backup Types & Compression\n    PRINT '--- Backup Type Distribution (Last 7 Days) ---';\n    SELECT\n        database_name AS DatabaseName,\n        type AS BackupType,\n        COUNT(*) AS BackupCount,\n        SUM(CASE WHEN compressed_backup_size > 0 THEN 1 ELSE 0 END) AS CompressedCount,\n        CAST(AVG(backup_size / 1024.0 / 1024.0) AS NUMERIC(10,2)) AS AvgSizeMB,\n        CAST(AVG(compressed_backup_size / 1024.0 / 1024.0) AS NUMERIC(10,2)) AS AvgCompressedMB,\n        MIN(backup_finish_date) AS EarliestBackup,\n        MAX(backup_finish_date) AS LatestBackup\n    FROM msdb.dbo.backupset\n    WHERE backup_finish_date > DATEADD(DAY, -7, GETDATE())\n      AND database_name <> N'master'\n    GROUP BY database_name, type\n    ORDER BY database_name, type;\n\n    -- Section 3: Databases Missing Required Backups\n    PRINT '--- Databases Without Recent Full Backups ---';\n    SELECT\n        d.name AS DatabaseName,\n        d.recovery_model_desc AS RecoveryModel,\n        MAX(b.backup_finish_date) AS LastFullBackup,\n        DATEDIFF(DAY, MAX(b.backup_finish_date), GETDATE()) AS DaysSinceFullBackup\n    FROM sys.databases AS d\n    LEFT JOIN msdb.dbo.backupset AS b\n        ON d.name = b.database_name AND b.type = 'D'\n    WHERE d.database_id > 4\n      AND d.state = 0\n    GROUP BY d.name, d.recovery_model_desc\n    HAVING (MAX(b.backup_finish_date) IS NULL OR DATEDIFF(DAY, MAX(b.backup_finish_date), GETDATE()) > @BackupDaysSLA)\n    ORDER BY DaysSinceFullBackup DESC;\n\n    -- Section 4: Log Chain Risk (FULL recovery without recent log backup)\n    PRINT '--- Log Chain Risk Assessment ---';\n    SELECT\n        d.name AS DatabaseName,\n        CASE WHEN MAX(CASE WHEN b.type = 'L' THEN b.backup_finish_date END) IS NULL\n            THEN 'NO LOG BACKUPS'\n            ELSE CAST(DATEDIFF(HOUR, MAX(CASE WHEN b.type = 'L' THEN b.backup_finish_date END), GETDATE()) AS VARCHAR) + ' hours since last log'\n        END AS LogBackupStatus,\n        CASE\n            WHEN MAX(CASE WHEN b.type = 'D' THEN b.backup_finish_date END) IS NULL THEN 'CRITICAL'\n            WHEN DATEDIFF(HOUR, MAX(CASE WHEN b.type = 'L' THEN b.backup_finish_date END), GETDATE()) > @BackupHoursSLA THEN 'HIGH'\n            ELSE 'OK'\n        END AS RiskLevel\n    FROM sys.databases AS d\n    LEFT JOIN msdb.dbo.backupset AS b ON d.name = b.database_name\n    WHERE d.recovery_model_desc = 'FULL'\n      AND d.database_id > 4\n      AND d.state = 0\n    GROUP BY d.name\n    ORDER BY\n        CASE\n            WHEN MAX(CASE WHEN b.type = 'L' THEN b.backup_finish_date END) IS NULL THEN 0\n            WHEN DATEDIFF(HOUR, MAX(CASE WHEN b.type = 'L' THEN b.backup_finish_date END), GETDATE()) > @BackupHoursSLA THEN 1\n            ELSE 2\n        END;\nEND;\nGO\n", "sql_server/00_Framework/sp_DBA_BaselineCapture.sql": "/*\n================================================================================\nsp_DBA_BaselineCapture — Capture performance baseline snapshot\n================================================================================\nCaptures current wait statistics, performance counters, and I/O file stats\ninto the BaselineSnapshot table for historical trending and delta comparison.\n\nRun on a schedule (e.g., daily) to build baseline history. Compare snapshots\nusing the delta query in the header.\n\nDelta comparison:\n    WITH Latest AS (\n        SELECT TOP (2) *\n        FROM dbo.BaselineSnapshot\n        WHERE ServerName = @@SERVERNAME AND WaitType IS NOT NULL\n        ORDER BY SnapshotUtc DESC\n    )\n    SELECT\n        a.WaitType,\n        a.WaitTimeMs AS CurrentWait,\n        b.WaitTimeMs AS PreviousWait,\n        a.WaitTimeMs - b.WaitTimeMs AS DeltaWait\n    FROM Latest a\n    INNER JOIN Latest b ON a.WaitType = b.WaitType AND a.SnapshotId > b.SnapshotId;\n\nUsage:\n    EXEC dbo.sp_DBA_BaselineCapture;\n    EXEC dbo.sp_DBA_BaselineCapture @CaptureWaitStats = 1, @CaptureCounters = 1;\n================================================================================\n*/\nIF OBJECT_ID(N'dbo.sp_DBA_BaselineCapture', N'P') IS NULL\n    EXEC(N'CREATE PROCEDURE dbo.sp_DBA_BaselineCapture AS RETURN 0;');\nGO\n\nALTER PROCEDURE dbo.sp_DBA_BaselineCapture\n    @CaptureWaitStats   BIT = 1,\n    @CaptureCounters    BIT = 1,\n    @CaptureFileStats   BIT = 1,\n    @Notes              NVARCHAR(500) = NULL\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\n    DECLARE @ServerName SYSNAME = @@SERVERNAME;\n    DECLARE @Now DATETIME2(3) = SYSUTCDATETIME();\n\n    IF OBJECT_ID(N'dbo.BaselineSnapshot', N'U') IS NULL\n    BEGIN\n        RAISERROR(N'Run 00_Repository/DBARepository_Persistence.sql first to create BaselineSnapshot table.', 16, 1);\n        RETURN;\n    END;\n\n    -- 1. Wait Statistics\n    IF @CaptureWaitStats = 1\n    BEGIN\n        INSERT INTO dbo.BaselineSnapshot (\n            ServerName, SnapshotUtc, SnapshotType, WaitType, WaitTimeMs, SignalWaitMs, WaitingTasks, Notes\n        )\n        SELECT\n            @ServerName, @Now, 'Baseline',\n            wait_type, wait_time_ms, signal_wait_time_ms, waiting_tasks_count, @Notes\n        FROM sys.dm_os_wait_stats\n        WHERE waiting_tasks_count > 0\n          AND wait_type NOT IN (SELECT wait_type FROM dbo.fn_DBA_ExcludedWaitTypes());\n\n        PRINT CAST(@@ROWCOUNT AS VARCHAR) + N' wait stats captured.';\n    END;\n\n    -- 2. Performance Counters\n    IF @CaptureCounters = 1\n    BEGIN\n        INSERT INTO dbo.BaselineSnapshot (\n            ServerName, SnapshotUtc, SnapshotType, CounterName, CounterValue, Notes\n        )\n        SELECT\n            @ServerName, @Now, 'Baseline',\n            object_name + '.' + counter_name,\n            CAST(cntr_value AS DECIMAL(18,4)),\n            @Notes\n        FROM sys.dm_os_performance_counters\n        WHERE cntr_value > 0\n          AND counter_name IN (\n              'Page life expectancy',\n              'Buffer cache hit ratio',\n              'Target Server Memory (KB)',\n              'Total Server Memory (KB)',\n              'SQL Compilations/sec',\n              'SQL Re-Compilations/sec',\n              'Batch Requests/sec',\n              'Lock Waits/sec',\n              'Number of Deadlocks/sec',\n              'Transactions/sec'\n          )\n        ORDER BY object_name, counter_name;\n\n        PRINT CAST(@@ROWCOUNT AS VARCHAR) + N' counters captured.';\n    END;\n\n    -- 3. I/O File Stats\n    IF @CaptureFileStats = 1\n    BEGIN\n        INSERT INTO dbo.BaselineSnapshot (\n            ServerName, SnapshotUtc, SnapshotType,\n            DatabaseId, DatabaseName, FileId,\n            NumReads, NumWrites, IoStallReadMs, IoStallWriteMs, Notes\n        )\n        SELECT\n            @ServerName, @Now, 'Baseline',\n            vfs.database_id, DB_NAME(vfs.database_id), vfs.file_id,\n            vfs.num_of_reads, vfs.num_of_writes,\n            vfs.io_stall_read_ms, vfs.io_stall_write_ms, @Notes\n        FROM sys.dm_io_virtual_file_stats(NULL, NULL) AS vfs\n        ORDER BY vfs.database_id, vfs.file_id;\n\n        PRINT CAST(@@ROWCOUNT AS VARCHAR) + N' file stats captured.';\n    END;\n\n    PRINT N'Baseline capture complete at ' + CONVERT(NVARCHAR(30), @Now, 121);\nEND;\nGO\n", "sql_server/00_Framework/sp_DBA_ForEachDatabase.sql": "/*\n================================================================================\nsp_DBA_ForEachDatabase - Standard cross-database execution helper\n================================================================================\nDescription:\n    Executes a SQL batch in each selected database context with QUOTENAME safety\n    and optional error isolation.\n\nParameters:\n    @Command            SQL batch to run after USE [database]. Use ? in @Command\n                        only when you need the bare database name token replaced.\n    @UserDatabasesOnly  When 1, skips master/tempdb/model/msdb (database_id <= 4)\n    @IncludeReadOnly    When 0, skips read-only databases\n    @DatabaseList       Comma-separated database names (overrides default selection)\n    @ExcludeList        Comma-separated database names to skip\n    @PrintOnly          When 1, prints commands instead of executing\n    @ContinueOnError    When 1, logs errors and continues to next database\n\nUsage:\n    EXEC dbo.sp_DBA_ForEachDatabase\n        @Command = N'SELECT DB_NAME() AS database_name, COUNT(*) AS user_tables FROM sys.tables WHERE type = ''U'';',\n        @UserDatabasesOnly = 1;\n\n    EXEC dbo.sp_DBA_ForEachDatabase\n        @Command = N'SELECT * FROM sys.database_files;',\n        @DatabaseList = N'AdventureWorks,SalesDB';\n================================================================================\n*/\nIF OBJECT_ID(N'dbo.sp_DBA_ForEachDatabase', N'P') IS NULL\n    EXEC(N'CREATE PROCEDURE dbo.sp_DBA_ForEachDatabase AS RETURN 0;');\nGO\n\nALTER PROCEDURE dbo.sp_DBA_ForEachDatabase\n    @Command            NVARCHAR(MAX),\n    @UserDatabasesOnly  BIT = 1,\n    @IncludeReadOnly    BIT = 0,\n    @DatabaseList       NVARCHAR(MAX) = NULL,\n    @ExcludeList        NVARCHAR(MAX) = NULL,\n    @PrintOnly          BIT = 0,\n    @ContinueOnError    BIT = 1\nAS\nBEGIN\n    SET NOCOUNT ON;\n\n    IF @Command IS NULL OR LTRIM(RTRIM(@Command)) = N''\n    BEGIN\n        RAISERROR('sp_DBA_ForEachDatabase: @Command cannot be empty.', 16, 1);\n        RETURN;\n    END;\n\n    DECLARE @DatabaseName SYSNAME;\n    DECLARE @ExecSQL NVARCHAR(MAX);\n    DECLARE @ErrMsg NVARCHAR(4000);\n    DECLARE @ErrNum INT;\n    DECLARE @ErrLine INT;\n\n  IF OBJECT_ID('tempdb..#DBAList') IS NOT NULL DROP TABLE #DBAList;\n    CREATE TABLE #DBAList (database_id INT NOT NULL PRIMARY KEY, database_name SYSNAME NOT NULL);\n\n    IF @DatabaseList IS NOT NULL AND LTRIM(RTRIM(@DatabaseList)) <> N''\n    BEGIN\n        INSERT INTO #DBAList (database_id, database_name)\n        SELECT d.database_id, d.name\n        FROM sys.databases AS d\n        INNER JOIN (\n            SELECT LTRIM(RTRIM(value)) AS database_name\n            FROM STRING_SPLIT(@DatabaseList, N',')\n            WHERE LTRIM(RTRIM(value)) <> N''\n        ) AS requested ON requested.database_name = d.name\n        WHERE d.state = 0\n          AND d.is_in_standby = 0;\n    END\n    ELSE\n    BEGIN\n        INSERT INTO #DBAList (database_id, database_name)\n        SELECT d.database_id, d.name\n        FROM sys.databases AS d\n        WHERE d.state = 0\n          AND d.is_in_standby = 0\n          AND (@UserDatabasesOnly = 0 OR d.database_id > 4)\n          AND (@IncludeReadOnly = 1 OR d.is_read_only = 0);\n    END;\n\n    IF @ExcludeList IS NOT NULL AND LTRIM(RTRIM(@ExcludeList)) <> N''\n    BEGIN\n        DELETE l\n        FROM #DBAList AS l\n        INNER JOIN (\n            SELECT LTRIM(RTRIM(value)) AS database_name\n            FROM STRING_SPLIT(@ExcludeList, N',')\n            WHERE LTRIM(RTRIM(value)) <> N''\n        ) AS excluded ON excluded.database_name = l.database_name;\n    END;\n\n    DECLARE db_cursor CURSOR LOCAL FAST_FORWARD FOR\n        SELECT database_name FROM #DBAList ORDER BY database_name;\n\n    OPEN db_cursor;\n    FETCH NEXT FROM db_cursor INTO @DatabaseName;\n\n    WHILE @@FETCH_STATUS = 0\n    BEGIN\n        SET @ExecSQL = N'USE ' + QUOTENAME(@DatabaseName) + N'; '\n                     + REPLACE(@Command, N'?', @DatabaseName);\n\n        IF @PrintOnly = 1\n        BEGIN\n            PRINT N'-- Database: ' + @DatabaseName;\n            PRINT @ExecSQL;\n            PRINT N'GO';\n        END\n        ELSE\n        BEGIN\n            BEGIN TRY\n                EXEC sys.sp_executesql @ExecSQL;\n            END TRY\n            BEGIN CATCH\n                SET @ErrNum = ERROR_NUMBER();\n                SET @ErrLine = ERROR_LINE();\n                SET @ErrMsg = ERROR_MESSAGE();\n\n                IF @ContinueOnError = 1\n                BEGIN\n                    RAISERROR(\n                        N'sp_DBA_ForEachDatabase: Database [%s] failed (Error %d, Line %d): %s',\n                        10, 1, @DatabaseName, @ErrNum, @ErrLine, @ErrMsg\n                    );\n                END\n                ELSE\n                BEGIN\n                    CLOSE db_cursor;\n                    DEALLOCATE db_cursor;\n                    DROP TABLE #DBAList;\n                    THROW;\n                END;\n            END CATCH;\n        END;\n\n        FETCH NEXT FROM db_cursor INTO @DatabaseName;\n    END;\n\n    CLOSE db_cursor;\n    DEALLOCATE db_cursor;\n    DROP TABLE #DBAList;\nEND;\nGO\n", "sql_server/00_Framework/sp_DBA_HealthCheck.sql": "/*\n================================================================================\nsp_DBA_HealthCheck - One-Stop Diagnostic Engine (Enterprise Edition)\n================================================================================\nPrerequisites: Deploy framework objects first (00_Framework/00_Deploy_Framework.ps1).\n\nUsage:\n    EXEC dbo.sp_DBA_HealthCheck @DeepDive = 0;\n    EXEC dbo.sp_DBA_HealthCheck @DeepDive = 1, @DatabaseList = N'SalesDB,HRDB';\n    EXEC dbo.sp_DBA_HealthCheck @BackupHoursSLA = 48;\n================================================================================\n*/\nIF OBJECT_ID(N'dbo.sp_DBA_HealthCheck', N'P') IS NULL\n    EXEC(N'CREATE PROCEDURE dbo.sp_DBA_HealthCheck AS RETURN 0;');\nGO\n\nALTER PROCEDURE dbo.sp_DBA_HealthCheck\n    @DeepDive           BIT = 0,\n    @DatabaseList       NVARCHAR(MAX) = NULL,\n    @IncludeReadOnly    BIT = 0,\n    @BackupHoursSLA     INT = 24\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SET QUOTED_IDENTIFIER ON;\n    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\n    IF OBJECT_ID(N'dbo.fn_DBA_ExcludedWaitTypes', N'IF') IS NULL\n    BEGIN\n        RAISERROR(N'Run 00_Framework/00_Deploy_Framework.ps1 (-ServerInstance . -Database master) to auto-deploy all required objects, or deploy sp_DBA_HealthCheck and fn_DBA_ExcludedWaitTypes manually.', 16, 1);\n        RETURN;\n    END;\n\n    IF OBJECT_ID(N'tempdb..#DBAFindings') IS NOT NULL DROP TABLE #DBAFindings;\n    CREATE TABLE #DBAFindings (\n        [CheckId] INT,\n        [Severity] VARCHAR(20),\n        [Weight] INT,\n        [Area] VARCHAR(50),\n        [Finding] VARCHAR(255),\n        [Impact] VARCHAR(255),\n        [Recommendation] VARCHAR(MAX),\n        [NextStepCommand] VARCHAR(MAX)\n    );\n\n    DECLARE @SQLServerCPU INT, @SystemIdle INT, @OtherCPU INT;\n    DECLARE @SignalWaitPct DECIMAL(5,2);\n    DECLARE @PLE INT, @TargetMem BIGINT, @TotalMem BIGINT;\n    DECLARE @CTFP INT, @MAXDOP INT;\n    DECLARE @ProductVersion NVARCHAR(128) = CAST(SERVERPROPERTY(N'ProductVersion') AS NVARCHAR(128));\n    DECLARE @MajorVersion INT = CAST(LEFT(@ProductVersion, CHARINDEX(N'.', @ProductVersion) - 1) AS INT);\n    DECLARE @db_id_loop INT;\n    DECLARE @db_name_loop SYSNAME;\n    DECLARE @DynamicSQL_Loop NVARCHAR(MAX);\n    DECLARE @DbQuoted NVARCHAR(260);\n\n    IF OBJECT_ID(N'tempdb..#HealthCheckDbs') IS NOT NULL DROP TABLE #HealthCheckDbs;\n    CREATE TABLE #HealthCheckDbs (database_id INT NOT NULL PRIMARY KEY, database_name SYSNAME NOT NULL);\n\n    IF @DatabaseList IS NOT NULL AND LTRIM(RTRIM(@DatabaseList)) <> N''\n    BEGIN\n        INSERT INTO #HealthCheckDbs (database_id, database_name)\n        SELECT d.database_id, d.name\n        FROM sys.databases AS d\n        INNER JOIN (\n            SELECT LTRIM(RTRIM(value)) AS database_name\n            FROM STRING_SPLIT(@DatabaseList, N',')\n            WHERE LTRIM(RTRIM(value)) <> N''\n        ) AS requested ON requested.database_name = d.name\n        WHERE d.state = 0 AND d.is_in_standby = 0;\n    END\n    ELSE\n    BEGIN\n        INSERT INTO #HealthCheckDbs (database_id, database_name)\n        SELECT database_id, name\n        FROM sys.databases\n        WHERE state = 0\n          AND is_in_standby = 0\n          AND database_id > 4\n          AND (@IncludeReadOnly = 1 OR is_read_only = 0);\n    END;\n\n    ----------------------------------------------------------------------------\n    -- 1. CPU Utilization & Scheduling\n    ----------------------------------------------------------------------------\n    DECLARE @ts_now BIGINT = (SELECT cpu_ticks / (cpu_ticks / ms_ticks) FROM sys.dm_os_sys_info);\n\n    SELECT TOP (1)\n        @SQLServerCPU = SQLProcessUtilization,\n        @SystemIdle = SystemIdle,\n        @OtherCPU = 100 - SystemIdle - SQLProcessUtilization\n    FROM (\n        SELECT\n            record.value(N'(./Record/SchedulerMonitorEvent/SystemHealth/SystemIdle)[1]', N'int') AS SystemIdle,\n            record.value(N'(./Record/SchedulerMonitorEvent/SystemHealth/ProcessUtilization)[1]', N'int') AS SQLProcessUtilization\n        FROM (\n            SELECT TOP (1) CONVERT(XML, record) AS [record]\n            FROM sys.dm_os_ring_buffers\n            WHERE ring_buffer_type = N'RING_BUFFER_SCHEDULER_MONITOR'\n              AND record LIKE N'%<SystemHealth>%'\n            ORDER BY [timestamp] DESC\n        ) AS x\n    ) AS y;\n\n    IF EXISTS (SELECT 1 FROM sys.dm_os_schedulers WHERE runnable_tasks_count > 10 AND status = N'VISIBLE ONLINE')\n        INSERT INTO #DBAFindings VALUES (101, N'High', 15, N'CPU', N'High Runnable Task Count', N'Queries are waiting for CPU cycles.', N'Check sys.dm_os_schedulers for specific hotspots.', N'SELECT * FROM sys.dm_os_schedulers WHERE status = ''VISIBLE ONLINE'';');\n\n    SELECT @SignalWaitPct = CAST(CAST(SUM(signal_wait_time_ms) AS NUMERIC(18,2)) / NULLIF(SUM(wait_time_ms), 0) * 100 AS DECIMAL(5,2))\n    FROM sys.dm_os_wait_stats\n    WHERE wait_type NOT IN (SELECT wait_type FROM dbo.fn_DBA_ExcludedWaitTypes());\n\n    IF @SQLServerCPU > 80\n        INSERT INTO #DBAFindings VALUES (102, N'High', 20, N'CPU', N'High SQL Server CPU Utilization (' + CAST(@SQLServerCPU AS VARCHAR(10)) + N'%)', N'Query performance degradation.', N'Historical CPU from ring buffers. Threshold > 80%.', N'SELECT TOP 10 * FROM sys.dm_exec_query_stats ORDER BY total_worker_time DESC;');\n\n    IF @OtherCPU > 20\n        INSERT INTO #DBAFindings VALUES (103, N'Medium', 10, N'CPU', N'High External CPU Usage (' + CAST(@OtherCPU AS VARCHAR(10)) + N'%)', N'Steals cycles from SQL Server.', N'Check antivirus, backup agents, or other host processes.', NULL);\n\n    IF @SignalWaitPct > 25\n        INSERT INTO #DBAFindings VALUES (104, N'High', 15, N'CPU', N'High Signal Waits (' + CAST(@SignalWaitPct AS VARCHAR(10)) + N'%)', N'Severe CPU scheduling pressure.', N'Target signal waits < 25%. Review MAXDOP and CTFP.', NULL);\n\n    DECLARE @AdHocPlanMB DECIMAL(10,2);\n    SELECT @AdHocPlanMB = SUM(CAST(size_in_bytes AS BIGINT)) / 1024.0 / 1024.0\n    FROM sys.dm_exec_cached_plans\n    WHERE objtype = N'Adhoc' AND usecounts = 1;\n\n    IF @AdHocPlanMB > 500\n        INSERT INTO #DBAFindings VALUES (105, N'Low', 5, N'Performance', N'Plan Cache Bloat Detected (' + CAST(@AdHocPlanMB AS VARCHAR(20)) + N' MB)', N'Wasting memory on single-use plans.', N'Enable optimize for ad hoc workloads.', N'EXEC sp_configure ''optimize for ad hoc workloads'', 1; RECONFIGURE;');\n\n    ----------------------------------------------------------------------------\n    -- 2. Cross-Database Security & Best Practices\n    ----------------------------------------------------------------------------\n    SELECT @db_id_loop = MIN(database_id) FROM #HealthCheckDbs;\n\n    WHILE @db_id_loop IS NOT NULL\n    BEGIN\n        SELECT @db_name_loop = database_name FROM #HealthCheckDbs WHERE database_id = @db_id_loop;\n        SET @DbQuoted = QUOTENAME(@db_name_loop);\n\n        BEGIN TRY\n            IF EXISTS (SELECT 1 FROM sys.databases WHERE database_id = @db_id_loop AND is_trustworthy_on = 1)\n                INSERT INTO #DBAFindings VALUES (201, N'High', 15, N'Security', N'Trustworthy Database: ' + @db_name_loop, N'Privilege escalation risk.', N'Disable TRUSTWORTHY unless required.', N'ALTER DATABASE ' + @DbQuoted + N' SET TRUSTWORTHY OFF;');\n\n            SET @DynamicSQL_Loop = N'USE ' + @DbQuoted + N';\n                IF EXISTS (\n                    SELECT 1 FROM sys.database_permissions AS p\n                    INNER JOIN sys.database_principals AS pr ON p.grantee_principal_id = pr.principal_id\n                    WHERE pr.name = N''guest'' AND p.permission_name = N''CONNECT'' AND p.state = N''G''\n                )\n                INSERT INTO #DBAFindings VALUES (202, N''Medium'', 10, N''Security'', N''Guest User Enabled in '' + DB_NAME(), N''Lateral movement risk.'', N''Revoke CONNECT from guest.'', N''USE ' + @DbQuoted + N'; REVOKE CONNECT FROM guest;'');';\n            EXEC sys.sp_executesql @DynamicSQL_Loop;\n\n            IF EXISTS (SELECT 1 FROM sys.databases WHERE database_id = @db_id_loop AND page_verify_option_desc <> N'CHECKSUM')\n                INSERT INTO #DBAFindings VALUES (203, N'Critical', 25, N'Best Practice', N'Page Verification not CHECKSUM: ' + @db_name_loop, N'Undetected corruption risk.', N'Set PAGE_VERIFY to CHECKSUM.', N'ALTER DATABASE ' + @DbQuoted + N' SET PAGE_VERIFY CHECKSUM;');\n\n            IF EXISTS (SELECT 1 FROM sys.databases WHERE database_id = @db_id_loop AND (is_auto_shrink_on = 1 OR is_auto_close_on = 1))\n                INSERT INTO #DBAFindings VALUES (204, N'Critical', 20, N'Best Practice', N'Auto-Shrink/Close Enabled: ' + @db_name_loop, N'Performance spikes and fragmentation.', N'Disable AUTO_SHRINK and AUTO_CLOSE.', N'ALTER DATABASE ' + @DbQuoted + N' SET AUTO_SHRINK OFF, AUTO_CLOSE OFF;');\n\n            SET @DynamicSQL_Loop = N'USE ' + @DbQuoted + N';\n                IF EXISTS (\n                    SELECT 1 FROM sys.dm_db_index_usage_stats AS s\n                    INNER JOIN sys.indexes AS i ON s.object_id = i.object_id AND s.index_id = i.index_id\n                    WHERE s.database_id = DB_ID() AND i.index_id > 1\n                      AND s.user_updates > 10000\n                      AND (s.user_seeks + s.user_scans + s.user_lookups) = 0\n                )\n                INSERT INTO #DBAFindings VALUES (205, N''Low'', 5, N''Indexes'', N''Unused Indexes in '' + DB_NAME(), N''Write overhead without read benefit.'', N''Validate since last restart before dropping.'', NULL);';\n            EXEC sys.sp_executesql @DynamicSQL_Loop;\n\n            IF @MajorVersion >= 11\n            BEGIN\n                SET @DynamicSQL_Loop = N'USE ' + @DbQuoted + N';\n                    IF EXISTS (\n                        SELECT 1 FROM sys.stats AS s\n                        CROSS APPLY sys.dm_db_stats_properties(s.object_id, s.stats_id) AS sp\n                        WHERE OBJECTPROPERTY(s.object_id, N''IsUserTable'') = 1\n                          AND CAST(sp.modification_counter AS DECIMAL(18,2)) / NULLIF(sp.rows, 0) > 0.2\n                    )\n                    INSERT INTO #DBAFindings VALUES (206, N''Medium'', 10, N''Statistics'', N''Stale Statistics in '' + DB_NAME(), N''Poor execution plans.'', N''UPDATE STATISTICS on affected tables.'', NULL);';\n                EXEC sys.sp_executesql @DynamicSQL_Loop;\n            END;\n\n            IF EXISTS (SELECT 1 FROM sys.databases WHERE database_id = @db_id_loop AND is_query_store_on = 1)\n            BEGIN\n                SET @DynamicSQL_Loop = N'USE ' + @DbQuoted + N';\n                    IF EXISTS (SELECT 1 FROM sys.database_query_store_options WHERE actual_state_desc = N''READ_ONLY'')\n                    INSERT INTO #DBAFindings VALUES (207, N''Medium'', 10, N''Advanced'', N''Query Store READ_ONLY: '' + DB_NAME(), N''Plan history capture stopped.'', N''Increase max_storage_size_mb or clean up Query Store.'', NULL);';\n                EXEC sys.sp_executesql @DynamicSQL_Loop;\n            END;\n\n            IF EXISTS (SELECT 1 FROM sys.databases WHERE database_id = @db_id_loop AND is_cdc_enabled = 1)\n            BEGIN\n                SET @DynamicSQL_Loop = N'USE ' + @DbQuoted + N';\n                    IF EXISTS (SELECT 1 FROM sys.dm_cdc_log_scan_sessions WHERE latency > 3600)\n                    INSERT INTO #DBAFindings VALUES (208, N''Medium'', 10, N''Advanced'', N''High CDC Latency in '' + DB_NAME(), N''Transaction log may not reuse.'', N''Review CDC job parameters and log reader throughput.'', NULL);';\n                EXEC sys.sp_executesql @DynamicSQL_Loop;\n            END;\n        END TRY\n        BEGIN CATCH\n            INSERT INTO #DBAFindings VALUES (\n                209, N'Medium', 5, N'Security',\n                N'Could not audit database: ' + @db_name_loop,\n                LEFT(ERROR_MESSAGE(), 200),\n                N'Verify CONNECT permission and database accessibility.',\n                NULL\n            );\n        END CATCH;\n\n        SELECT @db_id_loop = MIN(database_id) FROM #HealthCheckDbs WHERE database_id > @db_id_loop;\n    END;\n\n    SELECT @CTFP = CAST(value_in_use AS INT) FROM sys.configurations WHERE name = N'cost threshold for parallelism';\n    SELECT @MAXDOP = CAST(value_in_use AS INT) FROM sys.configurations WHERE name = N'max degree of parallelism';\n\n    IF @CTFP = 5\n        INSERT INTO #DBAFindings VALUES (301, N'Medium', 10, N'Config', N'Default Cost Threshold for Parallelism (5)', N'Trivial queries may parallelize.', N'Increase CTFP to at least 50.', N'EXEC sp_configure ''cost threshold for parallelism'', 50; RECONFIGURE;');\n\n    IF @MAXDOP = 0\n        INSERT INTO #DBAFindings VALUES (302, N'Medium', 10, N'Config', N'MAXDOP is 0', N'Single query may use all CPUs.', N'Set MAXDOP per NUMA (often capped at 8).', NULL);\n\n    IF (SELECT value_in_use FROM sys.configurations WHERE name = N'optimize for ad hoc workloads') = 0\n        INSERT INTO #DBAFindings VALUES (303, N'Low', 5, N'Config', N'Optimize for Ad Hoc Workloads is OFF', N'Plan cache bloat risk.', N'Enable optimize for ad hoc workloads.', N'EXEC sp_configure ''optimize for ad hoc workloads'', 1; RECONFIGURE;');\n\n    IF (SELECT value_in_use FROM sys.configurations WHERE name = N'backup compression default') = 0\n        INSERT INTO #DBAFindings VALUES (304, N'Low', 5, N'Config', N'Backup Compression Default is OFF', N'Larger, slower backups.', N'Enable backup compression default.', N'EXEC sp_configure ''backup compression default'', 1; RECONFIGURE;');\n\n    IF (SELECT value_in_use FROM sys.configurations WHERE name = N'remote admin connections') = 0\n        INSERT INTO #DBAFindings VALUES (305, N'Medium', 10, N'Config', N'Dedicated Admin Connection (DAC) is OFF', N'Cannot connect when instance is hung.', N'Enable remote admin connections.', N'EXEC sp_configure ''remote admin connections'', 1; RECONFIGURE;');\n\n    IF COL_LENGTH(N'sys.dm_server_services', N'instant_file_initialization_enabled') IS NOT NULL\n       AND EXISTS (\n            SELECT 1 FROM sys.dm_server_services\n            WHERE instant_file_initialization_enabled = N'N'\n              AND (servicename LIKE N'SQL Server (%)' OR servicename = N'MSSQLSERVER')\n        )\n        INSERT INTO #DBAFindings VALUES (306, N'Medium', 10, N'OS', N'Instant File Initialization (IFI) is DISABLED', N'Slow file growth and restores.', N'Grant Perform Volume Maintenance Tasks to service account.', NULL);\n\n    IF COL_LENGTH(N'sys.dm_os_sys_info', N'sql_memory_model_desc') IS NOT NULL\n       AND EXISTS (SELECT 1 FROM sys.dm_os_sys_info WHERE sql_memory_model_desc = N'CONVENTIONAL')\n        INSERT INTO #DBAFindings VALUES (307, N'Medium', 10, N'OS', N'Locked Pages in Memory (LPIM) not active', N'OS may page SQL Server memory.', N'Consider Lock Pages in Memory if memory pressure occurs.', NULL);\n\n    ----------------------------------------------------------------------------\n    -- 3. Memory\n    ----------------------------------------------------------------------------\n    SELECT @TargetMem = cntr_value / 1024 FROM sys.dm_os_performance_counters WHERE counter_name = N'Target Server Memory (KB)';\n    SELECT @TotalMem = cntr_value / 1024 FROM sys.dm_os_performance_counters WHERE counter_name = N'Total Server Memory (KB)';\n    SELECT @PLE = MIN(cntr_value) FROM sys.dm_os_performance_counters WHERE object_name LIKE N'%Buffer Manager%' AND counter_name = N'Page life expectancy';\n\n    IF @TotalMem < (@TargetMem * 0.9)\n        INSERT INTO #DBAFindings VALUES (401, N'High', 15, N'Memory', N'SQL Server not reaching Target Memory', N'Possible OS memory pressure.', N'Review max server memory and host RAM.', NULL);\n\n    DECLARE @PLEThreshold INT = CASE WHEN @TotalMem > 0 THEN (@TotalMem / 1024 / 4) * 150 ELSE 300 END;\n    IF @PLE < @PLEThreshold\n        INSERT INTO #DBAFindings VALUES (402, N'Medium', 10, N'Memory', N'Low Page Life Expectancy (' + CAST(@PLE AS VARCHAR(10)) + N's)', N'Buffer pool churn.', N'Check scans, missing indexes, memory grants.', NULL);\n\n    IF EXISTS (SELECT 1 FROM sys.dm_exec_query_memory_grants)\n        INSERT INTO #DBAFindings VALUES (403, N'High', 20, N'Memory', N'Active Memory Grant Waits', N'Queries waiting for memory to execute.', N'Optimize sorts/hashes or add RAM.', N'SELECT * FROM sys.dm_exec_query_memory_grants;');\n\n    ----------------------------------------------------------------------------\n    -- 4. Wait Statistics (Top 30)\n    ----------------------------------------------------------------------------\n    IF OBJECT_ID(N'tempdb..#TopWaits') IS NOT NULL DROP TABLE #TopWaits;\n    SELECT TOP (30)\n        wait_type,\n        wait_time_ms / 1000.0 AS [Wait_S],\n        (wait_time_ms - signal_wait_time_ms) / 1000.0 AS [Resource_S],\n        signal_wait_time_ms / 1000.0 AS [Signal_S],\n        waiting_tasks_count AS [Wait_Count],\n        CAST(wait_time_ms * 100.0 / SUM(wait_time_ms) OVER() AS DECIMAL(5,2)) AS [Percentage],\n        CASE\n            -- Parallelism\n            WHEN wait_type = N'CXPACKET' THEN N'Parallelism coordinator waiting on worker threads. Normal when mixed with CXCONSUMER. If dominant, check cost threshold for parallelism (default 5). Consider raising CTFP to 50-200 to reduce unnecessary parallelism.'\n            WHEN wait_type = N'CXCONSUMER' THEN N'Parallelism consumer waiting on producers. Often benign — a row is being passed between parallel operators. Investigate only when CXPACKET+CXCONSUMER together exceed 30% of total waits.'\n            WHEN wait_type = N'EXECSYNC' THEN N'Parallel thread waiting for another thread to produce rows. High values suggest a single slow parallel operator. Check the plan for expensive sorts, hashes, or scans feeding the gather.'\n            -- CPU / Scheduling\n            WHEN wait_type = N'SOS_SCHEDULER_YIELD' THEN N'Thread voluntarily yielded its 4ms quantum — normal under CPU-bound workloads. Investigate when > 25% of total waits. Check for query plan regressions, missing indexes, or CPU-hungry cursors.'\n            WHEN wait_type = N'THREADPOOL' THEN N'No worker thread available to run a task. Classic symptom of max worker thread starvation. Check sys.dm_os_schedulers for runnable_task_count. May need to increase max worker threads or fix a parallelism leak.'\n            WHEN wait_type = N'RESOURCE_POOL' THEN N'Task waiting for a resource pool to yield capacity. Common with Resource Governor throttling. Review RG workload group limits or disable temporarily for testing.'\n            WHEN wait_type = N'PREEMPTIVE_OS_AUTHENTICATIONOPS' THEN N'Waiting on Windows/AD authentication (LogonUser, NegotiateSecurityContext). Indicates slow domain controller or Kerberos issues. Check network latency to DC and DNS resolution.'\n            WHEN wait_type = N'PREEMPTIVE_OS_WRITEFILE' THEN N'Waiting on an OS-level WriteFile call outside SQL scheduler control. Typically backup/restore or file initialization. Check I/O subsystem and Enable Instant File Initialization.'\n            -- Disk I/O\n            WHEN wait_type = N'PAGEIOLATCH_SH' THEN N'Shared latch on a data page being read from disk into buffer pool. High values indicate slow disk I/O or memory pressure causing excessive page reads. Run disk_latency.sql to identify hot files.'\n            WHEN wait_type = N'PAGEIOLATCH_EX' THEN N'Exclusive latch on a data page during physical read. Often seen with large table scans or poor indexing. Check for missing clustered indexes and large table scans in plan cache.'\n            WHEN wait_type = N'PAGEIOLATCH_UP' THEN N'Latch while modifying a page that is currently being read from disk. Indicates I/O subsystem contention. Check disk latency and review write-heavy operations.'\n            WHEN wait_type = N'WRITELOG' THEN N'Waiting for transaction log records to be flushed to disk. High values suggest log file on slow storage, large VLF count, or heavy DML. Move log to fast storage and check VLF count.'\n            WHEN wait_type = N'LOGBUFFER' THEN N'Waiting for space in the log buffer to write log records. Indicates log contention — often from very large transactions or autogrowth events. Split large transactions and pre-grow the log file.'\n            WHEN wait_type = N'LOGMGR' THEN N'Waiting for log buffer flush to complete. Related to WRITELOG. Check log file location, VLF count, and whether log autogrowth is occurring frequently.'\n            -- Memory\n            WHEN wait_type = N'RESOURCE_SEMAPHORE' THEN N'Query is waiting for a memory grant to execute a memory-consuming operator (sort/hash). High values mean large queries are starving each other. Check sys.dm_exec_query_memory_grants and consider query optimization or adding RAM.'\n            WHEN wait_type = N'RESOURCE_SEMAPHORE_POOL' THEN N'Query waiting for a thread pool grant. Often caused by max degree of parallelism set too high. Review DOP settings and check for plans that request excessive parallelism.'\n            WHEN wait_type = N'MEMORY_ALLOCATION_EXTENSIONS' THEN N'Waiting for extended memory allocation beyond normal pool. Seen on servers with max server memory configured too low or during large memory grant requests.'\n            -- Locking / Blocking\n            WHEN wait_type = N'LCK_M_X' THEN N'Exclusive lock waiting to modify a row/page/table. Indicates blocking — find the head blocker using sys.dm_exec_requests joined to sys.dm_tran_locks. Check for long-running transactions and missing indexes.'\n            WHEN wait_type = N'LCK_M_S' THEN N'Shared lock waiting for a resource held by an exclusive lock. Common with update operations blocking reads. Consider NOLOCK hints, snapshot isolation, or reducing transaction duration.'\n            WHEN wait_type = N'LCK_M_U' THEN N'Update lock waiting for a shared lock held by another session. Often a precursor to deadlocks. Check for concurrent update patterns on the same rows.'\n            WHEN wait_type = N'PAGELATCH_EX' THEN N'Exclusive in-memory latch on a buffer page. High values indicate hot-page contention — most commonly TempDB allocation pages (PFS/GAM/SGAM). Check tempdb_configuration.sql.'\n            WHEN wait_type = N'PAGELATCH_SH' THEN N'Shared in-memory latch contention on a buffer page. Multiple sessions reading the same page simultaneously. If in tempdb, check allocation contention. If in user DB, review hot-page access patterns.'\n            -- Network / Client\n            WHEN wait_type = N'ASYNC_NETWORK_IO' THEN N'SQL Server has results ready but the client is slow to consume them. Check application-side fetch patterns, cursor usage, or network latency. Common with SSMS result grid rendering or large unbounded result sets.'\n            WHEN wait_type = N'NETWAITFORREPLY' THEN N'Waiting for a network reply from a linked server or Service Broker. Indicates linked server latency. Check linked server connectivity and query the remote server health.'\n            -- AlwaysOn AG\n            WHEN wait_type = N'HADR_SYNC_COMMIT' THEN N'Primary replica waiting for secondary replica(s) to confirm log hardening. Indicates secondary replica lagging behind. Check secondary disk I/O, redo thread speed, and network latency between replicas.'\n            WHEN wait_type = N'HADR_FILESTREAM_IOMGR_IOCOMPLETION' THEN N'FILESTREAM I/O completion wait in AlwaysOn AG. Indicates FILESTREAM data being synchronized to secondaries. Check FILESTREAM filegroup I/O performance on both primary and secondary.'\n            WHEN wait_type = N'HADR_LOGCAPTURE_WAIT' THEN N'Log capture thread waiting for new log records. Normal during idle periods. If high during active workload, check log send queue size and secondary redo rate.'\n            WHEN wait_type = N'HADR_WORK_QUEUE' THEN N'AG redo thread waiting for work from the log redo queue. If the redo queue is large, the secondary may be falling behind. Check secondary resource contention and network bandwidth.'\n            WHEN wait_type = N'WAITFOR' THEN N'Session explicitly waiting via WAITFOR command or Service Broker dialog. If unexpected, check for application WAITFOR DELAY patterns or idle Service Broker conversations.'\n            WHEN wait_type = N'BROKER_EVENTHANDLER' THEN N'Service Broker internal event handler waiting. Usually normal. If excessive, check for stuck or orphaned Service Broker conversations using sys.conversation_endpoints.'\n            ELSE N'Check Microsoft Docs: https://learn.microsoft.com/en-us/sql/relational-databases/system-dm-views/sys-dm-os-wait-stats'\n        END AS [Expert_Note]\n    INTO #TopWaits\n    FROM sys.dm_os_wait_stats\n    WHERE wait_type NOT IN (SELECT wait_type FROM dbo.fn_DBA_ExcludedWaitTypes())\n      AND waiting_tasks_count > 0\n    ORDER BY wait_time_ms DESC;\n\n    IF EXISTS (SELECT 1 FROM #TopWaits WHERE wait_type LIKE N'LCK%' AND Percentage > 10)\n        INSERT INTO #DBAFindings VALUES (501, N'Critical', 25, N'Performance', N'High Locking/Blocking Waits', N'Application timeouts likely.', N'Identify head blocker and tune transactions.', N'-- Run 04_Performance_Diagnostics/blocking_and_deadlocks.sql');\n\n    IF EXISTS (SELECT 1 FROM #TopWaits WHERE wait_type = N'PAGEIOLATCH_SH' AND Percentage > 20)\n        INSERT INTO #DBAFindings VALUES (502, N'High', 15, N'Performance', N'High Disk Read Waits (PAGEIOLATCH_SH)', N'Slow I/O or memory pressure.', N'Check disk latency and indexing.', N'-- Run 01_Server_OS/disk_latency.sql');\n\n    IF EXISTS (SELECT 1 FROM #TopWaits WHERE wait_type = N'RESOURCE_SEMAPHORE')\n        INSERT INTO #DBAFindings VALUES (503, N'High', 20, N'Memory', N'Query Memory Grant Starvation', N'Large queries waiting for grants.', N'Optimize memory-heavy plans.', NULL);\n\n    ----------------------------------------------------------------------------\n    -- 5. Storage Engine\n    ----------------------------------------------------------------------------\n    IF EXISTS (\n        SELECT 1 FROM sys.dm_io_virtual_file_stats(NULL, NULL)\n        WHERE (io_stall_read_ms / NULLIF(num_of_reads, 0) > 20)\n           OR (io_stall_write_ms / NULLIF(num_of_writes, 0) > 20)\n    )\n        INSERT INTO #DBAFindings VALUES (601, N'High', 15, N'I/O', N'High Disk Latency Detected (>20ms)', N'Slow query response.', N'Analyze per-file stalls.', N'-- Run 01_Server_OS/disk_latency.sql');\n\n    IF @MajorVersion >= 13\n    BEGIN\n        IF EXISTS (\n            SELECT 1\n            FROM sys.databases AS d\n            INNER JOIN #HealthCheckDbs AS hc ON hc.database_id = d.database_id\n            CROSS APPLY (SELECT COUNT(*) AS vlf_count FROM sys.dm_db_log_info(d.database_id)) AS v\n            WHERE v.vlf_count >= 1000\n        )\n            INSERT INTO #DBAFindings VALUES (602, N'High', 15, N'Storage', N'Critical VLF Count (>=1000)', N'Slow recovery and log backups.', N'Rebuild log with large growth increments.', N'-- Run 03_Storage_Engine/vlf_fragmentation.sql');\n\n        IF EXISTS (\n            SELECT 1\n            FROM sys.databases AS d\n            INNER JOIN #HealthCheckDbs AS hc ON hc.database_id = d.database_id\n            CROSS APPLY (SELECT COUNT(*) AS vlf_count FROM sys.dm_db_log_info(d.database_id)) AS v\n            WHERE v.vlf_count BETWEEN 200 AND 999\n        )\n            INSERT INTO #DBAFindings VALUES (603, N'Medium', 10, N'Storage', N'Elevated VLF Count (200-999)', N'Log operations may slow.', N'Plan log file maintenance.', N'-- Run 03_Storage_Engine/vlf_fragmentation.sql');\n    END;\n\n    IF (SELECT COUNT(*) FROM sys.master_files WHERE database_id = 2 AND type = 0) < 4\n        INSERT INTO #DBAFindings VALUES (604, N'Medium', 10, N'TempDB', N'Few TempDB Data Files', N'Possible PAGELATCH contention.', N'Use 4-8 equal data files; add only if contention proven.', NULL);\n\n    IF EXISTS (\n        SELECT 1 FROM sys.master_files\n        WHERE database_id = 2 AND type = 0\n          AND growth <> (SELECT TOP (1) growth FROM sys.master_files WHERE database_id = 2 AND type = 0 ORDER BY file_id)\n    )\n        INSERT INTO #DBAFindings VALUES (605, N'High', 15, N'TempDB', N'Uneven TempDB File Growths', N'Proportional fill imbalance.', N'Equalize growth increments for all TempDB data files.', NULL);\n\n    IF EXISTS (SELECT 1 FROM sys.master_files WHERE is_percent_growth = 1 AND database_id IN (SELECT database_id FROM #HealthCheckDbs))\n        INSERT INTO #DBAFindings VALUES (606, N'Medium', 10, N'Storage', N'Percentage-based Autogrowth Enabled', N'Unpredictable growth pauses.', N'Switch to fixed MB growth.', NULL);\n\n    ----------------------------------------------------------------------------\n    -- 6. Missing Indexes (instance-wide DMV)\n    ----------------------------------------------------------------------------\n    IF EXISTS (\n        SELECT 1\

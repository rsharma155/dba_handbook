ned\n    users, guest access, db_owner role members, and cross-database ownership chaining.\n\nOutput:\n    Result sets for each security check with database name and affected principals.\n\nAction:\n    Disable trustworthy on databases that don't need it:\n        ALTER DATABASE [DBName] SET TRUSTWORTHY OFF;\n    Drop orphaned database users (users without matching server logins):\n        DROP USER [OrphanedUser];\n    Revoke db_owner from users who only need read or write access.\n    Disable guest access in user databases unless explicitly required:\n        REVOKE CONNECT FROM GUEST;\n\nParameters:\n    @DatabaseList - comma-separated database names or NULL for all user DBs\n\nCriticality: High\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\n\nDECLARE @DatabaseList NVARCHAR(MAX) = NULL;\n\nPRINT N'--- Trustworthy Databases ---';\nSELECT name AS [DB], is_trustworthy_on\nFROM sys.databases\nWHERE is_trustworthy_on = 1 AND database_id > 4;\n\nIF OBJECT_ID(N'tempdb..#SecurityAudit') IS NOT NULL DROP TABLE #SecurityAudit;\nCREATE TABLE #SecurityAudit (\n    [Database] SYSNAME,\n    [Metric] NVARCHAR(128),\n    [Principal] SYSNAME,\n    [Type] NVARCHAR(60),\n    [Created] DATETIME NULL\n);\n\nDECLARE @SecurityCommand NVARCHAR(MAX) = N'\nIF EXISTS (\n    SELECT 1\n    FROM sys.database_permissions AS p\n    INNER JOIN sys.database_principals AS pr ON p.grantee_principal_id = pr.principal_id\n    WHERE pr.name = N''guest'' AND p.permission_name = N''CONNECT'' AND p.state = N''G''\n)\nINSERT INTO #SecurityAudit VALUES (DB_NAME(), N''Guest Access Enabled'', N''guest'', N''DATABASE_PRINCIPAL'', NULL);\n\nINSERT INTO #SecurityAudit\nSELECT DB_NAME(), N''Orphaned User'', dp.name, dp.type_desc, dp.create_date\nFROM sys.database_principals AS dp\nLEFT JOIN sys.server_principals AS sp ON dp.sid = sp.sid\nWHERE dp.type IN (N''S'', N''U'')\n  AND sp.sid IS NULL\n  AND dp.authentication_type_desc = N''INSTANCE''\n  AND dp.name NOT IN (N''guest'', N''INFORMATION_SCHEMA'', N''sys'');\n\nIF EXISTS (\n    SELECT 1 FROM sys.databases AS d\n    WHERE d.database_id = DB_ID()\n      AND d.owner_sid IS NOT NULL\n      AND SUSER_SNAME(d.owner_sid) IS NULL\n)\nINSERT INTO #SecurityAudit\nSELECT DB_NAME(), N''Orphaned Database Owner'', CONVERT(NVARCHAR(128), d.owner_sid, 1), N''DATABASE_OWNER'', NULL\nFROM sys.databases AS d WHERE d.database_id = DB_ID();';\n\nIF OBJECT_ID(N'dbo.sp_DBA_ForEachDatabase', N'P') IS NOT NULL\nBEGIN\n    EXEC dbo.sp_DBA_ForEachDatabase\n        @Command = @SecurityCommand,\n        @UserDatabasesOnly = 1,\n        @IncludeReadOnly = 0,\n        @DatabaseList = @DatabaseList,\n        @ContinueOnError = 1;\nEND\nELSE\nBEGIN\n    DECLARE @db_name SYSNAME;\n    DECLARE @SQL NVARCHAR(MAX);\n\n    IF OBJECT_ID(N'tempdb..#DbTargets') IS NOT NULL DROP TABLE #DbTargets;\n    CREATE TABLE #DbTargets (database_name SYSNAME PRIMARY KEY);\n\n    IF @DatabaseList IS NOT NULL AND LTRIM(RTRIM(@DatabaseList)) <> N''\n        INSERT INTO #DbTargets SELECT LTRIM(RTRIM(value)) FROM STRING_SPLIT(@DatabaseList, N',') WHERE LTRIM(RTRIM(value)) <> N'';\n    ELSE\n        INSERT INTO #DbTargets SELECT name FROM sys.databases WHERE database_id > 4 AND state = 0 AND is_in_standby = 0;\n\n    DECLARE db_cursor CURSOR LOCAL FAST_FORWARD FOR SELECT database_name FROM #DbTargets ORDER BY database_name;\n    OPEN db_cursor;\n    FETCH NEXT FROM db_cursor INTO @db_name;\n    WHILE @@FETCH_STATUS = 0\n    BEGIN\n        SET @SQL = N'USE ' + QUOTENAME(@db_name) + N';' + @SecurityCommand;\n        BEGIN TRY EXEC sys.sp_executesql @SQL; END TRY BEGIN CATCH END CATCH;\n        FETCH NEXT FROM db_cursor INTO @db_name;\n    END;\n    CLOSE db_cursor; DEALLOCATE db_cursor;\n    DROP TABLE #DbTargets;\nEND;\n\nSELECT * FROM #SecurityAudit ORDER BY [Database], [Metric], [Principal];\nDROP TABLE #SecurityAudit;\n\nPRINT N'--- Sysadmins & SecurityAdmins ---';\nSELECT l.name AS [Login], r.name AS [Role]\nFROM sys.server_principals AS l\nINNER JOIN sys.server_role_members AS srm ON l.principal_id = srm.member_principal_id\nINNER JOIN sys.server_principals AS r ON srm.role_principal_id = r.principal_id\nWHERE r.name IN (N'sysadmin', N'securityadmin')\n  AND l.name NOT LIKE N'NT SERVICE\\%'\nORDER BY r.name, l.name;\n", "sql_server/07_Security/encryption_hardening.sql": "/*\n================================================================================\nPurpose:        Verifies Transparent Data Encryption (TDE) status, SSL/TLS \n                certificate configuration, and SQL Server Audit activation.\nProvides:       TDE state, encryption percentage, connection encryption status, \n                and server-level audit configurations.\nImportance:     Critical for ensuring data-at-rest and data-in-transit security \n                compliance (SOC2, HIPAA, PCI-DSS).\nInterpretation: All production databases should have TDE enabled. All active \n                 connections should use encryption. Audits should be enabled.\nAction: For databases with Is_TDE_Enabled = 0 and sensitive data, enable TDE:\n    CREATE DATABASE ENCRYPTION KEY WITH ALGORITHM = AES_256 ENCRYPTION BY SERVER CERTIFICATE [CertName];\n    ALTER DATABASE [DBName] SET ENCRYPTION ON;\n    For connections without encryption, configure the server to force encryption via SQL Server Configuration Manager. For missing SQL Server Audits, create server and database audit specifications per compliance requirements.\nCriticality:    High\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\n\nDECLARE @DatabaseList NVARCHAR(MAX) = NULL;\nDECLARE @MajorVersion INT = CAST(PARSENAME(CAST(SERVERPROPERTY(N'ProductVersion') AS NVARCHAR(128)), 4) AS INT);\n\n-- 1. Transparent Data Encryption (TDE) Status per Database\nSELECT \n    d.name AS [Database_Name],\n    d.is_encrypted AS [Is_TDE_Enabled],\n    CASE \n        WHEN dek.encryptor_type IS NOT NULL THEN dek.encryptor_type\n        ELSE N'N/A'\n    END AS [Encryptor_Type],\n    CASE \n        WHEN dek.encryption_state = 3 THEN N'ENCRYPTED'\n        WHEN dek.encryption_state = 2 THEN N'ENCRYPTION_IN_PROGRESS'\n        WHEN dek.encryption_state = 1 THEN N'UNENCRYPTED'\n        WHEN dek.encryption_state = 0 THEN N'NO_DATABASE_KEY'\n        ELSE N'UNKNOWN'\n    END AS [Encryption_State],\n    dek.percent_complete AS [Encryption_Pct]\nFROM sys.databases AS d\nLEFT JOIN sys.dm_database_encryption_keys AS dek ON d.database_id = dek.database_id\nWHERE d.database_id > 4\n  AND d.state = 0\n  AND (\n        @DatabaseList IS NULL\n        OR d.name IN (SELECT LTRIM(RTRIM(value)) FROM STRING_SPLIT(@DatabaseList, N',') WHERE LTRIM(RTRIM(value)) <> N'')\n      )\nORDER BY d.name;\n\n-- 2. SSL/TLS Connection Encryption (all active sessions)\nPRINT N'--- Connection Encryption Summary ---';\nSELECT\n    encrypt_option AS [Encrypt_Option],\n    COUNT(*) AS [Session_Count],\n    CAST(COUNT(*) * 100.0 / SUM(COUNT(*)) OVER() AS DECIMAL(5,2)) AS [Pct_Of_Sessions]\nFROM sys.dm_exec_connections\nWHERE session_id > 50\nGROUP BY encrypt_option\nORDER BY [Session_Count] DESC;\n\nSELECT TOP (20)\n    c.session_id,\n    s.login_name,\n    c.encrypt_option,\n    c.auth_scheme,\n    c.net_transport,\n    c.client_net_address\nFROM sys.dm_exec_connections AS c\nINNER JOIN sys.dm_exec_sessions AS s ON c.session_id = s.session_id\nWHERE c.session_id > 50\nORDER BY c.session_id;\n\n-- 3. SQL Server Audit Configuration\nIF @MajorVersion >= 16\n    EXEC(N'SELECT \n        aud.name AS [Audit_Name],\n        aud.is_state_enabled AS [Is_Enabled],\n        aud.type_desc AS [Audit_Type],\n        aud.queue_delay AS [Queue_Delay_ms],\n        aud.on_failure_desc AS [On_Failure_Action],\n        aud.predicate AS [Audit_Predicate],\n        CAST(N''SQL Server Audit configuration review. Threshold: Audits should be enabled (Is_Enabled = 1) for compliance with regulatory standards (SOC2, HIPAA, ISO27001). Recommendation: Create server and database audit specifications to log failed logins, permission changes, and DDL operations.'' AS VARCHAR(1000)) AS [Metric_Context]\n    FROM sys.server_audits AS aud WITH (NOLOCK)\n    ORDER BY aud.name;');\nELSE\n    EXEC(N'SELECT \n        aud.name AS [Audit_Name],\n        aud.is_state_enabled AS [Is_Enabled],\n        aud.type_desc AS [Audit_Type],\n        aud.destination_type_desc AS [Destination_Type],\n        aud.path AS [Audit_File_Path],\n        aud.max_files AS [Max_Files],\n        aud.max_rollover_files AS [Max_Rollover],\n        aud.retention_days AS [Retention_Days],\n        aud.queue_delay AS [Queue_Delay_ms],\n        aud.on_failure_desc AS [On_Failure_Action],\n        aud.predicate AS [Audit_Predicate],\n        CAST(N''SQL Server Audit configuration review. Threshold: Audits should be enabled (Is_Enabled = 1) for compliance with regulatory standards (SOC2, HIPAA, ISO27001). Recommendation: Create server and database audit specifications to log failed logins, permission changes, and DDL operations.'' AS VARCHAR(1000)) AS [Metric_Context]\n    FROM sys.server_audits AS aud WITH (NOLOCK)\n    ORDER BY aud.name;');\n\n-- 4. Server-Level Audit Specifications\nIF @MajorVersion >= 16\n    EXEC(N'SELECT \n        aspec.name AS [Specification_Name],\n        aspec.is_state_enabled AS [Is_Enabled],\n        a.name AS [Parent_Audit],\n        STUFF((SELECT N'', '' + adet.audit_action_name\n              FROM sys.server_audit_specification_details AS adet\n              WHERE adet.server_specification_id = aspec.server_specification_id\n              ORDER BY adet.audit_action_id\n              FOR XML PATH(N''''), TYPE).value(N''.'', N''NVARCHAR(MAX)''), 1, 2, N'''') AS [Audit_Actions],\n        CAST(N''Server audit specifications determine which actions are logged. Recommendation: Ensure audit specifications capture login failures (FAILED_LOGIN_GROUP), permission changes (SERVER_ROLE_MEMBER_CHANGE_GROUP), and database object changes.''\n             AS VARCHAR(1000)) AS [Metric_Context]\n    FROM sys.server_audit_specifications AS aspec WITH (NOLOCK)\n    INNER JOIN sys.server_audits AS a WITH (NOLOCK)\n        ON aspec.audit_guid = a.audit_guid\n    ORDER BY aspec.name;');\nELSE\n    EXEC(N'SELECT \n        aspec.name AS [Specification_Name],\n        aspec.is_state_enabled AS [Is_Enabled],\n        aspec.type_desc AS [Spec_Type],\n        a.name AS [Parent_Audit],\n        CASE \n            WHEN aspec.type = ''SL'' THEN aspec.name\n            ELSE STUFF((SELECT N'', '' + adet.audit_action_name\n                  FROM sys.server_audit_specification_details AS adet\n                  WHERE adet.server_specification_id = aspec.server_specification_id\n                  ORDER BY adet.audit_action_id\n                  FOR XML PATH(N''''), TYPE).value(N''.'', N''NVARCHAR(MAX)''), 1, 2, N'''')\n        END AS [Audit_Actions],\n        CAST(N''Server audit specifications determine which actions are logged. Recommendation: Ensure audit specifications capture login failures (FAILED_LOGIN_GROUP), permission changes (SERVER_ROLE_MEMBER_CHANGE_GROUP), and database object changes.''\n             AS VARCHAR(1000)) AS [Metric_Context]\n    FROM sys.server_audit_specifications AS aspec WITH (NOLOCK)\n    INNER JOIN sys.server_audits AS a WITH (NOLOCK)\n        ON aspec.audit_guid = a.audit_guid\n    ORDER BY aspec.name;');\n", "sql_server/07_Security/login_audit.sql": "/*\n================================================================================\nSQL Server Login Security Audit\n================================================================================\nDescription:\n    Audits SQL Server logins and role memberships. Reports disabled logins,\n    password policy non-compliance, sysadmin role members, and sa account status.\n\nOutput:\n    Multiple result sets: sysadmin members, disabled/enabled logins with\n    password policy details, sa account status, and login auditing summary.\n\nAction:\n    Review sysadmin members — remove any logins that do not require full\n    administrative access. Ensure the sa account is renamed and disabled.\n    Enable \"Enforce password policy\" and \"Enforce password expiration\" for\n    all SQL authentication logins. Disable any unused or test logins.\n\nCriticality: High\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\n\nPRINT '--- Sysadmin Role Members ---';\nSELECT\n    sp.name AS [Login_Name],\n    sp.type_desc AS [Login_Type],\n    sp.is_disabled AS [Is_Disabled],\n    sp.create_date,\n    sp.modify_date,\n    CASE WHEN sp.name LIKE N'NT SERVICE\\%' OR sp.name LIKE N'NT AUTHORITY\\%' THEN N'SERVICE ACCOUNT' ELSE N'REVIEW' END AS [Account_Class]\nFROM sys.server_role_members AS srm\nINNER JOIN sys.server_principals AS sp ON srm.member_principal_id = sp.principal_id\nINNER JOIN sys.server_principals AS role ON srm.role_principal_id = role.principal_id\nWHERE role.name = N'sysadmin'\nORDER BY sp.name;\n\nPRINT '--- SQL Logins: Policy & Expiration ---';\nSELECT\n    name AS [Login_Name],\n    is_disabled,\n    is_policy_checked,\n    is_expiration_checked,\n    LOGINPROPERTY(name, N'IsLocked') AS [Is_Locked],\n    LOGINPROPERTY(name, N'DaysUntilExpiration') AS [Days_Until_Expiration],\n    create_date,\n    modify_date\nFROM sys.sql_logins\nWHERE name NOT LIKE N'##%'\nORDER BY is_disabled DESC, name;\n\nPRINT '--- sa Login Status ---';\nSELECT\n    name,\n    is_disabled,\n    is_policy_checked,\n    create_date,\n    CASE WHEN is_disabled = 0 THEN N'WARNING: sa enabled' ELSE N'OK: sa disabled' END AS [Status]\nFROM sys.sql_logins\nWHERE sid = 0x01;\n\nPRINT '--- Orphaned Windows Logins (no server access) ---';\nSELECT name, type_desc, create_date\nFROM sys.server_principals\nWHERE type IN (N'U', N'G')\n  AND name NOT LIKE N'NT SERVICE\\%'\n  AND name NOT LIKE N'NT AUTHORITY\\%'\n  AND name NOT LIKE N'NT MACHINE\\%'\nORDER BY name;\n", "sql_server/08_Advanced/cdc_health.sql": "/*\n================================================================================\nCDC Capture Health Across Databases\n================================================================================\nDescription:\n    Monitors Change Data Capture (CDC) health across all CDC-enabled databases.\n    Reports capture latency, capture instance configuration, and log scan issues.\n\nOutput:\n    CDC-enabled databases list, capture instance details (source table, captured\n    columns), and latency metrics in seconds.\n\nAction:\n    If Latency_Seconds > @LatencyWarningSeconds, investigate: (1) check if the\n    CDC capture job is running, (2) monitor transaction log growth (CDC holds\n    log truncation), (3) review if the source table has too many columns tracked.\n    For high latency, increase capture job frequency or reduce captured columns.\n\nParameters:\n    @DatabaseList - comma-separated database names or NULL for all user DBs\n    @LatencyWarningSeconds - latency threshold for warning (default 60)\n\nCriticality: High\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\n\nDECLARE @DatabaseList NVARCHAR(MAX) = NULL;\nDECLARE @LatencyWarningSeconds INT = 60;\n\nPRINT N'--- CDC Enabled Databases ---';\nSELECT name AS [Database_Name], is_cdc_enabled, state_desc, recovery_model_desc\nFROM sys.databases\nWHERE is_cdc_enabled = 1;\n\nIF OBJECT_ID(N'tempdb..#CDCHealth') IS NOT NULL DROP TABLE #CDCHealth;\nCREATE TABLE #CDCHealth (\n    [Database] SYSNAME,\n    [Capture_Instance] SYSNAME,\n    [Source_Table] SYSNAME,\n    [Captured_Columns] INT,\n    [Latest_Latency_S] INT,\n    [Latest_Scan_End] DATETIME NULL,\n    [Latency_Status] NVARCHAR(20)\n);\n\nDECLARE @CdcCommand NVARCHAR(MAX) = N'\nDECLARE @latency INT = (\n    SELECT TOP (1) latency\n    FROM sys.dm_cdc_log_scan_sessions\n    WHERE end_time IS NOT NULL\n    ORDER BY end_time DESC\n);\nDECLARE @scan_end DATETIME = (\n    SELECT TOP (1) end_time\n    FROM sys.dm_cdc_log_scan_sessions\n    WHERE end_time IS NOT NULL\n    ORDER BY end_time DESC\n);\nINSERT INTO #CDCHealth\nSELECT\n    DB_NAME(),\n    ct.capture_instance,\n    ct.source_schema + N''.'' + ct.source_name,\n    ct.captured_column_count,\n    @latency,\n    @scan_end,\n    CASE WHEN @latency > ' + CAST(@LatencyWarningSeconds AS NVARCHAR(10)) + N' THEN N''WARNING'' ELSE N''OK'' END\nFROM cdc.change_tables AS ct;';\n\nIF OBJECT_ID(N'dbo.sp_DBA_ForEachDatabase', N'P') IS NOT NULL\nBEGIN\n    DECLARE @CdcDbList NVARCHAR(MAX) = STUFF((\n        SELECT N',' + name\n        FROM sys.databases\n        WHERE is_cdc_enabled = 1 AND state = 0 AND is_in_standby = 0\n        FOR XML PATH(N''), TYPE).value(N'.', N'NVARCHAR(MAX)'), 1, 1, N'');\n    IF @DatabaseList IS NOT NULL AND LTRIM(RTRIM(@DatabaseList)) <> N''\n        SET @CdcDbList = @DatabaseList;\n\n    IF @CdcDbList IS NOT NULL AND LEN(@CdcDbList) > 0\n        EXEC dbo.sp_DBA_ForEachDatabase\n            @Command = @CdcCommand,\n            @UserDatabasesOnly = 0,\n            @IncludeReadOnly = 0,\n            @DatabaseList = @CdcDbList,\n            @ContinueOnError = 1;\nEND\nELSE\nBEGIN\n    DECLARE @db_name SYSNAME;\n    DECLARE @SQL NVARCHAR(MAX);\n\n    DECLARE db_cursor CURSOR LOCAL FAST_FORWARD FOR\n        SELECT name FROM sys.databases WHERE is_cdc_enabled = 1 AND state = 0 AND is_in_standby = 0\n          AND (@DatabaseList IS NULL OR name IN (SELECT LTRIM(RTRIM(value)) FROM STRING_SPLIT(@DatabaseList, N',') WHERE LTRIM(RTRIM(value)) <> N''))\n        ORDER BY name;\n\n    OPEN db_cursor;\n    FETCH NEXT FROM db_cursor INTO @db_name;\n    WHILE @@FETCH_STATUS = 0\n    BEGIN\n        SET @SQL = N'USE ' + QUOTENAME(@db_name) + N';' + @CdcCommand;\n        BEGIN TRY EXEC sys.sp_executesql @SQL; END TRY BEGIN CATCH END CATCH;\n        FETCH NEXT FROM db_cursor INTO @db_name;\n    END;\n    CLOSE db_cursor; DEALLOCATE db_cursor;\nEND;\n\nSELECT * FROM #CDCHealth ORDER BY [Latest_Latency_S] DESC, [Database];\nDROP TABLE #CDCHealth;\n", "sql_server/08_Advanced/error_log_and_connectivity.sql": "/*\n================================================================================\nPurpose:        Analyzes system error logs and connectivity ring buffers to \n                diagnose hidden login failures and critical system errors.\nProvides:       Recent critical error log entries (I/O, Corruption, Memory) and \n                connectivity trace records (Login timeouts, drops).\nImportance:     Critical for detecting network instability or hardware-related \n                errors that may not be immediately obvious.\nInterpretation: Frequent \"Login timeout\" or \"Connection drop\" in ring buffers \n                 points to network or client-side issues.\nAction: For error log entries showing I/O errors (823, 824, 825): run DBCC CHECKDB on affected databases immediately and check disk health. For connectivity issues (Login timeout, Connection drops): investigate network latency, firewall rules, and client driver configuration. For memory errors: run memory_diagnostics.sql to check PLE and memory pressure. Review the error log weekly as part of routine maintenance.\nCriticality:    High\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\nSET QUOTED_IDENTIFIER ON;\n\n-- 1. Search Error Log for Critical Issues (Last 7 days)\nPRINT 'Searching Error Log for Critical Issues...';\nIF OBJECT_ID('tempdb..#ErrorLog') IS NOT NULL DROP TABLE #ErrorLog;\nCREATE TABLE #ErrorLog (LogDate DATETIME, ProcessInfo VARCHAR(100), Text VARCHAR(MAX));\n\nINSERT INTO #ErrorLog EXEC sp_readerrorlog 0, 1;\n\nSELECT \n    LogDate, ProcessInfo, Text,\n    CAST('Filters SQL Server Error Log for critical keywords. ' +\n         'Threshold: Keywords like \"corruption\", \"failed\", \"error\", \"IO\" are high priority. ' +\n         'Recommendation: Correlate error timestamps with application failures or performance drops.'\n         AS VARCHAR(1000)) AS [Metric_Context]\nFROM #ErrorLog\nWHERE (Text LIKE '%error%' OR Text LIKE '%failed%' OR Text LIKE '%corruption%' OR Text LIKE '%IO%')\n  AND LogDate > DATEADD(DAY, -7, GETDATE())\nORDER BY LogDate DESC;\n\n-- 2. Connectivity Ring Buffer (Hidden Login Failures)\nPRINT 'Analyzing Connectivity Ring Buffer...';\nSELECT \n    CAST(record AS XML).value('(//Record/ConnectivityTraceRecord/RecordType)[1]', 'varchar(50)') AS [Record_Type],\n    CAST(record AS XML).value('(//Record/ConnectivityTraceRecord/RecordSource)[1]', 'varchar(50)') AS [Source],\n    CAST(record AS XML).value('(//Record/ConnectivityTraceRecord/Spid)[1]', 'int') AS [SPID],\n    CAST(record AS XML).value('(//Record/ConnectivityTraceRecord/RemoteHost)[1]', 'varchar(100)') AS [Remote_Host],\n    CAST(record AS XML).value('(//Record/ConnectivityTraceRecord/TdsErrorCode)[1]', 'varchar(10)') AS [TDS_Error],\n    CAST(record AS XML).value('(//Record/ConnectivityTraceRecord/State)[1]', 'int') AS [State],\n    [timestamp],\n    CAST('Connectivity ring buffer identifies login timeouts and connection terminations not in the error log. ' +\n         'Threshold: High frequency of \"Error\" record types indicates network or client-side issues. ' +\n         'Recommendation: Check client connection strings and network stability.'\n         AS VARCHAR(1000)) AS [Metric_Context]\nFROM sys.dm_os_ring_buffers WITH (NOLOCK)\nWHERE ring_buffer_type = 'RING_BUFFER_CONNECTIVITY'\nORDER BY [timestamp] DESC;\n\nDROP TABLE #ErrorLog;\n", "sql_server/08_Advanced/feature_deep_dive_audit.sql": "/*\n================================================================================\nSQL Server Advanced Category: Detailed Feature Configuration Audit\n================================================================================\nDescription:\n    Exhaustive audit of CDC internal job parameters, Query Store current\n    configuration, Replication throughput metrics, and SQL Agent job ownership.\n\nOutput:\n    Multiple result sets covering CDC job configuration, Query Store settings,\n    replication performance, and job owner audit.\n\nAction:\n    Review CDC job parameters (maxtrans, maxscans) — adjust for your latency\n    requirements. Verify Query Store settings (max_storage_size_mb, data_flush_\n    interval_seconds) against your recovery and monitoring needs. Check for jobs\n    owned by disabled logins or service accounts that may cause failures after\n    password changes.\n\nCriticality: Medium\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\n\nDECLARE @MajorVersion INT = CAST(PARSENAME(CAST(SERVERPROPERTY(N'ProductVersion') AS NVARCHAR(128)), 4) AS INT);\n\n-- 1. CDC Internal Job Configuration (msdb CDC jobs)\nPRINT '--- CDC Job Parameters ---';\nIF EXISTS (SELECT 1 FROM sys.databases WHERE is_cdc_enabled = 1)\nBEGIN\n    IF OBJECT_ID(N'msdb.dbo.cdc_jobs', N'U') IS NOT NULL\n    BEGIN\n        IF @MajorVersion >= 16\n            EXEC(N'SELECT\n                DB_NAME(j.database_id) AS [Database_Name],\n                j.job_type AS [Job_Type],\n                j.job_id AS [Job_Id],\n                j.maxtrans AS [Max_Trans_Per_Cycle],\n                j.maxscans AS [Max_Scan_Cycles],\n                j.pollinginterval AS [Polling_Interval_s],\n                j.retention AS [Cleanup_Retention_Minutes],\n                CAST(N''CDC job parameters control log reader load. maxscans * maxtrans = max transactions per agent run. Low values with high volume cause lag.'' AS NVARCHAR(1000)) AS [Description]\n            FROM msdb.dbo.cdc_jobs AS j\n            ORDER BY j.database_id, j.job_type;');\n        ELSE\n            EXEC(N'SELECT\n                j.database_name AS [Database_Name],\n                j.job_type AS [Job_Type],\n                j.job_name AS [Job_Name],\n                j.maxtrans AS [Max_Trans_Per_Cycle],\n                j.maxscans AS [Max_Scan_Cycles],\n                j.pollinginterval AS [Polling_Interval_s],\n                j.retention AS [Cleanup_Retention_Minutes],\n                CAST(N''CDC job parameters control log reader load. maxscans * maxtrans = max transactions per agent run. Low values with high volume cause lag.'' AS NVARCHAR(1000)) AS [Description]\n            FROM msdb.dbo.cdc_jobs AS j\n            ORDER BY j.database_name, j.job_type;');\n    END\n    ELSE\n    BEGIN\n        PRINT 'msdb.dbo.cdc_jobs not found. Run on SQL Server 2016+ with CDC enabled.';\n    END;\n\n    PRINT '--- Recent CDC Errors ---';\n    IF @MajorVersion >= 16\n        EXEC(N'SELECT TOP (20)\n            e.session_id,\n            e.phase_number AS [Phase],\n            e.entry_time,\n            e.error_number AS [Error_Code],\n            e.error_message\n        FROM sys.dm_cdc_errors AS e\n        ORDER BY e.entry_time DESC;');\n    ELSE\n        EXEC(N'SELECT TOP (20)\n            e.database_id,\n            DB_NAME(e.database_id) AS [Database_Name],\n            e.session_id,\n            e.phase,\n            e.entry_time,\n            e.error_code,\n            e.error_message\n        FROM sys.dm_cdc_errors AS e\n        ORDER BY e.entry_time DESC;');\nEND\nELSE\n    PRINT 'No CDC-enabled databases on this instance.';\n\n-- 2. Query Store Granular Metrics\nPRINT '--- Query Store Policy Audit ---';\nBEGIN\n    DECLARE @qs_db SYSNAME, @qs_cursor CURSOR;\n    SET @qs_cursor = CURSOR LOCAL FAST_FORWARD FOR\n        SELECT name FROM sys.databases WHERE database_id > 4 AND state = 0;\n    OPEN @qs_cursor;\n    FETCH NEXT FROM @qs_cursor INTO @qs_db;\n    WHILE @@FETCH_STATUS = 0\n    BEGIN\n        DECLARE @qs_sql NVARCHAR(MAX) = N'USE ' + QUOTENAME(@qs_db) + N';\n        SELECT\n            N''' + REPLACE(@qs_db, N'''', N'''''') + N''' AS [DB],\n            qs.actual_state_desc,\n            qs.flush_interval_seconds AS [Flush_s],\n            qs.interval_length_minutes AS [Aggregation_Interval_m],\n            qs.max_plans_per_query,\n            CAST(N''Query Store configuration determines performance data resolution. flush_interval_seconds controls disk persistence frequency.'' AS NVARCHAR(1000)) AS [Description]\n        FROM sys.database_query_store_options AS qs;';\n        BEGIN TRY EXEC sp_executesql @qs_sql; END TRY BEGIN CATCH END CATCH;\n        FETCH NEXT FROM @qs_cursor INTO @qs_db;\n    END;\n    CLOSE @qs_cursor;\n    DEALLOCATE @qs_cursor;\nEND;\n\n-- 3. Replication Latency & Buffer Analysis\nPRINT '--- Replication Agent Detailed Metrics ---';\nIF EXISTS (SELECT 1 FROM sys.databases WHERE name = N'distribution')\nBEGIN\n    SELECT\n        h.agent_id,\n        da.name AS [Agent_Name],\n        h.delivery_rate AS [Commands_Per_Sec],\n        h.delivery_latency AS [Total_Latency_ms],\n        h.timestamp AS [Sample_Time],\n        CAST(N'If delivery_rate is high but latency is also high, the subscriber is likely the bottleneck.' AS NVARCHAR(1000)) AS [Description]\n    FROM distribution.dbo.MSdistribution_history AS h\n    INNER JOIN distribution.dbo.MSdistribution_agents AS da ON da.id = h.agent_id\n    WHERE h.timestamp = (\n        SELECT MAX(h2.timestamp)\n        FROM distribution.dbo.MSdistribution_history AS h2\n        WHERE h2.agent_id = h.agent_id\n    )\n    ORDER BY h.delivery_latency DESC;\nEND\nELSE\n    PRINT 'Distribution database not found. Replication may not be configured.';\n\n-- 4. SQL Agent Job Owner Audit\nPRINT '--- Agent Job Owner Analysis ---';\nSELECT\n    j.name AS [Job],\n    l.name AS [Owner],\n    j.enabled,\n    CAST(N'Jobs should be owned by sa or a dedicated service account. Disabled owner logins cause job start failures.' AS NVARCHAR(1000)) AS [Description]\nFROM msdb.dbo.sysjobs AS j\nINNER JOIN sys.server_principals AS l ON j.owner_sid = l.sid\nWHERE l.name <> N'sa'\nORDER BY j.name;\n", "sql_server/08_Advanced/inmemory_compression.sql": "/*\n================================================================================\nCompression Candidates and In-Memory OLTP Health\n================================================================================\nDescription:\n    Identifies tables that are good candidates for data compression (page or row)\n    based on size and scan patterns, and reports In-Memory OLTP (Hekaton) health.\n\nOutput:\n    (1) Compression candidates with table size and scan frequency\n    (2) In-Memory OLTP memory usage and garbage collection status\n\nAction:\n    For compression candidates with large size and frequent scans: test page\n    compression on a non-production copy:\n        ALTER INDEX [IndexName] ON [TableName] REBUILD WITH (DATA_COMPRESSION = PAGE);\n    Page compression can reduce storage by 50-80% with minimal CPU overhead on\n    read-heavy workloads. For In-Memory OLTP: ensure garbage collection is keeping\n    up — if not, increase the number of garbage collection worker threads.\n\nParameters:\n    @DatabaseList - comma-separated database names or NULL for all user DBs\n    @MinRows - minimum row count to consider (default 1000)\n    @MinScans - minimum scan count to consider (default 1000)\n\nCriticality: Low\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\n\nDECLARE @DatabaseList NVARCHAR(MAX) = NULL;\nDECLARE @MinRows BIGINT = 1000;\nDECLARE @MinScans BIGINT = 1000;\n\nIF OBJECT_ID(N'tempdb..#CompressionResults') IS NOT NULL DROP TABLE #CompressionResults;\nCREATE TABLE #CompressionResults (\n    [Database] SYSNAME,\n    [Table] SYSNAME,\n    [Index] SYSNAME,\n    [Rows] BIGINT,\n    [Scans] BIGINT,\n    [Size_MB] DECIMAL(18,2)\n);\n\nDECLARE @CompressionCommand NVARCHAR(MAX) = N'\nINSERT INTO #CompressionResults\nSELECT\n    DB_NAME(),\n    OBJECT_NAME(s.object_id),\n    i.name,\n    p.rows,\n    s.user_scans,\n    CAST(p.used_page_count * 8.0 / 1024 AS DECIMAL(18,2))\nFROM sys.dm_db_index_usage_stats AS s\nINNER JOIN sys.indexes AS i ON s.object_id = i.object_id AND s.index_id = i.index_id\nINNER JOIN sys.partitions AS p ON i.object_id = p.object_id AND i.index_id = p.index_id\nWHERE s.database_id = DB_ID()\n  AND OBJECTPROPERTY(s.object_id, N''IsUserTable'') = 1\n  AND p.rows > ' + CAST(@MinRows AS NVARCHAR(20)) + N'\n  AND p.data_compression = 0\n  AND s.user_scans > ' + CAST(@MinScans AS NVARCHAR(20)) + N';';\n\nIF OBJECT_ID(N'dbo.sp_DBA_ForEachDatabase', N'P') IS NOT NULL\nBEGIN\n    EXEC dbo.sp_DBA_ForEachDatabase\n        @Command = @CompressionCommand,\n        @UserDatabasesOnly = 1,\n        @IncludeReadOnly = 0,\n        @DatabaseList = @DatabaseList,\n        @ContinueOnError = 1;\nEND\nELSE\nBEGIN\n    DECLARE @db_name SYSNAME;\n    DECLARE @SQL NVARCHAR(MAX);\n\n    IF OBJECT_ID(N'tempdb..#DbTargets') IS NOT NULL DROP TABLE #DbTargets;\n    CREATE TABLE #DbTargets (database_name SYSNAME PRIMARY KEY);\n\n    IF @DatabaseList IS NOT NULL AND LTRIM(RTRIM(@DatabaseList)) <> N''\n        INSERT INTO #DbTargets SELECT LTRIM(RTRIM(value)) FROM STRING_SPLIT(@DatabaseList, N',') WHERE LTRIM(RTRIM(value)) <> N'';\n    ELSE\n        INSERT INTO #DbTargets SELECT name FROM sys.databases WHERE database_id > 4 AND state = 0 AND is_in_standby = 0;\n\n    DECLARE db_cursor CURSOR LOCAL FAST_FORWARD FOR SELECT database_name FROM #DbTargets ORDER BY database_name;\n    OPEN db_cursor;\n    FETCH NEXT FROM db_cursor INTO @db_name;\n    WHILE @@FETCH_STATUS = 0\n    BEGIN\n        SET @SQL = N'USE ' + QUOTENAME(@db_name) + N';' + @CompressionCommand;\n        BEGIN TRY EXEC sys.sp_executesql @SQL; END TRY BEGIN CATCH END CATCH;\n        FETCH NEXT FROM db_cursor INTO @db_name;\n    END;\n    CLOSE db_cursor; DEALLOCATE db_cursor;\n    DROP TABLE #DbTargets;\nEND;\n\nPRINT N'--- Compression Candidates (uncompressed, scan-heavy) ---';\nSELECT * FROM #CompressionResults ORDER BY [Size_MB] DESC;\n\n-- In-Memory OLTP (per database with memory-optimized objects)\nIF OBJECT_ID(N'tempdb..#XtpHealth') IS NOT NULL DROP TABLE #XtpHealth;\nCREATE TABLE #XtpHealth (\n    [Database] SYSNAME,\n    [Table] SYSNAME,\n    [Memory_Allocated_KB] BIGINT,\n    [Memory_Used_KB] BIGINT\n);\n\nDECLARE @XtpCommand NVARCHAR(MAX) = N'\nIF OBJECT_ID(N''sys.dm_db_xtp_table_memory_stats'', N''V'') IS NOT NULL\n    INSERT INTO #XtpHealth\n    SELECT DB_NAME(), OBJECT_NAME(object_id), memory_allocated_for_table_kb, memory_used_by_table_kb\n    FROM sys.dm_db_xtp_table_memory_stats;';\n\nIF OBJECT_ID(N'dbo.sp_DBA_ForEachDatabase', N'P') IS NOT NULL\n    EXEC dbo.sp_DBA_ForEachDatabase @Command = @XtpCommand, @UserDatabasesOnly = 1, @DatabaseList = @DatabaseList, @ContinueOnError = 1;\nELSE\nBEGIN\n    DECLARE @db_x SYSNAME;\n    DECLARE @sql_x NVARCHAR(MAX);\n    DECLARE xtp_cursor CURSOR LOCAL FAST_FORWARD FOR\n        SELECT name FROM sys.databases WHERE database_id > 4 AND state = 0 AND is_in_standby = 0\n          AND (@DatabaseList IS NULL OR name IN (SELECT LTRIM(RTRIM(value)) FROM STRING_SPLIT(@DatabaseList, N',') WHERE LTRIM(RTRIM(value)) <> N''));\n    OPEN xtp_cursor;\n    FETCH NEXT FROM xtp_cursor INTO @db_x;\n    WHILE @@FETCH_STATUS = 0\n    BEGIN\n        SET @sql_x = N'USE ' + QUOTENAME(@db_x) + N';' + @XtpCommand;\n        BEGIN TRY EXEC sys.sp_executesql @sql_x; END TRY BEGIN CATCH END CATCH;\n        FETCH NEXT FROM xtp_cursor INTO @db_x;\n    END;\n    CLOSE xtp_cursor; DEALLOCATE xtp_cursor;\nEND;\n\nPRINT N'--- In-Memory OLTP Table Memory ---';\nSELECT * FROM #XtpHealth ORDER BY [Memory_Used_KB] DESC;\nDROP TABLE #CompressionResults;\nDROP TABLE #XtpHealth;\n", "sql_server/08_Advanced/query_store_health.sql": "/*\n================================================================================\nSQL Server Query Store Health Monitor\n================================================================================\nDescription:\n    Reports Query Store operational status across all databases and detects\n    true plan regressions (multi-plan queries where the recent slow plan is\n    significantly worse than the best baseline) and lists forced plans.\n\nOutput:\n    (1) Query Store status per database (READ_ONLY, STATE_MISMATCH, NEAR_MAX, OK)\n    (2) Plan regression details with query text, plan IDs, and regression %\n    (3) Forced plans and force failure counts\n\nAction:\n    For databases with Health_Status = READ_ONLY: increase max_storage_size_mb\n    or clear the query store (EXEC sp_query_store_flush_db) if space is full.\n    For STATE_MISMATCH: run ALTER DATABASE [DBName] SET QUERY_STORE = ON.\n    For regression plans > 50%: consider forcing the baseline plan:\n        EXEC sp_query_store_force_plan @query_id, @baseline_plan_id;\n    For force failures: investigate why the plan cannot be forced (missing index,\n    plan guidability issues).\n\nParameters:\n    @DatabaseList - comma-separated database names or NULL for all user DBs\n    @RegressionPctThreshold - minimum regression % to flag (default 50)\n    @RecentHours - lookback window for recent execution (default 24)\n    @LookbackHours - historical window for baseline (default 168)\n\nCriticality: High\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\n\nDECLARE @DatabaseList NVARCHAR(MAX) = NULL;\nDECLARE @RegressionPctThreshold DECIMAL(10,2) = 50.0;\nDECLARE @RecentHours INT = 24;\nDECLARE @LookbackHours INT = 168;\n\n-- 1. Query Store Status (Instance-Wide)\nPRINT N'--- Query Store Status (All User DBs) ---';\nIF OBJECT_ID(N'tempdb..#QSStatus') IS NOT NULL DROP TABLE #QSStatus;\nCREATE TABLE #QSStatus (\n    [Database_Name]     SYSNAME         NOT NULL,\n    [Actual_State]      NVARCHAR(60)    NULL,\n    [Desired_State]     NVARCHAR(60)    NULL,\n    [Current_Size_MB]   BIGINT          NULL,\n    [Max_Size_MB]       BIGINT          NULL,\n    [Capture_Mode]      NVARCHAR(60)    NULL,\n    [Health_Status]     NVARCHAR(20)    NULL\n);\n\nDECLARE @db_name SYSNAME, @sql NVARCHAR(MAX);\nDECLARE db_cursor CURSOR LOCAL FAST_FORWARD FOR\n    SELECT name\n    FROM sys.databases\n    WHERE state = 0\n      AND is_in_standby = 0\n      AND database_id > 4\n      AND is_query_store_on = 1\n      AND (\n            @DatabaseList IS NULL\n            OR name IN (SELECT LTRIM(RTRIM(value)) FROM STRING_SPLIT(@DatabaseList, N',') WHERE LTRIM(RTRIM(value)) <> N'')\n          )\n    ORDER BY name;\n\nOPEN db_cursor;\nFETCH NEXT FROM db_cursor INTO @db_name;\n\nWHILE @@FETCH_STATUS = 0\nBEGIN\n    SET @sql = N'USE ' + QUOTENAME(@db_name) + N';\n    INSERT INTO #QSStatus (Database_Name, Actual_State, Desired_State, Current_Size_MB, Max_Size_MB, Capture_Mode, Health_Status)\n    SELECT\n        DB_NAME(),\n        qs.actual_state_desc,\n        qs.desired_state_desc,\n        qs.current_storage_size_mb,\n        qs.max_storage_size_mb,\n        qs.query_capture_mode_desc,\n        CASE\n            WHEN qs.actual_state_desc = N''READ_ONLY'' THEN N''READ_ONLY''\n            WHEN qs.actual_state_desc <> qs.desired_state_desc THEN N''STATE_MISMATCH''\n            WHEN qs.current_storage_size_mb > (qs.max_storage_size_mb * 0.9) THEN N''NEAR_MAX''\n            ELSE N''OK''\n        END\n    FROM sys.database_query_store_options AS qs;';\n\n    BEGIN TRY\n        EXEC sys.sp_executesql @sql;\n    END TRY\n    BEGIN CATCH\n        DECLARE @ErrMsg NVARCHAR(4000) = ERROR_MESSAGE();\n        RAISERROR(N'query_store_health: Database [%s] failed: %s', 10, 1, @db_name, @ErrMsg);\n    END CATCH;\n\n    FETCH NEXT FROM db_cursor INTO @db_name;\nEND;\n\nCLOSE db_cursor;\nDEALLOCATE db_cursor;\n\nSELECT * FROM #QSStatus ORDER BY [Database_Name];\nDROP TABLE #QSStatus;\n\n-- 2. True Plan Regressions\nPRINT N'--- Query Store Plan Regressions ---';\nIF OBJECT_ID(N'dbo.sp_DBA_QueryStoreRegressions', N'P') IS NOT NULL\nBEGIN\n    EXEC dbo.sp_DBA_QueryStoreRegressions\n        @DatabaseList = @DatabaseList,\n        @RegressionPctThreshold = @RegressionPctThreshold,\n        @RecentHours = @RecentHours,\n        @LookbackHours = @LookbackHours,\n        @MinExecutions = 5,\n        @TopPerDatabase = 10,\n        @IncludeForcedPlans = 1;\nEND\nELSE\nBEGIN\n    RAISERROR(N'Deploy 00_Framework/sp_DBA_QueryStoreRegressions.sql for true regression detection.', 16, 1);\nEND;\n", "sql_server/08_Advanced/replication_monitor.sql": "/*\n================================================================================\nPurpose:        Monitors the health, status, and latency of SQL Server \n                Replication agents.\nProvides:       Replication agent status (Snapshot, Log Reader, Distribution, \n                Merge) and undelivered command counts (latency).\nImportance:     Essential for ensuring data consistency across replicated \n                environments and preventing subscriber lag.\nInterpretation: Agents in 'Failed' or 'Retrying' state indicate stoppage. \n                High undelivered commands suggest backlog/latency.\nAction: For agents in \"Failed\" state: review SQL Agent error logs and re-start the agent. For agents in \"Retrying\" state: check connectivity between publisher/distributor/subscriber (firewall, network, login). For high undelivered command counts: ensure the distribution agent is running and not backlogged. Consider increasing the poll interval or optimizing the publication design (filtered publications, batch processing).\nCriticality:    High\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\n\n-- 1. Replication Agent Status\nPRINT 'Checking Replication Agent Status...';\nIF EXISTS (SELECT 1 FROM sys.databases WHERE name = 'distribution')\nBEGIN\n    SELECT \n        publisher_db,\n        publication,\n        agent_type = CASE agent_type WHEN 1 THEN 'Snapshot' WHEN 2 THEN 'Log Reader' WHEN 3 THEN 'Distribution' WHEN 4 THEN 'Merge' END,\n        status = CASE status WHEN 1 THEN 'Started' WHEN 2 THEN 'Succeeded' WHEN 3 THEN 'InProgress' WHEN 4 THEN 'Idle' WHEN 5 THEN 'Retrying' WHEN 6 THEN 'Failed' END,\n        last_timestamp,\n        delivery_rate,\n        delivery_latency,\n        CAST('Replication agent status audit. ' +\n             'Threshold: Agents in \"Failed\" or \"Retrying\" state indicate replication stoppage. ' +\n             'Recommendation: Check agent history and replication monitor for network or permission errors.'\n             AS VARCHAR(1000)) AS [Metric_Context]\n    FROM distribution.dbo.MSreplication_monitordata WITH (NOLOCK)\n    ORDER BY status DESC;\nEND\nELSE\nBEGIN\n    PRINT 'Distribution database not found. Replication might not be configured on this instance.';\nEND\n\n-- 2. Undelivered Commands (Latency)\nPRINT 'Checking Undelivered Commands...';\nIF EXISTS (SELECT 1 FROM sys.databases WHERE name = 'distribution')\nBEGIN\n    SELECT \n        s.name AS [Subscription],\n        da.publisher_db,\n        da.publication,\n        h.pending_commands AS [Undelivered_Commands],\n        h.delivery_latency / 1000 AS [Latency_s],\n        CAST('Measures transactional replication backlog. ' +\n             'Threshold: High undelivered command count indicates subscriber lag. ' +\n             'Recommendation: Check subscriber I/O performance and network throughput between distributor and subscriber.'\n             AS VARCHAR(1000)) AS [Metric_Context]\n    FROM distribution.dbo.MSdistribution_status AS h WITH (NOLOCK)\n    INNER JOIN distribution.dbo.MSdistribution_agents AS da WITH (NOLOCK) ON h.agent_id = da.id\n    INNER JOIN master.sys.servers AS s ON da.subscriber_id = s.server_id\n    ORDER BY h.pending_commands DESC;\nEND\n", "sql_server/08_Advanced/sql_agent_job_monitor.sql": "/*\n================================================================================\nSQL Server Agent Job Monitor: Failures & Duration Anomalies\n================================================================================\nDescription:\n    Detects SQL Agent job failures in the last 24 hours and flags jobs whose\n    last run duration significantly exceeds their historical average duration.\n\nOutput:\n    Two result sets: (1) Failed jobs with error messages, (2) Jobs with\n    duration anomalies (current run much longer than average).\n\nAction:\n    For failed jobs: review the Error_Message and investigate the root cause.\n    Common issues: backup destination full, login failures, unavailable databases.\n    For duration anomalies: investigate if the job is waiting on blocking, running\n    during peak load, or processing more data than usual. Consider rescheduling\n    long-running jobs to off-peak hours.\n\nPrerequisites: dbo.fn_DBA_AgentRunDurationSeconds (00_Framework) optional.\n\nCriticality: High\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\n\nDECLARE @HasDurationFn BIT = CASE WHEN OBJECT_ID(N'dbo.fn_DBA_AgentRunDurationSeconds', N'FN') IS NOT NULL THEN 1 ELSE 0 END;\n\n-- 1. Failed Jobs in Last 24 Hours\nPRINT 'Checking for failed SQL Agent jobs (Last 24h)...';\nSELECT\n    j.name AS [Job_Name],\n    s.step_id AS [Step_ID],\n    s.step_name AS [Step_Name],\n    msdb.dbo.agent_datetime(h.run_date, h.run_time) AS [Run_DateTime],\n    h.message AS [Error_Message],\n    CAST(N'Failed SQL Agent Job detection. Any failure in a critical production job requires investigation.' AS NVARCHAR(1000)) AS [Metric_Context]\nFROM msdb.dbo.sysjobs AS j\nINNER JOIN msdb.dbo.sysjobhistory AS h ON j.job_id = h.job_id\nINNER JOIN msdb.dbo.sysjobsteps AS s ON j.job_id = s.job_id AND h.step_id = s.step_id\nWHERE h.run_status = 0\n  AND msdb.dbo.agent_datetime(h.run_date, h.run_time) > DATEADD(DAY, -1, GETDATE())\nORDER BY [Run_DateTime] DESC;\n\n-- 2. Long Running Jobs (Running > 2x their average duration)\nPRINT 'Checking for jobs with duration anomalies...';\n;WITH JobStats AS (\n    SELECT\n        job_id,\n        AVG(\n            CASE WHEN @HasDurationFn = 1\n                THEN dbo.fn_DBA_AgentRunDurationSeconds(run_duration)\n                ELSE ((run_duration / 10000) * 3600) + (((run_duration % 10000) / 100) * 60) + (run_duration % 100)\n            END\n        ) AS [Avg_Duration_s]\n    FROM msdb.dbo.sysjobhistory\n    WHERE step_id = 0\n      AND run_status = 1\n    GROUP BY job_id\n)\nSELECT\n    j.name AS [Job_Name],\n    ja.run_requested_date AS [Start_Time],\n    DATEDIFF(SECOND, ja.run_requested_date, GETDATE()) AS [Current_Duration_s],\n    CAST(js.Avg_Duration_s AS INT) AS [Historical_Avg_s],\n    CAST(N'Current duration > 2x historical average indicates blocking or abnormal data volume.' AS NVARCHAR(1000)) AS [Metric_Context]\nFROM msdb.dbo.sysjobactivity AS ja\nINNER JOIN msdb.dbo.sysjobs AS j ON ja.job_id = j.job_id\nINNER JOIN JobStats AS js ON j.job_id = js.job_id\nWHERE ja.session_id = (SELECT MAX(session_id) FROM msdb.dbo.syssessions)\n  AND ja.start_execution_date IS NOT NULL\n  AND ja.stop_execution_date IS NULL\n  AND js.Avg_Duration_s > 0\n  AND DATEDIFF(SECOND, ja.run_requested_date, GETDATE()) > (js.Avg_Duration_s * 2)\nORDER BY [Current_Duration_s] DESC;\n", "sql_server/08_Advanced/ultra_deep_internal_audit.sql": "/*\n================================================================================\nPurpose:        High-level diagnostic analysis for advanced SQL Server internal \n                structures including TempDB, Buffer Pool, and Plan Cache.\nProvides:       TempDB space breakdown, Buffer Pool residency per database, \n                and detection of potential parameter sniffing (multi-plan queries).\nImportance:     Critical for identifying instance-wide resource bottlenecks \n                and query plan efficiency issues.\nInterpretation: High TempDB version store suggests long transactions or RCSI. \n                Buffer Pool distribution shows which DBs dominate cache. \n                Multi-plan queries indicate parameter sniffing.\nAction: For TempDB: if Version_Store_MB > 30% of total TempDB, investigate long-running transactions or read-committed snapshot isolation usage (RCSI). If Internal_Objects_MB is high, review large hash joins/sort spills. For Buffer Pool: if a small database dominates cache, investigate inefficient table scans via index_usage_efficiency.sql. For Multi-Plan queries (parameter sniffing candidates): review the query text and consider OPTION (RECOMPILE) or optimize for unknown pattern.\nCriticality:    High\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\nSET QUOTED_IDENTIFIER ON;\n\n-- 1. TempDB Space Usage Breakdown\nPRINT '--- TempDB Space Usage Deep-Dive ---';\nSELECT\n    SUM(user_object_reserved_page_count) * 8 / 1024 AS [User_Objects_MB],\n    SUM(internal_object_reserved_page_count) * 8 / 1024 AS [Internal_Objects_MB],\n    SUM(version_store_reserved_page_count) * 8 / 1024 AS [Version_Store_MB],\n    SUM(unallocated_extent_page_count) * 8 / 1024 AS [Free_Space_MB],\n    CAST('Breakdown of what is consuming space in TempDB. ' +\n         'Expert Note: High Version Store suggests RCSI or long-running transactions. High Internal Objects suggests massive hash joins/sorts spills.'\n         AS VARCHAR(1000)) AS [Analysis]\nFROM sys.dm_db_file_space_usage;\n\n-- 2. Buffer Pool residency per Database\nPRINT '--- Buffer Pool Distribution per Database ---';\nSELECT \n    (CASE WHEN ([database_id] = 32767) THEN 'Resource Database' ELSE DB_NAME([database_id]) END) AS [Database_Name],\n    COUNT(*) * 8 / 1024 AS [Cached_MB],\n    CAST('Shows how much of the SQL Server memory (Buffer Pool) is dedicated to each database. ' +\n         'Expert Note: If a small database is consuming most of the cache, it may have inefficient scans.'\n         AS VARCHAR(1000)) AS [Analysis]\nFROM sys.dm_os_buffer_descriptors\nGROUP BY [database_id]\nORDER BY [Cached_MB] DESC;\n\n-- 3. Parameter Sniffing / Multi-Plan Detection\nPRINT '--- Potential Parameter Sniffing Candidates (Multi-Plan Batch) ---';\nSELECT TOP 20\n    st.text AS [Query_Text],\n    COUNT(DISTINCT CAST(qp.query_plan AS NVARCHAR(MAX))) AS [Plan_Count],\n    SUM(qs.execution_count) AS [Total_Executions],\n    MAX(qs.max_elapsed_time) / 1000 AS [Max_Duration_ms],\n    MIN(qs.min_elapsed_time) / 1000 AS [Min_Duration_ms],\n    CAST('Queries with multiple execution plans for the same text. ' +\n         'Expert Note: A high plan count with vast duration differences (Max vs Min) is a strong indicator of parameter sniffing.'\n         AS VARCHAR(1000)) AS [Analysis]\nFROM sys.dm_exec_query_stats qs\nCROSS APPLY sys.dm_exec_sql_text(qs.sql_handle) st\nCROSS APPLY sys.dm_exec_query_plan(qs.plan_handle) qp\nGROUP BY st.text\nHAVING COUNT(DISTINCT CAST(qp.query_plan AS NVARCHAR(MAX))) > 1\nORDER BY [Plan_Count] DESC;\n", "sql_server/09_Maintenance/failed_jobs.sql": "/*\n================================================================================\nSQL Server Failed Jobs & Maintenance Audit\n================================================================================\nDescription:\n    Detects SQL Agent job failures in the last 24 hours and identifies jobs\n    whose last run duration significantly exceeds their historical average.\n    Essential for daily operational hygiene checks.\n\nOutput:\n    (1) Failed jobs with error messages and timestamps\n    (2) Jobs with anomalous run durations\n\nAction:\n    For failed jobs: read the Error_Message and investigate. Common causes:\n    backup destination full, login expiry, permission changes, network outage.\n    For duration anomalies: investigate resource contention during the job's\n    execution window (blocking, I/O pressure, concurrency). Consider rescheduling\n    or optimizing the job steps.\n\nPrerequisites: dbo.fn_DBA_AgentRunDurationSeconds (00_Framework) optional.\n               Falls back to inline calculation if function is not available.\n\nCriticality: High\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\n\nDECLARE @HasDurationFn BIT = CASE WHEN OBJECT_ID(N'dbo.fn_DBA_AgentRunDurationSeconds', N'FN') IS NOT NULL THEN 1 ELSE 0 END;\n\n-- 1. Failed Jobs in the Last 24 Hours\nPRINT '--- SQL Agent Job Failures (Last 24 Hours) ---';\nSELECT\n    j.name AS [Job_Name],\n    h.step_id,\n    h.step_name,\n    msdb.dbo.agent_datetime(h.run_date, h.run_time) AS [Run_DateTime],\n    h.run_duration AS [Duration_HHMMSS],\n    CASE WHEN @HasDurationFn = 1\n        THEN dbo.fn_DBA_AgentRunDurationSeconds(h.run_duration)\n        ELSE ((h.run_duration / 10000) * 3600) + (((h.run_duration % 10000) / 100) * 60) + (h.run_duration % 100)\n    END AS [Duration_Seconds],\n    h.message AS [Error_Message],\n    CASE\n        WHEN h.run_status = 0 THEN N'FAILED'\n        WHEN h.run_status = 2 THEN N'RETRY'\n        WHEN h.run_status = 3 THEN N'CANCELLED'\n    END AS [Status]\nFROM msdb.dbo.sysjobs AS j\nINNER JOIN msdb.dbo.sysjobhistory AS h ON j.job_id = h.job_id\nWHERE h.run_status IN (0, 2, 3)\n  AND msdb.dbo.agent_datetime(h.run_date, h.run_time) > DATEADD(HOUR, -24, GETDATE())\nORDER BY [Run_DateTime] DESC;\n\n-- 2. Long Running Jobs (Current)\nPRINT '--- Currently Running Jobs & Duration ---';\nSELECT\n    j.name AS [Job_Name],\n    ja.start_execution_date AS [Start_Time],\n    DATEDIFF(MINUTE, ja.start_execution_date, GETDATE()) AS [Duration_Minutes],\n    js.step_name AS [Current_Step]\nFROM msdb.dbo.sysjobactivity AS ja\nINNER JOIN msdb.dbo.sysjobs AS j ON ja.job_id = j.job_id\nINNER JOIN msdb.dbo.sysjobsteps AS js ON ja.job_id = js.job_id AND ja.last_executed_step_id + 1 = js.step_id\nWHERE ja.session_id = (SELECT MAX(session_id) FROM msdb.dbo.syssessions)\n  AND ja.start_execution_date IS NOT NULL\n  AND ja.stop_execution_date IS NULL\nORDER BY [Duration_Minutes] DESC;\n", "sql_server/09_Maintenance/last_checkdb_dates.sql": "/*\n================================================================================\nSQL Server DBCC CHECKDB History\n================================================================================\nDescription:\n    Reports the last successful DBCC CHECKDB date for each database using\n    Ola Hallengren's CommandLog table (if available) or msdb backup history\n    as a proxy. Databases without recent CHECKDB are flagged.\n\nOutput:\n    Database name, last CHECKDB date, days since last CHECKDB, and status.\n\nAction:\n    For databases with days since last CHECKDB > @MaxDaysWithoutCheckDB,\n    schedule a CHECKDB during the next maintenance window:\n        DBCC CHECKDB ([DBName]) WITH NO_INFOMSGS, ALL_ERRORMSGS;\n    For critical databases, run CHECKDB daily. CHECKDB is essential for\n    detecting corruption before it causes data loss.\n\nParameters:\n    @MaxDaysWithoutCheckDB - maximum allowed days without CHECKDB (default 7)\n\nPrerequisites: Ola Hallengren's maintenance solution for CommandLog table.\n               Falls back to msdb backup history if CommandLog is unavailable.\n\nCriticality: High\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\n\nDECLARE @MaxDaysWithoutCheckDB INT = 7;\nDECLARE @HasCommandLog BIT = 0;\n\nIF EXISTS (SELECT 1 FROM sys.databases WHERE name = N'msdb' AND state = 0)\n   AND EXISTS (SELECT 1 FROM msdb.sys.tables WHERE name = N'CommandLog' AND schema_id = SCHEMA_ID(N'dbo'))\n    SET @HasCommandLog = 1;\n\nIF @HasCommandLog = 1\nBEGIN\n    ;WITH LastCheck AS (\n        SELECT\n            DatabaseName,\n            MAX(StartTime) AS last_checkdb_time,\n            MAX(CASE WHEN ErrorNumber <> 0 THEN 1 ELSE 0 END) AS had_errors\n        FROM msdb.dbo.CommandLog\n        WHERE CommandType = N'DBCC_CHECKDB'\n        GROUP BY DatabaseName\n    )\n    SELECT\n        d.name AS [Database_Name],\n        d.state_desc,\n        lc.last_checkdb_time AS [Last_CHECKDB],\n        DATEDIFF(DAY, lc.last_checkdb_time, GETDATE()) AS [Days_Since_CHECKDB],\n        CASE\n            WHEN lc.last_checkdb_time IS NULL THEN N'CRITICAL: Never recorded'\n            WHEN DATEDIFF(DAY, lc.last_checkdb_time, GETDATE()) > @MaxDaysWithoutCheckDB THEN N'WARNING: Over SLA'\n            WHEN lc.had_errors = 1 THEN N'WARNING: Last run had errors'\n            ELSE N'OK'\n        END AS [CHECKDB_Status]\n    FROM sys.databases AS d\n    LEFT JOIN LastCheck AS lc ON lc.DatabaseName = d.name\n    WHERE d.database_id > 4\n      AND d.state = 0\n    ORDER BY [Days_Since_CHECKDB] DESC;\nEND\nELSE\nBEGIN\n    PRINT 'msdb.dbo.CommandLog not found. Install Ola Hallengren MaintenanceSolution or run CHECKDB manually.';\n    SELECT\n        d.name AS [Database_Name],\n        d.state_desc,\n        CAST(NULL AS DATETIME) AS [Last_CHECKDB],\n        CAST(NULL AS INT) AS [Days_Since_CHECKDB],\n        N'UNKNOWN: No CommandLog table' AS [CHECKDB_Status]\n    FROM sys.databases AS d\n    WHERE d.database_id > 4 AND d.state = 0\n    ORDER BY d.name;\nEND;\n", "sql_server/10_Capacity_Planning/database_growth_forecast.sql": "/*\n================================================================================\nSQL Server Database Capacity & Growth Forecasting\n================================================================================\nDescription:\n    Estimates database growth trends based on backup size history from msdb.\n    Identifies databases with rapid growth rates that may exceed available\n    storage capacity.\n\nOutput:\n    Database name, average size, growth over last 30 days, growth percentage,\n    and a growth status indicator.\n\nAction:\n    For databases with \"WARNING: High Growth (>10%)\" in 30 days, calculate\n    when the database will exhaust available disk space:\n        (Free_Disk_Space_GB) / (Daily_Growth_GB) = Days_Remaining\n    Add storage or archive old data before the disk fills. Schedule this script\n    monthly and track growth trends over multiple months for more accurate\n    forecasting.\n\nCriticality: Medium\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\n\n-- 1. Database Size & Growth Trend (Last 30 Days from Backup History)\nPRINT '--- Database Size Growth Trend (Last 30 Days) ---';\nSELECT \n    database_name,\n    CAST(AVG(backup_size/1024/1024/1024) AS DECIMAL(10,2)) AS [Avg_Size_GB],\n    CAST(MAX(backup_size/1024/1024/1024) - MIN(backup_size/1024/1024/1024) AS DECIMAL(10,2)) AS [Growth_GB_30D],\n    CASE \n        WHEN (MAX(backup_size) - MIN(backup_size)) / NULLIF(MIN(backup_size), 0) > 0.1 THEN '🟡 WARNING: High Growth (>10%)'\n        ELSE '🟢 NORMAL'\n    END AS [Growth_Status]\nFROM msdb.dbo.backupset\nWHERE type = 'D' -- Full Backups\n  AND backup_finish_date > DATEADD(DAY, -30, GETDATE())\nGROUP BY database_name\nORDER BY [Growth_GB_30D] DESC;\n\n-- 2. Data File Autogrowth Events\nPRINT '--- Recent Autogrowth Events (Default Trace) ---';\nDECLARE @filename NVARCHAR(1000);\nSELECT @filename = path FROM sys.traces WHERE is_default = 1;\n\nIF @filename IS NOT NULL\nBEGIN\n    SELECT \n        DatabaseName,\n        [FileName],\n        (Duration / 1000) AS [Duration_ms],\n        StartTime,\n        ((IntegerData * 8.0) / 1024.0) AS [Growth_MB],\n        TextData AS [Event_Type]\n    FROM sys.fn_trace_gettable(CAST(SUBSTRING(@filename, 1, LEN(@filename) - CHARINDEX('\\', REVERSE(@filename))) + '\\log.trc' AS NVARCHAR(1000)), DEFAULT)\n    WHERE EventClass IN (92, 93) -- Data/Log File Auto Grow\n      AND StartTime > DATEADD(DAY, -7, GETDATE())\n    ORDER BY StartTime DESC;\nEND\nELSE\n    PRINT 'Default trace is disabled. Autogrowth events cannot be audited via this method.';\n", "sql_server/11_Query_Store/regressed_queries.sql": "/*\n================================================================================\nSQL Server Query Store Plan Regression Diagnostics\n================================================================================\nDescription:\n    Wrapper for sp_DBA_QueryStoreRegressions. Detects true plan regressions —\n    queries with multiple plans where the recent slow plan performs significantly\n    worse than the best historical plan for the same query_id.\n\nOutput:\n    (1) Plan regressions with query text, plan IDs, regression percentage\n    (2) Forced plans and force failure counts\n\nAction:\n    For regression plans > @RegressionPctThreshold: force the baseline plan:\n        EXEC sp_query_store_force_plan @query_id, @baseline_plan_id;\n    Monitor forced plans for regression. If regression does not resolve,\n    investigate index changes or statistics updates that may have caused the\n    plan change. Run after any significant database changes (index maintenance,\n    statistics update, large data loads).\n\nParameters:\n    @DatabaseList - comma-separated database names or NULL for all user DBs\n    @RegressionPctThreshold - minimum regression % to flag (default 50)\n    @RecentHours - lookback for regression data (default 24)\n    @LookbackHours - historical window for baseline plans (default 168)\n\nPrerequisites: sp_DBA_QueryStoreRegressions (deploy via 00_Framework/00_Deploy_Framework.ps1)\n\nCriticality: High\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\n\nDECLARE @DatabaseList NVARCHAR(MAX) = NULL;\nDECLARE @RegressionPctThreshold DECIMAL(10,2) = 50.0;\nDECLARE @RecentHours INT = 24;\nDECLARE @LookbackHours INT = 168;\n\nIF OBJECT_ID(N'dbo.sp_DBA_QueryStoreRegressions', N'P') IS NULL\nBEGIN\n    RAISERROR(N'Run 00_Framework/sp_DBA_QueryStoreRegressions.sql before this script.', 16, 1);\n    RETURN;\nEND;\n\nEXEC dbo.sp_DBA_QueryStoreRegressions\n    @DatabaseList = @DatabaseList,\n    @RegressionPctThreshold = @RegressionPctThreshold,\n    @RecentHours = @RecentHours,\n    @LookbackHours = @LookbackHours,\n    @MinExecutions = 5,\n    @TopPerDatabase = 20,\n    @IncludeForcedPlans = 1;\n", "sql_server/12_Extended_Events/active_xe_sessions.sql": "/*\n================================================================================\nSQL Server Extended Events (XE) Monitoring\n================================================================================\nDescription:\n    Lists all active Extended Event sessions and their targets across the\n    instance, and extracts recent deadlock events from the system_health session.\n    Useful for auditing XE usage and investigating deadlocks.\n\nOutput:\n    (1) Active XE sessions with target details\n    (2) Recent deadlock events (last 5) from system_health with XML graph\n\nAction:\n    Review active sessions to ensure no runaway XE sessions are consuming\n    resources. For deadlock events: analyze the Deadlock_Graph XML to identify\n    the victim process, contested objects, and lock modes. Use the process IDs\n    and query text to locate and fix the deadlocking code. Consider adding\n    custom XE sessions for targeted monitoring (e.g., long-running queries,\n    login failures).\n\nCriticality: Low\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\nSET QUOTED_IDENTIFIER ON;\n\n-- 1. Active Extended Event Sessions and Targets\nPRINT '--- Active Extended Event Sessions ---';\nSELECT\n    s.name AS [Session_Name],\n    s.create_time,\n    t.target_name,\n    p.name AS target_package_name,\n  CASE\n        WHEN s.name = N'system_health' THEN N'SYSTEM DEFAULT'\n        WHEN s.name = N'AlwaysOn_health' THEN N'AG MONITOR'\n        ELSE N'USER DEFINED'\n    END AS [Session_Type]\nFROM sys.dm_xe_sessions AS s\nLEFT JOIN sys.dm_xe_session_targets AS t\n    ON s.address = t.event_session_address\nLEFT JOIN sys.dm_xe_packages AS p\n    ON t.target_package_guid = p.guid\nORDER BY s.name, t.target_name;\n\n-- 2. Deadlock Extraction from System Health (Last 5)\nPRINT '--- Recent Deadlocks (from system_health session) ---';\nIF EXISTS (SELECT 1 FROM sys.dm_xe_sessions WHERE name = N'system_health')\nBEGIN\n    SELECT TOP (5)\n        event_data.value(N'(event/@timestamp)[1]', N'datetime2') AS [Event_Time],\n        event_data.query(N'(event/data[@name=\"xml_report\"]/value/deadlock)') AS [Deadlock_Graph]\n    FROM sys.dm_xe_session_targets AS st\n    INNER JOIN sys.dm_xe_sessions AS s\n        ON s.address = st.event_session_address\n    CROSS APPLY (SELECT CAST(st.target_data AS XML) AS target_data_xml) AS t\n    CROSS APPLY t.target_data_xml.nodes(N'RingBufferTarget/event[@name=\"xml_deadlock_report\"]') AS x(event_data)\n    WHERE s.name = N'system_health'\n      AND st.target_name = N'ring_buffer'\n    ORDER BY [Event_Time] DESC;\nEND\nELSE\n    PRINT 'system_health session is not running.';\n", "sql_server/13_Resource_Governor/resource_governor_config.sql": "/*\n================================================================================\nSQL Server Resource Governor Audit\n================================================================================\nDescription:\n    Reviews Resource Governor (RG) configuration status, resource pools, and\n    workload groups. Identifies whether RG is enabled and how resources are\n    allocated across workloads.\n\nOutput:\n    RG enabled/disabled status, classifier function details, resource pool\n    configuration (min/max CPU and memory), and workload group settings.\n\nAction:\n    If RG is disabled but workload isolation is needed (e.g., separating\n    reporting from OLTP), plan an RG implementation:\n    (1) Create resource pools with MIN/MAX CPU and memory settings\n    (2) Create workload groups mapped to pools\n    (3) Create a classifier function to route sessions\n    (4) ALTER RESOURCE GOVERNOR RECONFIGURE;\n    Test thoroughly in non-production first — a misconfigured classifier\n    can affect all connections.\n\nCriticality: Low\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\n\n-- 1. Resource Governor Global Status\nPRINT '--- Resource Governor Status ---';\nSELECT \n    is_enabled,\n    classifier_function_id,\n    OBJECT_NAME(classifier_function_id) AS [Classifier_Function_Name],\n    CASE \n        WHEN is_enabled = 1 THEN '🟢 ENABLED'\n        ELSE '⚪ DISABLED (Default)'\n    END AS [Status]\nFROM sys.resource_governor_configuration;\n\n-- 2. Resource Pool Usage & Limits\nPRINT '--- Resource Pool Configuration ---';\nSELECT \n    name AS [Pool_Name],\n    min_cpu_percent,\n    max_cpu_percent,\n    min_memory_percent,\n    max_memory_percent,\n    CASE \n        WHEN name = 'internal' THEN '🔵 SYSTEM POOL'\n        WHEN name = 'default' THEN '⚪ DEFAULT POOL'\n        ELSE '🟢 USER POOL'\n    END AS [Pool_Type]\nFROM sys.resource_governor_resource_pools;\n\n-- 3. Workload Groups\nPRINT '--- Workload Group Mapping ---';\nSELECT \n    name AS [Group_Name],\n    pool_name = (SELECT name FROM sys.resource_governor_resource_pools WHERE pool_id = wg.pool_id),\n    importance,\n    request_max_memory_grant_percent,\n    request_max_cpu_time_sec\nFROM sys.resource_governor_workload_groups wg;\n", "sql_server/14_Baselines/performance_snapshot.sql": "/*\n================================================================================\nSQL Server Baseline Snapshot Capture (Lightweight)\n================================================================================\nDescription:\n    Captures a point-in-time snapshot of key performance metrics: wait stats,\n    performance counters, OS info, and file I/O stall data. Use this before\n    and after making changes to measure impact, or capture regularly for\n    historical trending.\n\nOutput:\n    (1) Instance performance counters (CPU, memory, I/O, batch requests)\n    (2) Top waits with wait times\n    (3) Database file I/O stalls\n\nAction:\n    Run this script BEFORE and AFTER any major change (configuration change,\n    index rebuild, query optimization, hardware upgrade). Compare the two\n    snapshots to quantify the impact. For ongoing monitoring, schedule this\n    script hourly via SQL Agent and store results in a baseline table.\n    Cross-reference with sp_DBA_BaselineCapture for persistent storage.\n\nCriticality: Low\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\n\nSELECT sqlserver_start_time AS [Instance_Start_Time], N'Cumulative counters below are since this time.' AS [Note]\nFROM sys.dm_os_sys_info;\n\n-- 1. Instance Performance Counters Snapshot\nPRINT '--- Baseline: Performance Counters Snapshot ---';\nSELECT \n    GETDATE() AS [Snapshot_Time],\n    object_name,\n    counter_name,\n    instance_name,\n    cntr_value,\n    cntr_type\nFROM sys.dm_os_performance_counters\nWHERE counter_name IN (\n    N'Page life expectancy', N'Batch Requests/sec', N'SQL Compilations/sec', \n    N'SQL Re-Compilations/sec', N'User Connections', N'Lock Waits/sec',\n    N'Buffer cache hit ratio', N'Buffer cache hit ratio base'\n)\nAND (object_name LIKE N'%Buffer Manager%' OR object_name LIKE N'%SQL Statistics%' OR object_name LIKE N'%General Statistics%' OR object_name LIKE N'%Locks%');\n\n-- 2. Instance Wait Stats Snapshot (Cumulative)\nPRINT '--- Baseline: Cumulative Wait Stats ---';\nIF OBJECT_ID(N'dbo.fn_DBA_ExcludedWaitTypes', N'IF') IS NOT NULL\nBEGIN\n    SELECT \n        GETDATE() AS [Snapshot_Time],\n        wait_type,\n        waiting_tasks_count,\n        wait_time_ms,\n        max_wait_time_ms,\n        signal_wait_time_ms\n    FROM sys.dm_os_wait_stats\n    WHERE wait_time_ms > 1000\n      AND wait_type NOT IN (SELECT wait_type FROM dbo.fn_DBA_ExcludedWaitTypes())\n    ORDER BY wait_time_ms DESC;\nEND\nELSE\nBEGIN\n    RAISERROR(N'Install 00_Framework for filtered wait stats snapshot.', 10, 1);\n    SELECT GETDATE() AS [Snapshot_Time], wait_type, waiting_tasks_count, wait_time_ms\n    FROM sys.dm_os_wait_stats\n    WHERE wait_time_ms > 1000\n    ORDER BY wait_time_ms DESC;\nEND;\n\n-- 3. I/O File Stats Snapshot\nPRINT '--- Baseline: File I/O Stats ---';\nSELECT\n    GETDATE() AS [Snapshot_Time],\n    DB_NAME(vfs.database_id) AS [Database_Name],\n    mf.name AS [File_Name],\n    vfs.num_of_reads,\n    vfs.num_of_writes,\n    vfs.io_stall_read_ms,\n    vfs.io_stall_write_ms\nFROM sys.dm_io_virtual_file_stats(NULL, NULL) AS vfs\nINNER JOIN sys.master_files AS mf ON vfs.database_id = mf.database_id AND vfs.file_id = mf.file_id;\n", "sql_server/Prod_Migration/01_Quick_Triage/00_RUN_FIRST_triage_playbook.sql": "/*\n================================================================================\nRUN FIRST — Post-Migration Performance Triage Playbook\n================================================================================\nPurpose:\n    Single-pass snapshot when an application is slow immediately after a SQL\n    Server upgrade/migration (e.g. 2019 Express → 2025 Developer).\n\nWhen to run:\n    First 5 minutes of investigation. Run on the PRODUCTION instance during\n    slowness (or reproduce slowness first).\n\nWhat it checks:\n    (1) Instance identity — version, edition, uptime, build\n    (2) sys.dm_os_sys_info — schedulers, runnable tasks, memory model\n    (3) Memory configuration — max/min server memory vs physical RAM\n    (4) Database compatibility levels vs instance default\n    (5) Active blocking chains\n    (6) Top 15 non-benign wait types since startup\n    (7) Sessions currently waiting (not running on CPU)\n\nInterpretation:\n    - Runnable_Tasks > 0 on multiple schedulers  → CPU scheduling pressure\n    - Blocking_Session_ID > 0 anywhere           → concurrency issue (hints won't help)\n    - Top waits LATCH_METADATA_*               → metadata/SSMS slowness likely\n    - Top waits PAGEIOLATCH_WRITELOG           → storage / log I/O\n    - Max_Server_Memory_MB << Physical_RAM_GB    → Express-era cap still in place\n\nNext action if this script does not reveal the cause:\n    → 03_Elapsed_Time_Diagnostics/01_elapsed_vs_worker_time_gap.sql\n    → 04_Wait_Stats/01_wait_stats_delta_capture.sql (reproduce issue, capture delta)\n\nCriticality: Critical — run before changing any settings or applying hints.\n================================================================================\n*/\n\nSET NOCOUNT ON;\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\nPRINT '=== 1. INSTANCE IDENTITY ===';\nSELECT\n    CAST(SERVERPROPERTY(N'ProductVersion') AS NVARCHAR(128))   AS [Product_Version],\n    CAST(SERVERPROPERTY(N'ProductLevel') AS NVARCHAR(128))       AS [Product_Level],\n    CAST(SERVERPROPERTY(N'Edition') AS NVARCHAR(256))          AS [Edition],\n    CAST(SERVERPROPERTY(N'EngineEdition') AS INT)              AS [Engine_Edition_ID],\n    CAST(SERVERPROPERTY(N'ProductMajorVersion') AS INT)        AS [Major_Version],\n    si.sqlserver_start_time                                    AS [SQL_Start_Time],\n    DATEDIFF(MINUTE, si.sqlserver_start_time, SYSDATETIME()) AS [Uptime_Minutes],\n  CASE\n        WHEN COL_LENGTH(N'sys.dm_os_sys_info', N'sql_memory_model_desc') IS NOT NULL\n            THEN (SELECT sql_memory_model_desc FROM sys.dm_os_sys_info)\n        ELSE N'N/A — check LPIM via service account policy'\n    END AS [SQL_Memory_Model]\nFROM sys.dm_os_sys_info AS si;\n\nPRINT '=== 2. OS / SCHEDULER PRESSURE (dm_os_sys_info + schedulers) ===';\nSELECT\n    os.cpu_count              AS [Logical_CPU_Count],\n    os.hyperthread_ratio      AS [Hyperthread_Ratio],\n    os.physical_memory_kb / 1024 AS [Physical_RAM_MB],\n    os.virtual_memory_kb / 1024   AS [Virtual_Memory_MB],\n    os.committed_target_kb / 1024 AS [Target_Memory_Committed_MB],\n    --os.availability_group_id AS [AG_ID_If_Not_Zero],\n    SUM(CASE WHEN sched.status = N'VISIBLE ONLINE' THEN 1 ELSE 0 END) AS [Online_Schedulers],\n    SUM(sched.runnable_tasks_count) AS [Total_Runnable_Tasks],\n    SUM(sched.current_tasks_count)  AS [Total_Current_Tasks],\n    MAX(sched.runnable_tasks_count) AS [Max_Runnable_On_Any_Scheduler],\n    CAST(\n        N'Runnable_Tasks > 0 sustained = CPU queue. ' +\n        N'With LOW CPU on queries, check blocking/latches/IO instead.'\n    AS NVARCHAR(500)) AS [Interpretation]\nFROM sys.dm_os_sys_info AS os\nCROSS JOIN sys.dm_os_schedulers AS sched\nWHERE sched.scheduler_id < 255\nGROUP BY os.cpu_count, os.hyperthread_ratio, os.physical_memory_kb, os.virtual_memory_kb,\n         os.committed_target_kb; --, os.availability_group_id;\n\nPRINT '=== 3. MEMORY CONFIGURATION ===';\nSELECT\n    c.name AS [Setting],\n    c.value_in_use AS [Value],\n    (SELECT physical_memory_kb / 1024 FROM sys.dm_os_sys_info) AS [Physical_RAM_MB],\n    CAST(\n        CASE c.name\n            WHEN N'max server memory (MB)' THEN\n                CASE\n                    WHEN c.value_in_use < (SELECT physical_memory_kb / 1024 * 0.5 FROM sys.dm_os_sys_info)\n                        THEN N'WARNING: max server memory may still reflect Express-era or conservative cap. Post-upgrade Developer edition can use more RAM.'\n                    ELSE N'Review — ensure OS reserve of 4-8 GB on large servers.'\n                END\n            ELSE N'Review 07_Instance_Config/01_post_migration_config_audit.sql'\n        END AS NVARCHAR(500)\n    ) AS [Post_Migration_Note]\nFROM sys.configurations AS c\nWHERE c.name IN (N'max server memory (MB)', N'min server memory (MB)', N'max degree of parallelism', N'cost threshold for parallelism');\n\nPRINT '=== 4. DATABASE COMPATIBILITY (common post-migration gap) ===';\nDECLARE @InstanceCompat INT =\n    COALESCE(\n        CAST(SERVERPROPERTY(N'ProductMajorVersion') AS INT),\n        CAST(PARSENAME(CAST(SERVERPROPERTY(N'ProductVersion') AS NVARCHAR(128)), 4) AS INT)\n    ) * 10;\n\nSELECT\n    d.name AS [Database_Name],\n    d.compatibility_level AS [Compat_Level],\n    @InstanceCompat AS [Instance_Default_Compat],\n    d.is_auto_close_on AS [Auto_Close],\n    d.is_auto_shrink_on AS [Auto_Shrink],\n    d.state_desc AS [State],\n    CASE\n        WHEN d.compatibility_level < @InstanceCompat THEN N'ACTION: Test upgrade compat in lower env'\n        WHEN d.is_auto_close_on = 1 OR d.is_auto_shrink_on = 1 THEN N'CRITICAL: Disable auto_close/auto_shrink'\n        ELSE N'OK'\n    END AS [Action]\nFROM sys.databases AS d\nWHERE d.database_id > 4\nORDER BY d.compatibility_level, d.name;\n\nPRINT '=== 5. ACTIVE BLOCKING (if any row returns, hints will NOT fix app slowness) ===';\nSELECT\n    r.session_id,\n    r.blocking_session_id,\n    r.wait_type,\n    r.wait_time AS [Wait_ms],\n    r.wait_resource,\n    s.login_name,\n    s.host_name,\n    s.program_name,\n    SUBSTRING(st.text, (r.statement_start_offset / 2) + 1,\n        CASE WHEN r.statement_end_offset = -1 THEN LEN(st.text)\n             ELSE (r.statement_end_offset - r.statement_start_offset) / 2 + 1 END) AS [Current_Statement]\nFROM sys.dm_exec_requests AS r\nINNER JOIN sys.dm_exec_sessions AS s ON r.session_id = s.session_id\nCROSS APPLY sys.dm_exec_sql_text(r.sql_handle) AS st\nWHERE r.blocking_session_id <> 0\n   OR r.session_id IN (SELECT DISTINCT blocking_session_id FROM sys.dm_exec_requests WHERE blocking_session_id <> 0)\nORDER BY r.wait_time DESC;\n\nIF @@ROWCOUNT = 0\n    PRINT 'No active blocking detected at this moment. Capture waits during slow query execution.';\n\nPRINT '=== 6. TOP 15 WAIT TYPES (since startup — use delta script for cleaner signal) ===';\nSELECT TOP (15)\n    ws.wait_type,\n    ws.waiting_tasks_count AS [Wait_Count],\n    ws.wait_time_ms / 1000.0 AS [Total_Wait_Sec],\n    (ws.wait_time_ms - ws.signal_wait_time_ms) / 1000.0 AS [Resource_Wait_Sec],\n    ws.signal_wait_time_ms / 1000.0 AS [Signal_Wait_Sec],\n    CAST(ws.wait_time_ms * 1.0 / NULLIF(ws.waiting_tasks_count, 0) AS DECIMAL(18,2)) AS [Avg_Wait_ms],\n    CASE\n        WHEN ws.wait_type LIKE N'LCK%' THEN N'→ 05_Concurrency/01_blocking_and_locks.sql'\n        WHEN ws.wait_type LIKE N'LATCH%' OR ws.wait_type LIKE N'PAGELATCH%' OR ws.wait_type LIKE N'METADATA%' THEN N'→ 04_Wait_Stats/03_latch_metadata_waits.sql'\n        WHEN ws.wait_type LIKE N'PAGEIOLATCH%' OR ws.wait_type IN (N'WRITELOG', N'IO_COMPLETION') THEN N'→ 08_Storage_OS/01_io_latency_deep_dive.sql'\n        WHEN ws.wait_type LIKE N'RESOURCE_SEMAPHORE%' THEN N'→ 07_Instance_Config/01_post_migration_config_audit.sql'\n        WHEN ws.wait_type LIKE N'PREEMPTIVE_OS%' THEN N'→ 08_Storage_OS/02_os_integration_post_migration.sql'\n        WHEN ws.wait_type = N'THREADPOOL' THEN N'CRITICAL — worker exhaustion'\n        ELSE N'→ 04_Wait_Stats/02_post_migration_wait_decoder.sql'\n    END AS [Next_Script]\nFROM sys.dm_os_wait_stats AS ws\nWHERE ws.wait_type NOT IN (\n    N'BROKER_EVENTHANDLER', N'BROKER_RECEIVE_WAITFOR', N'BROKER_TASK_STOP', N'BROKER_TO_FLUSH',\n    N'BROKER_TRANSMITTER', N'CHECKPOINT_QUEUE', N'CHKPT', N'CLR_AUTO_EVENT', N'CLR_MANUAL_EVENT',\n    N'CLR_SEMAPHORE', N'DBMIRROR_DBM_EVENT', N'DBMIRROR_EVENTS_QUEUE', N'DBMIRROR_WORKER_QUEUE',\n    N'DBMIRRORING_CMD', N'DIRTY_PAGE_POLL', N'DISPATCHER_QUEUE_SEMAPHORE', N'EXECSYNC',\n    N'FSAGENT', N'FT_IFTS_SCHEDULER_IDLE_WAIT', N'FT_IFTSHC_MUTEX', N'HADR_FILESTREAM_IOMGR_IOCOMPLETION',\n    N'HADR_LOGCAPTURE_WAIT', N'HADR_NOTIFICATION_DEQUEUE', N'HADR_TIMER_TASK', N'HADR_WORK_QUEUE',\n    N'KSOURCE_WAKEUP', N'LAZYWRITER_SLEEP', N'LOGMGR_QUEUE', N'MEMORY_ALLOCATION_EXT',\n    N'ONDEMAND_TASK_QUEUE', N'PARALLEL_REDO_DRAIN_WORKER', N'PARALLEL_REDO_LOG_CACHE',\n    N'PARALLEL_REDO_TRAN_LIST', N'PARALLEL_REDO_WORKER_SYNC', N'PARALLEL_REDO_WORKER_WAIT_WORK',\n    N'PREEMPTIVE_OS_FLUSHFILEBUFFERS', N'PREEMPTIVE_XE_GETTARGETSTATE', N'PVS_PREALLOCATE',\n    N'PWAIT_ALL_COMPONENTS_INITIALIZED', N'PWAIT_DIRECTLOGCONSUMER_GETNEXT',\n    N'QDS_ASYNC_QUEUE', N'QDS_CLEANUP_STALE_QUERIES_TASK_MAIN_LOOP_SLEEP',\n    N'QDS_PERSIST_TASK_MAIN_LOOP_SLEEP', N'QDS_SHUTDOWN_QUEUE', N'QDS_ASYNC_QUEUE',\n    N'REDO_THREAD_PENDING_WORK', N'REQUEST_FOR_DEADLOCK_SEARCH', N'RESOURCE_QUEUE',\n    N'SERVER_IDLE_TASK', N'SLEEP_BPOOL_FLUSH', N'SLEEP_DBSTARTUP', N'SLEEP_DCOMSTARTUP',\n    N'SLEEP_MASTERDBREADY', N'SLEEP_MASTERMDREADY', N'SLEEP_MASTERUPGRADED', N'SLEEP_MSDBSTARTUP',\n    N'SLEEP_SYSTEMTASK', N'SLEEP_TASK', N'SLEEP_TEMPDBSTARTUP', N'SNI_HTTP_ACCEPT',\n    N'SOS_WORK_DISPATCHER', N'SP_SERVER_DIAGNOSTICS_SLEEP', N'SQLTRACE_BUFFER_FLUSH',\n    N'SQLTRACE_INCREMENTAL_FLUSH_SLEEP', N'SQLTRACE_WAIT_ENTRIES', N'WAIT_FOR_RESULTS',\n    N'WAIT_XTP_HOST_WAIT', N'WAIT_XTP_OFFLINE_CKPT_NEW_LOG', N'WAIT_XTP_CKPT_CLOSE',\n    N'XE_BUFFERMGR_ALLPROCESSED_EVENT', N'XE_DISPATCHER_JOIN', N'XE_DISPATCHER_WAIT',\n    N'XE_FILE_TARGET_TVF', N'XE_LIVE_TARGET_TVF'\n)\nAND ws.waiting_tasks_count > 0\nORDER BY ws.wait_time_ms DESC;\n\nPRINT '=== 7. SESSIONS CURRENTLY WAITING (not actively on CPU) ===';\nSELECT TOP (25)\n    r.session_id,\n    r.status,\n    r.command,\n    r.wait_type,\n    r.wait_time AS [Wait_ms],\n    r.cpu_time AS [CPU_ms],\n    r.logical_reads,\n    r.reads AS [Physical_Reads],\n    r.writes,\n    s.login_name,\n    s.host_name,\n    s.program_name,\n    CASE\n        WHEN r.wait_type LIKE N'LCK%' THEN N'Blocked — find head blocker'\n        WHEN r.wait_type LIKE N'LATCH%' OR r.wait_type LIKE N'PAGELATCH%' THEN N'Metadata/buffer latch — see latch script'\n        WHEN r.wait_type LIKE N'PAGEIOLATCH%' THEN N'Disk read wait — check storage latency'\n        WHEN r.wait_type LIKE N'PREEMPTIVE%' THEN N'OS call — AV/AD/filesystem'\n        ELSE N'C

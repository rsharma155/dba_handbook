       - Deadlock summary with timestamps, victims, and wait times\n                - Per-process details: login, host, database, isolation level,\n                  wait type, wait time, and the exact statement that deadlocked\n                - Resource contention map: objects, indexes, and lock modes\n                - Blocking chain visualization within each deadlock\n                - Historical deadlock frequency trend (last 7 days)\nImportance:     Deadlocks are inevitable in well-concurrent systems. This script\n                moves beyond \"there was a deadlock\" to \"why it happened and what\n                resources were contested,\" enabling targeted fixes.\nInterpretation: Focus on the OBJECT involved (table/index) and the lock mode\n                 (X vs S). If the same object appears repeatedly, redesign the\n                 access pattern or index strategy for that object.\nAction: Identify the most contested object (table/index) from the Resource_Contention_Map. If the same object appears repeatedly, consider: (1) reducing transaction scope, (2) accessing the object in the same order across transactions, (3) adding covering indexes to reduce lock duration, or (4) enabling READ_COMMITTED_SNAPSHOT if acceptable. For historical trend, check deadlock_frequency to see if the pattern is worsening.\nCriticality:    High\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\nSET QUOTED_IDENTIFIER ON;\n\nDECLARE @DeadlockCount INT;\n\n------------------------------------------------------------\n-- 1. Recent Deadlock Events (last 20 from system_health)\n------------------------------------------------------------\nSELECT TOP (20)\n    xdr.value('(event/@timestamp)[1]', 'DATETIME2')             AS [Event_Timestamp],\n    xdr.value('(//deadlock/@priority)[1]', 'INT')               AS [Priority],\n    xdr.value('(//deadlock/victim-list/victimProcess/@id)[1]', 'NVARCHAR(100)') AS [Victim_Process_ID],\n    xdr.value('(//deadlock/process-list/process/@spid)[1]', 'INT')             AS [SPID_1],\n    xdr.value('(//deadlock/process-list/process/@loginname)[1]', 'NVARCHAR(128)') AS [SPID_1_Login],\n    xdr.value('(//deadlock/process-list/process/@hostname)[1]', 'NVARCHAR(128)') AS [SPID_1_Host],\n    xdr.value('(//deadlock/process-list/process/@clientapp)[1]', 'NVARCHAR(128)') AS [SPID_1_App],\n    xdr.value('(//deadlock/process-list/process/@currentdb)[1]', 'INT')        AS [SPID_1_DBID],\n    xdr.value('(//deadlock/process-list/process/@isolationlevel)[1]', 'NVARCHAR(50)') AS [SPID_1_Isolation],\n    xdr.value('(//deadlock/process-list/process/@waittime)[1]', 'INT')         AS [SPID_1_WaitTime_ms],\n    xdr.value('(//deadlock/process-list/process/@lastbatchstarted)[1]', 'NVARCHAR(30)') AS [SPID_1_LastBatch],\n    xdr.value('(//deadlock/process-list/process/@status)[1]', 'NVARCHAR(30)')  AS [SPID_1_Status],\n    xdr.value('(//deadlock/process-list/process/@trancount)[1]', 'INT')        AS [SPID_1_TranCount],\n    -- SPID 2\n    xdr.value('(//deadlock/process-list/process[2]/@spid)[1]', 'INT')          AS [SPID_2],\n    xdr.value('(//deadlock/process-list/process[2]/@loginname)[1]', 'NVARCHAR(128)') AS [SPID_2_Login],\n    xdr.value('(//deadlock/process-list/process[2]/@hostname)[1]', 'NVARCHAR(128)') AS [SPID_2_Host],\n    xdr.value('(//deadlock/process-list/process[2]/@clientapp)[1]', 'NVARCHAR(128)') AS [SPID_2_App],\n    xdr.value('(//deadlock/process-list/process[2]/@currentdb)[1]', 'INT')     AS [SPID_2_DBID],\n    xdr.value('(//deadlock/process-list/process[2]/@waittime)[1]', 'INT')      AS [SPID_2_WaitTime_ms],\n    -- SPID 3 (if present)\n    xdr.value('(//deadlock/process-list/process[3]/@spid)[1]', 'INT')          AS [SPID_3],\n    xdr.value('(//deadlock/process-list/process[3]/@loginname)[1]', 'NVARCHAR(128)') AS [SPID_3_Login]\nFROM (\n    SELECT\n        XEvent.query('.') AS xdr\n    FROM (\n        SELECT CAST(target_data AS XML) AS target_data\n        FROM sys.dm_xe_session_targets st\n        INNER JOIN sys.dm_xe_sessions s ON st.event_session_address = s.address\n        WHERE s.name = N'system_health'\n          AND st.target_name = N'event_file'\n    ) AS data\n    CROSS APPLY target_data.nodes('RingBufferTarget/event[@name=\"xml_deadlock_report\"]') AS XEvent(XEvent)\n) AS DeadlockEvents\nORDER BY xdr.value('(event/@timestamp)[1]', 'DATETIME2') DESC;\n\n------------------------------------------------------------\n-- 2. Process Details: What each session was doing\n------------------------------------------------------------\nSELECT N'PROCESS DETAILS (from last 5 deadlocks)' AS [Section];\nSELECT TOP (10)\n    xdr.value('(event/@timestamp)[1]', 'DATETIME2')             AS [Deadlock_Time],\n    proc_node.value('@spid', 'INT')                              AS [SPID],\n    proc_node.value('@loginname', 'NVARCHAR(128)')               AS [Login_Name],\n    proc_node.value('@hostname', 'NVARCHAR(128)')                AS [Host_Name],\n    proc_node.value('@clientapp', 'NVARCHAR(128)')               AS [Application],\n    proc_node.value('@currentdb', 'INT')                         AS [Database_ID],\n    DB_NAME(proc_node.value('@currentdb', 'INT'))                AS [Database_Name],\n    proc_node.value('@isolationlevel', 'NVARCHAR(50)')           AS [Isolation_Level],\n    proc_node.value('@status', 'NVARCHAR(30)')                   AS [Status],\n    proc_node.value('@trancount', 'INT')                         AS [Transaction_Count],\n    proc_node.value('@waittime', 'INT')                          AS [Wait_Time_ms],\n    proc_node.value('@lastbatchstarted', 'NVARCHAR(30)')         AS [Last_Batch_Started],\n    -- Execution stack (procedure + line)\n    proc_node.value('(executionStack/frame[1]/@procname)[1]', 'NVARCHAR(256)') AS [Top_Proc],\n    proc_node.value('(executionStack/frame[1]/@line)[1]', 'INT')              AS [Line_Number],\n    proc_node.value('(executionStack/frame[1]/@sqlhandle)[1]', 'NVARCHAR(256)') AS [SQL_Handle],\n    -- Input buffer (the actual statement)\n    proc_node.value('(inputbuf)[1]', 'NVARCHAR(MAX)')           AS [Input_Buffer]\nFROM (\n    SELECT\n        XEvent.query('.') AS xdr\n    FROM (\n        SELECT CAST(target_data AS XML) AS target_data\n        FROM sys.dm_xe_session_targets st\n        INNER JOIN sys.dm_xe_sessions s ON st.event_session_address = s.address\n        WHERE s.name = N'system_health'\n          AND st.target_name = N'event_file'\n    ) AS data\n    CROSS APPLY target_data.nodes('RingBufferTarget/event[@name=\"xml_deadlock_report\"]') AS XEvent(XEvent)\n) AS DeadlockEvents\nCROSS APPLY xdr.nodes('//deadlock/process-list/process') AS ProcessNode(proc_node)\nORDER BY xdr.value('(event/@timestamp)[1]', 'DATETIME2') DESC;\n\n------------------------------------------------------------\n-- 3. Resource Contention: What objects were locked\n------------------------------------------------------------\nSELECT N'OBJECTS CONTENDED (last 5 deadlocks)' AS [Section];\nSELECT TOP (15)\n    xdr.value('(event/@timestamp)[1]', 'DATETIME2')             AS [Deadlock_Time],\n    obj_node.value('@dbid', 'INT')                               AS [Database_ID],\n    DB_NAME(obj_node.value('@dbid', 'INT'))                      AS [Database_Name],\n    obj_node.value('@objectname', 'NVARCHAR(256)')               AS [Object_Name],\n    obj_node.value('@indexname', 'NVARCHAR(256)')                AS [Index_Name],\n    obj_node.value('@indexid', 'INT')                            AS [Index_ID],\n    obj_node.value('@mode', 'NVARCHAR(20)')                      AS [Lock_Mode],\n    CASE obj_node.value('@mode', 'NVARCHAR(20)')\n        WHEN 'X'  THEN 'Exclusive — WRITE conflict. Check for concurrent updates on same rows.'\n        WHEN 'S'  THEN 'Shared — READ contention. Multiple readers blocked by a writer.'\n        WHEN 'U'  THEN 'Update — transitioning to X. Deadlock between UPDATE and SELECT.'\n        WHEN 'IX' THEN 'Intent Exclusive — table-level lock for page/row exclusive.'\n        WHEN 'IS' THEN 'Intent Shared — table-level lock for page/row shared.'\n        ELSE 'Review lock escalation patterns.'\n    END AS [Interpretation]\nFROM (\n    SELECT\n        XEvent.query('.') AS xdr\n    FROM (\n        SELECT CAST(target_data AS XML) AS target_data\n        FROM sys.dm_xe_session_targets st\n        INNER JOIN sys.dm_xe_sessions s ON st.event_session_address = s.address\n        WHERE s.name = N'system_health'\n          AND st.target_name = N'event_file'\n    ) AS data\n    CROSS APPLY target_data.nodes('RingBufferTarget/event[@name=\"xml_deadlock_report\"]') AS XEvent(XEvent)\n) AS DeadlockEvents\nCROSS APPLY xdr.nodes('//deadlock/resource-list/*') AS ObjNode(obj_node)\nWHERE obj_node.value('@objectname', 'NVARCHAR(256)') IS NOT NULL\nORDER BY xdr.value('(event/@timestamp)[1]', 'DATETIME2') DESC;\n\n------------------------------------------------------------\n-- 4. Deadlock Frequency Trend (last 7 days by day)\n------------------------------------------------------------\nSELECT N'DEADLOCK FREQUENCY TREND (last 7 days)' AS [Section];\n;WITH DeadlockDates AS (\n    SELECT\n        CAST(xdr.value('(event/@timestamp)[1]', 'DATETIME2') AS DATE) AS [Deadlock_Date],\n        CASE WHEN xdr.value('(//deadlock/victim-list/victimProcess/@id)[1]', 'NVARCHAR(100)') IS NOT NULL THEN 1 ELSE 0 END AS IsVictim\n    FROM (\n        SELECT\n            XEvent.query('.') AS xdr\n        FROM (\n            SELECT CAST(target_data AS XML) AS target_data\n            FROM sys.dm_xe_session_targets st\n            INNER JOIN sys.dm_xe_sessions s ON st.event_session_address = s.address\n            WHERE s.name = N'system_health'\n              AND st.target_name = N'event_file'\n        ) AS data\n        CROSS APPLY target_data.nodes('RingBufferTarget/event[@name=\"xml_deadlock_report\"]') AS XEvent(XEvent)\n    ) AS DeadlockEvents\n    WHERE xdr.value('(event/@timestamp)[1]', 'DATETIME2') >= DATEADD(DAY, -7, SYSUTCDATETIME())\n)\nSELECT\n    [Deadlock_Date],\n    COUNT(*) AS [Deadlock_Count],\n    SUM(IsVictim) AS [Victims]\nFROM DeadlockDates\nGROUP BY [Deadlock_Date]\nORDER BY Deadlock_Date DESC;\n\n------------------------------------------------------------\n-- 5. Top Deadlock-Prone Objects (last 7 days)\n------------------------------------------------------------\nSELECT N'TOP DEADLOCK-PRONE OBJECTS (last 7 days)' AS [Section];\n;WITH DeadlockObjects AS (\n    SELECT\n        obj_node.value('@objectname', 'NVARCHAR(256)')               AS [Object_Name],\n        DB_NAME(obj_node.value('@dbid', 'INT'))                      AS [Database_Name],\n        xdr.value('(event/@timestamp)[1]', 'DATETIME2')             AS [Event_Time]\n    FROM (\n        SELECT\n            XEvent.query('.') AS xdr\n        FROM (\n            SELECT CAST(target_data AS XML) AS target_data\n            FROM sys.dm_xe_session_targets st\n            INNER JOIN sys.dm_xe_sessions s ON st.event_session_address = s.address\n            WHERE s.name = N'system_health'\n              AND st.target_name = N'event_file'\n        ) AS data\n        CROSS APPLY target_data.nodes('RingBufferTarget/event[@name=\"xml_deadlock_report\"]') AS XEvent(XEvent)\n    ) AS DeadlockEvents\n    CROSS APPLY xdr.nodes('//deadlock/resource-list/*') AS ObjNode(obj_node)\n    WHERE obj_node.value('@objectname', 'NVARCHAR(256)') IS NOT NULL\n      AND xdr.value('(event/@timestamp)[1]', 'DATETIME2') >= DATEADD(DAY, -7, SYSUTCDATETIME())\n)\nSELECT TOP (10)\n    [Object_Name],\n    [Database_Name],\n    COUNT(*)                   AS [Deadlock_Involvements],\n    MIN([Event_Time])          AS [First_Seen],\n    MAX([Event_Time])          AS [Last_Seen]\nFROM DeadlockObjects\nGROUP BY [Object_Name], [Database_Name]\nORDER BY COUNT(*) DESC;\n\n------------------------------------------------------------\n-- 6. Custom XE Session Check (if user has a dedicated deadlock session)\n------------------------------------------------------------\nIF EXISTS (\n    SELECT 1 FROM sys.dm_xe_sessions\n    WHERE name LIKE N'%Deadlock%' AND name <> N'system_health'\n)\nBEGIN\n    DECLARE @CustomSession NVARCHAR(128);\n    SELECT TOP (1) @CustomSession = name FROM sys.dm_xe_sessions\n    WHERE name LIKE N'%Deadlock%' AND name <> N'system_health';\n\n    DECLARE @SQL NVARCHAR(MAX) = N'\n        SELECT TOP (10)\n            xdr.value(''(event/@timestamp)[1]'', ''DATETIME2'') AS [Event_Timestamp],\n            xdr.value(''(//deadlock/victim-list/victimProcess/@id)[1]'', ''NVARCHAR(100)'') AS [Victim],\n            xdr.value(''(//deadlock/process-list/process/@spid)[1]'', ''INT'') AS [SPID_1],\n            xdr.value(''(//deadlock/process-list/process/@loginname)[1]'', ''NVARCHAR(128)'') AS [Login_1],\n            xdr.value(''(//deadlock/process-list/process[2]/@spid)[1]'', ''INT'') AS [SPID_2],\n            xdr.value(''(//deadlock/process-list/process[2]/@loginname)[1]'', ''NVARCHAR(128)'') AS [Login_2]\n        FROM (\n            SELECT XEvent.query(''.'') AS xdr\n            FROM (\n                SELECT CAST(target_data AS XML) AS target_data\n                FROM sys.dm_xe_session_targets st\n                INNER JOIN sys.dm_xe_sessions s ON st.event_session_address = s.address\n                WHERE s.name = N''' + @CustomSession + N'''\n                  AND st.target_name = N''event_file''\n            ) AS data\n            CROSS APPLY target_data.nodes(''RingBufferTarget/event[@name=\"xml_deadlock_report\"]'') AS XEvent(XEvent)\n        ) AS CustomDeadlocks\n        ORDER BY xdr.value(''(event/@timestamp)[1]'', ''DATETIME2'') DESC;';\n\n    PRINT N'--- Deadlocks from custom XE session: ' + @CustomSession + N' ---';\n    EXEC(@SQL);\nEND;\n\nPRINT N'--- Analysis complete. Focus on objects that appear repeatedly in section 5. ---';\nPRINT N'--- Common fixes: add covering indexes, reduce transaction scope, use SNAPSHOT isolation. ---';\nGO\n", "sql_server/04_Performance_Diagnostics/plan_cache_deep_dive.sql": "/*\n================================================================================\nPurpose:        Parses the XML execution plan cache to identify key lookups \n                (non-covering indexes) and implicit conversions (SARGability).\nProvides:       Top 20 queries with Key Lookups and top 20 queries with Implicit \n                Conversions, including execution counts and XML query plans.\nImportance:     Essential for identifying hidden performance killers that waste \n                CPU and I/O due to data type mismatches or suboptimal indexing.\nInterpretation: High \"Avg_CPU_ms\" for these queries indicates high-impact \n                 optimization opportunities. Check Plan_XML for the specific nodes.\nAction: For Key Lookup queries (first result set), create a covering nonclustered index that includes all columns from the SELECT and WHERE clauses to eliminate the lookup. For Implicit Conversion queries (second result set), fix the data type mismatch — typically the application is passing a string (NVARCHAR) to an INT or DATETIME column, or the join columns have mismatched types. Use the Plan_XML column to identify the specific node.\nCriticality:    High\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\nSET QUOTED_IDENTIFIER ON;\n\n-- 1. Find Top 20 Queries with Key Lookups\nPRINT 'Searching for Key Lookups in Plan Cache...';\nWITH XMLNAMESPACES (DEFAULT 'http://schemas.microsoft.com/sqlserver/2004/07/showplan')\nSELECT TOP 20\n    qs.execution_count,\n    qs.total_worker_time / 1000 AS [Total_CPU_ms],\n    (qs.total_worker_time / qs.execution_count) / 1000 AS [Avg_CPU_ms],\n    st.text AS [Parent_Query],\n    qp.query_plan AS [Plan_XML]\nFROM sys.dm_exec_query_stats AS qs\nCROSS APPLY sys.dm_exec_sql_text(qs.sql_handle) AS st\nCROSS APPLY sys.dm_exec_query_plan(qs.plan_handle) AS qp\nWHERE qp.query_plan.exist('//IndexLookUp') = 1\nORDER BY qs.total_worker_time DESC;\n\n-- 2. Find Queries with Implicit Conversions (Plan Bloat / SARGability issues)\nPRINT 'Searching for Implicit Conversions in Plan Cache...';\nWITH XMLNAMESPACES (DEFAULT 'http://schemas.microsoft.com/sqlserver/2004/07/showplan')\nSELECT TOP 20\n    qs.execution_count,\n    st.text AS [Query_Text],\n    qp.query_plan AS [Plan_XML]\nFROM sys.dm_exec_query_stats AS qs\nCROSS APPLY sys.dm_exec_sql_text(qs.sql_handle) AS st\nCROSS APPLY sys.dm_exec_query_plan(qs.plan_handle) AS qp\nWHERE qp.query_plan.exist('//ScalarOperator[contains(@ScalarString, \"CONVERT_IMPLICIT\")]') = 1\nORDER BY qs.total_worker_time DESC;\n", "sql_server/04_Performance_Diagnostics/top_resource_queries.sql": "/*\n================================================================================\nPurpose:        Identifies the top 20 statements consuming the most CPU, \n                physical/logical reads, or having the longest elapsed durations.\nProvides:       Execution counts, total/avg CPU, logical reads, duration, \n                query text, and associated execution plan XML.\nImportance:     Pinpoints the \"heavy hitters\" in the workload that offer the \n                highest return on investment for query tuning and optimization.\nInterpretation: Focus on queries with high \"Avg_Logical_Reads\" or \"Avg_CPU_ms\". \n                 Correlate with wait statistics to understand the wait type.\nAction: Copy the query text from the top-ranked queries and analyze the execution plan in SSMS. Look for: (1) missing index warnings (green text), (2) table scans on large tables, (3) implicit conversions, (4) key lookups. For queries with high Avg_CPU_ms, create recommended indexes and re-evaluate. For large batches, consider breaking into smaller operations or optimizing the worst-performing steps.\nCriticality:    High\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\n\nSELECT TOP (20)\n    qs.execution_count AS [Execution_Count],\n    qs.total_worker_time / 1000 AS [Total_CPU_ms],\n    (qs.total_worker_time / qs.execution_count) / 1000 AS [Avg_CPU_ms],\n    qs.total_logical_reads AS [Total_Logical_Reads],\n    qs.total_logical_reads / qs.execution_count AS [Avg_Logical_Reads],\n    qs.total_elapsed_time / 1000 AS [Total_Duration_ms],\n    (qs.total_elapsed_time / qs.execution_count) / 1000 AS [Avg_Duration_ms],\n    -- Extract the specific statement from the batch\n    SUBSTRING(st.text, (qs.statement_start_offset/2)+1, \n        ((CASE qs.statement_end_offset\n            WHEN -1 THEN DATALENGTH(st.text)\n            ELSE qs.statement_end_offset\n         END - qs.statement_start_offset)/2) + 1) AS [Query_Text],\n    qp.query_plan AS [Query_Plan_XML],\n    CAST('Displays worst performing queries from SQL Server plan cache. ' + \n         'Threshold: Queries with Avg_Logical_Reads > 10,000 or Avg_CPU_ms > 500ms are candidates for optimization. ' +\n         'Recommendation: Open Query_Plan_XML to locate clustered index scans or key lookups. Add missing indexes, reduce sorting operations, or verify parameter statistics.'\n         AS VARCHAR(1000)) AS [Metric_Context]\nFROM sys.dm_exec_query_stats AS qs WITH (NOLOCK)\nCROSS APPLY sys.dm_exec_sql_text(qs.sql_handle) AS st\nCROSS APPLY sys.dm_exec_query_plan(qs.plan_handle) AS qp\nORDER BY [Total_CPU_ms] DESC; -- Can change to total_logical_reads or total_elapsed_time depending on diagnostic focus\n", "sql_server/04_Performance_Diagnostics/wait_statistics.sql": "/*\n================================================================================\nPurpose:        Collects cumulative instance-wide wait statistics, filtering out \n                benign background system waits to highlight active bottlenecks.\nProvides:       Wait types, wait times (total, resource, signal), wait counts, \n                percentage of total waits, and best practice recommendations.\nImportance:     Critical for identifying the primary hardware or configuration \n                bottleneck (CPU, I/O, Memory, Locking) affecting the instance.\nInterpretation: Focus on wait types with the highest \"Percentage_Of_Total_Waits\". \n                 The top 3-5 types typically represent 80%+ of total wait time.\nAction: Focus on the top 3-5 wait types — they represent 80%+ of total wait time. Common patterns: PAGEIOLATCH_XX = disk I/O bottleneck (run disk_latency.sql), LCK_M_XX = blocking (run blocking_and_deadlocks.sql), SOS_SCHEDULER_YIELD = CPU pressure (run cpu_utilization.sql), RESOURCE_SEMAPHORE = memory pressure (run memory_diagnostics.sql). See wait_statistics_reference.sql for detailed investigation commands per wait type.\nCriticality:    High\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\n\nIF OBJECT_ID(N'dbo.fn_DBA_ExcludedWaitTypes', N'IF') IS NULL\n    AND NOT EXISTS (SELECT 1 FROM DBARepository.sys.objects WHERE name = N'fn_DBA_ExcludedWaitTypes' AND type = 'IF')\nBEGIN\n    RAISERROR(N'Run 00_Framework/00_Deploy_Framework.ps1 (-ServerInstance . -Database master) to auto-deploy all required objects, or deploy fn_DBA_ExcludedWaitTypes manually.', 16, 1);\n    RETURN;\nEND;\n\nSELECT sqlserver_start_time AS [Instance_Start_Time], N'Wait stats are cumulative since this time.' AS [Metric_Context]\nFROM sys.dm_os_sys_info;\n\nWITH [WaitStats] AS (\n    SELECT \n        wait_type,\n        wait_time_ms / 1000.0 AS [Wait_S],\n        (wait_time_ms - signal_wait_time_ms) / 1000.0 AS [Resource_S],\n        signal_wait_time_ms / 1000.0 AS [Signal_S],\n        waiting_tasks_count AS [Wait_Count],\n        ROW_NUMBER() OVER(ORDER BY wait_time_ms DESC) AS [Row_Num]\n    FROM sys.dm_os_wait_stats\n    WHERE wait_type NOT IN (SELECT wait_type FROM dbo.fn_DBA_ExcludedWaitTypes())\n      AND waiting_tasks_count > 0\n)\nSELECT \n    W1.wait_type AS [Wait_Type],\n    CAST(W1.Wait_S AS DECIMAL(14, 2)) AS [Wait_Sec],\n    CAST(W1.Resource_S AS DECIMAL(14, 2)) AS [Resource_Sec],\n    CAST(W1.Signal_S AS DECIMAL(14, 2)) AS [Signal_Sec],\n    W1.Wait_Count AS [Wait_Count],\n    CAST(W1.Wait_S / NULLIF(SUM(W2.Wait_S), 0) * 100 AS DECIMAL(5, 2)) AS [Percentage_Of_Total_Waits],\n    CASE \n        WHEN W1.wait_type LIKE 'LCK%' THEN 'Locking'\n        WHEN W1.wait_type LIKE 'PAGEIOLATCH%' THEN 'Storage (Read)'\n        WHEN W1.wait_type LIKE 'WRITELOG' OR W1.wait_type LIKE 'LOGMGR%' THEN 'Storage (Write)'\n        WHEN W1.wait_type LIKE 'PAGELATCH%' THEN 'Buffer/TempDB'\n        WHEN W1.wait_type = 'CXPACKET' THEN 'Parallelism'\n        WHEN W1.wait_type = 'SOS_SCHEDULER_YIELD' THEN 'CPU'\n        WHEN W1.wait_type = 'RESOURCE_SEMAPHORE' THEN 'Memory'\n        WHEN W1.wait_type = 'ASYNC_NETWORK_IO' THEN 'Network/Client'\n        ELSE 'Other'\n    END AS [Wait_Category],\n    CASE \n        WHEN W1.wait_type LIKE 'LCK%' THEN 'Locking / Blocking contention. Recommendation: Identify active blocking session, optimize query transactions, or modify isolation level (e.g. RCSI).'\n        WHEN W1.wait_type LIKE 'PAGEIOLATCH%' THEN 'Disk to Memory transfer bottleneck. Recommendation: Improve indexing to avoid large table scans, or scale memory/I/O throughput.'\n        WHEN W1.wait_type LIKE 'PAGELATCH%' THEN 'In-memory buffer contention (common in TempDB allocation pages). Recommendation: Optimize TempDB file allocation or review page-splits.'\n        WHEN W1.wait_type = 'CXPACKET' THEN 'Parallel task coordination. Recommendation: Often occurs alongside other wait types. Investigate high-cost plans, increase CTFP configuration.'\n        WHEN W1.wait_type = 'ASYNC_NETWORK_IO' THEN 'App server processing wait. Recommendation: Client application is processing rows too slowly or fetching massive datasets (RBAR).'\n        WHEN W1.wait_type = 'RESOURCE_SEMAPHORE' THEN 'Query memory grant starvation. Recommendation: Optimize memory-heavy sorts/hashes or scale system memory.'\n        ELSE 'Generic wait type. Review MSDN documentation or correlate with concurrent performance traces.'\n    END AS [Best_Practice_Recommendation],\n    CAST('Aggregates and formats cumulative wait stats. ' + \n         'Threshold: Top 3 wait types usually make up 80%+ of bottlenecks. ' +\n         'Recommendation: Target optimization efforts on the highest percentage wait types.'\n         AS VARCHAR(1000)) AS [Metric_Context]\nFROM [WaitStats] AS W1\nCROSS JOIN [WaitStats] AS W2\nWHERE W2.Row_Num <= 20 -- Limits percentage calculation base to top 20 wait types\nGROUP BY W1.wait_type, W1.Wait_S, W1.Resource_S, W1.Signal_S, W1.Wait_Count, W1.Row_Num\nHAVING W1.Row_Num <= 20\nORDER BY W1.Wait_S DESC;\n", "sql_server/04_Performance_Diagnostics/wait_statistics_reference.sql": "/*\n================================================================================\nPurpose:        Exhaustive wait statistics analysis with detailed root cause \n                analysis and suggested investigation commands for top 30 waits.\nProvides:       Detailed breakdown of top 30 wait types, average wait times, \n                percentage impact, and actionable T-SQL investigation scripts.\nImportance:     Serves as a comprehensive reference guide for DBAs to understand \n                and troubleshoot specific wait types with proven commands.\nInterpretation: Use the \"Root_Cause_Analysis\" to understand the wait and execute \n                 the \"Investigation_Command\" to find the specific source of pressure.\nAction: Use this script as a reference guide. For each high-impact wait type in your environment, execute the provided Investigation_Command to find the source. For example, if PAGEIOLATCH_XX is top, run the investigation command to find slow data files, then cross-reference with disk_latency.sql. This script does not require immediate action — it is educational and designed to guide your troubleshooting.\nCriticality:    Medium (Educational/Reference)\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\n\nIF OBJECT_ID(N'dbo.fn_DBA_ExcludedWaitTypes', N'IF') IS NULL\n    AND NOT EXISTS (SELECT 1 FROM DBARepository.sys.objects WHERE name = N'fn_DBA_ExcludedWaitTypes' AND type = 'IF')\nBEGIN\n    RAISERROR(N'Run 00_Framework/00_Deploy_Framework.ps1 (-ServerInstance . -Database master) to auto-deploy all required objects, or deploy fn_DBA_ExcludedWaitTypes manually.', 16, 1);\n    RETURN;\nEND;\n\nWITH WaitData AS (\n    SELECT\n        wait_type,\n        wait_time_ms / 1000.0 AS [Wait_S],\n        (wait_time_ms - signal_wait_time_ms) / 1000.0 AS [Resource_S],\n        signal_wait_time_ms / 1000.0 AS [Signal_S],\n        waiting_tasks_count AS [Wait_Count],\n        100.0 * wait_time_ms / SUM(wait_time_ms) OVER() AS [Percentage],\n        ROW_NUMBER() OVER(ORDER BY wait_time_ms DESC) AS [RowNum]\n    FROM sys.dm_os_wait_stats\n    WHERE wait_type NOT IN (SELECT wait_type FROM dbo.fn_DBA_ExcludedWaitTypes())\n)\nSELECT \n    wait_type AS [Wait_Type],\n    CAST([Wait_S] AS DECIMAL(16,2)) AS [Wait_Sec],\n    CAST([Percentage] AS DECIMAL(5,2)) AS [%],\n    CAST(([Wait_S] / [Wait_Count]) AS DECIMAL(16,4)) AS [Avg_Wait_S],\n    CASE \n        WHEN wait_type = 'CXPACKET' THEN 'Parallel skew. Threads waiting for others.'\n        WHEN wait_type = 'SOS_SCHEDULER_YIELD' THEN 'CPU pressure. Threads exhausted quantum.'\n        WHEN wait_type = 'PAGEIOLATCH_SH' THEN 'Disk Read. Data pages coming from disk.'\n        WHEN wait_type = 'PAGEIOLATCH_EX' THEN 'Disk Write. Buffer flush to disk.'\n        WHEN wait_type = 'WRITELOG' THEN 'T-Log latency. Flush to disk bottleneck.'\n        WHEN wait_type = 'ASYNC_NETWORK_IO' THEN 'App fetching too slow / RBAR.'\n        WHEN wait_type = 'RESOURCE_SEMAPHORE' THEN 'Memory grant starvation (Sort/Hash).'\n        WHEN wait_type = 'LCK_M_X' THEN 'Exclusive Lock blocking.'\n        WHEN wait_type = 'LCK_M_S' THEN 'Shared Lock blocking.'\n        WHEN wait_type = 'PAGELATCH_UP' THEN 'TempDB/Buffer metadata contention.'\n        WHEN wait_type = 'THREADPOOL' THEN 'Worker thread exhaustion. CRITICAL.'\n        WHEN wait_type = 'PREEMPTIVE_OS_WRITEFILEGATHER' THEN 'IFI Disabled check.'\n        WHEN wait_type = 'CMEMTHREAD' THEN 'Memory object contention (Plan Cache).'\n        WHEN wait_type = 'HADR_SYNC_COMMIT' THEN 'AlwaysOn Sync Latency (Network/IO).'\n        WHEN wait_type = 'LOGBUFFER' THEN 'Wait for space in log buffer. IO bottleneck.'\n        WHEN wait_type = 'RESOURCE_SEMAPHORE_QUERY_COMPILE' THEN 'Compilation storm. Plan cache bloat.'\n        WHEN wait_type = 'LCK_M_IX' THEN 'Intent Exclusive Lock. Table/Page level blocking.'\n        WHEN wait_type = 'PAGEIOLATCH_UP' THEN 'Page update read. Disk bottleneck.'\n        WHEN wait_type = 'ASYNC_IO_COMPLETION' THEN 'General IO wait. Check storage.'\n        WHEN wait_type = 'BACKUPIO' THEN 'SQL waiting for backup device.'\n        WHEN wait_type = 'CXCONSUMER' THEN 'Safe to ignore if CXPACKET is high.'\n        WHEN wait_type = 'REDO_THREAD_PENDING_WORK' THEN 'AlwaysOn Redo Lag.'\n        WHEN wait_type = 'SLEEP_BPOOL_FLUSH' THEN 'Checkpoint/LazyWriter bottleneck.'\n        WHEN wait_type = 'DTC' THEN 'Distributed Transaction Coordinator lag.'\n        WHEN wait_type = 'OLEDB' THEN 'Linked Server or DMV overhead.'\n        WHEN wait_type = 'DBMIRROR_SEND' THEN 'Mirroring network lag.'\n        WHEN wait_type = 'SQLCLR_QUANTUM' THEN 'CLR code executing too long.'\n        WHEN wait_type = 'WRITE_COMPLETION' THEN 'General async write wait.'\n        WHEN wait_type = 'POOL_PAGELATCH_EX' THEN 'Buffer pool contention.'\n        WHEN wait_type = 'QUERY_EXECUTION_INDEX_LOOKUP' THEN 'Key Lookup pressure.'\n        ELSE 'Review SQL documentation.'\n    END AS [Root_Cause_Analysis],\n    CASE \n        WHEN wait_type LIKE 'PAGEIOLATCH%' THEN 'SELECT * FROM sys.dm_io_virtual_file_stats(NULL,NULL) ORDER BY io_stall DESC;'\n        WHEN wait_type = 'CXPACKET' THEN 'SELECT * FROM sys.configurations WHERE name IN (''max degree of parallelism'',''cost threshold for parallelism'');'\n        WHEN wait_type = 'RESOURCE_SEMAPHORE' THEN 'SELECT * FROM sys.dm_exec_query_memory_grants;'\n        WHEN wait_type LIKE 'LCK%' THEN 'EXEC sp_WhoIsActive @get_plans=1;'\n        WHEN wait_type = 'SOS_SCHEDULER_YIELD' THEN 'SELECT TOP 20 * FROM sys.dm_exec_query_stats ORDER BY total_worker_time DESC;'\n        WHEN wait_type = 'WRITELOG' THEN 'SELECT * FROM sys.dm_io_virtual_file_stats(2,NULL); -- Check TempDB/Log'\n        ELSE 'N/A'\n    END AS [Investigation_Command]\nFROM WaitData\nWHERE RowNum <= 30\nORDER BY [Wait_S] DESC;\n", "sql_server/05_Index_Statistics/advanced_index_analysis.sql": "/*\n================================================================================\nSQL Server Ultra-Deep Index Diagnostic: Contention & Exact Duplicates\n================================================================================\nDescription:\n    Identifies indexes with high row/page lock contention and detects exact\n    duplicate indexes (same key columns, same included columns) across databases.\n\nOutput:\n    Two result sets: (1) Indexes with lock contention (row + page lock waits),\n    sorted by total wait time. (2) Exact duplicate indexes that waste space.\n\nAction:\n    For high-contention indexes (result set 1): Consider index redesign\n    (narrowing the key, using hash partitioning, or reducing transaction scope).\n    For duplicate indexes (result set 2): Drop the duplicate with the lower\n    number of seeks or the one that was created later. Duplicate indexes add\n    write overhead and maintenance cost without benefit.\n\nParameters:\n    @DatabaseList - comma-separated database names or NULL for all user DBs\n\nPrerequisites: SQL Server 2016+ (FOR XML PATH used for column aggregation on 2016; STRING_AGG on 2017+)\n\nCriticality: Medium\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\n\nDECLARE @DatabaseList NVARCHAR(MAX) = NULL;\n\nIF OBJECT_ID(N'tempdb..#Contention') IS NOT NULL DROP TABLE #Contention;\nCREATE TABLE #Contention (\n    [Database] SYSNAME,\n    [Table] SYSNAME,\n    [Index] SYSNAME,\n    [Row_Lock_Wait_ms] BIGINT,\n    [Page_Lock_Wait_ms] BIGINT\n);\n\nIF OBJECT_ID(N'tempdb..#Duplicates') IS NOT NULL DROP TABLE #Duplicates;\nCREATE TABLE #Duplicates (\n    [Database] SYSNAME,\n    [Table] SYSNAME,\n    [Index_1] SYSNAME,\n    [Index_2] SYSNAME,\n    [Column_List] NVARCHAR(MAX)\n);\n\nDECLARE @ContentionCommand NVARCHAR(MAX) = N'\nINSERT INTO #Contention\nSELECT DB_NAME(), OBJECT_NAME(s.object_id), i.name, s.row_lock_wait_in_ms, s.page_lock_wait_in_ms\nFROM sys.dm_db_index_operational_stats(DB_ID(), NULL, NULL, NULL) AS s\nINNER JOIN sys.indexes AS i ON s.object_id = i.object_id AND s.index_id = i.index_id\nWHERE s.row_lock_wait_in_ms > 0 OR s.page_lock_wait_in_ms > 0;';\n\nDECLARE @DuplicateCommand NVARCHAR(MAX) = N'\n;WITH IndexCols AS (\n    SELECT i.object_id, i.index_id, i.name,\n        STUFF((\n            SELECT N'','' + c.name\n            FROM sys.index_columns AS ic2\n            INNER JOIN sys.columns AS c ON ic2.object_id = c.object_id AND ic2.column_id = c.column_id\n            WHERE ic2.object_id = i.object_id AND ic2.index_id = i.index_id AND ic2.is_included_column = 0\n            ORDER BY ic2.key_ordinal\n            FOR XML PATH(N''''), TYPE).value(N''.'', N''NVARCHAR(MAX)''), 1, 1, N'''') AS Cols\n    FROM sys.indexes AS i\n    WHERE i.index_id > 1\n    GROUP BY i.object_id, i.index_id, i.name\n)\nINSERT INTO #Duplicates\nSELECT DB_NAME(), OBJECT_NAME(i1.object_id), i1.name, i2.name, i1.Cols\nFROM IndexCols AS i1\nINNER JOIN IndexCols AS i2 ON i1.object_id = i2.object_id AND i1.index_id < i2.index_id AND i1.Cols = i2.Cols;';\n\nDECLARE @CombinedCommand NVARCHAR(MAX) = @ContentionCommand + NCHAR(10) + @DuplicateCommand;\n\nIF OBJECT_ID(N'dbo.sp_DBA_ForEachDatabase', N'P') IS NOT NULL\nBEGIN\n    EXEC dbo.sp_DBA_ForEachDatabase\n        @Command = @CombinedCommand,\n        @UserDatabasesOnly = 1,\n        @IncludeReadOnly = 0,\n        @DatabaseList = @DatabaseList,\n        @ContinueOnError = 1;\nEND\nELSE\nBEGIN\n    DECLARE @db_name SYSNAME;\n    DECLARE @SQL NVARCHAR(MAX);\n\n    IF OBJECT_ID(N'tempdb..#DbTargets') IS NOT NULL DROP TABLE #DbTargets;\n    CREATE TABLE #DbTargets (database_name SYSNAME PRIMARY KEY);\n\n    IF @DatabaseList IS NOT NULL AND LTRIM(RTRIM(@DatabaseList)) <> N''\n        INSERT INTO #DbTargets SELECT LTRIM(RTRIM(value)) FROM STRING_SPLIT(@DatabaseList, N',') WHERE LTRIM(RTRIM(value)) <> N'';\n    ELSE\n        INSERT INTO #DbTargets SELECT name FROM sys.databases WHERE database_id > 4 AND state = 0 AND is_in_standby = 0;\n\n    DECLARE db_cursor CURSOR LOCAL FAST_FORWARD FOR SELECT database_name FROM #DbTargets ORDER BY database_name;\n    OPEN db_cursor;\n    FETCH NEXT FROM db_cursor INTO @db_name;\n    WHILE @@FETCH_STATUS = 0\n    BEGIN\n        SET @SQL = N'USE ' + QUOTENAME(@db_name) + N';' + @CombinedCommand;\n        BEGIN TRY EXEC sys.sp_executesql @SQL; END TRY BEGIN CATCH END CATCH;\n        FETCH NEXT FROM db_cursor INTO @db_name;\n    END;\n    CLOSE db_cursor; DEALLOCATE db_cursor;\n    DROP TABLE #DbTargets;\nEND;\n\nPRINT N'--- Index Contention & Blocking (Top 20) ---';\nSELECT TOP (20) * FROM #Contention ORDER BY (Row_Lock_Wait_ms + Page_Lock_Wait_ms) DESC;\n\nPRINT N'--- Exact Duplicate Indexes (Wasteful) ---';\nSELECT * FROM #Duplicates ORDER BY [Database], [Table];\n\nDROP TABLE #Contention;\nDROP TABLE #Duplicates;\n", "sql_server/05_Index_Statistics/index_usage_efficiency.sql": "/*\n================================================================================\nIndex Usage Efficiency Across All User Databases\n================================================================================\nDescription:\n    Shows missing index recommendations from the DMV (instance-wide), identifies\n    unused indexes that waste write I/O and maintenance time, and lists the most\n    expensive index operations (seeks vs scans).\n\nOutput:\n    Three result sets: (1) Top 20 missing indexes with advantage scores,\n    (2) Unused indexes with high maintenance overhead, (3) Index usage summary.\n\nAction:\n    For missing indexes (result set 1): Review Index_Advantage_Score — scores\n    > 100,000 are strong candidates. Validate against existing indexes before\n    creating. For unused indexes (result set 2): Indexes with zero seeks and\n    zero scans but high writes are maintenance overhead — drop only after\n    confirming uptime and business approval. Do NOT act on first-run data alone;\n    index usage stats reset on restart.\n\nParameters:\n    @DatabaseList - comma-separated database names or NULL for all user DBs\n    @MinIndexWrites - minimum writes to consider index maintenance cost (default 1000)\n\nCriticality: Medium\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\nSET QUOTED_IDENTIFIER ON;\n\nDECLARE @DatabaseList NVARCHAR(MAX) = NULL;\nDECLARE @MinIndexWrites BIGINT = 1000;\n\nSELECT sqlserver_start_time AS [Instance_Start_Time], N'Index usage stats are cumulative since this time.' AS [Metric_Context]\nFROM sys.dm_os_sys_info;\n\n-- 1. Missing Index Recommendations (Instance-Wide)\nPRINT N'--- Missing Index Recommendations (Instance-Wide) ---';\nSELECT TOP (20)\n    CAST(gs.user_seeks * gs.avg_user_impact * gs.avg_total_user_cost AS INT) AS [Index_Advantage_Score],\n    DB_NAME(d.database_id) AS [Database_Name],\n    d.statement AS [Table_Path],\n    d.equality_columns AS [Equality_Columns],\n    d.inequality_columns AS [Inequality_Columns],\n    d.included_columns AS [Included_Columns],\n    gs.user_seeks AS [User_Seeks],\n    gs.avg_user_impact AS [Avg_User_Impact_Pct],\n    CAST(N'WARNING: Never blindly create missing indexes from this DMV. Validate overlap and write overhead.' AS NVARCHAR(1000)) AS [Metric_Context]\nFROM sys.dm_db_missing_index_groups AS g\nINNER JOIN sys.dm_db_missing_index_group_stats AS gs ON gs.group_handle = g.index_group_handle\nINNER JOIN sys.dm_db_missing_index_details AS d ON g.index_handle = d.index_handle\nWHERE @DatabaseList IS NULL\n   OR DB_NAME(d.database_id) IN (\n        SELECT LTRIM(RTRIM(value)) FROM STRING_SPLIT(@DatabaseList, N',') WHERE LTRIM(RTRIM(value)) <> N''\n   )\nORDER BY [Index_Advantage_Score] DESC;\n\n-- 2. Unused Indexes (All User DBs)\nPRINT N'--- Unused Indexes (All User DBs) ---';\nIF OBJECT_ID(N'tempdb..#UnusedIndexes') IS NOT NULL DROP TABLE #UnusedIndexes;\nCREATE TABLE #UnusedIndexes (\n    [Database_Name] SYSNAME,\n    [Table_Name] SYSNAME,\n    [Index_Name] SYSNAME,\n    [Writes] BIGINT,\n    [Reads] BIGINT,\n    [Index_Type] NVARCHAR(60)\n);\n\nDECLARE @IndexCommand NVARCHAR(MAX) = N'\nINSERT INTO #UnusedIndexes\nSELECT\n    DB_NAME(),\n    OBJECT_NAME(i.object_id),\n    i.name,\n    s.user_updates,\n    s.user_seeks + s.user_scans + s.user_lookups,\n    i.type_desc\nFROM sys.indexes AS i\nINNER JOIN sys.dm_db_index_usage_stats AS s\n    ON s.object_id = i.object_id AND s.index_id = i.index_id\nWHERE s.database_id = DB_ID()\n  AND OBJECTPROPERTY(i.object_id, N''IsUserTable'') = 1\n  AND i.index_id > 1\n  AND s.user_updates > ' + CAST(@MinIndexWrites AS NVARCHAR(20)) + N'\n  AND (s.user_seeks + s.user_scans + s.user_lookups) = 0;';\n\nIF OBJECT_ID(N'dbo.sp_DBA_ForEachDatabase', N'P') IS NOT NULL\nBEGIN\n    EXEC dbo.sp_DBA_ForEachDatabase\n        @Command = @IndexCommand,\n        @UserDatabasesOnly = 1,\n        @IncludeReadOnly = 0,\n        @DatabaseList = @DatabaseList,\n        @ContinueOnError = 1;\nEND\nELSE\nBEGIN\n    DECLARE @db_name SYSNAME;\n    DECLARE @SQL NVARCHAR(MAX);\n\n    IF OBJECT_ID(N'tempdb..#DbTargets') IS NOT NULL DROP TABLE #DbTargets;\n    CREATE TABLE #DbTargets (database_name SYSNAME PRIMARY KEY);\n\n    IF @DatabaseList IS NOT NULL AND LTRIM(RTRIM(@DatabaseList)) <> N''\n        INSERT INTO #DbTargets SELECT LTRIM(RTRIM(value)) FROM STRING_SPLIT(@DatabaseList, N',') WHERE LTRIM(RTRIM(value)) <> N'';\n    ELSE\n        INSERT INTO #DbTargets SELECT name FROM sys.databases WHERE database_id > 4 AND state = 0 AND is_in_standby = 0;\n\n    DECLARE db_cursor CURSOR LOCAL FAST_FORWARD FOR SELECT database_name FROM #DbTargets ORDER BY database_name;\n    OPEN db_cursor;\n    FETCH NEXT FROM db_cursor INTO @db_name;\n    WHILE @@FETCH_STATUS = 0\n    BEGIN\n        SET @SQL = N'USE ' + QUOTENAME(@db_name) + N';' + @IndexCommand;\n        BEGIN TRY EXEC sys.sp_executesql @SQL; END TRY BEGIN CATCH END CATCH;\n        FETCH NEXT FROM db_cursor INTO @db_name;\n    END;\n    CLOSE db_cursor; DEALLOCATE db_cursor;\n    DROP TABLE #DbTargets;\nEND;\n\nSELECT * FROM #UnusedIndexes ORDER BY [Writes] DESC;\nDROP TABLE #UnusedIndexes;\n", "sql_server/05_Index_Statistics/physical_stats_and_heaps.sql": "/*\n================================================================================\nPhysical Stats, Fragmentation, and Heap Forwarded Records\n================================================================================\nDescription:\n    Analyzes index fragmentation levels and heap forwarded record counts across\n    all user databases. High fragmentation degrades scan performance; forwarded\n    records fragment heap reads.\n\nOutput:\n    Table/Index level details including page count, fragmentation percentage,\n    and forwarded record count for heaps.\n\nAction:\n    For indexes with Fragmentation_Pct > 30%: rebuild ONLINE if possible:\n        ALTER INDEX [IndexName] ON [TableName] REBUILD WITH (ONLINE = ON);\n    For 5-30% fragmentation: reorganize:\n        ALTER INDEX [IndexName] ON [TableName] REORGANIZE;\n    For heaps with > 1000 forwarded records: create a clustered index then drop\n    it (or keep it), or use ALTER TABLE ... REBUILD to eliminate forwarding.\n\nParameters:\n    @DatabaseList - comma-separated database names or NULL for all user DBs\n    @MinPageCount - minimum page count to include (default 1000)\n    @MinFragmentationPct - minimum fragmentation to flag (default 5)\n\nWarning: dm_db_index_physical_stats can be expensive on large databases.\n         Run during off-peak hours.\n\nCriticality: Medium\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\n\nDECLARE @DatabaseList NVARCHAR(MAX) = NULL;\nDECLARE @MinPageCount INT = 1000;\nDECLARE @MinFragmentationPct DECIMAL(5,2) = 5.0;\n\nIF OBJECT_ID(N'tempdb..#PhysStats') IS NOT NULL DROP TABLE #PhysStats;\nCREATE TABLE #PhysStats (\n    [Database_Name] SYSNAME,\n    [Table_Name] SYSNAME,\n    [Index_Name] SYSNAME,\n    [Index_Type] NVARCHAR(60),\n    [Page_Count] BIGINT,\n    [Forwarded_Records] BIGINT,\n    [Fragmentation_Pct] DECIMAL(5,2),\n    [Maintenance_Hint] NVARCHAR(40)\n);\n\nDECLARE @PhysCommand NVARCHAR(MAX) = N'\nINSERT INTO #PhysStats\nSELECT\n    DB_NAME(),\n    OBJECT_NAME(ps.object_id),\n    i.name,\n    ps.index_type_desc,\n    ps.page_count,\n    ps.forwarded_record_count,\n    CAST(ps.avg_fragmentation_in_percent AS DECIMAL(5,2)),\n    CASE\n        WHEN ps.forwarded_record_count > 0 THEN N''REVIEW HEAP''\n        WHEN ps.avg_fragmentation_in_percent >= 30 AND ps.page_count >= 10000 THEN N''REBUILD''\n        WHEN ps.avg_fragmentation_in_percent >= ' + CAST(@MinFragmentationPct AS NVARCHAR(10)) + N' THEN N''REORGANIZE''\n        ELSE N''OK''\n    END\nFROM sys.dm_db_index_physical_stats(DB_ID(), NULL, NULL, NULL, N''LIMITED'') AS ps\nINNER JOIN sys.indexes AS i ON ps.object_id = i.object_id AND ps.index_id = i.index_id\nWHERE ps.page_count >= ' + CAST(@MinPageCount AS NVARCHAR(10)) + N'\n  AND (ps.avg_fragmentation_in_percent > ' + CAST(@MinFragmentationPct AS NVARCHAR(10)) + N' OR ps.forwarded_record_count > 0);';\n\nIF OBJECT_ID(N'dbo.sp_DBA_ForEachDatabase', N'P') IS NOT NULL\nBEGIN\n    EXEC dbo.sp_DBA_ForEachDatabase\n        @Command = @PhysCommand,\n        @UserDatabasesOnly = 1,\n        @IncludeReadOnly = 0,\n        @DatabaseList = @DatabaseList,\n        @ContinueOnError = 1;\nEND\nELSE\nBEGIN\n    DECLARE @db_name SYSNAME;\n    DECLARE @SQL NVARCHAR(MAX);\n\n    IF OBJECT_ID(N'tempdb..#DbTargets') IS NOT NULL DROP TABLE #DbTargets;\n    CREATE TABLE #DbTargets (database_name SYSNAME PRIMARY KEY);\n\n    IF @DatabaseList IS NOT NULL AND LTRIM(RTRIM(@DatabaseList)) <> N''\n        INSERT INTO #DbTargets SELECT LTRIM(RTRIM(value)) FROM STRING_SPLIT(@DatabaseList, N',') WHERE LTRIM(RTRIM(value)) <> N'';\n    ELSE\n        INSERT INTO #DbTargets SELECT name FROM sys.databases WHERE database_id > 4 AND state = 0 AND is_in_standby = 0;\n\n    DECLARE db_cursor CURSOR LOCAL FAST_FORWARD FOR SELECT database_name FROM #DbTargets ORDER BY database_name;\n    OPEN db_cursor;\n    FETCH NEXT FROM db_cursor INTO @db_name;\n    WHILE @@FETCH_STATUS = 0\n    BEGIN\n        SET @SQL = N'USE ' + QUOTENAME(@db_name) + N';' + @PhysCommand;\n        BEGIN TRY EXEC sys.sp_executesql @SQL; END TRY BEGIN CATCH END CATCH;\n        FETCH NEXT FROM db_cursor INTO @db_name;\n    END;\n    CLOSE db_cursor; DEALLOCATE db_cursor;\n    DROP TABLE #DbTargets;\nEND;\n\nSELECT * FROM #PhysStats ORDER BY [Fragmentation_Pct] DESC, [Forwarded_Records] DESC;\nDROP TABLE #PhysStats;\n", "sql_server/05_Index_Statistics/statistics_freshness.sql": "/*\n================================================================================\nStatistics Freshness Across User Databases\n================================================================================\nDescription:\n    Reports stale statistics (modifications since last update exceeding a\n    threshold) across databases. Stale statistics lead to poor cardinality\n    estimates and bad execution plans.\n\nOutput:\n    List of statistics with last update date, row count, modifications,\n    and modification percentage relative to row count.\n\nAction:\n    For statistics with Modification_Pct exceeding 20-30% of row count,\n    update statistics:\n        UPDATE STATISTICS [TableName] ([StatisticsName]) WITH FULLSCAN;\n    For very large tables, use WITH SAMPLE instead. Schedule a nightly\n    statistics maintenance job (e.g., Ola Hallengren's IndexOptimize) to\n    prevent future plan regressions.\n\nParameters:\n    @DatabaseList - comma-separated database names or NULL for all user DBs\n    @StalePctThreshold - modification % threshold for flagging (default 20)\n\nCriticality: High\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\n\nDECLARE @StalePctThreshold DECIMAL(5,2) = 20.0;\nDECLARE @DatabaseList NVARCHAR(MAX) = NULL;\n\nIF OBJECT_ID(N'tempdb..#StatsResults') IS NOT NULL DROP TABLE #StatsResults;\nCREATE TABLE #StatsResults (\n    [Database_Name] SYSNAME,\n    [Table_Name] SYSNAME,\n    [Statistics_Name] SYSNAME,\n    [Last_Updated] DATETIME,\n    [Total_Rows] BIGINT,\n    [Rows_Sampled] BIGINT,\n    [Modifications] BIGINT,\n    [Modification_Pct] DECIMAL(18,2)\n);\n\nDECLARE @StatsCommand NVARCHAR(MAX) = N'\nINSERT INTO #StatsResults\nSELECT\n    DB_NAME(),\n    OBJECT_NAME(s.object_id),\n    s.name,\n    sp.last_updated,\n    sp.rows,\n    sp.rows_sampled,\n    sp.modification_counter,\n    CAST(sp.modification_counter AS DECIMAL(18,2)) / NULLIF(sp.rows, 0) * 100\nFROM sys.stats AS s\nCROSS APPLY sys.dm_db_stats_properties(s.object_id, s.stats_id) AS sp\nWHERE OBJECTPROPERTY(s.object_id, N''IsUserTable'') = 1\n  AND CAST(sp.modification_counter AS DECIMAL(18,2)) / NULLIF(sp.rows, 0) * 100 >= ' + CAST(@StalePctThreshold AS NVARCHAR(10)) + N';';\n\nIF OBJECT_ID(N'dbo.sp_DBA_ForEachDatabase', N'P') IS NOT NULL\nBEGIN\n    EXEC dbo.sp_DBA_ForEachDatabase\n        @Command = @StatsCommand,\n        @UserDatabasesOnly = 1,\n        @IncludeReadOnly = 0,\n        @DatabaseList = @DatabaseList,\n        @ContinueOnError = 1;\nEND\nELSE\nBEGIN\n    DECLARE @db_name SYSNAME;\n    DECLARE @SQL NVARCHAR(MAX);\n\n    IF OBJECT_ID(N'tempdb..#DbTargets') IS NOT NULL DROP TABLE #DbTargets;\n    CREATE TABLE #DbTargets (database_name SYSNAME PRIMARY KEY);\n\n    IF @DatabaseList IS NOT NULL AND LTRIM(RTRIM(@DatabaseList)) <> N''\n        INSERT INTO #DbTargets SELECT LTRIM(RTRIM(value)) FROM STRING_SPLIT(@DatabaseList, N',') WHERE LTRIM(RTRIM(value)) <> N'';\n    ELSE\n        INSERT INTO #DbTargets SELECT name FROM sys.databases WHERE database_id > 4 AND state = 0 AND is_read_only = 0 AND is_in_standby = 0;\n\n    DECLARE db_cursor CURSOR LOCAL FAST_FORWARD FOR SELECT database_name FROM #DbTargets ORDER BY database_name;\n    OPEN db_cursor;\n    FETCH NEXT FROM db_cursor INTO @db_name;\n    WHILE @@FETCH_STATUS = 0\n    BEGIN\n        SET @SQL = N'USE ' + QUOTENAME(@db_name) + N';' + @StatsCommand;\n        BEGIN TRY EXEC sys.sp_executesql @SQL; END TRY BEGIN CATCH END CATCH;\n        FETCH NEXT FROM db_cursor INTO @db_name;\n    END;\n    CLOSE db_cursor; DEALLOCATE db_cursor;\n    DROP TABLE #DbTargets;\nEND;\n\nSELECT * FROM #StatsResults ORDER BY [Modification_Pct] DESC, [Modifications] DESC;\nDROP TABLE #StatsResults;\n", "sql_server/06_HA_DR/alwayson_ag_monitor.sql": "/*\n================================================================================\nPurpose:        Monitors Availability Group health, replica synchronization \n                states, failover readiness, and estimated data loss (RPO).\nProvides:       Replica roles, sync health, log send/redo queue sizes, rates, \n                and estimated RPO (recovery point objective) in seconds.\nImportance:     Essential for maintaining high availability and ensuring that \n                secondary replicas are up-to-date and ready for failover.\nInterpretation: Sync Health should be \"HEALTHY\". High log send/redo queues \nindicate bottlenecks. RPO should be near 0 for sync replicas.\nAction: If Sync Health is not \"HEALTHY\" for any replica, check network connectivity and SQL Server error logs. For high log_send_queue_size or redo_queue_size, investigate the disk I/O on the secondary (log writing) and primary (log generation) using disk_latency.sql. For synchronous replicas, RPO > 0 means data loss risk — ensure the network latency is < 10ms between replicas.\nCriticality:    Critical\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\n\nDECLARE @MajorVersion INT = CAST(PARSENAME(CAST(SERVERPROPERTY(N'ProductVersion') AS NVARCHAR(128)), 4) AS INT);\n\n-- 1. Availability Group & Replica Overview\nSELECT \n    ag.name AS [AG_Name],\n    ar.replica_server_name AS [Replica_Server],\n    ars.role_desc AS [Role],\n    ars.operational_state_desc AS [Operational_State],\n    ars.connected_state_desc AS [Connected_State],\n    ars.recovery_health_desc AS [Recovery_Health],\n    ars.synchronization_health_desc AS [Sync_Health],\n    CAST('Availability Group replica health overview. ' +\n         'Threshold: Secondary replicas should be in SYNCHRONIZED state. ' +\n         'Recommendation: Investigate any replica not in SYNCHRONIZED or SYNCHRONIZING state. Check network latency and log throughput.'\n         AS VARCHAR(1000)) AS [Metric_Context]\nFROM sys.dm_hadr_availability_replica_states AS ars WITH (NOLOCK)\nINNER JOIN sys.availability_replicas AS ar WITH (NOLOCK)\n    ON ars.replica_id = ar.replica_id\nINNER JOIN sys.availability_groups AS ag WITH (NOLOCK)\n    ON ars.group_id = ag.group_id\nORDER BY ag.name, ars.role_desc;\n\n-- 2. Database-Level Synchronization Status\nIF @MajorVersion >= 16\n    EXEC(N'SELECT \n        ag.name AS [AG_Name],\n        ar.replica_server_name AS [Replica_Server],\n        ars.role_desc AS [Role],\n        adc.database_name AS [Database_Name],\n        hds.synchronization_state_desc AS [Sync_State],\n        hds.synchronization_health_desc AS [Sync_Health],\n        hds.log_send_queue_size AS [Log_Send_Queue_KB],\n        hds.redo_queue_size AS [Redo_Queue_KB],\n        hds.log_send_rate AS [Log_Send_Rate_KB_s],\n        hds.redo_rate AS [Redo_Rate_KB_s],\n        hds.low_water_mark_for_ghosts AS [Low_Water_Mark],\n        CAST(N''Per-database AG synchronization metrics. Threshold: Log_Send_Queue_Size and Redo_Queue_Size should be low (ideally < 1MB) in SYNCHRONIZED state. Rising send or redo queues indicate secondary replica lagging behind the primary. Recommendation: If queues grow, check network bandwidth, primary log generation rate, and secondary I/O latency.'' AS VARCHAR(1000)) AS [Metric_Context]\n    FROM sys.dm_hadr_database_replica_states AS hds WITH (NOLOCK)\n    INNER JOIN sys.availability_databases_cluster AS adc WITH (NOLOCK)\n        ON hds.group_id = adc.group_id AND hds.group_database_id = adc.group_database_id\n    INNER JOIN sys.availability_replicas AS ar WITH (NOLOCK)\n        ON hds.replica_id = ar.replica_id\n    INNER JOIN sys.availability_groups AS ag WITH (NOLOCK)\n        ON hds.group_id = ag.group_id\n    INNER JOIN sys.dm_hadr_availability_replica_states AS ars WITH (NOLOCK)\n        ON hds.replica_id = ars.replica_id\n    ORDER BY ag.name, adc.database_name, ars.role_desc;');\nELSE\n    EXEC(N'SELECT \n        ag.name AS [AG_Name],\n        ar.replica_server_name AS [Replica_Server],\n        ars.role_desc AS [Role],\n        hds.database_name AS [Database_Name],\n        hds.synchronization_state_desc AS [Sync_State],\n        hds.synchronization_health_desc AS [Sync_Health],\n        hds.log_send_queue_size AS [Log_Send_Queue_KB],\n        hds.redo_queue_size AS [Redo_Queue_KB],\n        hds.log_send_rate AS [Log_Send_Rate_KB_s],\n        hds.redo_rate AS [Redo_Rate_KB_s],\n        hds.log_send_time AS [Log_Send_Time_ms],\n        hds.low_water_mark_for_ghosts AS [Low_Water_Mark],\n        CAST(N''Per-database AG synchronization metrics. Threshold: Log_Send_Queue_Size and Redo_Queue_Size should be low (ideally < 1MB) in SYNCHRONIZED state. Rising send or redo queues indicate secondary replica lagging behind the primary. Recommendation: If queues grow, check network bandwidth, primary log generation rate, and secondary I/O latency.'' AS VARCHAR(1000)) AS [Metric_Context]\n    FROM sys.dm_hadr_database_replica_states AS hds WITH (NOLOCK)\n    INNER JOIN sys.availability_replicas AS ar WITH (NOLOCK)\n        ON hds.replica_id = ar.replica_id\n    INNER JOIN sys.availability_groups AS ag WITH (NOLOCK)\n        ON hds.group_id = ag.group_id\n    INNER JOIN sys.dm_hadr_availability_replica_states AS ars WITH (NOLOCK)\n        ON hds.replica_id = ars.replica_id\n    ORDER BY ag.name, hds.database_name, ars.role_desc;');\n\n-- 3. Failover Readiness & Estimated Recovery (RTO / RPO)\nIF @MajorVersion >= 16\n    EXEC(N'SELECT \n        ag.name AS [AG_Name],\n        ar.replica_server_name AS [Replica_Server],\n        adc.database_name AS [Database_Name],\n        ars.role_desc AS [Role],\n        hds.is_primary_replica AS [Is_Primary],\n        hds.is_suspended AS [Is_Suspended],\n        hds.suspend_reason_desc AS [Suspend_Reason],\n        hds.last_commit_time AS [Last_Commit_Time],\n        DATEDIFF(SECOND, hds.last_commit_time, GETDATE()) AS [RPO_Estimate_Seconds],\n        CAST(N''Failover readiness assessment. Threshold: RPO_Estimate_Seconds should be as close to 0 as possible for synchronous replicas. Recommendation: If RPO exceeds SLA targets, investigate network throughput, log generation rate, and secondary replica performance. For asynchronous replicas, higher RPO is expected by design.'' AS VARCHAR(1000)) AS [Metric_Context]\n    FROM sys.dm_hadr_database_replica_states AS hds WITH (NOLOCK)\n    INNER JOIN sys.availability_databases_cluster AS adc WITH (NOLOCK)\n        ON hds.group_id = adc.group_id AND hds.group_database_id = adc.group_database_id\n    INNER JOIN sys.availability_replicas AS ar WITH (NOLOCK)\n        ON hds.replica_id = ar.replica_id\n    INNER JOIN sys.availability_groups AS ag WITH (NOLOCK)\n        ON hds.group_id = ag.group_id\n    INNER JOIN sys.dm_hadr_availability_replica_states AS ars WITH (NOLOCK)\n        ON hds.replica_id = ars.replica_id\n    WHERE ars.role_desc = ''SECONDARY''\n    ORDER BY ag.name, adc.database_name;');\nELSE\n    EXEC(N'SELECT \n        ag.name AS [AG_Name],\n        ar.replica_server_name AS [Replica_Server],\n        hds.database_name AS [Database_Name],\n        ars.role_desc AS [Role],\n        hds.is_primary_replica AS [Is_Primary],\n        hds.is_suspended AS [Is_Suspended],\n        hds.suspend_reason_desc AS [Suspend_Reason],\n        hds.last_commit_time AS [Last_Commit_Time],\n        DATEDIFF(SECOND, hds.last_commit_time, GETDATE()) AS [RPO_Estimate_Seconds],\n        CAST(N''Failover readiness assessment. Threshold: RPO_Estimate_Seconds should be as close to 0 as possible for synchronous replicas. Recommendation: If RPO exceeds SLA targets, investigate network throughput, log generation rate, and secondary replica performance. For asynchronous replicas, higher RPO is expected by design.'' AS VARCHAR(1000)) AS [Metric_Context]\n    FROM sys.dm_hadr_database_replica_states AS hds WITH (NOLOCK)\n    INNER JOIN sys.availability_replicas AS ar WITH (NOLOCK)\n        ON hds.replica_id = ar.replica_id\n    INNER JOIN sys.availability_groups AS ag WITH (NOLOCK)\n        ON hds.group_id = ag.group_id\n    INNER JOIN sys.dm_hadr_availability_replica_states AS ars WITH (NOLOCK)\n        ON hds.replica_id = ars.replica_id\n    WHERE ars.role_desc = ''SECONDARY''\n    ORDER BY ag.name, hds.database_name;');\n\n-- 4. AG Listener Status\nPRINT '--- AG Listener Health ---';\nIF @MajorVersion >= 16\n    EXEC(N'SELECT \n        dns_name,\n        port,\n        is_conformant,\n        is_distributed_network_name\n    FROM sys.availability_group_listeners;');\nELSE\n    EXEC(N'SELECT \n        dns_name,\n        port,\n        state_desc,\n        ip_configuration_string_from_cluster\n    FROM sys.availability_group_listeners;');\n", "sql_server/06_HA_DR/backup_log_chain.sql": "/*\n================================================================================\nSQL Server Backup Log Chain Integrity\n================================================================================\nDescription:\n    Detects breaks in the transaction log backup chain for FULL recovery model\n    databases. A broken log chain prevents point-in-time recovery and can make\n    restore operations fail after the break point.\n\nOutput:\n    Sequential log backup listing with LSN ranges, highlighting gaps where\n    first_lsn of the next backup does not match last_lsn of the previous backup.\n\nAction:\n    If a log chain break is detected (missing LSN continuity), immediately take\n    a new full backup followed by regular log backups. Investigate why the break\n    occurred — common causes: log backup failure, database switched to SIMPLE\n    recovery, or manual log shrink (SHRINKFILE). Run weekly to catch breaks early.\n\nCriticality: Critical\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\n\n;WITH LogBackups AS (\n    SELECT\n        bs.database_name,\n        bs.backup_start_date,\n        bs.backup_finish_date,\n        bs.first_lsn,\n        bs.last_lsn,\n        bs.database_backup_lsn,\n        ROW_NUMBER() OVER (PARTITION BY bs.database_name ORDER BY bs.backup_start_date) AS rn\n    FROM msdb.dbo.backupset AS bs\n    WHERE bs.type = N'L'\n),\nChainCheck AS (\n    SELECT\n        curr.database_name,\n        prev.backup_finish_date AS [Previous_Log_Backup],\n        curr.backup_finish_date AS [Current_Log_Backup],\n        prev.last_lsn AS [Previous_Last_LSN],\n        curr.first_lsn AS [Current_First_LSN],\n        CASE\n            WHEN prev.last_lsn <> curr.first_lsn THEN N'BREAK'\n            ELSE N'OK'\n        END AS [Chain_Status]\n    FROM LogBackups AS curr\n    INNER JOIN LogBackups AS prev\n        ON curr.database_name = prev.database_name\n       AND curr.rn = prev.rn + 1\n)\nSELECT\n    d.name AS [Database_Name],\n    d.recovery_model_desc,\n    cc.Previous_Log_Backup,\n    cc.Current_Log_Backup,\n    cc.Previous_Last_LSN,\n    cc.Current_First_LSN,\n    cc.Chain_Status\nFROM ChainCheck AS cc\nINNER JOIN sys.databases AS d ON d.name = cc.database_name\nWHERE cc.Chain_Status = N'BREAK'\n  AND d.recovery_model_desc = N'FULL'\n  AND d.database_id > 4\nORDER BY cc.Current_Log_Backup DESC;\n\nIF @@ROWCOUNT = 0\n    PRINT 'No log chain breaks detected in msdb backup history.';\n", "sql_server/06_HA_DR/backup_verification.sql": "/*\n================================================================================\nPurpose:        Reports the last full, differential, and transaction log backup \n                timestamps for all online user databases on the instance.\nProvides:       Recovery model, database state, last backup dates, hours since \n                last backup, and a calculated backup health status.\nImportance:     The most critical script for ensuring disaster recovery readiness, \n                meeting RPO/RTO SLAs, and data protection compliance.\nInterpretation: Look for \"CRITICAL\" or \"WARNING\" in Backup_Status. Ensure log \nbackups are frequent (e.g., < 1hr) for FULL recovery databases.\nAction: For databases with Backup_Status = \"CRITICAL\" (no backup within SLA), take an immediate backup:\n    BACKUP DATABASE [DBName] TO DISK = N'path';\n    For FULL recovery databases with long gaps since last log backup (< 1 hour is recommended), increase log backup frequency via a SQL Agent job. Schedule daily verification using this script in a monitoring job.\nCriticality:    Critical\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\n\nWITH LastBackups AS (\n    SELECT \n        database_name,\n        MAX(CASE WHEN type = 'D' THEN backup_finish_date END) AS [Last_Full_Backup],\n        MAX(CASE WHEN type = 'I' THEN backup_finish_date END) AS [Last_Differential_Backup],\n        MAX(CASE WHEN type = 'L' THEN backup_finish_date END) AS [Last_Log_Backup],\n        MAX(backup_finish_date) AS [Last_Any_Backup]\n    FROM msdb.dbo.backupset WITH (NOLOCK)\n    GROUP BY database_name\n)\nSELECT \n    d.name AS [Database_Name],\n    d.recovery_model_desc AS [Recovery_Model],\n    d.state_desc AS [Database_State],\n    lb.Last_Full_Backup AS [Last_Full_Backup],\n    lb.Last_Differential_Backup AS [Last_Differential_Backup],\n    lb.Last_Log_Backup AS [Last_Log_Backup],\n    DATEDIFF(HOUR, lb.Last_Any_Backup, GETDATE()) AS [Hours_Since_Last_Backup],\n    CASE \n        WHEN d.state = 0 THEN -- ONLINE\n            CASE \n                WHEN lb.Last_Any_Backup IS NULL THEN 'CRITICAL: No backup ever found'\n                WHEN DATEDIFF(HOUR, lb.Last_Any_Backup, GETDATE()) > 48 THEN 'WARNING: Last backup > 48 hours ago'\n                WHEN d.recovery_model_desc = 'FULL' AND lb.Last_Log_Backup IS NULL THEN 'WARNING: Full recovery mode with no log backup'\n                WHEN d.recovery_model_desc = 'FULL' AND DATEDIFF(HOUR, lb.Last_Log_Backup, GETDATE()) > 24 THEN 'WARNING: Log backup > 24 hours old'\n                ELSE 'OK'\n            END\n        ELSE 'N/A (database not online)'\n    END AS [Backup_Status],\n    CAST('Backup verification audit. ' +\n         'Threshold: Full backups should be taken daily (or weekly for very large databases), log backups every 15-60 minutes for FULL recovery model. ' +\n         'Recommendation: Schedule regular full, differential, and log backups to meet RPO requirements. ' +\n         'Databases in FULL recovery model without recent log backups are at risk of massive log file growth and data loss.'\n         AS VARCHAR(1000)) AS [Metric_Context]\nFROM sys.databases AS d WITH (NOLOCK)\nLEFT JOIN LastBackups AS lb ON d.name = lb.database_name\nWHERE d.database_id > 4 -- Exclude system databases\nORDER BY [Hours_Since_Last_Backup] DESC;\n", "sql_server/06_HA_DR/restore_test_simulator.sql": "/*\n================================================================================\nPurpose:        Automated restore testing simulator for disaster recovery \n                readiness validation. This script:\n                1. Shows the last known backup chain for each database\n                2. Calculates the estimated restore time based on backup sizes\n                3. Generates the exact RESTORE commands needed for a point-in-time restore\n                4. Identifies broken log chains or missing backups\n                5. Validates recovery model alignment with backup strategy\n\n                This is a READ-ONLY planning tool — it does NOT execute restores.\n                Use it to verify your DR readiness before an actual disaster.\n\nProvides:       - Backup chain completeness per database\n                - Estimated restore time (full + diff + logs)\n                - Generated RESTORE WITH RECOVERY commands\n                - RPO/RTO estimation based on last backup age\n                - Broken log chain detection\nImportance:     A backup is useless if you can't restore. This script validates\n                the entire restore chain and tells you exactly how long recovery\n                would take — BEFORE you need it.\nInterpretation: If Estimated_Restore_Minutes > your RTO target, you have a \n                problem. Fix backup frequency or restore procedures.\nAction: If Estimated_Restore_Minutes exceeds your RTO, increase backup frequency or invest in faster storage. If broken log chains are detected, take a new full backup immediately to re-establish the chain. Save the generated RESTORE commands to a recovery document. Schedule this script weekly to verify DR readiness.\nCriticality:    High (run weekly, before DR drills)\n================================================================================\n*/\n\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET NOCOUNT ON;\n\n------------------------------------------------------------\n-- 1. Backup Chain Completeness (per database)\n------------------------------------------------------------\nSELECT N'BACKUP CHAIN STATUS' AS [Section];\nSELECT\n    b.database_name                                           AS [Database_Name],\n    b.recovery_model_desc                                     AS [Recovery_Model],\n    b.backup_finish_date                                      AS [Last_Backup_Time],\n    DATEDIFF(MINUTE, b.backup_finish_date, GETDATE())        AS [Age_Minutes],\n    CASE\n        WHEN DATEDIFF(MINUTE, b.backup_finish_date, GETDATE()) <= 60 THEN 'OK (< 1 hour)'\n        WHEN DATEDIFF(MINUTE, b.backup_finish_date, GETDATE()) <= 1440 THEN 'WARNING (< 24 hours)'\n        WHEN DATEDIFF(MINUTE, b.backup_finish_date, GETDATE()) <= 4320 THEN 'AT RISK (< 3 days)'\n        ELSE 'CRITICAL (> 3 days)'\n    END                                                       AS [Backup_Age_Status],\n    b.type                                                   AS [Backup_Type],\n    CASE b.type\n        WHEN 'D' THEN 'FULL'\n        WHEN 'I' THEN 'DIFFERENTIAL'\n        WHEN 'L' THEN 'LOG'\n        WHEN 'F' THEN 'FILE/DIFF'\n        WHEN 'G' THEN 'FILEGROUP'\n        ELSE b.type\n    END                                                       AS [Backup_Type_Desc],\n    b.backup_size / 1048576.0                                 AS [Backup_Size_MB],\n    b.compressed_backup_size / 1048576.0                      AS [Compressed_Size_MB],\n    b.physical_device_name                                    AS [Backup_File_Path],\n    b.first_lsn                                              AS [First_LSN],\n    b.last_lsn                                               AS [Last_LSN],\n    DATEDIFF(SECOND, b.backup_start_date, b.backup_finish_date) AS [Backup_Duration_Sec],\n    CASE\n        WHEN b.backup_size > 0 AND DATEDIFF(SECOND, b.backup_start_date, b.backup_finish_date) > 0\n        THEN (b.backup_size / 1048576.0) / DATEDIFF(SECOND, b.backup_start_date, b.backup_finish_date)\n        ELSE 0\n    END                                                       AS [Throughput_MB_per_Sec]\nFROM (\n    SELECT\n        bs.database_name,\n        CASE bs.recovery_model WHEN 'F' THEN 'FULL' WHEN 'S' THEN 'SIMPLE' WHEN 'B' THEN 'BULK_LOGGED' ELSE bs.recovery_model END AS recovery_model_desc,\n        bs.backup_finish_date,\n        bs.type,\n        bs.backup_size,\n        bs.compressed_backup_size,\n        bs.first_lsn,\n        bs.last_lsn,\n        bs.backup_start_date,\n        bmf.physical_device_name,\n        ROW_NUMBER() OVER (PARTITION BY bs.database_name, bs.type ORDER BY bs.backup_finish_date DESC) AS rn\n    FROM msdb.dbo.backupset bs\n    INNER JOIN msdb.dbo.backupmediafamily bmf ON bs.media_set_id = bmf.media_set_id\n    WHERE bs.database_name NOT IN ('tempdb', 'model')\n) b\nWHERE b.rn <= 3\nORDER BY b.database_name, b.backup_finish_date DESC;\n\n------------------------------------------------------------\n-- 2. Estimated Restore Chain (what you need for recovery)\n------------------------------------------------------------\nSELECT N'ESTIMATED RESTORE CHAIN (per database)' AS [Section];\nSELECT\n    db.database_name                                          AS [Database_Name],\n    db.recovery_model_desc                                    AS [Recovery_Model],\n    -- Last full backup\n    full_b.backup_finish_date                                 AS [Last_Full_Backup],\n    full_b.backup_size / 1048576.0                            AS [Full_Backup_MB],\n    full_b.physical_device_name                               AS [Full_Backup_Path],\n    -- Last diff backup (if any)\n    diff_b.backup_finish_date                                 AS [Last_Diff_Backup],\n    diff_b.backup_size / 1048576.0                            AS [Diff_Backup_MB],\n    diff_b.physical_device_name                               AS [Diff_Backup_Path],\n    -- Log backups\n    log_b.log_count                                           AS [Log_Backups_After_Full],\n    log_b.total_log_mb                                        AS [Total_Log_MB],\n    -- Estimation\n    ISNULL(full_b.backup_size, 0) / 1048576.0\n        + ISNULL(diff_b.backup_size, 0) / 1048576.0\n        + ISNULL(log_b.total_log_mb, 0)                     AS [Total_Restore_Size_MB],\n    CASE\n        WHEN full_b.backup_size IS NULL THEN 'MISSING FULL BACKUP'\n        WHEN db.recovery_model_desc = 'SIMPLE' AND diff_b.backup_size IS NULL THEN 'FULL + LOG ONLY (no diff)'\n        ELSE 'FULL + DIFF + ' + CAST(ISNULL(log_b.log_count, 0) AS VARCHAR(10)) + ' LOG(s)'\n    END                                                       AS [Restore_Command_Summary],\n    -- RPO estimate (how much data you could lose)\n    DATEDIFF(MINUTE, ISNULL(log_b.last_log, diff_b.backup_finish_date), GETDATE()) AS [Minutes_Since_Last_Backup],\n    CASE\n        WHEN db.recovery_model_desc = 'SIMPLE'\n        THEN 'RPO = time since last full/diff backup'\n        ELSE 'RPO = time since last log backup'\n    END                                                       AS [RPO_Explanation]\nFROM (\n    SELECT DISTINCT database_name, CASE recovery_model WHEN 'F' THEN 'FULL' WHEN 'S' THEN 'SIMPLE' WHEN 'B' THEN 'BULK_LOGGED' ELSE recovery_model END AS recovery_model_desc\n    FROM msdb.dbo.backupset\n    WHERE database_name NOT IN ('tempdb', 'model')\n) db\n-- Last full backup\nLEFT JOIN (\n    SELECT database_name, backup_finish_date, backup_size, physical_device_name\n    FROM (\n        SELECT bs.database_name, bs.backup_finish_date, bs.backup_size, bmf.physical_device_name,\n               ROW_NUMBER() OVER (PARTITION BY bs.database_name ORDER BY bs.backup_finish_date DESC) AS rn\n        FROM msdb.dbo.backupset bs\n        INNER JOIN msdb.dbo.backupmediafamily bmf ON bs.media_set_id = bmf.media_set_id\n        WHERE bs.type = 'D'\n          AND bs.database_name NOT IN ('tempdb', 'model')\n    ) ranked\n    WHERE rn = 1\n) full_b ON db.database_name = full_b.database_name\n-- Last diff backup\nLEFT JOIN (\n    SELECT database_name, backup_finish_date, backup_size, physical_device_name\n    FROM (\n        SELECT bs.database_name, bs.backup_finish_date, bs.backup_size, bmf.physical_device_name,\n               ROW_NUMBER() OVER (PARTITION BY bs.database_name ORDER BY bs.backup_finish_date DESC) AS rn\n        FROM msdb.dbo.backupset bs\n        INNER JOIN msdb.dbo.backupmediafamily bmf ON bs.media_set_id = bmf.media_set_id\n        WHERE bs.type = 'I'\n          AND bs.database_name NOT IN ('tempdb', 'model')\n    ) ranked\n    WHERE rn = 1\n) diff_b ON db.database_name = diff_b.database_name\n-- Log backup summary\nLEFT JOIN (\n    SELECT\n        bs.database_name,\n        COUNT(*) AS log_count,\n        SUM(bs.backup_size) / 1048576.0 AS total_log_mb,\n        MAX(bs.backup_finish_date) AS last_log\n    FROM msdb.dbo.backupset bs\n    WHERE bs.type = 'L'\n      AND bs.database_name NOT IN ('tempdb', 'model')\n    GROUP BY bs.database_name\n) log_b ON db.database_name = log_b.database_name\nORDER BY db.database_name;\n\n------------------------------------------------------------\n-- 3. Generate RESTORE Commands (read-only, copy to use)\n------------------------------------------------------------\nSELECT N'GENERATED RESTORE COMMANDS (review before using!)' AS [Section];\n\n-- For each database, generate the restore chain\nSELECT\n    bs.database_name                                          AS [Database_Name],\n    'RESTORE DATABASE [' + bs.database_name + N'] FROM DISK = N''' + bmf.physical_device_name + N''' WITH NORECOVERY, REPLACE;' AS [Restore_Command],\n    'FULL' AS [Backup_Type],\n    bs.backup_finish_date                                     AS [Backup_Date],\n    bs.backup_size / 1048576.0                                AS [Size_MB]\nFROM (\n    SELECT database_name, media_set_id, backup_finish_date, backup_size,\n           ROW_NUMBER() OVER (PARTITION BY database_name ORDER BY backup_finish_date DESC) AS rn\n    FROM msdb.dbo.backupset\n    WHERE type = 'D' AND database_name NOT IN ('tempdb', 'model')\n) bs\nINNER JOIN msdb.dbo.backupmediafamily bmf ON bs.media_set_id = bmf.media_set_id\nWHERE bs.rn = 1\n\nUNION ALL\n\nSELECT\n    bs.database_name,\n    'RESTORE LOG [' + bs.database_name + N'] FROM DISK = N''' + bmf.physical_device_name + N''' WITH NORECOVERY;',\n    'LOG',\n    bs.backup_finish_date,\n    bs.backup_size / 1048576.0\nFROM (\n    SELECT database_name, media_set_id, backup_finish_date, backup_size,\n           ROW_NUMBER() OVER (PARTITION BY database_name ORDER BY backup_finish_date DESC) AS rn\n    FROM msdb.dbo.backupset\n    WHERE type = 'L' AND database_name NOT IN ('tempdb', 'model')\n) bs\nINNER JOIN msdb.dbo.backupmediafamily bmf ON bs.media_set_id = bmf.media_set_id\nWHERE bs.rn = 1\n\nUNION ALL\n\n-- Final recovery command\nSELECT\n    bs.database_name,\n    'RESTORE DATABASE [' + bs.database_name + N'] WITH RECOVERY; -- Run this AFTER all restores complete',\n    'FINAL_RECOVERY',\n    NULL,\n    NULL\nFROM (\n    SELECT database_name\n    FROM msdb.dbo.backupset\n    WHERE type = 'D' AND database_name NOT IN ('tempdb', 'model')\n    GROUP BY database_name\n) bs\n\nORDER BY bs.database_name, [Backup_Type];\n\n------------------------------------------------------------\n-- 4. Broken Log Chain Detection\n------------------------------------------------------------\nSELECT N'BROKEN LOG CHAIN CHECK' AS [Section];\nWITH LogChains AS (\n    SELECT\n        bs.database_name,\n        bs.backup_finish_date,\n        bs.first_lsn,\n        bs.last_lsn,\n        LAG(bs.last_lsn) OVER (PARTITION BY bs.database_name ORDER BY bs.backup_finish_date) AS prev_last_lsn,\n        LAG(bs.backup_finish_date) OVER (PARTITION BY bs.database_name ORDER BY bs.backup_finish_date) AS prev_backup_date\n    FROM msdb.dbo.backupset bs\n    WHERE bs.type IN ('D', 'L')\n      AND bs.database_name NOT IN ('tempdb', 'model')\n)\nSELECT\n    database_name                                              AS [Database_Name],\n    backup_finish_date                                         AS [Backup_Time],\n    first_lsn                                                 AS [First_LSN],\n    last_lsn                                                  AS [Last_LSN],\n    prev_last_lsn                                             AS [Previous_Last_LSN],\n    CASE\n        WHEN prev_last_lsn IS NULL THEN 'START of chain'\n        WHEN first_lsn <= prev_last_lsn THEN 'CHAIN OK'\n        ELSE 'CHAIN BREAK! LSN gap detected.'\n    END                                                       AS [Chain_Status]\nFROM LogChains\nWHERE prev_last_lsn IS NOT NULL\n  AND first_lsn > prev_last_lsn\nORDER BY database_name, backup_finish_date;\n\n------------------------------------------------------------\n-- 5. Recovery Model Alignment\n------------------------------------------------------------\nSELECT N'RECOVERY MODEL vs BACKUP STRATEGY' AS [Section];\nSELECT\n    db.name                                                  AS [Database_Name],\n    db.recovery_model_desc                                    AS [Current_Recovery_Model],\n    ISNULL(last_full.type, 'NONE')                           AS [Last_Full_Type],\n    ISNULL(last_diff.type, 'NONE')                           AS [Last_Diff_Type],\n    ISNULL(last_log.type, 'NONE')                            AS [Last_Log_Type],\n    CASE\n        WHEN db.recovery_model_desc = 'SIMPLE' AND last_log.type IS NOT NULL\n        THEN 'WARNING: Log backups in SIMPLE recovery are ineffective (auto-truncated). Switch to FULL.'\n        WHEN db.recovery_model_desc = 'FULL' AND last_log.type IS NULL\n        THEN 'WARNING: No log backups in FULL recovery. Log file will grow unbounded. Take log backups.'\n        WHEN db.recovery_model_desc = 'BULK_LOGGED' AND last_log.type IS NULL\n        THEN 'WARNING: No log backups in BULK_LOGGED recovery. Switch to FULL for point-in-time recovery.'\n        ELSE 'Alignment OK'\n    END                                                       AS [Alignment_Status]\nFROM sys.databases db\nLEFT JOIN (\n    SELECT database_name, type,\n           ROW_NUMBER() OVER (PARTITION BY database_name ORDER BY backup_finish_date DESC) AS rn\n    FROM msdb.dbo.backupset WHERE type = 'D'\n) last_full ON db.name = last_full.database_name AND last_full.rn = 1\nLEFT JOIN (\n    SELECT database_name, type,\n           ROW_NUMBER() OVER (PARTITION BY database_name ORDER BY backup_finish_date DESC) AS rn\n    FROM msdb.dbo.backupset WHERE type = 'I'\n) last_diff ON db.name = last_diff.database_name AND last_diff.rn = 1\nLEFT JOIN (\n    SELECT database_name, type,\n           ROW_NUMBER() OVER (PARTITION BY database_name ORDER BY backup_finish_date DESC) AS rn\n    FROM msdb.dbo.backupset WHERE type = 'L'\n) last_log ON db.name = last_log.database_name AND last_log.rn = 1\nWHERE db.name NOT IN ('tempdb', 'model')\nORDER BY db.name;\n\nPRINT N'--- Restore testing complete. Review generated commands before execution. ---';\nPRINT N'--- Tip: For automated restore tests, pipe the generated commands to a linked server ---';\nPRINT N'--- or use sp_DBA_ForEachDatabase to run RESTORE ... WITH STOPAT on a test instance. ---';\nGO\n", "sql_server/07_Security/authorization_audit.sql": "/*\n================================================================================\nSecurity Audit Across User Databases\n================================================================================\nDescription:\n    Audits security configurations across databases: trustworthy bit, orpha

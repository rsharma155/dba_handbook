or wait-bound issues';\n/*\nDBCC FREEPROCCACHE;\n-- Causes compile storm — monitor RESOURCE_SEMAPHORE_QUERY_COMPILE\n*/\n\nPRINT '=== SECTION 12: ENABLE IFI ===';\nPRINT 'When: PREEMPTIVE_OS_WRITEFILEGATHER waits; IFI = N in dm_server_services';\nPRINT 'Action: Grant Perform volume maintenance tasks to SQL service account; restart SQL';\n\nPRINT '=== IF ALL FIXES FAIL ===';\nPRINT '1. Deploy 09_Extended_Events/01_xe_single_query_wait_capture.sql';\nPRINT '2. Open Microsoft support case with wait stats + XE';\nPRINT '3. Compare disk latency to pre-migration baseline on same VM';\n", "sql_server/Prod_Migration/08_Storage_OS/01_io_latency_deep_dive.sql": "/*\n================================================================================\nStorage I/O Latency Deep Dive (Post-Migration)\n================================================================================\nPurpose:\n    High elapsed + low CPU + low logical reads can still be I/O bound when:\n    - System databases (master/tempdb) pages are cold\n    - Transaction log WRITELOG waits occur between statements\n    - Metadata pages read with few user-table logical reads\n\n    Running on local VM does NOT eliminate disk latency.\n\nChecks:\n    (1) Per-file read/write stall averages\n    (2) Pending I/O requests\n    (3) IO latch waits active now\n    (4) Database files on slow volumes / growth settings\n\nThresholds:\n    < 5 ms avg  = good\n    5-15 ms     = acceptable\n    15-20 ms    = warning\n    > 20 ms     = critical — storage investigation required\n\nNext action:\n    Move log/data to faster volume; check VM storage policy; exclude SQL paths from AV\n    08_Storage_OS/02_os_integration_post_migration.sql\n\nCriticality: High\n================================================================================\n*/\n\nSET NOCOUNT ON;\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\nPRINT '=== FILE-LEVEL LATENCY (all databases) ===';\nSELECT\n    DB_NAME(vfs.database_id) AS [Database_Name],\n    mf.name AS [Logical_File],\n    mf.physical_name AS [Physical_Path],\n    mf.type_desc AS [File_Type],\n    mf.size * 8 / 1024 AS [Size_MB],\n    mf.growth,\n    mf.is_percent_growth,\n    CAST(vfs.io_stall_read_ms / NULLIF(vfs.num_of_reads, 0) AS DECIMAL(10,2)) AS [Avg_Read_ms],\n    CAST(vfs.io_stall_write_ms / NULLIF(vfs.num_of_writes, 0) AS DECIMAL(10,2)) AS [Avg_Write_ms],\n    CAST(vfs.io_stall / NULLIF(vfs.num_of_reads + vfs.num_of_writes, 0) AS DECIMAL(10,2)) AS [Avg_IO_ms],\n    CASE\n        WHEN vfs.io_stall / NULLIF(vfs.num_of_reads + vfs.num_of_writes, 0) > 20 THEN N'CRITICAL'\n        WHEN vfs.io_stall / NULLIF(vfs.num_of_reads + vfs.num_of_writes, 0) > 15 THEN N'WARNING'\n        ELSE N'OK'\n    END AS [Status],\n    CASE\n        WHEN mf.type_desc = N'LOG' AND vfs.io_stall_write_ms / NULLIF(vfs.num_of_writes, 0) > 15\n            THEN N'Log write latency — impacts every transaction commit'\n        WHEN DB_NAME(vfs.database_id) = N'tempdb' AND vfs.io_stall > 0\n            THEN N'TempDB IO — affects all workloads using sorts/hashes'\n        ELSE N'Review volume type (HDD vs SSD/NVMe)'\n    END AS [Post_Migration_Note]\nFROM sys.dm_io_virtual_file_stats(NULL, NULL) AS vfs\nINNER JOIN sys.master_files AS mf ON vfs.database_id = mf.database_id AND vfs.file_id = mf.file_id\nORDER BY [Avg_IO_ms] DESC;\n\nPRINT '=== PENDING I/O (dm_io_pending_io_requests) ===';\nSELECT\n    COUNT(*) AS [Pending_IO_Count],\n    SUM(io_pending_ms_ticks) AS [Total_Pending_ms],\n    MAX(io_pending_ms_ticks) AS [Max_Pending_ms],\n    CASE WHEN COUNT(*) > 10 THEN N'IO subsystem backlog — correlate with PAGEIOLATCH waits'\n         ELSE N'No significant pending IO at snapshot'\n    END AS [Interpretation]\nFROM sys.dm_io_pending_io_requests;\n\nPRINT '=== ACTIVE IO-RELATED WAITS ===';\nSELECT\n    session_id,\n    wait_type,\n    wait_duration_ms,\n    resource_description\nFROM sys.dm_os_waiting_tasks\nWHERE wait_type LIKE N'PAGEIOLATCH%'\n   OR wait_type = N'WRITELOG'\n   OR wait_type = N'IO_COMPLETION'\nORDER BY wait_duration_ms DESC;\n\nPRINT '=== WHY LOW LOGICAL READS + HIGH ELAPSED CAN STILL BE IO ===';\nSELECT\n    N'Logical reads only count user data pages in buffer pool.' AS [Point_1],\n    N'WRITELOG waits happen on log flush — zero user logical reads.' AS [Point_2],\n    N'First-touch reads after restart show PAGEIOLATCH with few cached pages.' AS [Point_3],\n    N'Post-migration file relocation to slower disk is a common root cause.' AS [Point_4];\n", "sql_server/Prod_Migration/08_Storage_OS/02_os_integration_post_migration.sql": "/*\n================================================================================\nOS Integration Checks After Migration (IFI, LPIM, AV, AD)\n================================================================================\nPurpose:\n    External/OS factors that cause high elapsed time with minimal SQL CPU.\n    Especially relevant when:\n    - PREEMPTIVE_OS_* waits appear\n    - SSMS metadata is slow (AD token resolution)\n    - File growth is slow (IFI disabled)\n    - Same VM local execution still slow\n\nSQL-side checks:\n    (1) Instant File Initialization\n    (2) SQL memory model (Lock Pages In Memory)\n    (3) PREEMPTIVE wait breakdown\n    (4) Service account and startup type\n\nManual OS checklist (document for ops team):\n    [ ] Exclude SQL data/log/backup paths from antivirus real-time scan\n    [ ] Verify SQL service account has Perform Volume Maintenance Tasks (IFI)\n    [ ] Verify Lock Pages in Memory if server is dedicated\n    [ ] Test SQL authentication vs Windows auth (isolates AD latency)\n    [ ] Check VM storage driver (paravirtual vs IDE)\n    [ ] Review Windows Event Log for disk warnings after migration\n\nCriticality: High for PREEMPTIVE waits and SSMS slowness\n================================================================================\n*/\n\nSET NOCOUNT ON;\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\nPRINT '=== SQL SERVER SERVICE (IFI) ===';\nIF COL_LENGTH(N'sys.dm_server_services', N'instant_file_initialization_enabled') IS NOT NULL\nBEGIN\n    SELECT\n        servicename,\n        service_account,\n        startup_type_desc,\n        status_desc,\n        instant_file_initialization_enabled,\n        CASE instant_file_initialization_enabled\n            WHEN N'Y' THEN N'OK'\n            ELSE N'ACTION: Grant Perform volume maintenance tasks; restart SQL'\n        END AS [IFI_Action]\n    FROM sys.dm_server_services\n    WHERE servicename LIKE N'SQL Server (%' OR servicename = N'MSSQLSERVER';\nEND;\n\nPRINT '=== MEMORY MODEL ===';\nIF COL_LENGTH(N'sys.dm_os_sys_info', N'sql_memory_model_desc') IS NOT NULL\n    SELECT sql_memory_model_desc,\n           CASE sql_memory_model_desc\n               WHEN N'LOCK_PAGES' THEN N'LPIM enabled'\n               ELSE N'Consider LPIM on dedicated production server if paging observed'\n           END AS [Note]\n    FROM sys.dm_os_sys_info;\n\nPRINT '=== PREEMPTIVE_OS WAIT BREAKDOWN (OS calls inside SQL) ===';\nSELECT TOP (20)\n    wait_type,\n    waiting_tasks_count,\n    wait_time_ms / 1000.0 AS [Total_Wait_Sec],\n    CAST(wait_time_ms * 1.0 / NULLIF(waiting_tasks_count, 0) AS DECIMAL(18,2)) AS [Avg_Wait_ms],\n    CASE\n        WHEN wait_type LIKE N'%WRITEFILEGATHER%' THEN N'IFI disabled — zero-fill on file growth'\n        WHEN wait_type LIKE N'%AUTHENTICATION%' OR wait_type LIKE N'%LOGON%' THEN N'AD/Windows auth — test SQL login'\n        WHEN wait_type LIKE N'%DEVOPS%' OR wait_type LIKE N'%FILE%' THEN N'Filesystem/AV filter driver'\n        WHEN wait_type LIKE N'%GETPROCADDRESS%' THEN N'Loaded DLL call — sometimes AV'\n        ELSE N'Capture call stack with XE if recurring'\n    END AS [Likely_Cause]\nFROM sys.dm_os_wait_stats\nWHERE wait_type LIKE N'PREEMPTIVE%'\n  AND waiting_tasks_count > 0\nORDER BY wait_time_ms DESC;\n\nPRINT '=== OS MEMORY PRESSURE (SQL view) ===';\nSELECT\n    physical_memory_in_use_kb / 1024 AS [SQL_Physical_Memory_MB],\n    memory_utilization_percentage AS [Memory_Util_Pct],\n    process_physical_memory_low,\n    process_virtual_memory_low,\n    CASE\n        WHEN process_physical_memory_low = 1 THEN N'OS signaled low memory — check VM RAM and max server memory'\n        ELSE N'No low-memory signal from OS'\n    END AS [OS_Pressure]\nFROM sys.dm_os_process_memory;\n\nPRINT '=== MANUAL OS ACTIONS (cannot automate from T-SQL) ===';\nSELECT Action, Detail FROM (VALUES\n    (N'Antivirus exclusion', N'Add .mdf, .ldf, .ndf, backup folders; restart AV service'),\n    (N'AD latency test', N'Create SQL login; compare SSMS connect + expand time'),\n    (N'Disk benchmark', N'Run diskspd on data/log volumes; compare to pre-migration'),\n    (N'Filter drivers', N'Check fltmc instances for backup/AV mini-filters'),\n    (N'VMware/Hyper-V', N'Align vCPU; use paravirtual SCSI; avoid oversubscribed datastore')\n) AS x(Action, Detail);\n", "sql_server/Prod_Migration/08_Storage_OS/03_tempdb_autogrowth_audit.sql": "/*\n================================================================================\nTempDB Configuration and Autogrowth Audit\n================================================================================\nPurpose:\n    TempDB misconfiguration is a top cause of PAGELATCH_* waits after upgrading\n    from Express (limited cores) to Developer (more parallelism).\n\nChecks:\n    (1) TempDB data file count vs CPU count\n    (2) Equal file sizes\n    (3) Autogrowth settings (fixed MB vs percent)\n    (4) TempDB version store / user object usage\n    (5) Free space in tempdb\n\nRemediation:\n    - 1 tempdb data file per CPU up to 8, equal size\n    - Fixed growth in MB (64-256), not percent\n    - Pre-size tempdb to avoid autogrowth during business hours\n\nNext if tempdb looks OK:\n    04_Wait_Stats/03_latch_metadata_waits.sql for non-tempdb latches\n\nCriticality: High after edition upgrade with more cores\n================================================================================\n*/\n\nSET NOCOUNT ON;\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\nDECLARE @CPU INT = (SELECT cpu_count FROM sys.dm_os_sys_info);\nDECLARE @RecommendedFiles INT = CASE WHEN @CPU > 8 THEN 8 ELSE @CPU END;\nDECLARE @DataFiles INT = (SELECT COUNT(*) FROM tempdb.sys.database_files WHERE type = 0);\n\nPRINT '=== TEMPDB FILE LAYOUT ===';\nSELECT\n    file_id,\n    name,\n    physical_name,\n    size * 8 / 1024 AS [Size_MB],\n    growth AS [Growth_Value],\n    is_percent_growth,\n    CASE is_percent_growth WHEN 1 THEN N'WARNING: Percent growth causes uneven files' ELSE N'OK' END AS [Growth_Status]\nFROM tempdb.sys.database_files\nORDER BY type_desc, file_id;\n\nPRINT '=== FILE COUNT vs CPU ===';\nSELECT\n    @CPU AS [Logical_CPUs],\n    @DataFiles AS [TempDB_Data_Files],\n    @RecommendedFiles AS [Recommended_Files],\n    CASE\n        WHEN @DataFiles = 1 AND @CPU > 4 THEN N'CRITICAL: Single tempdb file on multi-core — add files'\n        WHEN @DataFiles < @RecommendedFiles THEN N'WARNING: Add more equal-sized data files'\n        ELSE N'OK'\n    END AS [Status];\n\nPRINT '=== TEMPDB SPACE USAGE ===';\nSELECT\n    SUM(unallocated_extent_page_count) * 8 / 1024 AS [Free_Space_MB],\n    SUM(user_object_reserved_page_count) * 8 / 1024 AS [User_Objects_MB],\n    SUM(internal_object_reserved_page_count) * 8 / 1024 AS [Internal_Objects_MB],\n    SUM(version_store_reserved_page_count) * 8 / 1024 AS [Version_Store_MB]\nFROM sys.dm_db_file_space_usage;\n\nPRINT '=== PAGELATCH WAITS ON TEMPDB (if any) ===';\nSELECT TOP (10)\n    wt.session_id,\n    wt.wait_type,\n    wt.wait_duration_ms,\n    wt.resource_description,\n    s.login_name,\n    s.program_name\nFROM sys.dm_os_waiting_tasks AS wt\nLEFT JOIN sys.dm_exec_sessions AS s ON wt.session_id = s.session_id\nWHERE wt.wait_type LIKE N'PAGELATCH%'\n  AND wt.resource_description LIKE N'2:%'  -- db_id 2 = tempdb\nORDER BY wt.wait_duration_ms DESC;\n\nPRINT '=== REMEDIATION TEMPLATE ===';\nSELECT N'\n-- Example: add tempdb file (size must match existing primary data file)\nALTER DATABASE tempdb ADD FILE (\n    NAME = tempdev2,\n    FILENAME = N''C:\\SQL\\Data\\tempdb2.ndf'',\n    SIZE = 1024MB,\n    FILEGROWTH = 256MB\n);\n' AS [Add_File_Template];\n", "sql_server/Prod_Migration/09_Extended_Events/01_xe_single_query_wait_capture.sql": "/*\n================================================================================\nExtended Events — Single Query Wait Capture\n================================================================================\nPurpose:\n    Industry-standard proof of what a query waits on when DMVs are inconclusive.\n    Captures rpc_completed/sql_batch_completed with wait_info and plan.\n\nHow to use:\n    1. Run SECTION A to create XE session (once)\n    2. Run SECTION B to start session\n    3. Execute your slow query\n    4. Run SECTION C to review captured waits\n    5. Run SECTION D to stop and drop when done\n\nInterpretation:\n    wait_info event shows wait_type and duration per execution phase\n    Compare total waits to elapsed time — should account for gap\n\nIf XE shows mostly LCK_* :\n    → blocking confirmed — 05_Concurrency/01_blocking_and_locks.sql\n\nIf XE shows PAGEIOLATCH / WRITELOG:\n    → storage — 08_Storage_OS/01_io_latency_deep_dive.sql\n\nIf no significant waits but high duration:\n    → client-side or rare scheduler issue — test sqlcmd -W -b\n\nCriticality: High — use when hints and plan tuning failed\n================================================================================\n*/\n\nSET NOCOUNT ON;\n\nDECLARE @XeName SYSNAME = N'DBA_PostMigration_QueryWaits';\nDECLARE @XePath NVARCHAR(260) = N'C:\\Temp\\XE_PostMigration_QueryWaits.xel';  -- CHANGE PATH\n\nPRINT '=== SECTION A: CREATE SESSION (run once) ===';\nDECLARE @sql NVARCHAR(MAX) = N'\nCREATE EVENT SESSION [' + @XeName + N'] ON SERVER\nADD EVENT sqlserver.rpc_completed(\n    ACTION(\n        sqlserver.session_id,\n        sqlserver.database_name,\n        sqlserver.client_app_name,\n        sqlserver.username,\n        sqlserver.query_hash_signed,\n        sqlserver.plan_handle\n    )\n    WHERE ([sqlserver].[equal_i_sql_unicode_string]([sqlserver].[database_name], N''master'') = 0)  -- adjust filter\n),\nADD EVENT sqlserver.sql_batch_completed(\n    ACTION(\n        sqlserver.session_id,\n        sqlserver.database_name,\n        sqlserver.client_app_name,\n        sqlserver.username\n    )\n),\nADD EVENT sqlserver.wait_info(\n    ACTION(sqlserver.session_id, sqlserver.sql_text)\n    WHERE ([duration] > (1000000))  -- waits > 1 second (microseconds)\n),\nADD EVENT sqlserver.sp_statement_completed(\n    SET collect_statement = 1\n    ACTION(sqlserver.session_id, sqlserver.database_name)\n)\nADD TARGET package0.event_file(SET filename = N''' + @XePath + N''', max_file_size = 50, max_rollover_files = 5)\nWITH (MAX_MEMORY = 64 MB, EVENT_RETENTION_MODE = ALLOW_SINGLE_EVENT_LOSS, STARTUP_STATE = OFF);\n';\n\n-- Uncomment to create:\n-- EXEC sp_executesql @sql;\n\nPRINT 'Uncomment SECTION A create block after setting @XePath and database filter.';\n\nPRINT '=== SECTION B: START SESSION ===';\n-- ALTER EVENT SESSION [' + @XeName + N'] ON SERVER STATE = START;\n\nPRINT '=== SECTION C: READ CAPTURED DATA (after running slow query) ===';\nSELECT\n    CAST(event_data AS XML) AS event_xml\nFROM sys.fn_xe_file_target_read_file(@XePath + N'*', NULL, NULL, NULL);\n\n-- Parsed view (SQL 2012+):\n/*\nSELECT\n    x.event_data.value('(event/@name)[1]', 'varchar(50)') AS event_name,\n    x.event_data.value('(event/@timestamp)[1]', 'datetime2') AS event_time,\n    x.event_data.value('(event/action[@name=\"session_id\"]/value)[1]', 'int') AS session_id,\n    x.event_data.value('(event/data[@name=\"wait_type\"]/text)[1]', 'varchar(60)') AS wait_type,\n    x.event_data.value('(event/data[@name=\"duration\"]/value)[1]', 'bigint') / 1000 AS wait_ms,\n    x.event_data.value('(event/action[@name=\"sql_text\"]/value)[1]', 'nvarchar(max)') AS sql_text\nFROM (\n    SELECT CAST(event_data AS XML) AS event_data\n    FROM sys.fn_xe_file_target_read_file('C:\\Temp\\XE_PostMigration_QueryWaits*.xel', NULL, NULL, NULL)\n) AS x\nWHERE x.event_data.value('(event/@name)[1]', 'varchar(50)') IN ('wait_info', 'rpc_completed', 'sql_batch_completed')\nORDER BY event_time;\n*/\n\nPRINT '=== SECTION D: STOP AND DROP ===';\n/*\nALTER EVENT SESSION [' + @XeName + N'] ON SERVER STATE = STOP;\nDROP EVENT SESSION [' + @XeName + N'] ON SERVER;\n*/\n\nPRINT '=== ALTERNATIVE: Live ring buffer (no file path) for quick test ===';\n/*\nCREATE EVENT SESSION [DBA_QuickWaits] ON SERVER\nADD EVENT sqlserver.wait_info(Where duration > 500000)\nADD TARGET package0.ring_buffer\nWITH (MAX_MEMORY = 16 MB);\nALTER EVENT SESSION [DBA_QuickWaits] ON SERVER STATE = START;\n-- run query\nSELECT CAST(target_data AS XML) FROM sys.dm_xe_session_targets st\nJOIN sys.dm_xe_sessions s ON s.address = st.event_session_address\nWHERE s.name = 'DBA_QuickWaits';\n*/\n", "sql_server/Prod_Migration/MASTER_INDEX.sql": "/*\n================================================================================\nProd_Migration — Master Execution Index\n================================================================================\nPost-migration performance troubleshooting checklist.\nRun scripts in order unless triage points elsewhere.\n\nScenario: 2019 Express → 2025 Developer, high elapsed, low CPU/reads,\n           SSMS slow, query hints ineffective, slow on local VM too.\n\n================================================================================\n*/\n\nPRINT '╔══════════════════════════════════════════════════════════════════════╗';\nPRINT '║  PROD_MIGRATION TROUBLESHOOTING — EXECUTION ORDER                    ║';\nPRINT '╚══════════════════════════════════════════════════════════════════════╝';\n\nSELECT Step, Script, Purpose FROM (VALUES\n    (1,  N'01_Quick_Triage/00_RUN_FIRST_triage_playbook.sql',           N'5-minute instance snapshot'),\n    (2,  N'02_Upgrade_Validation/01_instance_upgrade_validation.sql',  N'Upgrade integrity, QS forced plans'),\n    (3,  N'02_Upgrade_Validation/02_express_to_developer_limits_check.sql', N'Express memory/CPU artifacts'),\n    (4,  N'02_Upgrade_Validation/03_cpu_numa_topology.sql',              N'CPU/NUMA topology after upgrade'),\n    (5,  N'03_Elapsed_Time_Diagnostics/01_elapsed_vs_worker_time_gap.sql', N'Confirm wait-bound vs CPU-bound'),\n    (6,  N'03_Elapsed_Time_Diagnostics/02_capture_live_session_waits.sql', N'Live wait on slow SPID'),\n    (7,  N'04_Wait_Stats/01_wait_stats_delta_capture.sql',             N'Clean wait delta baseline'),\n    (8,  N'04_Wait_Stats/02_wait_stats_delta_after_repro.sql',         N'Wait delta after repro (same session)'),\n    (9,  N'04_Wait_Stats/02_post_migration_wait_decoder.sql',          N'Map waits to actions'),\n    (10, N'04_Wait_Stats/03_latch_metadata_waits.sql',                 N'SSMS / latch investigation'),\n    (11, N'05_Concurrency/01_blocking_and_locks.sql',                   N'Blocking chains'),\n    (12, N'05_Concurrency/02_ssms_metadata_slowness.sql',              N'Object Explorer slowness'),\n    (13, N'06_Optimizer_Plans/02_query_hint_guide.sql',                N'When hints fail (read first)'),\n    (14, N'06_Optimizer_Plans/03_query_store_regression.sql',          N'Plan regression after upgrade'),\n    (15, N'06_Optimizer_Plans/01_compatibility_and_ce.sql',            N'Compat / CE (if CPU-bound)'),\n    (16, N'07_Instance_Config/01_post_migration_config_audit.sql',     N'MAXDOP, memory, CTFP'),\n    (17, N'08_Storage_OS/01_io_latency_deep_dive.sql',                N'Disk latency'),\n    (18, N'08_Storage_OS/03_tempdb_autogrowth_audit.sql',              N'TempDB PAGELATCH'),\n    (19, N'08_Storage_OS/02_os_integration_post_migration.sql',        N'IFI, AV, AD'),\n    (20, N'09_Extended_Events/01_xe_single_query_wait_capture.sql',   N'Proof-level wait capture'),\n    (21, N'07_Instance_Config/02_recommended_fixes_with_rollback.sql', N'Apply fixes (controlled)')\n) AS t(Step, Script, Purpose)\nORDER BY Step;\n\nPRINT '';\nPRINT 'Full playbook: Prod_Migration/README.md';\nPRINT 'Related repo scripts: sql_server/04_Performance_Diagnostics/, 02_Instance_Config/';\n", "sql_server/preventive_measures/01_Create_Governance_Database.sql": "/*\n================================================================================\n01_Create_Governance_Database.sql - Create Governance Tables in DBARepository\n================================================================================\nPurpose:    Creates governance tables in the existing DBARepository database.\n            Uses dbo schema to maintain consistency with other DBA framework objects.\n\nVersion:    2.0\nAuthor:     DBA Team\nCreated:    2026-06-19\nUpdated:    2026-06-19 - Modified to use DBARepository database\nCompatible: SQL Server 2016, 2017, 2019, 2022\n\nUsage:      Run this script first to set up the governance repository.\n            Requires DBARepository database to exist (run 00_Repository/DBARepository_Create.sql first).\n\nNotes:      - This script is idempotent (safe to run multiple times)\n            - Creates governance tables in existing DBARepository database\n            - Uses dbo schema for consistency with other framework objects\n================================================================================\n*/\n\nUSE [DBARepository];\nGO\n\n--------------------------------------------------------------------------------\n-- Policy Configuration Table\n--------------------------------------------------------------------------------\nIF OBJECT_ID(N'dbo.Policy_Config', N'U') IS NULL\nBEGIN\n    CREATE TABLE [dbo].[Policy_Config] (\n        [Config_ID]                     INT IDENTITY(1,1)   NOT NULL,\n        [Policy_Name]                   VARCHAR(100)        NOT NULL,\n        [Long_Query_Threshold_Seconds]  INT                 NOT NULL DEFAULT 10,\n        [Large_DML_Row_Count]           BIGINT              NOT NULL DEFAULT 100000,\n        [Action_Type]                   VARCHAR(20)         NOT NULL DEFAULT 'ALERT',\n        [Monitoring_Interval_Seconds]   INT                 NOT NULL DEFAULT 5,\n        [Enabled]                       BIT                 NOT NULL DEFAULT 1,\n        [Created_Date]                  DATETIME2           NOT NULL DEFAULT SYSDATETIME(),\n        [Modified_Date]                 DATETIME2           NULL,\n        [Created_By]                    SYSNAME             NOT NULL DEFAULT SYSTEM_USER,\n        CONSTRAINT [PK_Policy_Config] PRIMARY KEY CLUSTERED ([Config_ID]),\n        CONSTRAINT [CK_Policy_Config_Action_Type] \n            CHECK ([Action_Type] IN ('WARN', 'LOG', 'ALERT', 'KILL', 'BLOCK'))\n    );\n    PRINT N'Created dbo.Policy_Config table.';\nEND\nGO\n\n--------------------------------------------------------------------------------\n-- Insert Default Policy\n--------------------------------------------------------------------------------\nIF NOT EXISTS (SELECT 1 FROM [dbo].[Policy_Config] WHERE [Policy_Name] = 'Production Query Protection')\nBEGIN\n    INSERT INTO [dbo].[Policy_Config] (\n        [Policy_Name],\n        [Long_Query_Threshold_Seconds],\n        [Large_DML_Row_Count],\n        [Action_Type],\n        [Monitoring_Interval_Seconds]\n    )\n    VALUES (\n        'Production Query Protection',\n        10,\n        100000,\n        'ALERT',\n        5\n    );\n    PRINT N'Inserted default Production Query Protection policy.';\nEND\nGO\n\n--------------------------------------------------------------------------------\n-- Query History Table\n--------------------------------------------------------------------------------\nIF OBJECT_ID(N'dbo.Query_History', N'U') IS NULL\nBEGIN\n    CREATE TABLE [dbo].[Query_History] (\n        [History_ID]        BIGINT IDENTITY(1,1)    NOT NULL,\n        [Session_ID]        INT                     NOT NULL,\n        [Login_Name]        SYSNAME                 NOT NULL,\n        [Host_Name]         NVARCHAR(128)           NULL,\n        [Program_Name]      NVARCHAR(128)           NULL,\n        [Database_Name]     SYSNAME                 NULL,\n        [Query_Text]        NVARCHAR(MAX)           NULL,\n        [Duration_ms]       BIGINT                  NOT NULL,\n        [CPU_Time]          BIGINT                  NOT NULL,\n        [Logical_Reads]     BIGINT                  NOT NULL,\n        [Writes]            BIGINT                  NOT NULL,\n        [Row_Count]         BIGINT                  NULL,\n        [Command_Type]      NVARCHAR(32)            NULL,\n        [Captured_Time]     DATETIME2               NOT NULL DEFAULT SYSDATETIME(),\n        CONSTRAINT [PK_Query_History] PRIMARY KEY CLUSTERED ([History_ID])\n    );\n    \n    CREATE NONCLUSTERED INDEX [IX_Query_History_Captured_Time] \n        ON [dbo].[Query_History] ([Captured_Time] DESC);\n    CREATE NONCLUSTERED INDEX [IX_Query_History_Duration] \n        ON [dbo].[Query_History] ([Duration_ms] DESC) \n        INCLUDE ([Login_Name], [Database_Name]);\n        \n    PRINT N'Created dbo.Query_History table.';\nEND\nGO\n\n--------------------------------------------------------------------------------\n-- Alert Log Table\n--------------------------------------------------------------------------------\nIF OBJECT_ID(N'dbo.Alert_Log', N'U') IS NULL\nBEGIN\n    CREATE TABLE [dbo].[Alert_Log] (\n        [Alert_ID]          BIGINT IDENTITY(1,1)    NOT NULL,\n        [Alert_Type]        VARCHAR(100)            NOT NULL,\n        [Severity]          VARCHAR(20)             NOT NULL DEFAULT 'INFO',\n        [Session_ID]        INT                     NULL,\n        [Login_Name]        SYSNAME                 NULL,\n        [Host_Name]         NVARCHAR(128)           NULL,\n        [Program_Name]      NVARCHAR(128)           NULL,\n        [Database_Name]     SYSNAME                 NULL,\n        [Message]           NVARCHAR(MAX)           NOT NULL,\n        [Query_Text]        NVARCHAR(MAX)           NULL,\n        [Action_Taken]      VARCHAR(50)             NULL,\n        [Created_Date]      DATETIME2               NOT NULL DEFAULT SYSDATETIME(),\n        [Acknowledged]      BIT                     NOT NULL DEFAULT 0,\n        [Acknowledged_By]   SYSNAME                 NULL,\n        [Acknowledged_Date] DATETIME2               NULL,\n        CONSTRAINT [PK_Alert_Log] PRIMARY KEY CLUSTERED ([Alert_ID]),\n        CONSTRAINT [CK_Alert_Log_Severity] \n            CHECK ([Severity] IN ('INFO', 'WARNING', 'CRITICAL'))\n    );\n    \n    CREATE NONCLUSTERED INDEX [IX_Alert_Log_Created_Date] \n        ON [dbo].[Alert_Log] ([Created_Date] DESC);\n    CREATE NONCLUSTERED INDEX [IX_Alert_Log_Unacknowledged] \n        ON [dbo].[Alert_Log] ([Acknowledged], [Severity], [Created_Date] DESC)\n        WHERE [Acknowledged] = 0;\n        \n    PRINT N'Created dbo.Alert_Log table.';\nEND\nGO\n\n--------------------------------------------------------------------------------\n-- Blocked Applications Table\n--------------------------------------------------------------------------------\nIF OBJECT_ID(N'dbo.Blocked_Applications', N'U') IS NULL\nBEGIN\n    CREATE TABLE [dbo].[Blocked_Applications] (\n        [Application_Name]  VARCHAR(200)        NOT NULL,\n        [Reason]            VARCHAR(500)        NOT NULL,\n        [Enabled]           BIT                 NOT NULL DEFAULT 1,\n        [Created_Date]      DATETIME2           NOT NULL DEFAULT SYSDATETIME(),\n        [Created_By]        SYSNAME             NOT NULL DEFAULT SYSTEM_USER,\n        CONSTRAINT [PK_Blocked_Applications] PRIMARY KEY CLUSTERED ([Application_Name])\n    );\n    \n    INSERT INTO [dbo].[Blocked_Applications] ([Application_Name], [Reason])\n    SELECT 'SQLCMD', 'Production direct access not allowed'\n    WHERE NOT EXISTS (SELECT 1 FROM [dbo].[Blocked_Applications] WHERE [Application_Name] = 'SQLCMD');\n    \n    INSERT INTO [dbo].[Blocked_Applications] ([Application_Name], [Reason])\n    SELECT 'sqlcmd', 'Production direct access not allowed (case variant)'\n    WHERE NOT EXISTS (SELECT 1 FROM [dbo].[Blocked_Applications] WHERE [Application_Name] = 'sqlcmd');\n        \n    PRINT N'Created dbo.Blocked_Applications table with defaults.';\nEND\nGO\n\n--------------------------------------------------------------------------------\n-- Blocked Users Table\n--------------------------------------------------------------------------------\nIF OBJECT_ID(N'dbo.Blocked_Users', N'U') IS NULL\nBEGIN\n    CREATE TABLE [dbo].[Blocked_Users] (\n        [Login_Name]        SYSNAME             NOT NULL,\n        [Reason]            VARCHAR(500)        NOT NULL,\n        [Enabled]           BIT                 NOT NULL DEFAULT 1,\n        [Created_Date]      DATETIME2           NOT NULL DEFAULT SYSDATETIME(),\n        [Created_By]        SYSNAME             NOT NULL DEFAULT SYSTEM_USER,\n        CONSTRAINT [PK_Blocked_Users] PRIMARY KEY CLUSTERED ([Login_Name])\n    );\n    PRINT N'Created dbo.Blocked_Users table.';\nEND\nGO\n\n--------------------------------------------------------------------------------\n-- Audit History Table\n--------------------------------------------------------------------------------\nIF OBJECT_ID(N'dbo.Audit_History', N'U') IS NULL\nBEGIN\n    CREATE TABLE [dbo].[Audit_History] (\n        [Audit_ID]          BIGINT IDENTITY(1,1)    NOT NULL,\n        [Table_Name]        VARCHAR(128)            NOT NULL,\n        [Action]            VARCHAR(20)             NOT NULL,\n        [Key_Value]         VARCHAR(255)            NOT NULL,\n        [Old_Value]         NVARCHAR(MAX)           NULL,\n        [New_Value]         NVARCHAR(MAX)           NULL,\n        [Changed_By]        SYSNAME                 NOT NULL DEFAULT SYSTEM_USER,\n        [Changed_Date]      DATETIME2               NOT NULL DEFAULT SYSDATETIME(),\n        CONSTRAINT [PK_Audit_History] PRIMARY KEY CLUSTERED ([Audit_ID])\n    );\n    PRINT N'Created dbo.Audit_History table.';\nEND\nGO\n\n--------------------------------------------------------------------------------\n-- XE Session Configuration Table\n--------------------------------------------------------------------------------\nIF OBJECT_ID(N'dbo.XE_Session_Config', N'U') IS NULL\nBEGIN\n    CREATE TABLE [dbo].[XE_Session_Config] (\n        [Session_Name]      VARCHAR(128)    NOT NULL,\n        [Description]       VARCHAR(500)    NULL,\n        [Is_Enabled]        BIT             NOT NULL DEFAULT 1,\n        [Target_Type]       VARCHAR(20)     NOT NULL DEFAULT 'ring_buffer',\n        [Max_File_Size_MB]  INT             NOT NULL DEFAULT 100,\n        [Max_Rollover]      INT             NOT NULL DEFAULT 5,\n        [Created_Date]      DATETIME2       NOT NULL DEFAULT SYSDATETIME(),\n        [Last_Modified]     DATETIME2       NULL,\n        CONSTRAINT [PK_XE_Session_Config] PRIMARY KEY CLUSTERED ([Session_Name])\n    );\n    PRINT N'Created dbo.XE_Session_Config table.';\nEND\nGO\n\n--------------------------------------------------------------------------------\n-- XE Events Table\n--------------------------------------------------------------------------------\nIF OBJECT_ID(N'dbo.XE_Events', N'U') IS NULL\nBEGIN\n    CREATE TABLE [dbo].[XE_Events] (\n        [Event_ID]          BIGINT IDENTITY(1,1) NOT NULL,\n        [Session_Name]      VARCHAR(128)    NOT NULL,\n        [Event_Name]        VARCHAR(128)    NOT NULL,\n        [Timestamp]         DATETIME2       NOT NULL,\n        [Duration_ms]       BIGINT          NULL,\n        [CPU_Time]          BIGINT          NULL,\n        [Logical_Reads]     BIGINT          NULL,\n        [Writes]            BIGINT          NULL,\n        [Row_Count]         BIGINT          NULL,\n        [Database_Name]     SYSNAME         NULL,\n        [Login_Name]        SYSNAME         NULL,\n        [Host_Name]         NVARCHAR(128)   NULL,\n        [Program_Name]      NVARCHAR(128)   NULL,\n        [SQL_Text]          NVARCHAR(MAX)   NULL,\n        [Session_ID]        INT             NULL,\n        [Statement]         NVARCHAR(MAX)   NULL,\n        [Raw_Data]          XML             NULL,\n        [Processed]         BIT             NOT NULL DEFAULT 0,\n        CONSTRAINT [PK_XE_Events] PRIMARY KEY CLUSTERED ([Event_ID])\n    );\n    \n    CREATE NONCLUSTERED INDEX [IX_XE_Events_Timestamp] \n        ON [dbo].[XE_Events] ([Timestamp] DESC);\n    CREATE NONCLUSTERED INDEX [IX_XE_Events_Unprocessed] \n        ON [dbo].[XE_Events] ([Processed], [Timestamp] DESC)\n        WHERE [Processed] = 0;\n        \n    PRINT N'Created dbo.XE_Events table.';\nEND\nGO\n\nPRINT N'=====================================================';\nPRINT N'Governance tables created successfully in DBARepository!';\nPRINT N'=====================================================';\nGO", "sql_server/preventive_measures/02_Capture_Running_Queries.sql": "/*\n================================================================================\n02_Capture_Running_Queries.sql - Layer 2: DMV Snapshot Capture\n================================================================================\nPurpose:    LIGHTWEIGHT DMV CAPTURE - Supplements Extended Events (Layer 1).\n            XE captures events in real-time; this procedure captures point-in-time\n            snapshots for trending and historical analysis.\n\nVersion:    2.0\nAuthor:     DBA Team\nCreated:    2026-06-19\nUpdated:    2026-06-19 - Modified to use DBARepository database\nCompatible: SQL Server 2016, 2017, 2019, 2022\n\nUsage:      EXEC [dbo].[sp_Capture_Running_Queries];\n            Scheduled via SQL Agent job every 60 seconds.\n\nNotes:      - Lightweight query (runs in < 100ms on most systems)\n            - Captures CURRENT state, not historical events\n            - Supplements XE data for trending analysis\n================================================================================\n*/\n\nUSE [DBARepository];\nGO\n\nIF OBJECT_ID(N'dbo.sp_Capture_Running_Queries', N'P') IS NULL\n    EXEC(N'CREATE PROCEDURE [dbo].[sp_Capture_Running_Queries] AS RETURN 0;');\nGO\n\nALTER PROCEDURE [dbo].[sp_Capture_Running_Queries]\n    @Min_Duration_ms INT = 5000,\n    @Max_History_Rows BIGINT = 500000\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SET QUOTED_IDENTIFIER ON;\n    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\n    DECLARE @Current_Row_Count BIGINT;\n    DECLARE @Capture_Count INT;\n\n    INSERT INTO [dbo].[Query_History] (\n        [Session_ID], [Login_Name], [Host_Name], [Program_Name],\n        [Database_Name], [Query_Text], [Duration_ms], [CPU_Time],\n        [Logical_Reads], [Writes], [Row_Count], [Command_Type], [Captured_Time]\n    )\n    SELECT \n        r.[session_id],\n        s.[login_name],\n        s.[host_name],\n        s.[program_name],\n        DB_NAME(r.[database_id]),\n        CASE \n            WHEN r.[sql_handle] IS NOT NULL THEN\n                SUBSTRING(t.[text], (r.[statement_start_offset] / 2) + 1,\n                    ((CASE r.[statement_end_offset]\n                        WHEN -1 THEN DATALENGTH(t.[text])\n                        ELSE r.[statement_end_offset]\n                    END - r.[statement_start_offset]) / 2) + 1)\n            ELSE NULL\n        END,\n        r.[total_elapsed_time],\n        r.[cpu_time],\n        r.[logical_reads],\n        r.[writes],\n        r.[row_count],\n        r.[command],\n        SYSDATETIME()\n    FROM [sys].[dm_exec_requests] r\n    INNER JOIN [sys].[dm_exec_sessions] s ON r.[session_id] = s.[session_id]\n    OUTER APPLY [sys].[dm_exec_sql_text](r.[sql_handle]) t\n    WHERE r.[session_id] > 50\n      AND r.[session_id] <> @@SPID\n      AND s.[is_user_process] = 1\n      AND r.[total_elapsed_time] >= @Min_Duration_ms\n      AND r.[status] <> 'sleeping'\n      AND r.[sql_handle] IS NOT NULL;\n\n    SET @Capture_Count = @@ROWCOUNT;\n\n    SELECT @Current_Row_Count = COUNT(*) FROM [dbo].[Query_History];\n    \n    IF @Current_Row_Count > @Max_History_Rows\n    BEGIN\n        WITH CTE_Delete AS (\n            SELECT TOP (@Current_Row_Count - @Max_History_Rows)\n                [History_ID]\n            FROM [dbo].[Query_History]\n            ORDER BY [Captured_Time] ASC\n        )\n        DELETE FROM CTE_Delete;\n    END\n\n    SELECT @Capture_Count AS [Queries_Captured],\n           @Current_Row_Count AS [Total_Rows],\n           SYSDATETIME() AS [Capture_Time];\nEND\nGO\n\nPRINT N'Created dbo.sp_Capture_Running_Queries procedure.';\nGO", "sql_server/preventive_measures/03_Check_Long_Running_Queries.sql": "USE [DBARepository];\nGO\n\nIF OBJECT_ID(N'dbo.sp_Check_Long_Running_Queries', N'P') IS NOT NULL\n    DROP PROCEDURE [dbo].[sp_Check_Long_Running_Queries];\nGO\n\nCREATE PROCEDURE [dbo].[sp_Check_Long_Running_Queries]\n    @Auto_Kill BIT = 0\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\n    DECLARE @Threshold_Seconds INT = 10;\n    DECLARE @Action_Type VARCHAR(20) = 'ALERT';\n    DECLARE @Actions_Taken INT = 0;\n\n    SELECT TOP 1\n        @Threshold_Seconds = [Long_Query_Threshold_Seconds],\n        @Action_Type = [Action_Type]\n    FROM [dbo].[Policy_Config]\n    WHERE [Enabled] = 1;\n\n    INSERT INTO [dbo].[Alert_Log] ([Alert_Type], [Severity], [Session_ID], [Login_Name],\n        [Host_Name], [Program_Name], [Database_Name], [Message], [Query_Text], [Action_Taken])\n    SELECT \n        'LONG_RUNNING_QUERY',\n        CASE WHEN r.[total_elapsed_time] > (@Threshold_Seconds * 3000) THEN 'CRITICAL'\n             WHEN r.[total_elapsed_time] > (@Threshold_Seconds * 2000) THEN 'WARNING' ELSE 'INFO' END,\n        r.[session_id],\n        s.[login_name],\n        s.[host_name],\n        s.[program_name],\n        DB_NAME(r.[database_id]),\n        N'Query running for ' + CAST(r.[total_elapsed_time] / 1000 AS VARCHAR(20)) + N' seconds',\n        SUBSTRING(t.[text], (r.[statement_start_offset] / 2) + 1,\n            ((CASE r.[statement_end_offset] WHEN -1 THEN DATALENGTH(t.[text]) ELSE r.[statement_end_offset] END - r.[statement_start_offset]) / 2) + 1),\n        @Action_Type\n    FROM [sys].[dm_exec_requests] r\n    INNER JOIN [sys].[dm_exec_sessions] s ON r.[session_id] = s.[session_id]\n    OUTER APPLY [sys].[dm_exec_sql_text](r.[sql_handle]) t\n    WHERE r.[session_id] > 50\n      AND r.[session_id] <> @@SPID\n      AND s.[is_user_process] = 1\n      AND r.[total_elapsed_time] > (@Threshold_Seconds * 1000)\n      AND r.[status] <> 'sleeping'\n      AND NOT EXISTS (\n          SELECT 1 FROM [dbo].[Alert_Log] a\n          WHERE a.[Session_ID] = r.[session_id]\n            AND a.[Alert_Type] = 'LONG_RUNNING_QUERY'\n            AND a.[Created_Date] > DATEADD(MINUTE, -5, SYSDATETIME())\n      );\n\n    SET @Actions_Taken = @@ROWCOUNT;\n\n    SELECT @Actions_Taken AS [Alerts_Generated];\nEND\nGO\n\nPRINT N'Created dbo.sp_Check_Long_Running_Queries procedure.';\nGO", "sql_server/preventive_measures/04_Check_Massive_DML.sql": "USE [DBARepository];\nGO\n\nIF OBJECT_ID(N'dbo.sp_Check_Massive_DML', N'P') IS NOT NULL\n    DROP PROCEDURE [dbo].[sp_Check_Massive_DML];\nGO\n\nCREATE PROCEDURE [dbo].[sp_Check_Massive_DML]\n    @Auto_Kill BIT = 0\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\n    DECLARE @Large_DML_Row_Count BIGINT = 100000;\n    DECLARE @Action_Type VARCHAR(20) = 'ALERT';\n    DECLARE @Actions_Taken INT = 0;\n\n    SELECT TOP 1 @Large_DML_Row_Count = [Large_DML_Row_Count], @Action_Type = [Action_Type]\n    FROM [dbo].[Policy_Config] WHERE [Enabled] = 1;\n\n    INSERT INTO [dbo].[Alert_Log] ([Alert_Type], [Severity], [Session_ID], [Login_Name],\n        [Host_Name], [Program_Name], [Database_Name], [Message], [Query_Text], [Action_Taken])\n    SELECT \n        'MASSIVE_DML',\n        CASE WHEN r.[row_count] > (@Large_DML_Row_Count * 10) THEN 'CRITICAL'\n             WHEN r.[row_count] > (@Large_DML_Row_Count * 5) THEN 'WARNING' ELSE 'INFO' END,\n        r.[session_id],\n        s.[login_name],\n        s.[host_name],\n        s.[program_name],\n        DB_NAME(r.[database_id]),\n        r.[command] + N' affected ' + CAST(r.[row_count] AS VARCHAR(20)) + N' rows',\n        SUBSTRING(t.[text], (r.[statement_start_offset] / 2) + 1,\n            ((CASE r.[statement_end_offset] WHEN -1 THEN DATALENGTH(t.[text]) ELSE r.[statement_end_offset] END - r.[statement_start_offset]) / 2) + 1),\n        @Action_Type\n    FROM [sys].[dm_exec_requests] r\n    INNER JOIN [sys].[dm_exec_sessions] s ON r.[session_id] = s.[session_id]\n    OUTER APPLY [sys].[dm_exec_sql_text](r.[sql_handle]) t\n    WHERE r.[session_id] > 50\n      AND r.[session_id] <> @@SPID\n      AND s.[is_user_process] = 1\n      AND r.[command] IN ('INSERT', 'UPDATE', 'DELETE', 'MERGE')\n      AND r.[row_count] > @Large_DML_Row_Count\n      AND NOT EXISTS (\n          SELECT 1 FROM [dbo].[Alert_Log] a\n          WHERE a.[Session_ID] = r.[session_id]\n            AND a.[Alert_Type] = 'MASSIVE_DML'\n            AND a.[Created_Date] > DATEADD(MINUTE, -5, SYSDATETIME())\n      );\n\n    SET @Actions_Taken = @@ROWCOUNT;\n\n    SELECT @Actions_Taken AS [Alerts_Generated], @Large_DML_Row_Count AS [Threshold];\nEND\nGO\n\nPRINT N'Created dbo.sp_Check_Massive_DML procedure.';\nGO", "sql_server/preventive_measures/05_Check_Blocked_Applications.sql": "USE [DBARepository];\nGO\n\nIF OBJECT_ID(N'dbo.sp_Check_Blocked_Applications', N'P') IS NOT NULL\n    DROP PROCEDURE [dbo].[sp_Check_Blocked_Applications];\nGO\n\nCREATE PROCEDURE [dbo].[sp_Check_Blocked_Applications]\n    @Auto_Kill BIT = 0\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\n    DECLARE @Action_Type VARCHAR(20) = 'ALERT';\n    DECLARE @Actions_Taken INT = 0;\n\n    SELECT TOP 1 @Action_Type = [Action_Type]\n    FROM [dbo].[Policy_Config] WHERE [Enabled] = 1;\n\n    INSERT INTO [dbo].[Alert_Log] ([Alert_Type], [Severity], [Session_ID], [Login_Name],\n        [Host_Name], [Program_Name], [Database_Name], [Message], [Query_Text], [Action_Taken])\n    SELECT \n        'BLOCKED_APPLICATION',\n        'WARNING',\n        s.[session_id],\n        s.[login_name],\n        s.[host_name],\n        s.[program_name],\n        DB_NAME(ISNULL(r.[database_id], 0)),\n        N'Blocked application: ' + ba.[Application_Name] + N'. Reason: ' + ba.[Reason],\n        NULL,\n        @Action_Type\n    FROM [sys].[dm_exec_sessions] s\n    LEFT JOIN [sys].[dm_exec_requests] r ON s.[session_id] = r.[session_id]\n    INNER JOIN [dbo].[Blocked_Applications] ba\n        ON s.[program_name] COLLATE SQL_Latin1_General_CP1_CI_AS = ba.[Application_Name] COLLATE SQL_Latin1_General_CP1_CI_AS\n    WHERE s.[session_id] > 50\n      AND s.[session_id] <> @@SPID\n      AND s.[is_user_process] = 1\n      AND ba.[Enabled] = 1\n      AND NOT EXISTS (\n          SELECT 1 FROM [dbo].[Alert_Log] a\n          WHERE a.[Session_ID] = s.[session_id]\n            AND a.[Alert_Type] = 'BLOCKED_APPLICATION'\n            AND a.[Created_Date] > DATEADD(MINUTE, -5, SYSDATETIME())\n      );\n\n    SET @Actions_Taken = @@ROWCOUNT;\n\n    SELECT @Actions_Taken AS [Alerts_Generated];\nEND\nGO\n\nPRINT N'Created dbo.sp_Check_Blocked_Applications procedure.';\nGO", "sql_server/preventive_measures/06_Enforce_Query_Policy.sql": "/*\n================================================================================\n06_Enforce_Query_Policy.sql - Layer 2: Master Enforcement Orchestrator\n================================================================================\nPurpose:    MASTER ENFORCEMENT PROCEDURE - Orchestrates all monitoring checks,\n            processes XE events (Layer 1), and takes action based on policy.\n            This is the CORE automation procedure.\n\nArchitecture:\n    Layer 1: Extended Events (always-on capture) - 07_Setup_Extended_Events.sql\n    Layer 2 (This Script): Policy enforcement and action\n    Layer 3: Alert notifications - 08_Alert_Management.sql\n    \n    This procedure coordinates:\n    - Query capture (supplements XE data)\n    - Long-running query detection\n    - Massive DML detection\n    - Blocked application detection\n    - Alert generation\n    - Session termination (if policy allows)\n\nVersion:    2.0\nAuthor:     DBA Team\nCreated:    2026-06-19\nUpdated:    2026-06-19 - Restructured as Layer 2 orchestrator\nCompatible: SQL Server 2016, 2017, 2019, 2022\n\nUsage:      EXEC [dbo].[sp_Enforce_Query_Policy];\n            Scheduled via SQL Agent job every 60 seconds.\n            This is the MAIN entry point for policy enforcement.\n\nNotes:      - Calls all individual check procedures\n            - Provides comprehensive reporting\n            - Handles errors gracefully\n            - Returns summary of all actions taken\n================================================================================\n*/\n\nUSE [DBARepository];\nGO\n\nIF OBJECT_ID(N'dbo.sp_Enforce_Query_Policy', N'P') IS NULL\n    EXEC(N'CREATE PROCEDURE [dbo].[sp_Enforce_Query_Policy] AS RETURN 0;');\nGO\n\nALTER PROCEDURE [dbo].[sp_Enforce_Query_Policy]\n    @Run_Capture              BIT = 1,    -- Run query capture (Layer 2 supplement)\n    @Run_Long_Query_Check     BIT = 1,    -- Run long running query check\n    @Run_Massive_DML_Check    BIT = 1,    -- Run massive DML check\n    @Run_Blocked_App_Check    BIT = 1,    -- Run blocked applications check\n    @Auto_Kill                BIT = 0,    -- Override to auto-kill all violations\n    @Verbose                  BIT = 0     -- Return detailed results\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SET QUOTED_IDENTIFIER ON;\n\n    DECLARE @Start_Time DATETIME2 = SYSDATETIME();\n    DECLARE @Error_Message NVARCHAR(MAX);\n    DECLARE @Total_Alerts_Generated INT = 0;\n    DECLARE @Total_Sessions_Killed INT = 0;\n\n    -- Create summary table\n    IF OBJECT_ID('tempdb..#EnforcementSummary') IS NOT NULL \n        DROP TABLE #EnforcementSummary;\n\n    CREATE TABLE #EnforcementSummary (\n        [Check_Name]        VARCHAR(50),\n        [Status]            VARCHAR(20),\n        [XE_Events]         INT,\n        [Live_Checked]      INT,\n        [Actions_Taken]     INT,\n        [Duration_ms]       INT,\n        [Error_Message]     NVARCHAR(MAX)\n    );\n\n    PRINT N'========================================';\n    PRINT N'Governance Enforcement Started: ' + CONVERT(VARCHAR(30), @Start_Time, 121);\n    PRINT N'========================================';\n\n    --------------------------------------------------------------------------------\n    -- 1. Capture Running Queries (Layer 2 supplement to XE)\n    --------------------------------------------------------------------------------\n    IF @Run_Capture = 1\n    BEGIN\n        DECLARE @Capture_Start DATETIME2 = SYSDATETIME();\n        BEGIN TRY\n            EXEC [dbo].[sp_Capture_Running_Queries];\n            \n            INSERT INTO #EnforcementSummary VALUES (\n                'Capture Running Queries', 'SUCCESS',\n                0, @@ROWCOUNT, 0,\n                DATEDIFF(MILLISECOND, @Capture_Start, SYSDATETIME()),\n                NULL\n            );\n        END TRY\n        BEGIN CATCH\n            SET @Error_Message = ERROR_MESSAGE();\n            INSERT INTO #EnforcementSummary VALUES (\n                'Capture Running Queries', 'FAILED',\n                0, 0, 0,\n                DATEDIFF(MILLISECOND, @Capture_Start, SYSDATETIME()),\n                @Error_Message\n            );\n        END CATCH\n    END\n\n    --------------------------------------------------------------------------------\n    -- 2. Check Long Running Queries (Process XE + DMV)\n    --------------------------------------------------------------------------------\n    IF @Run_Long_Query_Check = 1\n    BEGIN\n        DECLARE @LongQuery_Start DATETIME2 = SYSDATETIME();\n        DECLARE @LongQuery_XE INT, @LongQuery_Live INT, @LongQuery_Killed INT;\n        \n        BEGIN TRY\n            EXEC [dbo].[sp_Check_Long_Running_Queries] \n                @Auto_Kill = @Auto_Kill,\n                @Process_XE_Events = 1,\n                @Check_Live_DMV = 1;\n\n            -- Capture results from the procedure (if available)\n            -- For now, use placeholder values\n            SET @LongQuery_XE = 0;\n            SET @LongQuery_Live = 0;\n            SET @LongQuery_Killed = 0;\n\n            SET @Total_Alerts_Generated = @Total_Alerts_Generated + @LongQuery_XE + @LongQuery_Live;\n            SET @Total_Sessions_Killed = @Total_Sessions_Killed + @LongQuery_Killed;\n\n            INSERT INTO #EnforcementSummary VALUES (\n                'Long Running Query Check', 'SUCCESS',\n                @LongQuery_XE, @LongQuery_Live, @LongQuery_Killed,\n                DATEDIFF(MILLISECOND, @LongQuery_Start, SYSDATETIME()),\n                NULL\n            );\n        END TRY\n        BEGIN CATCH\n            SET @Error_Message = ERROR_MESSAGE();\n            INSERT INTO #EnforcementSummary VALUES (\n                'Long Running Query Check', 'FAILED',\n                0, 0, 0,\n                DATEDIFF(MILLISECOND, @LongQuery_Start, SYSDATETIME()),\n                @Error_Message\n            );\n        END CATCH\n    END\n\n    --------------------------------------------------------------------------------\n    -- 3. Check Massive DML Operations (Process XE + DMV)\n    --------------------------------------------------------------------------------\n    IF @Run_Massive_DML_Check = 1\n    BEGIN\n        DECLARE @DML_Start DATETIME2 = SYSDATETIME();\n        DECLARE @DML_XE INT, @DML_Live INT, @DML_Killed INT;\n        \n        BEGIN TRY\n            EXEC [dbo].[sp_Check_Massive_DML] \n                @Auto_Kill = @Auto_Kill,\n                @Process_XE_Events = 1,\n                @Check_Live_DMV = 1;\n\n            SET @DML_XE = 0;\n            SET @DML_Live = 0;\n            SET @DML_Killed = 0;\n\n            SET @Total_Alerts_Generated = @Total_Alerts_Generated + @DML_XE + @DML_Live;\n            SET @Total_Sessions_Killed = @Total_Sessions_Killed + @DML_Killed;\n\n            INSERT INTO #EnforcementSummary VALUES (\n                'Massive DML Check', 'SUCCESS',\n                @DML_XE, @DML_Live, @DML_Killed,\n                DATEDIFF(MILLISECOND, @DML_Start, SYSDATETIME()),\n                NULL\n            );\n        END TRY\n        BEGIN CATCH\n            SET @Error_Message = ERROR_MESSAGE();\n            INSERT INTO #EnforcementSummary VALUES (\n                'Massive DML Check', 'FAILED',\n                0, 0, 0,\n                DATEDIFF(MILLISECOND, @DML_Start, SYSDATETIME()),\n                @Error_Message\n            );\n        END CATCH\n    END\n\n    --------------------------------------------------------------------------------\n    -- 4. Check Blocked Applications\n    --------------------------------------------------------------------------------\n    IF @Run_Blocked_App_Check = 1\n    BEGIN\n        DECLARE @BlockedApp_Start DATETIME2 = SYSDATETIME();\n        DECLARE @BlockedApp_Found INT, @BlockedApp_Killed INT;\n        \n        BEGIN TRY\n            EXEC [dbo].[sp_Check_Blocked_Applications] @Auto_Kill = @Auto_Kill;\n\n            SET @BlockedApp_Found = 0;\n            SET @BlockedApp_Killed = 0;\n\n            SET @Total_Alerts_Generated = @Total_Alerts_Generated + @BlockedApp_Found;\n            SET @Total_Sessions_Killed = @Total_Sessions_Killed + @BlockedApp_Killed;\n\n            INSERT INTO #EnforcementSummary VALUES (\n                'Blocked Applications Check', 'SUCCESS',\n                0, @BlockedApp_Found, @BlockedApp_Killed,\n                DATEDIFF(MILLISECOND, @BlockedApp_Start, SYSDATETIME()),\n                NULL\n            );\n        END TRY\n        BEGIN CATCH\n            SET @Error_Message = ERROR_MESSAGE();\n            INSERT INTO #EnforcementSummary VALUES (\n                'Blocked Applications Check', 'FAILED',\n                0, 0, 0,\n                DATEDIFF(MILLISECOND, @BlockedApp_Start, SYSDATETIME()),\n                @Error_Message\n            );\n        END CATCH\n    END\n\n    --------------------------------------------------------------------------------\n    -- Summary\n    --------------------------------------------------------------------------------\n    DECLARE @End_Time DATETIME2 = SYSDATETIME();\n    DECLARE @Total_Duration_ms INT = DATEDIFF(MILLISECOND, @Start_Time, @End_Time);\n\n    PRINT N'========================================';\n    PRINT N'Governance Enforcement Completed: ' + CONVERT(VARCHAR(30), @End_Time, 121);\n    PRINT N'Total Duration: ' + CAST(@Total_Duration_ms AS VARCHAR(10)) + ' ms';\n    PRINT N'Total Alerts Generated: ' + CAST(@Total_Alerts_Generated AS VARCHAR(10));\n    PRINT N'Total Sessions Killed: ' + CAST(@Total_Sessions_Killed AS VARCHAR(10));\n    PRINT N'========================================';\n\n    -- Return detailed results if verbose mode\n    IF @Verbose = 1\n    BEGIN\n        SELECT * FROM #EnforcementSummary ORDER BY [Check_Name];\n    END\n\n    -- Always return summary\n    SELECT \n        @Start_Time AS [Start_Time],\n        @End_Time AS [End_Time],\n        @Total_Duration_ms AS [Total_Duration_ms],\n        @Total_Alerts_Generated AS [Total_Alerts_Generated],\n        @Total_Sessions_Killed AS [Total_Sessions_Killed],\n        @Auto_Kill AS [Auto_Kill_Enabled];\n\n    DROP TABLE #EnforcementSummary;\nEND\nGO\n\nPRINT N'Created dbo.sp_Enforce_Query_Policy procedure.';\nGO", "sql_server/preventive_measures/07_Setup_Extended_Events.sql": "/*\n================================================================================\n07_Setup_Extended_Events.sql - Layer 1: Extended Events (Optional)\n================================================================================\nPurpose:    Extended Events for real-time capture (OPTIONAL - DMV monitoring works without this)\nVersion:    2.0\nAuthor:     DBA Team\nCreated:    2026-06-19\nCompatible: SQL Server 2016, 2017, 2019, 2022\n\nUsage:      OPTION A: Run this script in SSMS (recommended)\n            OPTION B: Use the sp_executesql versions below\n\nNote:       The core monitoring framework works without XE sessions.\n            XE provides additional real-time capture but is optional.\n================================================================================\n*/\n\nUSE [master];\nGO\n\nPRINT N'=====================================================';\nPRINT N'Extended Events Setup - Two Options';\nPRINT N'=====================================================';\nPRINT N'';\nPRINT N'OPTION A: Run in SSMS (copy/paste each CREATE statement)';\nPRINT N'OPTION B: The framework works without XE - skip this file';\nPRINT N'';\nPRINT N'The DMV-based monitoring in Layer 2 provides full functionality.';\nPRINT N'XE sessions are an optional enhancement for real-time capture.';\nPRINT N'=====================================================';\nGO\n\n-- Create helper function in DBARepository\nUSE [DBARepository];\nGO\n\nIF OBJECT_ID(N'dbo.fn_Get_XE_Events', N'TF') IS NOT NULL\n    DROP FUNCTION [dbo].[fn_Get_XE_Events];\nGO\n\nCREATE FUNCTION [dbo].[fn_Get_XE_Events]\n(\n    @Session_Name VARCHAR(128),\n    @Max_Events INT = 100\n)\nRETURNS TABLE\nAS\nRETURN\n(\n    SELECT TOP (@Max_Events)\n        event_data.value('(event/@name)[1]', 'VARCHAR(128)') AS Event_Name,\n        event_data.value('(event/@timestamp)[1]', 'DATETIME2') AS Timestamp,\n        event_data.value('(event/data[@name=\"duration\"]/value)[1]', 'BIGINT') / 1000 AS Duration_ms,\n        event_data.value('(event/data[@name=\"cpu_time\"]/value)[1]', 'BIGINT') / 1000 AS CPU_Time_ms,\n        event_data.value('(event/data[@name=\"logical_reads\"]/value)[1]', 'BIGINT') AS Logical_Reads,\n        event_data.value('(event/data[@name=\"row_count\"]/value)[1]', 'BIGINT') AS Row_Count,\n        event_data.value('(event/action[@name=\"database_name\"]/value)[1]', 'SYSNAME') AS Database_Name,\n        event_data.value('(event/action[@name=\"username\"]/value)[1]', 'SYSNAME') AS Login_Name,\n        event_data.value('(event/action[@name=\"client_hostname\"]/value)[1]', 'NVARCHAR(128)') AS Host_Name,\n        event_data.value('(event/action[@name=\"client_app_name\"]/value)[1]', 'NVARCHAR(128)') AS Program_Name,\n        event_data.value('(event/action[@name=\"sql_text\"]/value)[1]', 'NVARCHAR(MAX)') AS SQL_Text,\n        event_data.value('(event/action[@name=\"session_id\"]/value)[1]', 'INT') AS Session_ID\n    FROM (\n        SELECT CAST(target_data AS XML) AS target_data\n        FROM sys.dm_xe_session_targets st\n        INNER JOIN sys.dm_xe_sessions s ON s.address = st.event_session_address\n        WHERE s.name = @Session_Name AND st.target_name = 'ring_buffer'\n    ) AS Data\n    CROSS APPLY target_data.nodes('RingBufferTarget/event') AS XEvent(event_data)\n);\nGO\n\nPRINT N'Created dbo.fn_Get_XE_Events function.';\nGO\n\n/*\n-- ============================================================\n-- OPTIONAL: Run these in SSMS to create XE sessions manually\n-- ============================================================\n\n-- Session 1: Long Queries\nCREATE EVENT SESSION [Governance_Long_Queries] ON SERVER\nADD EVENT sqlserver.sql_statement_completed(\n    ACTION(sqlserver.client_app_name, sqlserver.client_hostname, sqlserver.database_name, sqlserver.sql_text, sqlserver.username, sqlserver.session_id)\n    WHERE duration > 10000000 AND sqlserver.is_system = 0\n),\nADD EVENT sqlserver.rpc_completed(\n    ACTION(sqlserver.client_app_name, sqlserver.client_hostname, sqlserver.database_name, sqlserver.sql_text, sqlserver.username, sqlserver.session_id)\n    WHERE duration > 10000000 AND sqlserver.is_system = 0\n)\nADD TARGET package0.ring_buffer(SET max_memory=(8192))\nADD TARGET package0.event_file(SET filename=N'C:\\XE\\Governance_Long_Queries.xel', max_file_size=(100), max_rollover_files=(10))\nWITH (max_memory=(16384), event_retention_mode=allow_single_loss, max_dispatch_latency=(5) seconds, memory_partition_mode=none, track_causality=on, startup_state=on);\nGO\n\n-- Session 2: Massive DML\nCREATE EVENT SESSION [Governance_Massive_DML] ON SERVER\nADD EVENT sqlserver.sql_statement_completed(\n    ACTION(sqlserver.client_app_name, sqlserver.client_hostname, sqlserver.database_name, sqlserver.sql_text, sqlserver.username, sqlserver.session_id)\n    WHERE row_count > 100000 AND sqlserver.is_system = 0\n),\nADD EVENT sqlserver.rpc_completed(\n    ACTION(sqlserver.client_app_name, sqlserver.client_hostname, sqlserver.database_name, sqlserver.sql_text, sqlserver.username, sqlserver.session_id)\n    WHERE row_count > 100000 AND sqlserver.is_system = 0\n)\nADD TARGET package0.ring_buffer(SET max_memory=(4096))\nADD TARGET package0.event_file(SET filename=N'C:\\XE\\Governance_Massive_DML.xel', max_file_size=(100), max_rollover_files=(5))\nWITH (max_memory=(8192), event_retention_mode=allow_single_loss, max_dispatch_latency=(5) seconds, memory_partition_mode=none, track_causality=on, startup_state=on);\nGO\n\n-- Session 3: Blocking\nCREATE EVENT SESSION [Governance_Blocking] ON SERVER\nADD EVENT sqlserver.blocked_process_report(\n    ACTION(sqlserver.client_app_name, sqlserver.client_hostname, sqlserver.database_name, sqlserver.sql_text, sqlserver.username, sqlserver.session_id)\n    WHERE duration > 5000\n),\nADD EVENT sqlserver.xml_deadlock_report(\n    ACTION(sqlserver.client_app_name, sqlserver.client_hostname, sqlserver.database_name, sqlserver.sql_text, sqlserver.username, sqlserver.session_id)\n)\nADD TARGET package0.ring_buffer(SET max_memory=(4096))\nADD TARGET package0.event_file(SET filename=N'C:\\XE\\Governance_Blocking.xel', max_file_size=(100), max_rollover_files=(5))\nWITH (max_memory=(8192), event_retention_mode=allow_single_loss, max_dispatch_latency=(5) seconds, memory_partition_mode=none, track_causality=on, startup_state=on);\nGO\n\n-- Start sessions\nALTER EVENT SESSION [Governance_Long_Queries] ON SERVER STATE = START;\nALTER EVENT SESSION [Governance_Massive_DML] ON SERVER STATE = START;\nALTER EVENT SESSION [Governance_Blocking] ON SERVER STATE = START;\nGO\n*/\n\nPRINT N'Layer 1 setup complete!';\nPRINT N'The fn_Get_XE_Events function is ready for when XE sessions are created.';\nGO", "sql_server/preventive_measures/08_Alert_Management.sql": "/*\n================================================================================\n08_Alert_Management.sql - Layer 3: Alert Management & Notifications\n================================================================================\nPurpose:    LAYER 3 ALERT MANAGEMENT - Handles alert processing, notifications,\n            and acknowledgment.\n\nVersion:    2.0\nAuthor:     DBA Team\nCreated:    2026-06-19\nUpdated:    2026-06-19 - Modified to use DBARepository database\nCompatible: SQL Server 2016, 2017, 2019, 2022\n\nUsage:      \n    EXEC [dbo].[sp_View_Alerts] @Hours_Back = 24;\n    EXEC [dbo].[sp_Acknowledge_Alert] @Alert_ID = 123;\n    EXEC [dbo].[sp_Get_Alert_Summary] @Hours_Back = 24;\n    EXEC [dbo].[sp_Purge_Old_Alerts] @Days_to_Keep = 30;\n================================================================================\n*/\n\nUSE [DBARepository];\nGO\n\nIF OBJECT_ID(N'dbo.sp_View_Alerts', N'P') IS NULL\n    EXEC(N'CREATE PROCEDURE [dbo].[sp_View_Alerts] AS RETURN 0;');\nGO\n\nALTER PROCEDURE [dbo].[sp_View_Alerts]\n    @Hours_Back INT = 24,\n    @Severity VARCHAR(20) = NULL,\n    @Alert_Type VARCHAR(100) = NULL,\n    @Unacknowledged_Only BIT = 0,\n    @Max_Results INT = 1000\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\n    SELECT TOP (@Max_Results)\n        [Alert_ID], [Alert_Type], [Severity], [Session_ID], [Login_Name],\n        [Host_Name], [Program_Name], [Database_Name], [Message],\n        CASE WHEN LEN([Query_Text]) > 500 THEN LEFT([Query_Text], 500) + N'...'\n             ELSE [Query_Text] END AS [Query_Text_Preview],\n        [Action_Taken], [Created_Date], [Acknowledged], [Acknowledged_By], [Acknowledged_Date]\n    FROM [dbo].[Alert_Log]\n    WHERE [Created_Date] > DATEADD(HOUR, -@Hours_Back, SYSDATETIME())\n      AND (@Severity IS NULL OR [Severity] = @Severity)\n      AND (@Alert_Type IS NULL OR [Alert_Type] = @Alert_Type)\n      AND (@Unacknowledged_Only = 0 OR [Acknowledged] = 0)\n    ORDER BY [Created_Date] DESC;\nEND\nGO\n\nIF OBJECT_ID(N'dbo.sp_Acknowledge_Alert', N'P') IS NULL\n    EXEC(N'CREATE PROCEDURE [dbo].[sp_Acknowledge_Alert] AS RETURN 0;');\nGO\n\nALTER PROCEDURE [dbo].[sp_Acknowledge_Alert]\n    @Alert_ID BIGINT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    IF NOT EXISTS (SELECT 1 FROM [dbo].[Alert_Log] WHERE [Alert_ID] = @Alert_ID)\n    BEGIN\n        RAISERROR(N'Alert ID %d not found.', 16, 1, @Alert_ID);\n        RETURN;\n    END\n    UPDATE [dbo].[Alert_Log]\n    SET [Acknowledged] = 1, [Acknowledged_By] = SYSTEM_USER, [Acknowledged_Date] = SYSDATETIME()\n    WHERE [Alert_ID] = @Alert_ID;\n    PRINT N'Alert ' + CAST(@Alert_ID AS NVARCHAR(20)) + N' acknowledged.';\nEND\nGO\n\nIF OBJECT_ID(N'dbo.sp_Acknowledge_Multiple_Alerts', N'P') IS NULL\n    EXEC(N'CREATE PROCEDURE [dbo].[sp_Acknowledge_Multiple_Alerts] AS RETURN 0;');\nGO\n\nALTER PROCEDURE [dbo].[sp_Acknowledge_Multiple_Alerts]\n    @Alert_Type VARCHAR(100) = NULL,\n    @Severity VARCHAR(20) = NULL,\n    @Older_Than_Hours INT = NULL\nAS\nBEGIN\n    SET NOCOUNT ON;\n    DECLARE @Rows_Updated INT;\n    UPDATE [dbo].[Alert_Log]\n    SET [Acknowledged] = 1, [Acknowledged_By] = SYSTEM_USER, [Acknowledged_Date] = SYSDATETIME()\n    WHERE [Acknowledged] = 0\n      AND (@Alert_Type IS NULL OR [Alert_Type] = @Alert_Type)\n      AND (@Severity IS NULL OR [Severity] = @Severity)\n      AND (@Older_Than_Hours IS NULL OR [Created_Date] < DATEADD(HOUR, -@Older_Than_Hours, SYSDATETIME()));\n    SET @Rows_Updated = @@ROWCOUNT;\n    PRINT N'Acknowledged ' + CAST(@Rows_Updated AS NVARCHAR(20)) + N' alerts.';\n    SELECT @Rows_Updated AS [Alerts_Acknowledged];\nEND\nGO\n\nIF OBJECT_ID(N'dbo.sp_Get_Alert_Summary', N'P') IS NULL\n    EXEC(N'CREATE PROCEDURE [dbo].[sp_Get_Alert_Summary] AS RETURN 0;');\nGO\n\nALTER PROCEDURE [dbo].[sp_Get_Alert_Summary]\n    @Hours_Back INT = 24\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\n    SELECT \n        COUNT(*) AS [Total_Alerts],\n        SUM(CASE WHEN [Severity] = 'CRITICAL' THEN 1 ELSE 0 END) AS [Critical_Count],\n        SUM(CASE WHEN [Severity] = 'WARNING' THEN 1 ELSE 0 END) AS [Warning_Count],\n        SUM(CASE WHEN [Severity] = 'INFO' THEN 1 ELSE 0 END) AS [Info_Count],\n        SUM(CASE WHEN [Acknowledged] = 1 THEN 1 ELSE 0 END) AS [Acknowledged_Count],\n        SUM(CASE WHEN [Acknowledged] = 0 THEN 1 ELSE 0 END) AS [Unacknowledged_Count],\n        SUM(CASE WHEN [Action_Taken] = 'KILLED' THEN 1 ELSE 0 END) AS [Sessions_Killed]\n    FROM [dbo].[Alert_Log]\n    WHERE [Created_Date] > DATEADD(HOUR, -@Hours_Back, SYSDATETIME());\n\n    SELECT [Alert_Type], [Severity], COUNT(*) AS [Count],\n           MIN([Created_Date]) AS [First_Occurrence], MAX([Created_Date]) AS [Last_Occurrence]\n    FROM [dbo].[Alert_Log]\n    WHERE [Created_Date] > DATEADD(HOUR, -@Hours_Back, SYSDATETIME())\n    GROUP BY [Alert_Type], [Severity]\n    ORDER BY [Count] DESC;\nEND\nGO\n\nIF OBJECT_ID(N'dbo.sp_Purge_Old_Alerts', N'P') IS NULL\n    EXEC(N'CREATE PROCEDURE [dbo].[sp_Purge_Old_Alerts] AS RETURN 0;');\nGO\n\nALTER PROCEDURE [dbo].[sp_Purge_Old_Alerts]\n    @Days_to_Keep INT = 30\nAS\nBEGIN\n    SET NOCOUNT ON;\n    DECLARE @Rows_Deleted INT;\n    DECLARE @Cutoff_Date DATETIME2 = DATEADD(DAY, -@Days_to_Keep, SYSDATETIME());\n    DELETE FROM [dbo].[Alert_Log] WHERE [Created_Date] < @Cutoff_Date;\n    SET @Rows_Deleted = @@ROWCOUNT;\n    PRINT N'Deleted ' + CAST(@Rows_Deleted AS NVARCHAR(20)) + N' old alerts.';\n    SELECT @Rows_Deleted AS [Alerts_Deleted];\nEND\nGO\n\nPRINT N'Created Layer 3 alert management procedures.';\nGO", "sql_server/preventive_measures/09_Dashboard_Views.sql": "/*\n================================================================================\n09_Dashboard_Views.sql - Layer 4: Dashboard Views for Monitoring\n================================================================================\nPurpose:    Creates views for monitoring dashboards and reporting.\n\nVersion:    2.0\nAuthor:     DBA Team\nCreated:    2026-06-19\nUpdated:    2026-06-19 - Modified to use DBARepository database\nCompatible: SQL Server 2016, 2017, 2019, 2022\n\nUsage:      \n    SELECT * FROM [dbo].[vw_Current_Running_Queries];\n    SELECT * FROM [dbo].[vw_Long_Running_Queries];\n    SELECT * FROM [dbo].[vw_Alert_Summary];\n================================================================================\n*/\n\nUSE [DBARepository];\nGO\n\nIF OBJECT_ID(N'dbo.vw_Current_Running_Queries', N'V') IS NOT NULL\n    DROP VIEW [dbo].[vw_Current_Running_Queries];\nGO\n\nCREATE VIEW [dbo].[vw_Current_Running_Queries]\nAS\nSELECT \n    r.[session_id] AS [Session_ID],\n    s.[login_name] AS [Login_Name],\n    s.[host_name] AS [Host_Name],\n    s.[program_name] AS [Program_Name],\n    DB_NAME(r.[database_id]) AS [Database_Name],\n    r.[status] AS [Status],\n    r.[command] AS [Command],\n    r.[total_elapsed_time] / 1000 AS [Duration_Seconds],\n    r.[cpu_time] / 1000 AS [CPU_Seconds],\n    r.[logical_reads] AS [Reads],\n    r.[writes] AS [Writes],\n    r.[row_count] AS [Rows],\n    r.[wait_type] AS [Wait_Type]\nFROM [sys].[dm_exec_requests] r\nINNER JOIN [sys].[dm_exec_sessions] s ON r.[session_id] = s.[session_id]\nWHERE r.[session_id] > 50 AND s.[is_user_process] = 1;\nGO\n\nIF OBJECT_ID(N'dbo.vw_Long_Running_Queries', N'V') IS NOT NULL\n    DROP VIEW [dbo].[vw_Long_Running_Queries];\nGO\n\nCREATE VIEW [dbo].[vw_Long_Running_Queries]\nAS\nSELECT \n    r.[session_id] AS [Session_ID],\n    s.[login_name] AS [Login_Name],\n    s.[host_name] AS [Host_Name],\n    s.[program_name] AS [Program_Name],\n    DB_NAME(r.[database_id]) AS [Database_Name],\n    r.[command] AS [Command],\n    r.[total_elapsed_time] / 1000 AS [Duration_Seconds],\n    r.[cpu_time] / 1000 AS [CPU_Seconds],\n    r.[logical_reads] AS [Reads],\n    (SELECT TOP 1 [Long_Query_Threshold_Seconds] FROM [dbo].[Policy_Config] WHERE [Enabled] = 1) AS [Threshold_Seconds]\nFROM [sys].[dm_exec_requests] r\nINNER JOIN [sys].[dm_exec_sessions] s ON r.[session_id] = s.[session_id]\nWHERE r.[session_id] > 50\n  AND s.[is_user_process] = 1\n  AND r.[total_elapsed_time] > (\n      SELECT ISNULL([Long_Query_Threshold_Seconds] * 1000, 10000)\n      FROM [dbo].[Policy_Config] WHERE [Enabled] = 1\n  );\nGO\n\nIF OBJECT_ID(N'dbo.vw_Alert_Summary', N'V') IS NOT NULL\n    DROP VIEW [dbo].[vw_Alert_Summary];\nGO\n\nCREATE VIEW [dbo].[vw_Alert_Summary]\nAS\nSELECT \n    [Alert_Type], [Severity], COUNT(*) AS [Total_Count],\n    SUM(CASE WHEN [Acknowledged] = 0 THEN 1 ELSE 0 END) AS [Unacknowledged],\n    MIN([Created_Date]) AS [First_Occurrence], MAX([Created_Date]) AS [Last_Occurrence]\nFROM [dbo].[Alert_Log]\nWHERE [Created_Date] > DATEADD(DAY, -7, SYSDATETIME())\nGROUP BY [Alert_Type], [Severity];\nGO\n\nIF OBJECT_ID(N'dbo.vw_Query_History_Summary', N'V') IS NOT NULL\n    DROP VIEW [dbo].[vw_Query_History_Summary];\nGO\n\nCREATE VIEW [dbo].[vw_Query_History_Summary]\nAS\nSELECT \n    [Login_Name], [Host_Name], [Program_Name], [Database_Name],\n    COUNT(*) AS [Query_Count], AVG([Duration_ms]) / 1000 AS [Avg_Duration_s],\n    MAX([Duration_ms]) / 1000 AS [Max_Duration_s], SUM([CPU_Time]) / 1000 AS [Total_CPU_s]\nFROM [dbo].[Query_History]\nWHERE [Captured_Time] > DATEADD(DAY, -1, SYSDATETIME())\nGROUP BY [Login_Name], [Host_Name], [Program_Name], [Database_Name];\nGO\n\nIF OBJECT_ID(N'dbo.vw_Top_Resource_Users', N'V') IS NOT NULL\n    DROP VIEW [dbo].[vw_Top_Resource_Users];\nGO\n\nCREATE VIEW [dbo].[vw_Top_Resource_Users]\nAS\nSELECT TOP 100\n    [Login_Name], [Host_Name], [Program_Name],\n    COUNT(*) AS [Query_Count], SUM([Duration_ms]) / 1000 AS [Total_Duration_s],\n    SUM([CPU_Time]) / 1000 AS [Total_CPU_s]\nFROM [dbo].[Query_History]\nWHERE [Captured_Time] > DATEADD(DAY, -1, SYSDATETIME())\nGROUP BY [Login_Name], [Host_Name], [Program_Name]\nORDER BY [Total_Duration_s] DESC;\nGO\n\nPRINT N'Created dashboard views.';\nGO", "sql_server/preventive_measures/10_Create_SQL_Agent_Jobs.sql": "/*\n================================================================================\n10_Create_SQL_Agent_Jobs.sql - Layer 2 & 3: SQL Agent Automation\n================================================================================\nPurpose:    Creates SQL Agent jobs for the preventive measures framework.\n\nVersion:    2.0\nAuthor:     DBA Team\nCreated:    2026-06-19\nUpdated:    2026-06-19 - Modified to use DBARepository database\nCompatible: SQL Server 2016, 2017, 2019, 2022\n\nUsage:      Run this script to create automation jobs.\n================================================================================\n*/\n\nUSE [msdb];\nGO\n\n-- Create job category\nIF NOT EXISTS (SELECT 1 FROM syscategories WHERE name = N'Governance Monitoring')\nBEGIN\n    EXEC sp_add_category @class = N'JOB', @type = N'LOCAL', @name = N'Governance Monitoring';\n    PRINT N'Created Governance Monitoring job category.';\nEND\nGO\n\n--------------------------------------------------------------------------------\n-- Job 1: Query Capture (every 1 minute)\n--------------------------------------------------------------------------------\nIF EXISTS (SELECT 1 FROM sysjobs WHERE name = N'Governance_Query_Capture')\n    EXEC sp_delete_job @job_name = N'Governance_Query_Capture';\n\nEXEC sp_add_job \n    @job_name = N'Governance_Query_Capture',\n    @enabled = 1,\n    @description = N'Lightweight DMV capture for query trending.',\n    @category_name = N'Governance Monitoring',\n    @owner_login_name = N'sa';\n\nEXEC sp_add_jobstep \n    @job_name = N'Governance_Query_Capture',\n    @step_name = N'Capture Queries',\n    @step_id = 1,\n    @subsystem = N'TSQL',\n    @command = N'EXEC [dbo].[sp_Capture_Running_Queries] @Min_Duration_ms = 5000;',\n    @database_name = N'DBARepository';\n\nEXEC sp_add_jobschedule \n    @job_name = N'Governance_Query_Capture',\n    @name = N'Every 1 Minute',\n    @freq_type = 4,\n    @freq_interval = 1,\n    @freq_subday_type = 4,\n    @freq_subday_interval = 1,\n    @active_start_time = 0;\n\nEXEC sp_add_jobserver @job_name = N'Governance_Query_Capture', @server_name = N'(LOCAL)';\nPRINT N'Created Governance_Query_Capture job.';\nGO\n\n--------------------------------------------------------------------------------\n-- Job 2: Enforcement (every 1 minute)\n--------------------------------------------------------------------------------\nIF EXISTS (SELECT 1 FROM sysjobs WHERE name = N'Governance_Enforcement')\n    EXEC sp_delete_job @job_name = N'Governance_Enforcement';\n\nEXEC sp_add_job \n    @job_name = N'Governance_Enforcement',\n    @enabled = 1,\n    @description = N'Main enforcement job for policy checks.',\n    @category_name = N'Governance Monitoring',\n    @owner_login_name = N'sa';\n\nEXEC sp_add_jobstep \n    @job_name = N'Governance_Enforcement',\n    @step_name = N'Enforce Policies',\n    @step_id = 1,\n    @subsystem = N'TSQL',\n    @command = N'EXEC [dbo].[sp_Check_Long_Running_Queries];',\n    @database_name = N'DBARepository';\n\nEXEC sp_add_jobschedule \n    @job_name = N'Governance_Enforcement',\n    @name = N'Every 1 Minute',\n    @freq_type = 4,\n    @freq_interval = 1,\n    @freq_subday_type = 4,\n    @freq_subday_interval = 1,\n    @active_start_time = 0;\n\nEXEC sp_add_jobserver @job_name = N'Governance_Enforcement', @server_name = N'(LOCAL)';\nPRINT N'Created Governance_Enforcement job.';\nGO\n\n--------------------------------------------------------------------------------\n-- Job 3: Data Cleanup (daily at 2 AM)\n--------------------------------------------------------------------------------\nIF EXISTS (SELECT 1 FROM sysjobs WHERE name = N'Governance_Data_Cleanup')\n    EXEC sp_delete_job @job_name = N'Governance_Data_Cleanup';\n\nEXEC sp_add_job \n    @job_name = N'Governance_Data_Cleanup',\n    @enabled = 1,\n    @description = N'Daily cleanup of old data.',\n    @category_name = N'Governance Monitoring',\n    @owner_login_name = N'sa';\n\nEXEC sp_add_jobstep \n    @job_name = N'Governance_Data_Cleanup',\n    @step_name = N'Purge Old Data',\n    @step_id = 1,\n    @subsystem = N'TSQL',\n    @command = N'EXEC [dbo].[sp_Purge_Old_Alerts] @Days_to_Keep = 30;',\n    @database_name = N'DBARepository';\n\nEXEC sp_add_jobschedule \n    @job_name = N'Governance_Data_Cleanup',\n    @name = N'Daily at 2 AM',\n    @freq_type = 4,\n    @freq_interval = 1,\n    @active_start_time = 20000;\n\nEXEC sp_add_jobserver @job_name = N'Governance_Data_Cleanup', @server_name = N'(LOCAL)';\nPRINT N'Created Governance_Data_Cleanup job.';\nGO\n\nPRINT N'=====================================================';\nPRINT N'SQL Agent jobs created successfully!';\nPRINT N'=====================================================';\nGO", "sql_server/preventive_measures/11_Setup_Resource_Governor.sql": "/*\n================================================================================\n11_Setup_Resource_Governor.sql - Resource Governor (Enterprise Only)\n================================================================================\nPurpose:    Configures Resource Governor for workload management.\n\nVersion:    2.0\nAuthor:     DBA Team\nCreated:    2026-06-19\nCompatible: SQL Server 2016, 2017, 2019, 2022 (Enterprise only)\n\nUsage:      Run this script on Enterprise Edition only.\n================================================================================\n*/\n\nUSE [master];\nGO\n\n-- Check for Enterprise Edition\nDECLARE @Edition VARCHAR(50);\nSET @Edition = CAST(SERVERPROPERTY('Edition') AS VARCHAR(50));\n\nIF @Edition NOT LIKE '%Enterprise%'\nBEGIN\n    RAISERROR(N'Resource Governor requires SQL Server Enterprise Edition. Current: %s', 16, 1, @Edition);\n    RETURN;\nEND\nGO\n\nIF OBJECT_ID(N'dbo.sp_Setup_Resource_Governor', N'P') IS NOT NULL\n    DROP PROCEDURE [dbo].[sp_Setup_Resource_Governor];\nGO\n\nCREATE PROCEDURE [dbo].[sp_Setup_Resource_Governor]\nAS\nBEGIN\n    SET NOCOUNT ON;\n\n    -- Create Resource Pools\n    IF NOT EXISTS (SELECT 1 FROM sys.resource_governor_resource_pools WHERE name = N'Production_Pool')\n    BEGIN\n        CREATE RESOURCE POOL [Production_Pool] WITH (MIN_CPU_PERCENT = 20, MAX_CPU_PERCENT = 50, MIN_MEMORY_PERCENT = 20, MAX_MEMORY_PERCENT = 40);\n        PRINT N'Created Production_Pool.';\n    END\n\n    IF NOT EXISTS (SELECT 1 FROM sys.resource_governor_resource_pools WHERE name = N'Developer_Pool')\n    BEGIN\n        CREATE RESOURCE POOL [Developer_Pool] WITH (MIN_CPU_PERCENT = 0, MAX_CPU_PERCENT = 30, MIN_MEMORY_PERCENT = 0, MAX_MEMORY_PERCENT = 30);\n        PRINT N'Created Developer_Pool.';\n    END\n\n    -- Create Workload Groups\n    IF NOT EXISTS (SELECT 1 FROM sys.resource_governor_workload_groups WHERE name = N'Production_Group')\n    BEGIN\n        CREATE WORKLOAD GROUP [Production_Group] WITH (IMPORTANCE = HIGH) USING [Production_Pool];\n        PRINT N'Created Production_Group.';\n    END\n\n    IF NOT EXISTS (SELECT 1 FROM sys.resource_governor_workload_groups WHERE name = N'Developer_Group')\n    BEGIN\n        CREATE WORKLOAD GROUP [Developer_Group] WITH (IMPORTANCE = LOW) USING [Developer_Pool];\n        PRINT N'Created Developer_Group.';\n    END\n\n    ALTER RESOURCE GOVERNOR RECONFIGURE;\n    PRINT N'Resource Governor configured.';\nEND;\nGO\n\nPRINT N'Created dbo.sp_Setup_Resource_Governor procedure.';\nGO"}, "catalog": [{"engine": "postgres", "name": "00_Deploy_Framework.sql", "cat": "Framework", "desc": "Run once against dba_repository after 00_Repository/00_create_repository.sql", "risk": "Write", "path": "postgres/00_Framework/00_Deploy_Framework.sql", "database": "dba_repository"}, {"engine": "postgres", "name": "fn_dba_excluded_wait_events.sql", "cat": "Framework", "desc": "Returns wait event types that are normal background activity and should be excluded from bottleneck analysis (similar to SQL Server fn_DBA_ExcludedWaitTypes).", "risk": "Write", "path": "postgres/00_Framework/fn_dba_excluded_wait_events.sql", "database": "dba_repository"}, {"engine": "postgres", "name": "sp_dba_active_sessions.sql", "cat": "Framework", "desc": "Shows active, waiting, and blocking sessions with query text and wait info. Modes: DETAIL (default), SUMMARY, BLOCKING.", "risk": "Write", "path": "postgres/00_Framework/sp_dba_active_sessions.sql", "database": "dba_repository"}, {"engine": "postgres", "name": "sp_dba_backup_review.sql", "cat": "Framework", "desc": "Reviews archive mode, archiver stats, WAL retention settings, and base backup indicators. Complements external tools (pgBackRest, Barman, WAL-G).", "risk": "Write", "path": "postgres/00_Framework/sp_dba_backup_review.sql", "database": "dba_repository"}, {"engine": "postgres", "name": "sp_dba_baseline_capture.sql", "cat": "Framework", "desc": "Captures connection counts, buffer/cache stats, checkpoint counters, and top wait events into dba.baseline_snapshot for trending.", "risk": "Write", "path": "postgres/00_Framework/sp_dba_baseline_capture.sql", "database": "dba_repository"}, {"engine": "postgres", "name": "sp_dba_health_check.sql", "cat": "Framework", "desc": "Aggregates CPU, memory, connections, replication, vacuum, backup/archive, and configuration findings into a prioritized dashboard.", "risk": "Write", "path": "postgres/00_Framework/sp_dba_health_check.sql", "database": "dba_repository"}, {"engine": "postgres", "name": "sp_dba_index_review.sql", "cat": "Framework", "desc": "Reports unused indexes, high sequential scan tables, and foreign keys without supporting indexes across the current database.", "risk": "Write", "path": "postgres/00_Framework/sp_dba_index_review.sql", "database": "dba_repository"}, {"engine": "postgres", "name": "sp_dba_security_audit.sql", "cat": "Framework", "desc": "Audits superusers, PUBLIC grants, default privileges, and databases without forced row security where expected.", "risk": "Write", "path": "postgres/00_Framework

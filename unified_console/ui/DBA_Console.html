<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DBA Unified Console</title>
<style>
:root {
  --bg:#0f1419; --panel:#1a1f2e; --card:#1e2538; --border:#2d3748;
  --text:#e1e5ee; --muted:#8892a4; --accent:#3b82f6; --ok:#22c55e; --err:#ef4444; --warn:#f59e0b;
  --pg:#336791; --mssql:#cc2927;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--panel);gap:12px;flex-wrap:wrap}
header h1{font-size:18px}
.subtitle{font-size:11px;color:var(--muted)}
.badge{font-size:11px;padding:4px 8px;border-radius:999px;background:rgba(59,130,246,.15);color:var(--accent)}
.layout{display:grid;grid-template-columns:300px 1fr;min-height:calc(100vh - 58px)}
aside{padding:16px;border-right:1px solid var(--border);background:var(--panel);overflow:auto}
main{padding:16px;display:flex;flex-direction:column;gap:12px;overflow:auto}
label{display:block;font-size:12px;color:var(--muted);margin:8px 0 4px}
input,select,textarea{width:100%;padding:9px 11px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px}
textarea{min-height:160px;font-family:'Cascadia Code','Fira Code',monospace;line-height:1.5;resize:vertical}
button{padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:12px}
button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
button.run{background:var(--ok);border-color:var(--ok);color:#fff}
button:disabled{opacity:.5;cursor:not-allowed}
.row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;align-items:center}
.status{font-size:12px;padding:9px 11px;border-radius:8px;background:var(--card);border:1px solid var(--border)}
.status.ok{border-color:rgba(34,197,94,.4);color:var(--ok)}
.status.err{border-color:rgba(239,68,68,.4);color:var(--err)}
.status.warn{border-color:rgba(245,158,11,.4);color:var(--warn)}
.panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px}
.panel h2{font-size:14px;margin-bottom:10px}
.log{font-family:monospace;font-size:12px;white-space:pre-wrap;max-height:140px;overflow:auto;background:#111827;padding:10px;border-radius:8px}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{border-bottom:1px solid var(--border);padding:8px;text-align:left;vertical-align:top}
th{color:var(--muted);font-size:11px;text-transform:uppercase;position:sticky;top:0;background:var(--card)}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.tab{padding:6px 10px;border-radius:8px;border:1px solid var(--border);cursor:pointer;font-size:12px}
.tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.nav-tabs{display:flex;gap:8px;margin-bottom:12px}
.nav-tab{padding:8px 14px;border-radius:8px;border:1px solid var(--border);cursor:pointer;font-size:13px;background:var(--panel)}
.nav-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.view{display:none}.view.active{display:block}
.hidden{display:none!important}
.tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:4px;margin-right:4px}
.tag-g{background:rgba(34,197,94,.15);color:var(--ok)}
.tag-y{background:rgba(245,158,11,.15);color:var(--warn)}
.tag-b{background:rgba(59,130,246,.15);color:var(--accent)}
.tag-pg{background:rgba(51,103,145,.2);color:#7eb8e8}
.tag-ms{background:rgba(204,41,39,.2);color:#f87171}
.script-table-wrap{max-height:420px;overflow:auto;border:1px solid var(--border);border-radius:8px}
.script-path{font-family:monospace;font-size:11px;color:var(--muted);word-break:break-all}
tr.script-row{cursor:pointer}tr.script-row:hover td{background:rgba(59,130,246,.08)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;align-items:center;justify-content:center;padding:16px}
.overlay.active{display:flex}
.modal{width:min(1100px,96vw);max-height:90vh;background:var(--card);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;overflow:hidden}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--panel);gap:8px;flex-wrap:wrap}
.modal-body{overflow:auto;padding:0;flex:1}
pre.sql-code{margin:0;padding:14px 16px;font-family:'Cascadia Code','Fira Code',monospace;font-size:12px;line-height:1.6;white-space:pre;overflow:auto;background:#1e1e1e;color:#d4d4d4}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.filter-bar input{max-width:280px}
.chip{padding:4px 10px;border-radius:999px;border:1px solid var(--border);cursor:pointer;font-size:11px}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
@media(max-width:900px){.layout{grid-template-columns:1fr}aside{border-right:none;border-bottom:1px solid var(--border)}}
</style>
</head>
<body>
<header>
  <div>
    <h1>DBA Unified Console</h1>
    <div class="subtitle">147 scripts · 2026-06-29 14:54 UTC</div>
  </div>
  <span class="badge" id="connectorBadge">Checking connector…</span>
</header>

<div class="layout">
  <aside>
    <div class="panel">
      <h2>Connection</h2>
      <label for="engine">Engine</label>
      <select id="engine">
        <option value="mssql">SQL Server</option>
        <option value="postgres">PostgreSQL</option>
      </select>
      <label for="host">Host</label>
      <input id="host" value="localhost">
      <label for="port">Port</label>
      <input id="port" type="number" placeholder="auto">
      <label for="database">Database</label>
      <input id="database" placeholder="master / dba_repository">
      <label for="username">Username</label>
      <input id="username" placeholder="SQL auth (optional for Windows auth)">
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password">
      <label for="sslMode" class="pg-only">SSL mode</label>
      <select id="sslMode" class="pg-only">
        <option value="prefer">prefer</option>
        <option value="require">require</option>
        <option value="disable">disable</option>
      </select>
      <label class="mssql-only"><input type="checkbox" id="trustCertificate" checked> Trust server certificate</label>
      <div class="row">
        <button class="primary" id="btnConnect">Connect</button>
        <button id="btnDisconnect" disabled>Disconnect</button>
      </div>
      <div class="status warn" id="connStatus" style="margin-top:10px">Not connected</div>
    </div>
  </aside>

  <main>
    <div class="nav-tabs">
      <div class="nav-tab active" data-view="scripts">Script Explorer</div>
      <div class="nav-tab" data-view="query">Query Editor</div>
    </div>

    <div id="view-scripts" class="view active">
      <div class="panel">
        <h2>Browse scripts</h2>
        <div class="filter-bar">
          <input type="text" id="scriptSearch" placeholder="Search name, path, description…" oninput="renderScriptTable()">
          <span class="chip active" data-engine="all" onclick="setEngineFilter('all')">All</span>
          <span class="chip" data-engine="mssql" onclick="setEngineFilter('mssql')">SQL Server</span>
          <span class="chip" data-engine="postgres" onclick="setEngineFilter('postgres')">PostgreSQL</span>
          <span class="chip active" data-cat="all" onclick="setCatFilter('all')">All categories</span>
        </div>
        <div id="catChips" class="filter-bar" style="margin-top:0"></div>
        <div class="script-table-wrap">
          <table>
            <thead><tr><th>Script</th><th>Engine</th><th>Category</th><th>Risk</th><th>Description</th></tr></thead>
            <tbody id="scriptTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="view-query" class="view">
      <div class="panel">
        <h2>SQL</h2>
        <textarea id="sql">SELECT @@VERSION AS version;</textarea>
        <div class="row">
          <button class="primary" id="btnExecute" disabled>Execute</button>
          <button id="btnClear">Clear results</button>
        </div>
      </div>
    </div>

    <div class="panel">
      <h2>Execution log</h2>
      <div class="log" id="execLog">Ready.</div>
    </div>
    <div class="panel">
      <h2>Results</h2>
      <div id="resultsMeta" class="status">No results yet.</div>
      <div id="resultTabs" class="tabs hidden"></div>
      <div id="resultTables"></div>
    </div>
  </main>
</div>

<div class="overlay" id="scriptModal" onclick="if(event.target===this)closeScriptModal()">
  <div class="modal">
    <div class="modal-head">
      <div>
        <strong id="modalTitle">script.sql</strong>
        <div class="script-path" id="modalPath"></div>
      </div>
      <div class="row" style="margin:0">
        <span class="tag" id="modalEngineTag"></span>
        <span class="tag" id="modalRiskTag"></span>
        <span class="tag tag-b" id="modalCatTag"></span>
        <button onclick="loadScriptToEditor()">Load in editor</button>
        <button class="run" id="btnRunScript" onclick="runCurrentScript()">Run script</button>
        <button onclick="closeScriptModal()">Close</button>
      </div>
    </div>
    <div class="modal-body"><pre class="sql-code" id="modalCode"></pre></div>
  </div>
</div>

<script type="application/json" id="dba-embed-data">{"contents": {"postgres/00_Framework/00_Deploy_Framework.sql": "/*\n================================================================================\n00_Deploy_Framework.sql — Deploy all DBA framework objects\n================================================================================\nDescription:\n    Run once against dba_repository after 00_Repository/00_create_repository.sql\n\nUsage:\n    psql -d dba_repository -f 00_Deploy_Framework.sql\n\nCriticality: Low (one-time)\n================================================================================\n*/\n\n\\echo 'Deploying DBA framework objects...'\n\n\\ir fn_dba_excluded_wait_events.sql\n\\ir sp_dba_active_sessions.sql\n\\ir sp_dba_wait_analysis.sql\n\\ir sp_dba_index_review.sql\n\\ir sp_dba_backup_review.sql\n\\ir sp_dba_security_audit.sql\n\\ir sp_dba_baseline_capture.sql\n\\ir sp_dba_health_check.sql\n\n\\echo 'Framework deployment complete.'\n\\df dba.*\n", "postgres/00_Framework/fn_dba_excluded_wait_events.sql": "/*\n================================================================================\nfn_dba_excluded_wait_events — Benign wait events filter\n================================================================================\nDescription:\n    Returns wait event types that are normal background activity and should\n    be excluded from bottleneck analysis (similar to SQL Server fn_DBA_ExcludedWaitTypes).\n\nOutput:  Table of wait_event values to exclude.\n\nCriticality: Low (framework helper)\n================================================================================\n*/\n\nCREATE OR REPLACE FUNCTION dba.fn_excluded_wait_events()\nRETURNS TABLE (wait_event text)\nLANGUAGE sql\nIMMUTABLE\nAS $$\n    SELECT unnest(ARRAY[\n        'Activity',\n        'ArchiverMain',\n        'AutoVacuumMain',\n        'BgWriterHibernate',\n        'BgWriterMain',\n        'CheckpointerMain',\n        'CheckpointerMain',\n        'LogicalLauncherMain',\n        'LogicalReplicationLauncherMain',\n        'WalSenderMain',\n        'WalWriterMain',\n        'ClientRead',\n        'ClientWrite',\n        'Extension',\n        'Timeout',\n        'PgSleep',\n        'SafeSnapshot'\n    ]);\n$$;\n\nCOMMENT ON FUNCTION dba.fn_excluded_wait_events() IS\n    'Benign PostgreSQL wait events excluded from performance triage.';\n", "postgres/00_Framework/sp_dba_active_sessions.sql": "/*\n================================================================================\nsp_dba_active_sessions — Real-time session monitor\n================================================================================\nDescription:\n    Shows active, waiting, and blocking sessions with query text and wait info.\n    Modes: DETAIL (default), SUMMARY, BLOCKING.\n\nUsage:\n    SELECT * FROM dba.sp_active_sessions();\n    SELECT * FROM dba.sp_active_sessions(output_mode => 'BLOCKING');\n    SELECT * FROM dba.sp_active_sessions(filter_database => 'salesdb', min_duration_sec => 30);\n\nCriticality: High\n================================================================================\n*/\n\nCREATE OR REPLACE FUNCTION dba.sp_active_sessions(\n    filter_database    text DEFAULT NULL,\n    filter_wait_event  text DEFAULT NULL,\n    min_duration_sec   integer DEFAULT 0,\n    output_mode        text DEFAULT 'DETAIL'\n)\nRETURNS TABLE (\n    pid              integer,\n    usename          text,\n    datname          text,\n    application_name text,\n    client_addr      inet,\n    state            text,\n    wait_event_type  text,\n    wait_event       text,\n    duration_sec     numeric,\n    blocking_pid     integer,\n    query_snippet    text\n)\nLANGUAGE sql\nSTABLE\nAS $$\n    WITH sessions AS (\n        SELECT\n            a.pid,\n            a.usename::text,\n            a.datname::text,\n            a.application_name::text,\n            a.client_addr,\n            a.state::text,\n            a.wait_event_type::text,\n            a.wait_event::text,\n            round(extract(epoch FROM (now() - a.query_start))::numeric, 1) AS duration_sec,\n            a.query::text AS query_snippet,\n            pg_blocking_pids(a.pid) AS blockers\n        FROM pg_stat_activity a\n        WHERE a.pid <> pg_backend_pid()\n          AND a.backend_type = 'client backend'\n          AND (filter_database IS NULL OR a.datname = filter_database)\n          AND (filter_wait_event IS NULL OR a.wait_event ILIKE filter_wait_event)\n          AND extract(epoch FROM (now() - coalesce(a.query_start, a.backend_start))) >= min_duration_sec\n    )\n    SELECT\n        s.pid,\n        s.usename,\n        s.datname,\n        s.application_name,\n        s.client_addr,\n        s.state,\n        s.wait_event_type,\n        s.wait_event,\n        s.duration_sec,\n        CASE WHEN cardinality(s.blockers) > 0 THEN s.blockers[1] END AS blocking_pid,\n        left(regexp_replace(s.query_snippet, '\\s+', ' ', 'g'), 200) AS query_snippet\n    FROM sessions s\n    WHERE output_mode IN ('DETAIL', 'SUMMARY')\n       OR (output_mode = 'BLOCKING' AND cardinality(s.blockers) > 0)\n  ORDER BY s.duration_sec DESC NULLS LAST;\n$$;\n\nCOMMENT ON FUNCTION dba.sp_active_sessions(text, text, integer, text) IS\n    'Real-time PostgreSQL session monitor with blocking detection.';\n", "postgres/00_Framework/sp_dba_backup_review.sql": "/*\n================================================================================\nsp_dba_backup_review — WAL archiving and backup readiness\n================================================================================\nDescription:\n    Reviews archive mode, archiver stats, WAL retention settings, and base\n    backup indicators. Complements external tools (pgBackRest, Barman, WAL-G).\n\nUsage:\n    SELECT * FROM dba.sp_backup_review(backup_hours_sla => 24);\n\nCriticality: High\n================================================================================\n*/\n\nCREATE OR REPLACE FUNCTION dba.sp_backup_review(backup_hours_sla integer DEFAULT 24)\nRETURNS TABLE (\n    check_area       text,\n    status           text,\n    detail           text,\n    recommendation   text\n)\nLANGUAGE sql\nSTABLE\nAS $$\n    SELECT 'Archive Mode', setting,\n        CASE WHEN setting = 'on' THEN 'OK' ELSE 'WAL archiving disabled' END,\n        CASE WHEN setting <> 'on' THEN 'Set archive_mode=on and configure archive_command' END\n    FROM pg_settings WHERE name = 'archive_mode'\n\n    UNION ALL\n\n    SELECT 'WAL Level', setting, 'Current wal_level',\n        CASE WHEN setting = 'minimal' THEN 'Use replica or logical for HA/DR' END\n    FROM pg_settings WHERE name = 'wal_level'\n\n    UNION ALL\n\n    SELECT 'Archiver',\n        CASE WHEN failed_count > 0 THEN 'CRITICAL' WHEN last_failed_time IS NOT NULL THEN 'WARNING' ELSE 'OK' END,\n        format('last_archived=%s failed=%s', last_archived_wal, failed_count),\n        CASE WHEN failed_count > 0 THEN 'Fix archive_command failures immediately' END\n    FROM pg_stat_archiver\n\n    UNION ALL\n\n    SELECT 'Last Archive Age',\n        CASE WHEN last_archived_time < now() - (backup_hours_sla || ' hours')::interval\n             THEN 'WARNING' ELSE 'OK' END,\n        coalesce(last_archived_time::text, 'never'),\n        'Ensure continuous WAL archiving for PITR'\n    FROM pg_stat_archiver\n\n    UNION ALL\n\n    SELECT 'max_wal_size', setting, 'Checkpoint / WAL sizing',\n        'Increase if checkpoints_req is high (see checkpoint_and_wal.sql)'\n    FROM pg_settings WHERE name = 'max_wal_size';\n$$;\n", "postgres/00_Framework/sp_dba_baseline_capture.sql": "/*\n================================================================================\nsp_dba_baseline_capture — Persist performance snapshot\n================================================================================\nDescription:\n    Captures connection counts, buffer/cache stats, checkpoint counters,\n    and top wait events into dba.baseline_snapshot for trending.\n\nUsage:\n    SELECT dba.sp_baseline_capture();\n\nPrerequisite: dba.baseline_snapshot table (00_Repository/00_create_repository.sql)\n\nCriticality: Low\n================================================================================\n*/\n\nCREATE OR REPLACE FUNCTION dba.sp_baseline_capture()\nRETURNS bigint\nLANGUAGE plpgsql\nVOLATILE\nAS $$\nDECLARE\n    v_id bigint;\nBEGIN\n    INSERT INTO dba.baseline_snapshot (metric_area, metric_name, metric_value)\n    SELECT 'Connections', state, count(*)::numeric\n    FROM pg_stat_activity\n    WHERE backend_type = 'client backend'\n    GROUP BY state;\n\n    INSERT INTO dba.baseline_snapshot (metric_area, metric_name, metric_value)\n    SELECT 'Buffer', 'blks_hit', blks_hit::numeric FROM pg_stat_database WHERE datname = current_database()\n    UNION ALL\n    SELECT 'Buffer', 'blks_read', blks_read::numeric FROM pg_stat_database WHERE datname = current_database();\n\n    INSERT INTO dba.baseline_snapshot (metric_area, metric_name, metric_value)\n    SELECT 'BGWriter', 'checkpoints_timed', checkpoints_timed::numeric FROM pg_stat_bgwriter\n    UNION ALL\n    SELECT 'BGWriter', 'checkpoints_req', checkpoints_req::numeric FROM pg_stat_bgwriter\n    UNION ALL\n    SELECT 'BGWriter', 'buffers_checkpoint', buffers_checkpoint::numeric FROM pg_stat_bgwriter;\n\n    INSERT INTO dba.baseline_snapshot (metric_area, metric_name, metric_value, metric_text)\n    SELECT 'Waits', wait_event, count(*)::numeric, wait_event_type\n    FROM pg_stat_activity\n    WHERE wait_event IS NOT NULL AND pid <> pg_backend_pid()\n    GROUP BY wait_event_type, wait_event;\n\n    SELECT max(snapshot_id) INTO v_id FROM dba.baseline_snapshot;\n    RETURN v_id;\nEND;\n$$;\n", "postgres/00_Framework/sp_dba_health_check.sql": "/*\n================================================================================\nsp_dba_health_check — Consolidated PostgreSQL health orchestrator\n================================================================================\nDescription:\n    Aggregates CPU, memory, connections, replication, vacuum, backup/archive,\n    and configuration findings into a prioritized dashboard.\n\nUsage:\n    SELECT * FROM dba.sp_health_check(deep_dive => false);\n    SELECT * FROM dba.sp_health_check(deep_dive => true, backup_hours_sla => 24);\n\nParameters:\n    deep_dive          — include top waits and I/O detail\n    database_list      — comma-separated DB names (NULL = all)\n    backup_hours_sla   — hours since last archived WAL before warning\n\nCriticality: High\n================================================================================\n*/\n\nCREATE OR REPLACE FUNCTION dba.sp_health_check(\n    deep_dive          boolean DEFAULT false,\n    database_list      text DEFAULT NULL,\n    backup_hours_sla   integer DEFAULT 24\n)\nRETURNS TABLE (\n    check_id       integer,\n    severity       text,\n    weight         integer,\n    area           text,\n    finding        text,\n    impact         text,\n    recommendation text\n)\nLANGUAGE plpgsql\nSTABLE\nAS $$\nDECLARE\n    v_max_conn integer;\n    v_active_conn integer;\n    v_idle_in_txn integer;\n    v_repl_lag_bytes bigint;\n    v_archive_fail bigint;\n    v_shared_buffers text;\n    v_work_mem text;\n    v_wal_level text;\n    v_archive_mode text;\n    v_last_archived timestamptz;\n    v_any_finding boolean := false;\nBEGIN\n    -- Connections\n    SELECT count(*)::int INTO v_active_conn\n    FROM pg_stat_activity WHERE state = 'active' AND pid <> pg_backend_pid();\n\n    SELECT count(*)::int INTO v_idle_in_txn\n    FROM pg_stat_activity WHERE state = 'idle in transaction';\n\n    SELECT setting::int INTO v_max_conn FROM pg_settings WHERE name = 'max_connections';\n\n    IF v_active_conn > (v_max_conn * 0.8) THEN\n        v_any_finding := true;\n        RETURN QUERY SELECT 101, 'High', 15, 'Connections',\n            format('Active connections %s (>80%% of max_connections %s)', v_active_conn, v_max_conn),\n            'Connection exhaustion risk', 'Review pool sizing, idle timeouts, and app connection leaks';\n    END IF;\n\n    IF v_idle_in_txn > 5 THEN\n        v_any_finding := true;\n        RETURN QUERY SELECT 102, 'High', 20, 'Connections',\n            format('%s sessions idle in transaction', v_idle_in_txn),\n            'Blocking and bloat risk', 'Find long idle-in-transaction sessions; enforce statement_timeout and idle_in_transaction_session_timeout';\n    END IF;\n\n    -- Memory settings\n    SELECT setting INTO v_shared_buffers FROM pg_settings WHERE name = 'shared_buffers';\n    SELECT setting INTO v_work_mem FROM pg_settings WHERE name = 'work_mem';\n\n    IF pg_size_bytes(v_shared_buffers) < pg_size_bytes('1GB')\n       AND (SELECT setting::bigint FROM pg_settings WHERE name = 'effective_cache_size') < pg_size_bytes('2GB') THEN\n        v_any_finding := true;\n        RETURN QUERY SELECT 201, 'Medium', 10, 'Memory',\n            format('shared_buffers=%s may be low for production', v_shared_buffers),\n            'Cache pressure, more disk I/O', 'Tune shared_buffers (~25% RAM) and effective_cache_size per workload';\n    END IF;\n\n    -- WAL / archive\n    SELECT setting INTO v_wal_level FROM pg_settings WHERE name = 'wal_level';\n    SELECT setting INTO v_archive_mode FROM pg_settings WHERE name = 'archive_mode';\n\n    IF v_archive_mode <> 'on' AND v_wal_level IN ('replica', 'logical') THEN\n        v_any_finding := true;\n        RETURN QUERY SELECT 301, 'High', 20, 'HA/DR',\n            'archive_mode is off but wal_level supports replication',\n            'No point-in-time recovery / standby WAL shipping', 'Enable archive_mode and configure archive_command';\n    END IF;\n\n    SELECT failed_count, last_archived_time\n    INTO v_archive_fail, v_last_archived\n    FROM pg_stat_archiver;\n\n    IF v_archive_fail > 0 THEN\n        v_any_finding := true;\n        RETURN QUERY SELECT 302, 'Critical', 25, 'HA/DR',\n            format('WAL archive failures: %s', v_archive_fail),\n            'Broken backup chain', 'Check archive_command, disk space, and permissions on archive destination';\n    END IF;\n\n    IF v_last_archived IS NOT NULL\n       AND v_last_archived < now() - (backup_hours_sla || ' hours')::interval THEN\n        v_any_finding := true;\n        RETURN QUERY SELECT 303, 'High', 15, 'HA/DR',\n            format('Last archived WAL at %s (>%s h ago)', v_last_archived, backup_hours_sla),\n            'Backup/DR gap', 'Verify archiver process and backup tooling';\n    END IF;\n\n    -- Replication lag (physical)\n    IF EXISTS (SELECT 1 FROM pg_stat_replication) THEN\n        SELECT max(pg_wal_lsn_diff(pg_current_wal_lsn(), replay_lsn))::bigint\n        INTO v_repl_lag_bytes FROM pg_stat_replication;\n\n        IF coalesce(v_repl_lag_bytes, 0) > pg_size_bytes('1GB') THEN\n            v_any_finding := true;\n        RETURN QUERY SELECT 401, 'High', 20, 'Replication',\n                format('Replication lag %s bytes', v_repl_lag_bytes),\n                'RPO/RTO risk on failover', 'Check replica I/O, network, long queries on replica, hot_standby_feedback';\n        END IF;\n    END IF;\n\n    -- Autovacuum backlog\n    IF EXISTS (\n        SELECT 1 FROM pg_stat_user_tables\n        WHERE n_dead_tup > 100000\n          AND (last_autovacuum IS NULL OR last_autovacuum < now() - interval '7 days')\n    ) THEN\n        v_any_finding := true;\n        RETURN QUERY SELECT 501, 'Medium', 10, 'Maintenance',\n            'Tables with high dead tuples and stale autovacuum',\n            'Bloat and wraparound risk', 'Run 09_Maintenance/vacuum_bloat_maintenance.sql; tune autovacuum per table';\n    END IF;\n\n    -- Checkpoints\n    IF (SELECT checkpoints_req FROM pg_stat_bgwriter) >\n       (SELECT checkpoints_timed FROM pg_stat_bgwriter) * 2 THEN\n        v_any_finding := true;\n        RETURN QUERY SELECT 502, 'Medium', 10, 'Storage',\n            'Requested checkpoints exceed timed checkpoints',\n            'I/O spikes during checkpoint', 'Increase max_wal_size / checkpoint_timeout; review wal_compression';\n    END IF;\n\n    -- SSL\n    IF NOT EXISTS (SELECT 1 FROM pg_settings WHERE name = 'ssl' AND setting = 'on') THEN\n        v_any_finding := true;\n        RETURN QUERY SELECT 601, 'Medium', 10, 'Security',\n            'SSL is not enabled on server',\n            'Unencrypted client connections possible', 'Enable ssl and require SSL in pg_hba.conf for production';\n    END IF;\n\n    -- pg_stat_statements\n    IF NOT EXISTS (SELECT 1 FROM pg_extension WHERE extname = 'pg_stat_statements') THEN\n        v_any_finding := true;\n        RETURN QUERY SELECT 701, 'Low', 5, 'Diagnostics',\n            'pg_stat_statements extension not installed',\n            'Limited query performance history', 'CREATE EXTENSION pg_stat_statements; add to shared_preload_libraries';\n    END IF;\n\n    IF deep_dive THEN\n        RETURN QUERY\n        SELECT 801, 'Info', 1, 'Waits',\n            wait_event_type || ': ' || wait_event,\n            format('%s sessions waiting', count(*)::text),\n            'See 04_Performance_Diagnostics/wait_events.sql'\n        FROM pg_stat_activity\n        WHERE wait_event IS NOT NULL\n          AND pid <> pg_backend_pid()\n          AND wait_event NOT IN (SELECT wait_event FROM dba.fn_excluded_wait_events())\n        GROUP BY wait_event_type, wait_event\n        ORDER BY count(*) DESC\n        LIMIT 10;\n    END IF;\n\n    IF NOT v_any_finding THEN\n        RETURN QUERY SELECT 0, 'Info', 0, 'Summary',\n            'No critical findings from automated checks',\n            'Continue scheduled monitoring',\n            'Run dba.sp_baseline_capture() for trending';\n    END IF;\nEND;\n$$;\n\nCOMMENT ON FUNCTION dba.sp_health_check(boolean, text, integer) IS\n    'Consolidated PostgreSQL health check with severity-scored findings.';\n", "postgres/00_Framework/sp_dba_index_review.sql": "/*\n================================================================================\nsp_dba_index_review — Index usage, bloat signals, and missing FK indexes\n================================================================================\nDescription:\n    Reports unused indexes, high sequential scan tables, and foreign keys\n    without supporting indexes across the current database.\n\nUsage:\n    SELECT * FROM dba.sp_index_review(min_size_mb => 10);\n\nCriticality: Medium\n================================================================================\n*/\n\nCREATE OR REPLACE FUNCTION dba.sp_index_review(min_size_mb integer DEFAULT 10)\nRETURNS TABLE (\n    finding_type     text,\n    schema_name      text,\n    object_name      text,\n    index_name       text,\n    detail           text,\n    recommendation   text\n)\nLANGUAGE sql\nSTABLE\nAS $$\n    -- Unused indexes (never scanned since stats reset)\n    SELECT\n        'Unused Index',\n        schemaname,\n        relname,\n        indexrelname,\n        format('Size: %s; idx_scan=%s', pg_size_pretty(pg_relation_size(indexrelid)), idx_scan),\n        'Validate with business; consider DROP INDEX CONCURRENTLY after monitoring'\n    FROM pg_stat_user_indexes\n    WHERE idx_scan = 0\n      AND pg_relation_size(indexrelid) >= min_size_mb * 1024 * 1024\n      AND indexrelname NOT LIKE '%_pkey'\n\n    UNION ALL\n\n    -- High seq scan vs index scan ratio\n    SELECT\n        'High Sequential Scans',\n        schemaname,\n        relname,\n        NULL,\n        format('seq_scan=%s, idx_scan=%s, rows=%s',\n               seq_scan, idx_scan, n_live_tup),\n        'Review query plans; add selective indexes where appropriate'\n    FROM pg_stat_user_tables\n    WHERE seq_scan > idx_scan * 10\n      AND n_live_tup > 10000\n\n    UNION ALL\n\n    -- FK without index on referencing column\n    SELECT\n        'Missing FK Index',\n        n.nspname,\n        c.relname,\n        con.conname,\n        format('FK references %s.%s', fn.nspname, fc.relname),\n        'CREATE INDEX CONCURRENTLY on FK column to speed joins and cascades'\n    FROM pg_constraint con\n    JOIN pg_class c ON c.oid = con.conrelid\n    JOIN pg_namespace n ON n.oid = c.relnamespace\n    JOIN pg_class fc ON fc.oid = con.confrelid\n    JOIN pg_namespace fn ON fn.oid = fc.relnamespace\n    WHERE con.contype = 'f'\n      AND NOT EXISTS (\n          SELECT 1 FROM pg_index i\n          WHERE i.indrelid = con.conrelid\n            AND (i.indkey::smallint[])[0] = (con.conkey::smallint[])[0]\n      );\n$$;\n", "postgres/00_Framework/sp_dba_security_audit.sql": "/*\n================================================================================\nsp_dba_security_audit — Roles, privileges, and exposure checks\n================================================================================\nDescription:\n    Audits superusers, PUBLIC grants, default privileges, and databases\n  without forced row security where expected.\n\nUsage:\n    SELECT * FROM dba.sp_security_audit();\n\nCriticality: High\n================================================================================\n*/\n\nCREATE OR REPLACE FUNCTION dba.sp_security_audit()\nRETURNS TABLE (\n    severity         text,\n    area             text,\n    finding          text,\n    recommendation   text\n)\nLANGUAGE sql\nSTABLE\nAS $$\n    SELECT 'Critical', 'Roles', 'Superuser: ' || rolname,\n        'Limit superuser accounts; use least privilege roles'\n    FROM pg_roles WHERE rolsuper AND rolcanlogin\n\n    UNION ALL\n\n    SELECT 'High', 'PUBLIC', 'PUBLIC has CREATE on schema ' || nspname,\n        'REVOKE CREATE ON SCHEMA ... FROM PUBLIC'\n    FROM pg_namespace n\n    JOIN pg_roles r ON r.oid = n.nspowner\n    WHERE has_schema_privilege('public', n.oid, 'CREATE')\n      AND nspname NOT IN ('pg_catalog', 'information_schema', 'pg_toast')\n\n    UNION ALL\n\n    SELECT 'Medium', 'Connections', datname || ' allows unlimited connections',\n        'Consider CONNECTION LIMIT per database'\n    FROM pg_database\n    WHERE datconnlimit = -1 AND datallowconn AND datname NOT IN ('template0', 'template1')\n\n    UNION ALL\n\n    SELECT 'Medium', 'SSL', 'ssl = ' || setting,\n        CASE WHEN setting <> 'on' THEN 'Enable SSL for production' END\n    FROM pg_settings WHERE name = 'ssl'\n\n    UNION ALL\n\n    SELECT 'Info', 'Password', 'password_encryption = ' || setting, NULL\n    FROM pg_settings WHERE name = 'password_encryption';\n$$;\n", "postgres/00_Framework/sp_dba_wait_analysis.sql": "/*\n================================================================================\nsp_dba_wait_analysis — Wait event analysis with categories\n================================================================================\nDescription:\n    Aggregates current wait events from pg_stat_activity with categories and\n    recommendations (point-in-time snapshot, not cumulative like SQL Server).\n\nUsage:\n    SELECT * FROM dba.sp_wait_analysis(top_n => 20);\n\nCriticality: High\n================================================================================\n*/\n\nCREATE OR REPLACE FUNCTION dba.sp_wait_analysis(top_n integer DEFAULT 20)\nRETURNS TABLE (\n    wait_event_type  text,\n    wait_event       text,\n    session_count    bigint,\n    pct_of_waiting   numeric,\n    category         text,\n    recommendation   text\n)\nLANGUAGE sql\nSTABLE\nAS $$\n    WITH waiting AS (\n        SELECT wait_event_type, wait_event, count(*) AS cnt\n        FROM pg_stat_activity\n        WHERE wait_event IS NOT NULL\n          AND pid <> pg_backend_pid()\n          AND wait_event NOT IN (SELECT wait_event FROM dba.fn_excluded_wait_events())\n        GROUP BY wait_event_type, wait_event\n    ),\n    totals AS (\n        SELECT sum(cnt) AS total FROM waiting\n    )\n    SELECT\n        w.wait_event_type,\n        w.wait_event,\n        w.cnt,\n        round(100.0 * w.cnt / nullif(t.total, 0), 2),\n        CASE\n            WHEN w.wait_event ILIKE 'Lock%' OR w.wait_event_type = 'Lock' THEN 'Locking'\n            WHEN w.wait_event_type = 'IO' THEN 'Storage I/O'\n            WHEN w.wait_event ILIKE 'LWLock%' THEN 'Internal latch'\n            WHEN w.wait_event = 'WalSync' THEN 'WAL I/O'\n            WHEN w.wait_event_type = 'Client' THEN 'Client/Network'\n            ELSE 'Other'\n        END,\n        CASE\n            WHEN w.wait_event ILIKE 'Lock%' THEN 'Run blocking_and_locks.sql; shorten transactions'\n            WHEN w.wait_event_type = 'IO' THEN 'Check disk latency, checkpoint rate, and missing indexes'\n            WHEN w.wait_event = 'WalSync' THEN 'Review wal_buffers, synchronous_commit, storage throughput'\n            WHEN w.wait_event_type = 'Client' THEN 'Application not consuming results fast enough'\n            ELSE 'Correlate with pg_stat_statements and active query plans'\n        END\n    FROM waiting w\n    CROSS JOIN totals t\n    ORDER BY w.cnt DESC\n    LIMIT top_n;\n$$;\n", "postgres/00_Repository/00_create_repository.sql": "/*\n================================================================================\nDBA Repository — PostgreSQL governance database bootstrap\n================================================================================\nDescription:\n    Creates the dba_repository database and dba schema for framework objects,\n    baselines, and optional governance tables.\n\nAction:\n    Run as superuser: psql -f 00_create_repository.sql\n\nCriticality: Low (one-time setup)\n================================================================================\n*/\n\nSELECT format(\n    'CREATE DATABASE dba_repository WITH OWNER = %I ENCODING = ''UTF8'' LC_COLLATE = %L LC_CTYPE = %L',\n    current_user,\n    current_setting('lc_collate'),\n    current_setting('lc_ctype')\n)\nWHERE NOT EXISTS (SELECT 1 FROM pg_database WHERE datname = 'dba_repository')\\gexec\n\n\\connect dba_repository\n\nCREATE SCHEMA IF NOT EXISTS dba AUTHORIZATION CURRENT_USER;\n\nCOMMENT ON SCHEMA dba IS 'DBA essential scripts — framework and persistence objects';\n\nCREATE TABLE IF NOT EXISTS dba.baseline_snapshot (\n    snapshot_id       bigserial PRIMARY KEY,\n    snapshot_utc      timestamptz NOT NULL DEFAULT now(),\n    server_name       text NOT NULL DEFAULT current_setting('cluster_name', true),\n    metric_area       text NOT NULL,\n    metric_name       text NOT NULL,\n    metric_value      numeric,\n    metric_text       text,\n    database_name     text\n);\n\nCREATE INDEX IF NOT EXISTS ix_baseline_snapshot_utc\n    ON dba.baseline_snapshot (snapshot_utc DESC);\n\nCREATE TABLE IF NOT EXISTS dba.assessment_run (\n    run_id            bigserial PRIMARY KEY,\n    run_utc           timestamptz NOT NULL DEFAULT now(),\n    server_name       text NOT NULL,\n    profile           text NOT NULL DEFAULT 'Standard',\n    health_score      integer,\n    notes             text\n);\n\nCREATE TABLE IF NOT EXISTS dba.assessment_finding (\n    finding_id        bigserial PRIMARY KEY,\n    run_id            bigint REFERENCES dba.assessment_run(run_id) ON DELETE CASCADE,\n    check_id          integer,\n    severity          text NOT NULL,\n    area              text NOT NULL,\n    finding           text NOT NULL,\n    recommendation    text\n);\n\nCOMMENT ON TABLE dba.baseline_snapshot IS 'Point-in-time performance snapshots for trending';\n", "postgres/01_Server_OS/cpu_utilization.sql": "/*\n================================================================================\nCPU Utilization — Active query CPU and backend load\n================================================================================\nDescription:\n    Shows backends by state, long-running active queries, and parallel workers.\n    PostgreSQL does not expose historical CPU ring buffers like SQL Server;\n    use OS tools (top, pidstat) alongside this for host CPU.\n\nOutput:  Session counts, top CPU-time queries (from pg_stat_statements if available).\n\nAction:  High active count + long queries → run top_resource_queries.sql.\n         Many parallel workers → review max_parallel_workers_per_gather.\n\nCriticality: High\n================================================================================\n*/\n\nSELECT state, count(*) AS session_count,\n       'Point-in-time from pg_stat_activity' AS metric_context\nFROM pg_stat_activity\nWHERE backend_type = 'client backend'\nGROUP BY state\nORDER BY session_count DESC;\n\nSELECT pid, usename, datname, application_name,\n       round(extract(epoch FROM (now() - query_start))::numeric, 1) AS duration_sec,\n       wait_event_type, wait_event,\n       left(query, 120) AS query_snippet\nFROM pg_stat_activity\nWHERE state = 'active'\n  AND pid <> pg_backend_pid()\nORDER BY query_start\nLIMIT 20;\n\nDO $$\nBEGIN\n    IF EXISTS (SELECT 1 FROM pg_extension WHERE extname = 'pg_stat_statements') THEN\n        RAISE NOTICE 'See top_resource_queries.sql for pg_stat_statements CPU ranking.';\n    ELSE\n        RAISE NOTICE 'Install pg_stat_statements for query-level CPU history.';\n    END IF;\nEND $$;\n", "postgres/01_Server_OS/disk_io_analysis.sql": "/*\n================================================================================\nDisk I/O Analysis — Per-table and database I/O statistics\n================================================================================\nDescription:\n    Ranks databases and tables by blocks read/written and checkpoint impact.\n    Correlates with checkpoint activity from pg_stat_bgwriter.\n\nAction:  High heap_blks_read → missing indexes or insufficient cache.\n         High idx_blks_read on small tables → review index usage.\n\nCriticality: High\n================================================================================\n*/\n\nSELECT datname,\n       pg_size_pretty(pg_database_size(datname)) AS db_size,\n       blks_read, blks_hit,\n       tup_returned, tup_fetched, tup_inserted, tup_updated, tup_deleted\nFROM pg_stat_database\nWHERE datname NOT IN ('template0', 'template1')\nORDER BY blks_read DESC;\n\nSELECT schemaname, relname,\n       heap_blks_read, heap_blks_hit,\n       idx_blks_read, idx_blks_hit,\n       pg_size_pretty(pg_total_relation_size(relid)) AS total_size,\n       round(100.0 * heap_blks_hit / nullif(heap_blks_hit + heap_blks_read, 0), 2) AS heap_hit_pct\nFROM pg_statio_user_tables\nORDER BY heap_blks_read DESC\nLIMIT 25;\n\nSELECT checkpoints_timed, checkpoints_req,\n       checkpoint_write_time, checkpoint_sync_time,\n       buffers_checkpoint, buffers_clean, buffers_backend,\n       CASE WHEN checkpoints_req > checkpoints_timed * 2\n            THEN 'WARNING: Frequent requested checkpoints — tune max_wal_size'\n            ELSE 'OK' END AS checkpoint_status\nFROM pg_stat_bgwriter;\n", "postgres/01_Server_OS/memory_diagnostics.sql": "/*\n================================================================================\nMemory Diagnostics — Buffer cache, settings, and memory pressure signals\n================================================================================\nDescription:\n    Reviews shared_buffers, work_mem, effective_cache_size, and buffer hit ratio.\n    Flags high temp file usage and active memory-heavy queries.\n\nAction:  Buffer hit ratio < 99% on OLTP → increase shared_buffers or reduce seq scans.\n         High temp_bytes in pg_stat_statements → lower work_mem per query or optimize sorts.\n\nCriticality: High\n================================================================================\n*/\n\nSELECT name, setting, unit, short_desc\nFROM pg_settings\nWHERE name IN (\n    'shared_buffers', 'effective_cache_size', 'work_mem', 'maintenance_work_mem',\n    'huge_pages', 'temp_buffers', 'max_connections'\n)\nORDER BY name;\n\nSELECT datname,\n       blks_hit,\n       blks_read,\n       round(100.0 * blks_hit / nullif(blks_hit + blks_read, 0), 2) AS buffer_hit_pct,\n       CASE WHEN blks_hit + blks_read > 0 AND 100.0 * blks_hit / (blks_hit + blks_read) < 99\n            THEN 'WARNING: Low buffer hit ratio'\n            ELSE 'OK' END AS status\nFROM pg_stat_database\nWHERE datname = current_database();\n\nSELECT pid, usename, datname,\n       round(extract(epoch FROM (now() - query_start))::numeric, 1) AS duration_sec,\n       left(query, 100) AS query_snippet\nFROM pg_stat_activity\nWHERE state = 'active'\n  AND wait_event IN ('BufferPin', 'BufferIO', 'Lock')\n  AND pid <> pg_backend_pid()\nORDER BY query_start\nLIMIT 15;\n", "postgres/02_Instance_Config/connection_settings.sql": "/*\n================================================================================\nConnection Settings — Limits, timeouts, and pooling readiness\n================================================================================\nDescription:\n    Reviews connection limits, timeout settings, and current connection breakdown.\n\nAction:  Enable idle_in_transaction_session_timeout and statement_timeout in production.\n         Use connection pooling when max_connections is stressed.\n\nCriticality: Medium\n================================================================================\n*/\n\nSELECT name, setting, unit, short_desc\nFROM pg_settings\nWHERE name IN (\n    'max_connections', 'superuser_reserved_connections',\n    'statement_timeout', 'lock_timeout', 'idle_in_transaction_session_timeout',\n    'tcp_keepalives_idle', 'tcp_keepalives_interval'\n)\nORDER BY name;\n\nSELECT datname, numbackends, datconnlimit,\n       CASE WHEN datconnlimit = -1 THEN 'unlimited' ELSE datconnlimit::text END AS conn_limit\nFROM pg_stat_database d\nJOIN pg_database db ON db.datname = d.datname\nWHERE d.datname NOT IN ('template0', 'template1')\nORDER BY numbackends DESC;\n\nSELECT application_name, usename, client_addr, state, count(*) AS sessions\nFROM pg_stat_activity\nWHERE backend_type = 'client backend'\nGROUP BY application_name, usename, client_addr, state\nORDER BY sessions DESC\nLIMIT 20;\n", "postgres/02_Instance_Config/extension_audit.sql": "/*\n================================================================================\nExtension Audit — Installed extensions and versions\n================================================================================\nDescription:\n    Lists all extensions with schema, version, and relocation status.\n    Flags common production extensions that should be present or updated.\n\nAction:  Keep extensions patched with minor PG upgrades; review untrusted extensions.\n\nCriticality: Low\n================================================================================\n*/\n\nSELECT e.extname, n.nspname AS schema, e.extversion,\n       e.extrelocatable,\n       CASE e.extname\n           WHEN 'pg_stat_statements' THEN 'Recommended for query diagnostics'\n           WHEN 'pgcrypto' THEN 'Cryptographic functions'\n           WHEN 'citext' THEN 'Case-insensitive text'\n           WHEN 'postgis' THEN 'Geospatial — verify version compatibility'\n           ELSE NULL\n       END AS notes\nFROM pg_extension e\nJOIN pg_namespace n ON n.oid = e.extnamespace\nORDER BY e.extname;\n\nSELECT 'pg_stat_statements' AS recommended,\n       EXISTS (SELECT 1 FROM pg_extension WHERE extname = 'pg_stat_statements') AS installed;\n", "postgres/02_Instance_Config/postgresql_conf_audit.sql": "/*\n================================================================================\nPostgreSQL Configuration Audit — Production-critical GUC parameters\n================================================================================\nDescription:\n    Flags misconfigured parameters for OLTP/OLAP production workloads.\n\nAction:  Review flagged settings against workload; change via ALTER SYSTEM + reload.\n\nCriticality: Medium\n================================================================================\n*/\n\nWITH settings AS (\n    SELECT name, setting, unit, source, pending_restart\n    FROM pg_settings\n    WHERE name IN (\n        'max_connections', 'shared_buffers', 'effective_cache_size', 'work_mem',\n        'maintenance_work_mem', 'wal_buffers', 'checkpoint_timeout', 'max_wal_size',\n        'min_wal_size', 'random_page_cost', 'effective_io_concurrency',\n        'max_parallel_workers', 'max_parallel_workers_per_gather',\n        'autovacuum', 'autovacuum_max_workers', 'autovacuum_naptime',\n        'log_min_duration_statement', 'log_checkpoints', 'log_lock_waits',\n        'track_io_timing', 'shared_preload_libraries', 'synchronous_commit',\n        'full_page_writes', 'wal_compression', 'jit'\n    )\n)\nSELECT name, setting, unit, source, pending_restart,\n       CASE name\n           WHEN 'max_connections' THEN\n               CASE WHEN setting::int > 500 THEN 'REVIEW: Very high max_connections — prefer pooling'\n                    WHEN setting::int > 200 THEN 'INFO: Consider PgBouncer' END\n           WHEN 'shared_buffers' THEN\n               CASE WHEN pg_size_bytes(setting || coalesce(unit, '')) < pg_size_bytes('256MB')\n                    THEN 'WARNING: shared_buffers may be too low' END\n           WHEN 'autovacuum' THEN\n               CASE WHEN setting = 'off' THEN 'CRITICAL: autovacuum disabled' END\n           WHEN 'log_min_duration_statement' THEN\n               CASE WHEN setting = '-1' THEN 'INFO: No slow query logging enabled' END\n           WHEN 'track_io_timing' THEN\n               CASE WHEN setting = 'off' THEN 'INFO: Enable for I/O wait analysis' END\n           WHEN 'shared_preload_libraries' THEN\n               CASE WHEN setting NOT LIKE '%pg_stat_statements%'\n                    THEN 'INFO: Add pg_stat_statements to shared_preload_libraries' END\n       END AS audit_note\nFROM settings\nORDER BY name;\n", "postgres/03_Storage/bloat_analysis.sql": "/*\n================================================================================\nBloat Analysis — Dead tuples and estimated table bloat\n================================================================================\nDescription:\n    Identifies tables with high dead tuple ratio and vacuum lag.\n    For precise bloat estimates, use pgstattuple extension (optional).\n\nAction:  Run VACUUM (ANALYZE) on flagged tables; tune autovacuum per table if needed.\n\nCriticality: Medium\n================================================================================\n*/\n\nSELECT schemaname, relname,\n       n_live_tup, n_dead_tup,\n       round(100.0 * n_dead_tup / nullif(n_live_tup + n_dead_tup, 0), 2) AS dead_pct,\n       last_vacuum, last_autovacuum, last_analyze, last_autoanalyze,\n       pg_size_pretty(pg_total_relation_size(relid)) AS total_size,\n       CASE\n           WHEN n_dead_tup > 100000 AND coalesce(last_autovacuum, 'epoch'::timestamptz) < now() - interval '7 days'\n               THEN 'CRITICAL: High dead tuples, stale vacuum'\n           WHEN n_dead_tup > 10000 AND n_dead_tup > n_live_tup\n               THEN 'WARNING: Dead tuples exceed live tuples'\n           ELSE 'OK'\n       END AS bloat_status\nFROM pg_stat_user_tables\nWHERE n_dead_tup > 0\nORDER BY n_dead_tup DESC\nLIMIT 40;\n", "postgres/03_Storage/database_size_and_growth.sql": "/*\n================================================================================\nDatabase Size and Growth — Capacity overview\n================================================================================\nDescription:\n    Database sizes, largest tables, and toast/index breakdown.\n\nAction:  Plan disk capacity; archive or partition tables exceeding retention policy.\n\nCriticality: Medium\n================================================================================\n*/\n\nSELECT datname,\n       pg_size_pretty(pg_database_size(datname)) AS size,\n       pg_database_size(datname) AS size_bytes\nFROM pg_database\nWHERE datallowconn\nORDER BY pg_database_size(datname) DESC;\n\nSELECT schemaname, relname,\n       pg_size_pretty(pg_total_relation_size(relid)) AS total_size,\n       pg_size_pretty(pg_relation_size(relid)) AS table_size,\n       pg_size_pretty(pg_indexes_size(relid)) AS indexes_size,\n       n_live_tup, n_dead_tup,\n       last_vacuum, last_autovacuum\nFROM pg_stat_user_tables\nORDER BY pg_total_relation_size(relid) DESC\nLIMIT 30;\n", "postgres/03_Storage/tablespace_audit.sql": "/*\n================================================================================\nTablespace Audit — Locations, sizes, and disk mapping\n================================================================================\nDescription:\n    Lists tablespaces with filesystem locations and per-database usage.\n\nAction:  Ensure tablespaces map to correct storage tiers; monitor disk free space.\n\nCriticality: Medium\n================================================================================\n*/\n\nSELECT spcname, pg_catalog.pg_get_userbyid(spcowner) AS owner,\n       pg_tablespace_location(oid) AS location\nFROM pg_tablespace\nORDER BY spcname;\n\nSELECT t.spcname,\n       pg_size_pretty(sum(pg_tablespace_size(t.oid))) AS total_size\nFROM pg_tablespace t\nGROUP BY t.spcname;\n", "postgres/03_Storage/wal_archiving.sql": "/*\n================================================================================\nWAL Archiving — Archive mode, status, and retention\n================================================================================\nDescription:\n    WAL level, archive settings, archiver statistics, and current WAL position.\n\nAction:  Fix archive failures before they break PITR; verify archive_command in staging.\n\nCriticality: High\n================================================================================\n*/\n\nSELECT name, setting FROM pg_settings\nWHERE name IN ('wal_level', 'archive_mode', 'archive_command', 'archive_timeout',\n               'max_wal_size', 'min_wal_size', 'wal_compression');\n\nSELECT * FROM pg_stat_archiver;\n\nSELECT pg_current_wal_lsn() AS current_lsn,\n       pg_walfile_name(pg_current_wal_lsn()) AS current_wal_file;\n", "postgres/04_Performance_Diagnostics/blocking_and_locks.sql": "/*\n================================================================================\nBlocking and Locks — Blocking chains and lock holders\n================================================================================\nDescription:\n    Identifies blocked sessions, blocking PIDs, lock modes, and wait durations.\n\nAction:  Contact app owner for head blocker; use pg_cancel_backend() or pg_terminate_backend() with care.\n\nCriticality: High\n================================================================================\n*/\n\nSELECT blocked.pid AS blocked_pid,\n       blocked.usename AS blocked_user,\n       blocked.datname,\n       blocked.application_name,\n       blocking.pid AS blocking_pid,\n       blocking.usename AS blocking_user,\n       round(extract(epoch FROM (now() - blocked.query_start))::numeric, 1) AS blocked_sec,\n       blocked.wait_event_type,\n       blocked.wait_event,\n       left(blocked.query, 80) AS blocked_query,\n       left(blocking.query, 80) AS blocking_query\nFROM pg_stat_activity blocked\nJOIN pg_stat_activity blocking ON blocking.pid = ANY(pg_blocking_pids(blocked.pid))\nWHERE blocked.pid <> pg_backend_pid()\nORDER BY blocked_sec DESC;\n\nSELECT l.locktype, l.mode, l.granted,\n       a.pid, a.usename, a.datname, a.state,\n       left(a.query, 60) AS query_snippet\nFROM pg_locks l\nJOIN pg_stat_activity a ON a.pid = l.pid\nWHERE NOT l.granted\nORDER BY a.query_start\nLIMIT 30;\n", "postgres/04_Performance_Diagnostics/top_resource_queries.sql": "/*\n================================================================================\nTop Resource Queries — pg_stat_statements ranking\n================================================================================\nDescription:\n    Top queries by total time, mean time, calls, and temp I/O.\n    Requires pg_stat_statements extension.\n\nAction:  Optimize or index top offenders; reset stats only after capturing baseline.\n\nCriticality: High\n================================================================================\n*/\n\nDO $$\nBEGIN\n    IF NOT EXISTS (SELECT 1 FROM pg_extension WHERE extname = 'pg_stat_statements') THEN\n        RAISE EXCEPTION 'pg_stat_statements not installed. Add to shared_preload_libraries and CREATE EXTENSION.';\n    END IF;\nEND $$;\n\nSELECT calls,\n       round(total_exec_time::numeric, 2) AS total_ms,\n       round(mean_exec_time::numeric, 2) AS mean_ms,\n       round((100 * total_exec_time / sum(total_exec_time) OVER ())::numeric, 2) AS pct_total_time,\n       rows,\n       shared_blks_hit, shared_blks_read,\n       temp_blks_read, temp_blks_written,\n       left(query, 200) AS query_snippet\nFROM pg_stat_statements\nWHERE dbid = (SELECT oid FROM pg_database WHERE datname = current_database())\nORDER BY total_exec_time DESC\nLIMIT 20;\n\nSELECT calls,\n       round(mean_exec_time::numeric, 2) AS mean_ms,\n       left(query, 200) AS query_snippet\nFROM pg_stat_statements\nWHERE dbid = (SELECT oid FROM pg_database WHERE datname = current_database())\n  AND calls > 10\nORDER BY mean_exec_time DESC\nLIMIT 15;\n", "postgres/04_Performance_Diagnostics/vacuum_analyze_status.sql": "/*\n================================================================================\nVacuum and Analyze Status — Maintenance health per table\n================================================================================\nDescription:\n    Tables needing VACUUM/ANALYZE based on dead tuples and stats age.\n\nAction:  VACUUM ANALYZE on flagged tables; adjust autovacuum storage parameters for hot tables.\n\nCriticality: Medium\n================================================================================\n*/\n\nSELECT schemaname, relname,\n       n_live_tup, n_dead_tup,\n       last_vacuum, last_autovacuum,\n       last_analyze, last_autoanalyze,\n       vacuum_count, autovacuum_count,\n       CASE\n           WHEN n_dead_tup > 50000 AND last_autovacuum < now() - interval '3 days'\n               THEN 'VACUUM recommended'\n           WHEN last_analyze IS NULL OR last_analyze < now() - interval '14 days'\n               THEN 'ANALYZE recommended'\n           ELSE 'OK'\n       END AS maintenance_action\nFROM pg_stat_user_tables\nORDER BY n_dead_tup DESC\nLIMIT 40;\n\nSELECT datname,\n       age(datfrozenxid) AS xid_age,\n       current_setting('autovacuum_freeze_max_age')::bigint AS freeze_max_age,\n       CASE WHEN age(datfrozenxid) > current_setting('autovacuum_freeze_max_age')::bigint * 0.75\n            THEN 'WARNING: Approaching wraparound — prioritize vacuum'\n            ELSE 'OK' END AS wraparound_status\nFROM pg_database\nWHERE datallowconn AND datname NOT IN ('template0', 'template1');\n", "postgres/04_Performance_Diagnostics/wait_events.sql": "/*\n================================================================================\nWait Events — Current wait snapshot with categories\n================================================================================\nDescription:\n    Point-in-time wait events from pg_stat_activity (not cumulative).\n    Uses dba.fn_excluded_wait_events() when framework is deployed.\n\nAction:  Top Lock waits → blocking_and_locks.sql. IO waits → disk_io_analysis.sql.\n\nCriticality: High\n================================================================================\n*/\n\nSELECT now() AS snapshot_time,\n       pg_postmaster_start_time() AS instance_start_time,\n       'Waits are point-in-time, not cumulative since startup' AS metric_context;\n\nWITH excluded AS (\n    SELECT wait_event FROM dba.fn_excluded_wait_events()\n    WHERE EXISTS (SELECT 1 FROM pg_namespace WHERE nspname = 'dba')\n    UNION ALL\n    SELECT unnest(ARRAY['ClientRead','ClientWrite','Timeout','PgSleep']) WHERE NOT EXISTS (\n        SELECT 1 FROM pg_namespace WHERE nspname = 'dba'\n    )\n)\nSELECT wait_event_type, wait_event, count(*) AS sessions,\n       round(100.0 * count(*) / sum(count(*)) OVER (), 2) AS pct,\n       CASE\n           WHEN wait_event_type = 'Lock' THEN 'Blocking — run blocking_and_locks.sql'\n           WHEN wait_event_type = 'IO' THEN 'Storage I/O — run disk_io_analysis.sql'\n           WHEN wait_event = 'WalSync' THEN 'WAL sync — review storage and synchronous_commit'\n           WHEN wait_event_type = 'LWLock' THEN 'Internal contention — check pg_stat_activity detail'\n           ELSE 'See wait_events_reference.sql'\n       END AS recommendation\nFROM pg_stat_activity\nWHERE wait_event IS NOT NULL\n  AND pid <> pg_backend_pid()\n  AND wait_event NOT IN (SELECT wait_event FROM excluded)\nGROUP BY wait_event_type, wait_event\nORDER BY sessions DESC\nLIMIT 20;\n", "postgres/04_Performance_Diagnostics/wait_events_reference.sql": "/*\n================================================================================\nWait Events Reference — Common PostgreSQL waits with investigation steps\n================================================================================\nDescription:\n    Educational reference for junior DBAs mapping wait events to actions.\n\nCriticality: Low (reference)\n================================================================================\n*/\n\nSELECT wait_event, category, typical_cause, investigation\nFROM (VALUES\n    ('relation', 'Lock', 'Concurrent DDL/DML on same table', 'SELECT * FROM blocking_and_locks.sql'),\n    ('transactionid', 'Lock', 'Row-level lock waiting for another xact', 'Find blocking pid via pg_blocking_pids()'),\n    ('tuple', 'Lock', 'Hot page / concurrent updates', 'Reduce transaction duration; review HOT updates'),\n    ('DataFileRead', 'IO', 'Reading heap/index pages from disk', 'Check buffer hit ratio; add indexes'),\n    ('BufferIO', 'IO', 'Buffer manager I/O', 'Correlate with checkpoint and bgwriter stats'),\n    ('WalSync', 'IO', 'WAL flush to disk', 'Review wal_sync_method, storage latency'),\n    ('WalWrite', 'IO', 'Writing WAL buffers', 'High write load — batch commits if safe'),\n    ('ClientRead', 'Client', 'Server waiting for client', 'App not fetching rows; reduce result sets'),\n    ('ClientWrite', 'Client', 'Server waiting to send to client', 'Network or client processing delay'),\n    ('ParallelBitmapScan', 'CPU', 'Parallel query execution', 'Review max_parallel_workers settings'),\n    ('ProcArray', 'LWLock', 'Snapshot / proc array contention', 'Very high connection churn'),\n    ('BufferContent', 'LWLock', 'Buffer page contention', 'Heavy concurrent access same pages')\n) AS ref(wait_event, category, typical_cause, investigation)\nORDER BY category, wait_event;\n", "postgres/05_Index_Statistics/duplicate_indexes.sql": "/*\n================================================================================\nDuplicate Indexes — Same column sets (key columns)\n================================================================================\nDescription:\n    Finds indexes on identical leading key columns within the same table.\n\nAction:  Drop redundant index after confirming included columns and usage.\n\nCriticality: Medium\n================================================================================\n*/\n\nWITH index_cols AS (\n    SELECT\n        n.nspname AS schema_name,\n        t.relname AS table_name,\n        i.relname AS index_name,\n        array_agg(a.attname ORDER BY k.n) AS key_columns\n    FROM pg_index ix\n    JOIN pg_class t ON t.oid = ix.indrelid\n    JOIN pg_class i ON i.oid = ix.indexrelid\n    JOIN pg_namespace n ON n.oid = t.relnamespace\n    JOIN LATERAL unnest(ix.indkey) WITH ORDINALITY AS k(attnum, n) ON true\n    JOIN pg_attribute a ON a.attrelid = t.oid AND a.attnum = k.attnum\n    WHERE NOT ix.indisprimary\n    GROUP BY n.nspname, t.relname, i.relname\n)\nSELECT i1.schema_name, i1.table_name,\n       i1.index_name AS index_1,\n       i2.index_name AS index_2,\n       i1.key_columns\nFROM index_cols i1\nJOIN index_cols i2\n  ON i1.schema_name = i2.schema_name\n AND i1.table_name = i2.table_name\n AND i1.key_columns = i2.key_columns\n AND i1.index_name < i2.index_name\nORDER BY i1.schema_name, i1.table_name;\n", "postgres/05_Index_Statistics/index_usage_efficiency.sql": "/*\n================================================================================\nIndex Usage Efficiency — Scans, size, and utilization\n================================================================================\nDescription:\n    Index vs sequential scan ratio and index access counts.\n\nAction:  Drop unused large indexes after validation; add indexes where seq_scan dominates.\n\nCriticality: Medium\n================================================================================\n*/\n\nSELECT schemaname, relname,\n       seq_scan, seq_tup_read, idx_scan, idx_tup_fetch,\n       n_live_tup,\n       CASE WHEN seq_scan > coalesce(idx_scan, 0) * 5 AND n_live_tup > 10000\n            THEN 'High sequential scans' ELSE 'OK' END AS scan_status\nFROM pg_stat_user_tables\nORDER BY seq_scan DESC\nLIMIT 25;\n\nSELECT schemaname, relname, indexrelname,\n       idx_scan, idx_tup_read, idx_tup_fetch,\n       pg_size_pretty(pg_relation_size(indexrelid)) AS index_size\nFROM pg_stat_user_indexes\nORDER BY idx_scan ASC, pg_relation_size(indexrelid) DESC\nLIMIT 25;\n", "postgres/05_Index_Statistics/statistics_freshness.sql": "/*\n================================================================================\nStatistics Freshness — Stale stats detection\n================================================================================\nDescription:\n    Tables with old ANALYZE timestamps or high modification since analyze.\n\nAction:  ANALYZE affected tables; consider autovacuum_analyze_scale_factor per table.\n\nCriticality: Medium\n================================================================================\n*/\n\nSELECT schemaname, relname,\n       n_mod_since_analyze,\n       n_live_tup,\n       last_analyze, last_autoanalyze,\n       CASE\n           WHEN n_live_tup > 0 AND n_mod_since_analyze::float / n_live_tup > 0.2\n               THEN 'WARNING: >20% rows changed since analyze'\n           WHEN coalesce(last_analyze, last_autoanalyze) < now() - interval '30 days'\n               THEN 'WARNING: Stats older than 30 days'\n           ELSE 'OK'\n       END AS stats_status\nFROM pg_stat_user_tables\nWHERE n_live_tup > 1000\nORDER BY n_mod_since_analyze DESC\nLIMIT 40;\n", "postgres/05_Index_Statistics/unused_indexes.sql": "/*\n================================================================================\nUnused Indexes — Zero-scan indexes above size threshold\n================================================================================\nDescription:\n    Indexes with idx_scan = 0 since last stats reset (post restart or pg_stat_reset).\n\nAction:  Confirm with business; DROP INDEX CONCURRENTLY during maintenance window.\n\nCriticality: Medium\n================================================================================\n*/\n\nSELECT schemaname, relname, indexrelname,\n       idx_scan,\n       pg_size_pretty(pg_relation_size(indexrelid)) AS index_size,\n       pg_relation_size(indexrelid) AS size_bytes,\n       'Consider DROP INDEX CONCURRENTLY after monitoring period' AS recommendation\nFROM pg_stat_user_indexes\nWHERE idx_scan = 0\n  AND indexrelname NOT LIKE '%_pkey'\n  AND pg_relation_size(indexrelid) > 10 * 1024 * 1024\nORDER BY pg_relation_size(indexrelid) DESC;\n", "postgres/06_HA_DR/backup_verification.sql": "/*\n================================================================================\nBackup Verification — Archive chain and PITR readiness\n================================================================================\nDescription:\n    Validates WAL archiving health and settings required for point-in-time recovery.\n\nAction:  Test restore monthly; integrate with pgBackRest/Barman/WAL-G where used.\n\nCriticality: High\n================================================================================\n*/\n\nSELECT * FROM dba.sp_backup_review(24)\nWHERE EXISTS (SELECT 1 FROM pg_namespace WHERE nspname = 'dba');\n\nSELECT name, setting,\n       CASE name\n           WHEN 'archive_mode' THEN CASE WHEN setting <> 'on' THEN 'FAIL' ELSE 'PASS' END\n           WHEN 'archive_command' THEN CASE WHEN setting = '' OR setting IS NULL THEN 'FAIL' ELSE 'PASS' END\n           ELSE 'INFO'\n       END AS check_result\nFROM pg_settings\nWHERE name IN ('archive_mode', 'archive_command', 'restore_command', 'wal_level')\n  AND NOT EXISTS (SELECT 1 FROM pg_namespace WHERE nspname = 'dba');\n\nSELECT failed_count, last_failed_wal, last_failed_time,\n       last_archived_wal, last_archived_time,\n       CASE WHEN failed_count > 0 THEN 'CRITICAL: Archive failures detected' ELSE 'OK' END AS status\nFROM pg_stat_archiver;\n", "postgres/06_HA_DR/logical_replication_status.sql": "/*\n================================================================================\nLogical Replication Status — Publications and subscriptions\n================================================================================\nDescription:\n    Logical replication slots, publications, subscriptions, and worker state.\n\nAction:  Inactive replication slots can retain WAL — monitor pg_replication_slots.\n\nCriticality: High\n================================================================================\n*/\n\nSELECT slot_name, plugin, slot_type, database, active,\n       pg_size_pretty(pg_wal_lsn_diff(pg_current_wal_lsn(), restart_lsn)) AS retained_wal,\n       active_pid\nFROM pg_replication_slots\nORDER BY pg_wal_lsn_diff(pg_current_wal_lsn(), restart_lsn) DESC;\n\nSELECT pubname, puballtables, pubinsert, pubupdate, pubdelete, pubtruncate\nFROM pg_publication;\n\nSELECT subname, subenabled, subconninfo, subslotname\nFROM pg_subscription;\n\nSELECT subname, relid::regclass, received_lsn, latest_end_lsn, last_msg_send_time, last_msg_receipt_time\nFROM pg_stat_subscription;\n", "postgres/06_HA_DR/replication_lag.sql": "/*\n================================================================================\nReplication Lag — Byte and time lag with thresholds\n================================================================================\nDescription:\n    Quantifies replication lag for alerting and failover decisions.\n\nAction:  Set monitoring alerts on replay_lag_bytes; investigate before automatic failover.\n\nCriticality: High\n================================================================================\n*/\n\nSELECT pid, application_name, state,\n       pg_size_pretty(pg_wal_lsn_diff(pg_current_wal_lsn(), replay_lsn)) AS replay_lag,\n       pg_wal_lsn_diff(pg_current_wal_lsn(), replay_lsn) AS replay_lag_bytes,\n       replay_lag AS replay_lag_time,\n       CASE\n           WHEN pg_wal_lsn_diff(pg_current_wal_lsn(), replay_lsn) > pg_size_bytes('1GB')\n               THEN 'CRITICAL'\n           WHEN pg_wal_lsn_diff(pg_current_wal_lsn(), replay_lsn) > pg_size_bytes('100MB')\n               THEN 'WARNING'\n           ELSE 'OK'\n       END AS lag_status\nFROM pg_stat_replication;\n", "postgres/06_HA_DR/streaming_replication_status.sql": "/*\n================================================================================\nStreaming Replication Status — Physical replicas health\n================================================================================\nDescription:\n    Replica connection state, sync mode, lag bytes, and replay pause.\n\nAction:  Lag > SLA → check replica I/O, network, long queries on replica, vacuum on primary.\n\nCriticality: High\n================================================================================\n*/\n\nSELECT application_name, client_addr, state, sync_state,\n       pg_wal_lsn_diff(pg_current_wal_lsn(), sent_lsn) AS send_lag_bytes,\n       pg_wal_lsn_diff(pg_current_wal_lsn(), flush_lsn) AS flush_lag_bytes,\n       pg_wal_lsn_diff(pg_current_wal_lsn(), replay_lsn) AS replay_lag_bytes,\n       write_lag, flush_lag, replay_lag,\n       backend_start\nFROM pg_stat_replication;\n\nSELECT pg_is_in_recovery() AS is_replica,\n       CASE WHEN pg_is_in_recovery() THEN pg_last_wal_receive_lsn() END AS receive_lsn,\n       CASE WHEN pg_is_in_recovery() THEN pg_last_wal_replay_lsn() END AS replay_lsn;\n", "postgres/07_Security/connection_encryption.sql": "/*\n================================================================================\nConnection Encryption — SSL/TLS configuration review\n================================================================================\nDescription:\n    Server SSL settings and current connection SSL usage.\n\nAction:  Enable ssl=on; use hostssl in pg_hba.conf; require TLS 1.2+ in production.\n\nCriticality: High\n================================================================================\n*/\n\nSELECT name, setting, short_desc\nFROM pg_settings\nWHERE name IN ('ssl', 'ssl_cert_file', 'ssl_key_file', 'ssl_ca_file', 'ssl_min_protocol_version');\n\nSELECT pid, usename, datname, client_addr, ssl, version, cipher\nFROM pg_stat_ssl s\nJOIN pg_stat_activity a ON a.pid = s.pid\nWHERE a.backend_type = 'client backend';\n\nSELECT count(*) FILTER (WHERE ssl) AS ssl_connections,\n       count(*) FILTER (WHERE NOT ssl) AS non_ssl_connections\nFROM pg_stat_ssl s\nJOIN pg_stat_activity a ON a.pid = s.pid\nWHERE a.backend_type = 'client backend';\n", "postgres/07_Security/password_policy_audit.sql": "/*\n================================================================================\nPassword Policy Audit — Authentication methods and password settings\n================================================================================\nDescription:\n    Reviews password_encryption, auth settings, and roles without password expiry\n    (PostgreSQL uses external IAM/LDAP or pg_hba for enterprise auth).\n\nAction:  Use scram-sha-256; avoid trust auth in production; integrate SSO where possible.\n\nCriticality: Medium\n================================================================================\n*/\n\nSELECT name, setting FROM pg_settings\nWHERE name IN ('password_encryption', 'authentication_timeout', 'db_user_namespace');\n\nSELECT rolname, rolvaliduntil,\n       CASE WHEN rolvaliduntil IS NOT NULL AND rolvaliduntil < now()\n            THEN 'EXPIRED' WHEN rolcanlogin THEN 'ACTIVE' ELSE 'NOLOGIN' END AS status\nFROM pg_roles\nWHERE rolcanlogin\nORDER BY rolname;\n\n-- Review pg_hba.conf externally; this query lists expected auth methods in use\nSELECT 'Review pg_hba.conf for trust/peer on non-local connections' AS recommendation;\n", "postgres/07_Security/role_privilege_audit.sql": "/*\n================================================================================\nRole and Privilege Audit — Grants, superusers, and exposure\n================================================================================\nDescription:\n    Lists role memberships, dangerous grants, and object-level privileges.\n\nAction:  Revoke excessive grants; enforce least privilege; rotate superuser accounts.\n\nCriticality: High\n================================================================================\n*/\n\nSELECT rolname, rolsuper, rolcreaterole, rolcreatedb, rolcanlogin, rolreplication\nFROM pg_roles\nWHERE rolcanlogin\nORDER BY rolsuper DESC, rolname;\n\nSELECT grantor, grantee, table_schema, table_name, privilege_type\nFROM information_schema.role_table_grants\nWHERE grantee IN ('PUBLIC', 'authenticated', 'anon')\n   OR grantee IN (SELECT rolname FROM pg_roles WHERE rolcanlogin AND NOT rolsuper)\nORDER BY table_schema, table_name, grantee\nLIMIT 100;\n\nSELECT nspname,\n       has_schema_privilege('public', oid, 'CREATE') AS public_can_create\nFROM pg_namespace\nWHERE nspname NOT LIKE 'pg_%' AND nspname <> 'information_schema';\n", "postgres/08_Advanced/autovacuum_health.sql": "/*\n================================================================================\nAutovacuum Health — Workers, settings, and table-level tuning\n================================================================================\nDescription:\n    Autovacuum configuration and tables with custom storage parameters.\n\nAction:  Increase autovacuum_max_workers on large catalogs; per-table autovacuum for hot tables.\n\nCriticality: Medium\n================================================================================\n*/\n\nSELECT name, setting, unit FROM pg_settings\nWHERE name LIKE 'autovacuum%'\nORDER BY name;\n\nSELECT schemaname, relname,\n       reloptions,\n       n_dead_tup, last_autovacuum\nFROM pg_stat_user_tables t\nJOIN pg_class c ON c.relname = t.relname\nJOIN pg_namespace n ON n.oid = c.relnamespace AND n.nspname = t.schemaname\nWHERE reloptions IS NOT NULL\nORDER BY n_dead_tup DESC\nLIMIT 20;\n\nSELECT count(*) AS autovacuum_workers_active\nFROM pg_stat_activity\nWHERE query LIKE 'autovacuum:%';\n", "postgres/08_Advanced/checkpoint_and_wal.sql": "/*\n================================================================================\nCheckpoint and WAL — Write amplification and tuning signals\n================================================================================\nDescription:\n    Checkpoint frequency, WAL generation rate, and bgwriter behavior.\n\nAction:  Increase max_wal_size if checkpoints_req dominates; enable wal_compression if supported.\n\nCriticality: Medium\n================================================================================\n*/\n\nSELECT * FROM pg_stat_bgwriter;\n\nSELECT name, setting, unit FROM pg_settings\nWHERE name IN ('checkpoint_timeout', 'checkpoint_completion_target',\n               'max_wal_size', 'min_wal_size', 'wal_compression', 'wal_level');\n\nSELECT pg_current_wal_lsn(),\n       pg_wal_lsn_diff(pg_current_wal_lsn(), '0/0') AS wal_bytes_generated;\n", "postgres/08_Advanced/connection_analysis.sql": "/*\n================================================================================\nConnection Analysis — Client patterns and connection age\n================================================================================\nDescription:\n    Connection age distribution, client addresses, and backend types.\n\nAction:  Stale idle connections → reduce pool size or enable timeouts.\n\nCriticality: Medium\n================================================================================\n*/\n\nSELECT state, count(*) AS sessions,\n       round(avg(extract(epoch FROM (now() - backend_start)))::numeric, 0) AS avg_age_sec,\n       round(max(extract(epoch FROM (now() - backend_start)))::numeric, 0) AS max_age_sec\nFROM pg_stat_activity\nWHERE backend_type = 'client backend'\nGROUP BY state\nORDER BY sessions DESC;\n\nSELECT client_addr, application_name, usename, count(*) AS connections\nFROM pg_stat_activity\nWHERE backend_type = 'client backend'\nGROUP BY client_addr, application_name, usename\nHAVING count(*) > 10\nORDER BY connections DESC;\n", "postgres/08_Advanced/pg_stat_statements_deep.sql": "/*\n================================================================================\npg_stat_statements Deep Dive — Regressions, I/O, and temp usage\n================================================================================\nDescription:\n    Advanced query analysis: high variance, temp spill, and I/O-heavy queries.\n\nPrerequisite: pg_stat_statements extension\n\nCriticality: High\n================================================================================\n*/\n\nSELECT round(mean_exec_time::numeric, 2) AS mean_ms,\n       round(stddev_exec_time::numeric, 2) AS stddev_ms,\n       calls,\n       shared_blks_read, temp_blks_written,\n       left(query, 180) AS query_snippet\nFROM pg_stat_statements\nWHERE calls > 50 AND stddev_exec_time > mean_exec_time\nORDER BY stddev_exec_time DESC\nLIMIT 15;\n\nSELECT calls, temp_blks_written,\n       round(total_exec_time::numeric, 2) AS total_ms,\n       left(query, 180) AS query_snippet\nFROM pg_stat_statements\nWHERE temp_blks_written > 1000\nORDER BY temp_blks_written DESC\nLIMIT 15;\n", "postgres/09_Maintenance/long_running_transactions.sql": "/*\n================================================================================\nLong Running Transactions — XID age and open transaction risk\n================================================================================\nDescription:\n    Flags long-running transactions and idle-in-transaction sessions.\n\nAction:  Terminate only after app owner approval; fix app transaction handling.\n\nCriticality: High\n================================================================================\n*/\n\nSELECT pid, usename, datname, state,\n       xact_start, query_start,\n       round(extract(epoch FROM (now() - xact_start))::numeric, 1) AS xact_age_sec,\n       age(backend_xid) AS xid_age,\n       age(backend_xmin) AS xmin_age,\n       left(query, 120) AS query_snippet\nFROM pg_stat_activity\nWHERE xact_start IS NOT NULL\n  AND pid <> pg_backend_pid()\n  AND state IN ('active', 'idle in transaction')\nORDER BY xact_start\nLIMIT 25;\n", "postgres/09_Maintenance/pg_cron_job_status.sql": "/*\n================================================================================\npg_cron Job Status — Scheduled job health (if extension installed)\n================================================================================\nDescription:\n    Lists pg_cron jobs and recent run status when extension is present.\n\nPrerequisite: pg_cron extension (optional)\n\nCriticality: Low\n================================================================================\n*/\n\nDO $$\nBEGIN\n    IF EXISTS (SELECT 1 FROM pg_extension WHERE extname = 'pg_cron') THEN\n        RAISE NOTICE 'Query cron.job and cron.job_run_details for job history.';\n    ELSE\n        RAISE NOTICE 'pg_cron not installed — use external schedulers (cron, Kubernetes CronJob, etc.).';\n    END IF;\nEND $$;\n\nSELECT extname, extversion FROM pg_extension WHERE extname = 'pg_cron';\n", "postgres/09_Maintenance/vacuum_bloat_maintenance.sql": "/*\n================================================================================\nVacuum Bloat Maintenance — Priority maintenance queue\n================================================================================\nDescription:\n    Generates prioritized VACUUM candidates by dead tuple count and table size.\n\nAction:  Run VACUUM (ANALYZE) manually on top tables during low-traffic window

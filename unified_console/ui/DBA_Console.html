n        FROM sys.dm_db_missing_index_group_stats AS gs\n        INNER JOIN sys.dm_db_missing_index_groups AS g ON g.index_group_handle = gs.group_handle\n        INNER JOIN sys.dm_db_missing_index_details AS d ON d.index_handle = g.index_handle\n        INNER JOIN #HealthCheckDbs AS hc ON hc.database_id = d.database_id\n        WHERE (gs.user_seeks * gs.avg_user_impact * gs.avg_total_user_cost) > 1000000\n    )\n        INSERT INTO #DBAFindings VALUES (701, N'Low', 5, N'Indexes', N'High-Impact Missing Indexes Detected', N'Optimizer sees large potential gains.', N'Validate manually before creating indexes.', N'-- Run 05_Index_Statistics/index_usage_efficiency.sql');\n\n    ----------------------------------------------------------------------------\n    -- 7. Backups\n    ----------------------------------------------------------------------------\n    IF EXISTS (\n        SELECT 1\n        FROM sys.databases AS d\n        INNER JOIN #HealthCheckDbs AS hc ON hc.database_name = d.name\n        LEFT JOIN (\n            SELECT database_name, MAX(backup_finish_date) AS last_backup\n            FROM msdb.dbo.backupset\n            GROUP BY database_name\n        ) AS b ON d.name = b.database_name\n        WHERE d.state = 0\n          AND (b.last_backup IS NULL OR DATEDIFF(HOUR, b.last_backup, GETDATE()) > @BackupHoursSLA)\n    )\n        INSERT INTO #DBAFindings VALUES (801, N'Critical', 30, N'Backups', N'Databases missing recent backups', N'Data loss risk.', N'Verify backup jobs and msdb history.', N'-- Run 06_HA_DR/backup_verification.sql');\n\n    ----------------------------------------------------------------------------\n    -- 8. Always On\n    ----------------------------------------------------------------------------\n    IF SERVERPROPERTY(N'IsHadrEnabled') = 1\n    BEGIN\n        IF EXISTS (SELECT 1 FROM sys.dm_hadr_availability_replica_states WHERE synchronization_health_desc <> N'HEALTHY')\n            INSERT INTO #DBAFindings VALUES (901, N'Critical', 25, N'AlwaysOn', N'Availability Group Replica Not Healthy', N'Failover or data loss risk.', N'Check sync state and redo/send queues.', N'-- Run 06_HA_DR/alwayson_ag_monitor.sql');\n    END;\n\n    ----------------------------------------------------------------------------\n    -- Output\n    ----------------------------------------------------------------------------\n    DECLARE @HealthScore INT = 100 - (SELECT ISNULL(SUM(Weight), 0) FROM #DBAFindings);\n    IF @HealthScore < 0 SET @HealthScore = 0;\n\n    SELECT\n        CheckId,\n        CASE Severity\n            WHEN N'Critical' THEN N'CRITICAL'\n            WHEN N'High' THEN N'HIGH'\n            WHEN N'Medium' THEN N'MEDIUM'\n            WHEN N'Low' THEN N'LOW'\n            ELSE N'INFO'\n        END AS [Status],\n        Area, Finding, Impact, Recommendation, NextStepCommand\n    FROM #DBAFindings\n    ORDER BY CASE Severity WHEN N'Critical' THEN 1 WHEN N'High' THEN 2 WHEN N'Medium' THEN 3 WHEN N'Low' THEN 4 ELSE 5 END, CheckId;\n\n    SELECT\n        @HealthScore AS [Health_Score],\n        @SQLServerCPU AS [SQL_CPU_Pct],\n        @SystemIdle AS [Sys_Idle_Pct],\n        @SignalWaitPct AS [Signal_Wait_Pct],\n        @PLE AS [Min_PLE_s],\n        @PLEThreshold AS [PLE_Threshold_s],\n        @TotalMem AS [Total_Mem_MB],\n        @TargetMem AS [Target_Mem_MB],\n        sqlserver_start_time AS [Instance_Start_Time]\n    FROM sys.dm_os_sys_info;\n\n    IF @DeepDive = 1 OR EXISTS (SELECT 1 FROM #TopWaits WHERE Percentage > 10)\n    BEGIN\n        SELECT N'WAIT STATISTICS ENCYCLOPEDIA (TOP 30)' AS [Category];\n        SELECT wait_type, [Wait_S], [Percentage], Expert_Note FROM #TopWaits ORDER BY [Wait_S] DESC;\n    END;\n\n    IF @DeepDive = 1 OR @SQLServerCPU > 80 OR @SignalWaitPct > 25\n    BEGIN\n        SELECT N'TOP CPU CONSUMING QUERIES' AS [Category];\n        SELECT TOP (10)\n            qs.execution_count,\n            qs.total_worker_time / 1000 AS [Total_CPU_ms],\n            (qs.total_worker_time / NULLIF(qs.execution_count, 0)) / 1000 AS [Avg_CPU_ms],\n            SUBSTRING(st.text, (qs.statement_start_offset / 2) + 1,\n                ((CASE qs.statement_end_offset WHEN -1 THEN DATALENGTH(st.text) ELSE qs.statement_end_offset END - qs.statement_start_offset) / 2) + 1) AS [Query_Text],\n            qp.query_plan\n        FROM sys.dm_exec_query_stats AS qs\n        CROSS APPLY sys.dm_exec_sql_text(qs.sql_handle) AS st\n        CROSS APPLY sys.dm_exec_query_plan(qs.plan_handle) AS qp\n        ORDER BY qs.total_worker_time DESC;\n    END;\n\n    IF @DeepDive = 1 OR EXISTS (SELECT 1 FROM sys.dm_io_virtual_file_stats(NULL, NULL) WHERE io_stall_read_ms / NULLIF(num_of_reads, 0) > 20)\n    BEGIN\n        SELECT N'DISK LATENCY PER FILE (TOP 10)' AS [Category];\n        SELECT TOP (10)\n            DB_NAME(vfs.database_id) AS [DB],\n            mf.name,\n            CAST(vfs.io_stall_read_ms / NULLIF(vfs.num_of_reads, 0) AS NUMERIC(10,1)) AS [Read_Stall_ms],\n            CAST(vfs.io_stall_write_ms / NULLIF(vfs.num_of_writes, 0) AS NUMERIC(10,1)) AS [Write_Stall_ms]\n        FROM sys.dm_io_virtual_file_stats(NULL, NULL) AS vfs\n        INNER JOIN sys.master_files AS mf ON vfs.database_id = mf.database_id AND vfs.file_id = mf.file_id\n        ORDER BY (vfs.io_stall / NULLIF(vfs.num_of_reads + vfs.num_of_writes, 0)) DESC;\n    END;\n\n    DROP TABLE #DBAFindings;\n    DROP TABLE #HealthCheckDbs;\n    IF OBJECT_ID(N'tempdb..#TopWaits') IS NOT NULL DROP TABLE #TopWaits;\nEND;\nGO\n", "sql_server/00_Framework/sp_DBA_IndexReview.sql": "/*\n================================================================================\nsp_DBA_IndexReview — Comprehensive index health across databases\n================================================================================\nDetects unused indexes, duplicate indexes, missing indexes, and fragmentation\ncandidates across all user databases (or a specified list).\n\nUsage:\n    EXEC dbo.sp_DBA_IndexReview;\n    EXEC dbo.sp_DBA_IndexReview @DatabaseList = N'SalesDB,HRDB';\n    EXEC dbo.sp_DBA_IndexReview @MinPageCount = 1000, @IncludeFragmentation = 0;\n================================================================================\n*/\nIF OBJECT_ID(N'dbo.sp_DBA_IndexReview', N'P') IS NULL\n    EXEC(N'CREATE PROCEDURE dbo.sp_DBA_IndexReview AS RETURN 0;');\nGO\n\nALTER PROCEDURE dbo.sp_DBA_IndexReview\n    @DatabaseList           NVARCHAR(MAX) = NULL,\n    @IncludeReadOnly        BIT = 0,\n    @MinPageCount           INT = 1000,\n    @IncludeFragmentation   BIT = 1,\n    @IncludeMissingIndexes  BIT = 1,\n    @TopN                   INT = 50\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\n    IF OBJECT_ID(N'tempdb..#IndexReviewDbs') IS NOT NULL DROP TABLE #IndexReviewDbs;\n    CREATE TABLE #IndexReviewDbs (database_id INT NOT NULL PRIMARY KEY, database_name SYSNAME NOT NULL);\n\n    IF @DatabaseList IS NOT NULL AND LTRIM(RTRIM(@DatabaseList)) <> N''\n    BEGIN\n        INSERT INTO #IndexReviewDbs (database_id, database_name)\n        SELECT d.database_id, d.name\n        FROM sys.databases AS d\n        INNER JOIN (\n            SELECT LTRIM(RTRIM(value)) AS database_name\n            FROM STRING_SPLIT(@DatabaseList, N',')\n            WHERE LTRIM(RTRIM(value)) <> N''\n        ) AS req ON req.database_name = d.name\n        WHERE d.state = 0 AND d.is_in_standby = 0;\n    END\n    ELSE\n    BEGIN\n        INSERT INTO #IndexReviewDbs (database_id, database_name)\n        SELECT database_id, name FROM sys.databases\n        WHERE state = 0 AND is_in_standby = 0 AND database_id > 4\n          AND (@IncludeReadOnly = 1 OR is_read_only = 0);\n    END;\n\n    -- Section 1: Unused Indexes\n    IF OBJECT_ID(N'tempdb..#UnusedIndexes') IS NOT NULL DROP TABLE #UnusedIndexes;\n    CREATE TABLE #UnusedIndexes (\n        DatabaseName SYSNAME, SchemaName SYSNAME, TableName SYSNAME,\n        IndexName SYSNAME, IndexType VARCHAR(20), SizeMB DECIMAL(10,2),\n        UserUpdates BIGINT, UserSeeks BIGINT, UserScans BIGINT, UserLookups BIGINT,\n        LastSeek DATETIME, LastScan DATETIME, LastUpdate DATETIME\n    );\n\n    DECLARE @db_id INT, @db_name SYSNAME, @sql NVARCHAR(MAX);\n\n    DECLARE db_cursor CURSOR LOCAL FAST_FORWARD FOR\n        SELECT database_id, database_name FROM #IndexReviewDbs ORDER BY database_name;\n\n    OPEN db_cursor;\n    FETCH NEXT FROM db_cursor INTO @db_id, @db_name;\n\n    WHILE @@FETCH_STATUS = 0\n    BEGIN\n        BEGIN TRY\n            SET @sql = N'USE ' + QUOTENAME(@db_name) + N';\n            INSERT INTO #UnusedIndexes\n            SELECT\n                DB_NAME(), s.name, t.name, i.name,\n                i.type_desc,\n                CAST((ps.used_page_count * 8.0 / 1024) AS DECIMAL(10,2)),\n                ISNULL(ust.user_updates, 0),\n                ISNULL(ust.user_seeks, 0),\n                ISNULL(ust.user_scans, 0),\n                ISNULL(ust.user_lookups, 0),\n                ust.last_user_seek,\n                ust.last_user_scan,\n                ust.last_user_update\n            FROM sys.indexes AS i\n            INNER JOIN sys.tables AS t ON i.object_id = t.object_id\n            INNER JOIN sys.schemas AS s ON t.schema_id = s.schema_id\n            LEFT JOIN sys.dm_db_index_usage_stats AS ust\n                ON ust.object_id = i.object_id AND ust.index_id = i.index_id AND ust.database_id = DB_ID()\n            LEFT JOIN sys.dm_db_partition_stats AS ps\n                ON ps.object_id = i.object_id AND ps.index_id = i.index_id\n            WHERE i.index_id > 1\n              AND i.is_primary_key = 0\n              AND i.is_unique_constraint = 0\n              AND t.is_ms_shipped = 0\n              AND ISNULL(ust.user_updates, 0) > 1000\n              AND ISNULL(ust.user_seeks, 0) + ISNULL(ust.user_scans, 0) + ISNULL(ust.user_lookups, 0) = 0\n              AND ps.used_page_count > ' + CAST(@MinPageCount AS NVARCHAR(20)) + N'\n            ORDER BY ust.user_updates DESC;';\n            EXEC sys.sp_executesql @sql;\n        END TRY\n        BEGIN CATCH\n            -- Skip databases we can't access\n        END CATCH;\n\n        FETCH NEXT FROM db_cursor INTO @db_id, @db_name;\n    END;\n\n    CLOSE db_cursor;\n    DEALLOCATE db_cursor;\n\n    SELECT TOP (@TopN) * FROM #UnusedIndexes ORDER BY UserUpdates DESC;\n\n    -- Section 2: Missing Indexes (instance-wide DMV)\n    IF @IncludeMissingIndexes = 1\n    BEGIN\n        SELECT TOP (@TopN)\n            DB_NAME(d.database_id) AS DatabaseName,\n            d.equality_columns AS EqualityColumns,\n            d.inequality_columns AS InequalityColumns,\n            d.included_columns AS IncludedColumns,\n            CAST(gs.avg_user_impact AS DECIMAL(5,1)) AS AvgUserImpact,\n            gs.user_seeks AS UserSeeks,\n            gs.user_scans AS UserScans,\n            CAST(gs.avg_total_user_cost AS DECIMAL(10,2)) AS AvgTotalUserCost,\n            CAST((gs.user_seeks * gs.avg_user_impact * gs.avg_total_user_cost) AS DECIMAL(18,0)) AS ImprovementMeasure\n        FROM sys.dm_db_missing_index_group_stats AS gs\n        INNER JOIN sys.dm_db_missing_index_groups AS g ON gs.group_handle = g.index_group_handle\n        INNER JOIN sys.dm_db_missing_index_details AS d ON g.index_handle = d.index_handle\n        WHERE d.database_id IN (SELECT database_id FROM #IndexReviewDbs)\n          AND (gs.user_seeks * gs.avg_user_impact * gs.avg_total_user_cost) > 100000\n        ORDER BY (gs.user_seeks * gs.avg_user_impact * gs.avg_total_user_cost) DESC;\n    END;\n\n    -- Section 3: Fragmentation (optional, expensive)\n    IF @IncludeFragmentation = 1\n    BEGIN\n        IF OBJECT_ID(N'tempdb..#FragResults') IS NOT NULL DROP TABLE #FragResults;\n        CREATE TABLE #FragResults (\n            DatabaseName SYSNAME, SchemaName SYSNAME, TableName SYSNAME,\n            IndexName SYSNAME, fragmentation_pct DECIMAL(5,2), page_count INT,\n            Recommendation VARCHAR(20)\n        );\n\n        DECLARE frag_cursor CURSOR LOCAL FAST_FORWARD FOR\n            SELECT database_name FROM #IndexReviewDbs ORDER BY database_name;\n\n        OPEN frag_cursor;\n        FETCH NEXT FROM frag_cursor INTO @db_name;\n\n        WHILE @@FETCH_STATUS = 0\n        BEGIN\n            BEGIN TRY\n                SET @sql = N'USE ' + QUOTENAME(@db_name) + N';\n                INSERT INTO #FragResults\n                SELECT\n                    DB_NAME(), s.name, t.name, i.name,\n                    ps.avg_fragmentation_in_percent,\n                    ps.page_count,\n                    CASE\n                        WHEN ps.avg_fragmentation_in_percent > 30 AND ps.page_count > 1000 THEN ''REBUILD''\n                        WHEN ps.avg_fragmentation_in_percent > 5 AND ps.page_count > 1000 THEN ''REORGANIZE''\n                        ELSE ''OK''\n                    END\n                FROM sys.dm_db_index_physical_stats(DB_ID(), NULL, NULL, NULL, ''LIMITED'') AS ps\n                INNER JOIN sys.indexes AS i ON ps.object_id = i.object_id AND ps.index_id = i.index_id\n                INNER JOIN sys.tables AS t ON i.object_id = t.object_id\n                INNER JOIN sys.schemas AS s ON t.schema_id = s.schema_id\n                WHERE ps.page_count > ' + CAST(@MinPageCount AS NVARCHAR(20)) + N'\n                  AND ps.avg_fragmentation_in_percent > 5\n                  AND i.index_id > 0\n                  AND t.is_ms_shipped = 0;';\n                EXEC sys.sp_executesql @sql;\n            END TRY\n            BEGIN CATCH\n            END CATCH;\n\n            FETCH NEXT FROM frag_cursor INTO @db_name;\n        END;\n\n        CLOSE frag_cursor;\n        DEALLOCATE frag_cursor;\n\n        SELECT TOP (@TopN) * FROM #FragResults WHERE Recommendation <> 'OK' ORDER BY fragmentation_pct DESC;\n    END;\n\n    DROP TABLE #IndexReviewDbs;\n    DROP TABLE #UnusedIndexes;\n    IF OBJECT_ID(N'tempdb..#FragResults') IS NOT NULL DROP TABLE #FragResults;\nEND;\nGO\n", "sql_server/00_Framework/sp_DBA_PlanCacheAnalyzer.sql": "/*\n================================================================================\nsp_DBA_PlanCacheAnalyzer — Deep plan cache analysis with warnings\n================================================================================\nAnalyzes the plan cache to find resource-intensive queries, plan quality issues,\nand anti-patterns. Unlike a simple \"top queries by CPU\" script, this proc:\n\n  1. Ranks queries by multiple dimensions (CPU, reads, duration, memory, executions)\n  2. Detects anti-patterns via XML plan parsing (key lookups, implicit conversions,\n     cursors, sorts, expensive plans)\n  3. Groups results by \"warning category\" so you can fix patterns, not just queries\n  4. Shows parameter sensitivity indicators (multiple plans for same query hash)\n  5. Provides a human-readable \"What To Do\" column for each finding\n\nUsage:\n    EXEC dbo.sp_DBA_PlanCacheAnalyzer;\n    EXEC dbo.sp_DBA_PlanCacheAnalyzer @SortOrder = 'READS', @TopN = 20;\n    EXEC dbo.sp_DBA_PlanCacheAnalyzer @SortOrder = 'MEMORY', @TopN = 15;\n    EXEC dbo.sp_DBA_PlanCacheAnalyzer @SortOrder = 'WARNING';\n    EXEC dbo.sp_DBA_PlanCacheAnalyzer @FilterDatabase = N'SalesDB';\n    EXEC dbo.sp_DBA_PlanCacheAnalyzer @MinExecutionCount = 10;\n\nSort Orders:\n    CPU       - Top by total worker time (default)\n    READS     - Top by logical reads\n    DURATION  - Top by elapsed time\n    MEMORY    - Top by memory grants\n    EXECUTIONS- Top by execution count\n    WRITES    - Top by logical writes\n    WARNING   - Grouped by anti-pattern warning\n    REGRESSION- Top by average duration (high = slow per-execution)\n================================================================================\n*/\nIF OBJECT_ID(N'dbo.sp_DBA_PlanCacheAnalyzer', N'P') IS NULL\n    EXEC(N'CREATE PROCEDURE dbo.sp_DBA_PlanCacheAnalyzer AS RETURN 0;');\nGO\n\nALTER PROCEDURE dbo.sp_DBA_PlanCacheAnalyzer\n    @SortOrder          VARCHAR(20) = 'CPU',\n    @TopN               INT = 15,\n    @FilterDatabase     NVARCHAR(128) = NULL,\n    @MinExecutionCount  INT = 1\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\n    IF @SortOrder NOT IN ('CPU','READS','DURATION','MEMORY','EXECUTIONS','WRITES','WARNING','REGRESSION')\n    BEGIN\n        RAISERROR(N'@SortOrder must be one of: CPU, READS, DURATION, MEMORY, EXECUTIONS, WRITES, WARNING, REGRESSION', 16, 1);\n        RETURN;\n    END;\n\n    ------------------------------------------------------------\n    -- Core CTE: extract plan warnings and anti-patterns\n    ------------------------------------------------------------\n    WITH PlanWarnings AS (\n        SELECT\n            qs.plan_handle,\n            qs.sql_handle,\n            qs.statement_start_offset,\n            qs.statement_end_offset,\n            -- Anti-pattern detection\n            CASE WHEN qp.query_plan.exist('//IndexLookUp') = 1 THEN 1 ELSE 0 END AS Has_KeyLookup,\n            CASE WHEN qp.query_plan.exist('//ScalarOperator[contains(@ScalarString,\"CONVERT_IMPLICIT\")]') = 1 THEN 1 ELSE 0 END AS Has_ImplicitConversion,\n            CASE WHEN qp.query_plan.exist('//RelOp[@PhysicalOp=\"Sort\"][@EstimateRows > 10000]') = 1 THEN 1 ELSE 0 END AS Has_ExpensiveSort,\n            CASE WHEN qp.query_plan.exist('//RelOp[@PhysicalOp=\"Table Scan\"]') = 1 THEN 1 ELSE 0 END AS Has_TableScan,\n            CASE WHEN qp.query_plan.exist('//RelOp[@PhysicalOp=\"Index Scan\"][@EstimateRows > 100000]') = 1 THEN 1 ELSE 0 END AS Has_LargeIndexScan,\n            CASE WHEN qp.query_plan.exist('//Cursor') = 1 THEN 1 ELSE 0 END AS Has_Cursor,\n            CASE WHEN qp.query_plan.exist('//Warnings/SpillToTempDb') = 1 THEN 1 ELSE 0 END AS Has_SpillToTempDB,\n            CASE WHEN qp.query_plan.exist('//Warnings/PlanAffectingConvert') = 1 THEN 1 ELSE 0 END AS Has_ConvertWarning,\n            CASE WHEN qp.query_plan.exist('//Warnings/NoJoinPredicate') = 1 THEN 1 ELSE 0 END AS Has_CartesianJoin,\n            CASE WHEN qs.execution_count > 1 AND qs.total_elapsed_time / qs.execution_count > 10000000 THEN 1 ELSE 0 END AS Is_PossibleParamSniff,\n            -- Build warning list\n            CONCAT(\n                CASE WHEN qp.query_plan.exist('//IndexLookUp') = 1 THEN 'KEY_LOOKUP; ' ELSE '' END,\n                CASE WHEN qp.query_plan.exist('//ScalarOperator[contains(@ScalarString,\"CONVERT_IMPLICIT\")]') = 1 THEN 'IMPLICIT_CONVERSION; ' ELSE '' END,\n                CASE WHEN qp.query_plan.exist('//RelOp[@PhysicalOp=\"Sort\"][@EstimateRows > 10000]') = 1 THEN 'EXPENSIVE_SORT; ' ELSE '' END,\n                CASE WHEN qp.query_plan.exist('//RelOp[@PhysicalOp=\"Table Scan\"]') = 1 THEN 'TABLE_SCAN; ' ELSE '' END,\n                CASE WHEN qp.query_plan.exist('//RelOp[@PhysicalOp=\"Index Scan\"][@EstimateRows > 100000]') = 1 THEN 'LARGE_INDEX_SCAN; ' ELSE '' END,\n                CASE WHEN qp.query_plan.exist('//Cursor') = 1 THEN 'CURSOR; ' ELSE '' END,\n                CASE WHEN qp.query_plan.exist('//Warnings/SpillToTempDb') = 1 THEN 'TEMPDB_SPILL; ' ELSE '' END,\n                CASE WHEN qp.query_plan.exist('//Warnings/NoJoinPredicate') = 1 THEN 'CARTESIAN_JOIN; ' ELSE '' END,\n                CASE WHEN qs.execution_count > 1 AND qs.total_elapsed_time / qs.execution_count > 10000000 THEN 'PARAM_SNIFFING_SUSPECT; ' ELSE '' END\n            ) AS Warnings\n        FROM sys.dm_exec_query_stats qs\n        CROSS APPLY sys.dm_exec_query_plan(qs.plan_handle) qp\n        WHERE qs.execution_count >= @MinExecutionCount\n    ),\n    MainQuery AS (\n        SELECT\n            qs.plan_handle,\n            qs.sql_handle,\n            qs.statement_start_offset,\n            st.text                                                          AS Full_Query_Text,\n            SUBSTRING(st.text, (qs.statement_start_offset/2)+1,\n                ((CASE qs.statement_end_offset\n                    WHEN -1 THEN DATALENGTH(st.text)\n                    ELSE qs.statement_end_offset\n                 END - qs.statement_start_offset)/2)+1)                     AS Statement_Text,\n            DB_NAME(st.dbid)                                                 AS Database_Name,\n            qs.execution_count                                                AS Execution_Count,\n            qs.total_worker_time / 1000                                       AS Total_CPU_ms,\n            (qs.total_worker_time / qs.execution_count) / 1000               AS Avg_CPU_ms,\n            qs.total_logical_reads                                            AS Total_Logical_Reads,\n            qs.total_logical_reads / qs.execution_count                       AS Avg_Logical_Reads,\n            qs.total_elapsed_time / 1000                                      AS Total_Duration_ms,\n            (qs.total_elapsed_time / qs.execution_count) / 1000               AS Avg_Duration_ms,\n            qs.total_physical_reads                                           AS Total_Physical_Reads,\n            qs.total_logical_writes                                           AS Total_Logical_Writes,\n            qs.total_grant_kb / 1024                                          AS Avg_Memory_Grant_MB,\n            qs.total_spills * 8 / 1024                                        AS Total_Spills_MB,\n            qs.plan_generation_num                                            AS Plan_Generation_Num,\n            qs.creation_time                                                  AS Plan_Created_At,\n            qs.last_execution_time                                            AS Last_Execution,\n            HASHBYTES('SHA2_256', qs.query_hash)                              AS Query_Hash_Binary,\n            CAST(qs.query_hash AS VARCHAR(16))                                AS Query_Hash,\n            qp.query_plan                                                     AS Query_Plan\n        FROM sys.dm_exec_query_stats qs\n        CROSS APPLY sys.dm_exec_sql_text(qs.sql_handle) st\n        CROSS APPLY sys.dm_exec_query_plan(qs.plan_handle) qp\n        WHERE qs.execution_count >= @MinExecutionCount\n          AND (@FilterDatabase IS NULL OR DB_NAME(st.dbid) = @FilterDatabase)\n    ),\n    Combined AS (\n        SELECT\n            mq.*,\n            pw.Warnings,\n            pw.Has_KeyLookup,\n            pw.Has_ImplicitConversion,\n            pw.Has_ExpensiveSort,\n            pw.Has_TableScan,\n            pw.Has_LargeIndexScan,\n            pw.Has_Cursor,\n            pw.Has_SpillToTempDB,\n            pw.Has_CartesianJoin,\n            pw.Is_PossibleParamSniff,\n            -- What to do\n            CASE\n                WHEN pw.Has_CartesianJoin = 1 THEN 'CRITICAL: Cartesian join detected. Check for missing WHERE clause or JOIN condition.'\n                WHEN pw.Has_KeyLookup = 1 AND mq.Avg_CPU_ms > 500 THEN 'Add covering index to eliminate key lookup. High CPU + key lookup = priority fix.'\n                WHEN pw.Has_ImplicitConversion = 1 THEN 'Check data type mismatch in WHERE/JOIN parameters. Match parameter types to column types.'\n                WHEN pw.Has_SpillToTempDB = 1 THEN 'Query spills to TempDB. Add memory or create covering index to avoid sort/hash spills.'\n                WHEN pw.Has_ExpensiveSort = 1 THEN 'Large sort operation. Add ORDER BY supporting index or reduce result set with WHERE.'\n                WHEN pw.Has_TableScan = 1 AND mq.Avg_Logical_Reads > 10000 THEN 'Table scan on large table. Add appropriate index for this query pattern.'\n                WHEN pw.Has_LargeIndexScan = 1 THEN 'Large index scan. Consider adding a more selective index or adding WHERE filters.'\n                WHEN pw.Has_Cursor = 1 THEN 'Cursor detected. Consider converting to set-based logic for better performance.'\n                WHEN pw.Is_PossibleParamSniff = 1 THEN 'Possible parameter sniffing. Test with OPTION(RECOMPILE) or use OPTIMIZE FOR hint.'\n                WHEN mq.Avg_Duration_ms > 5000 THEN 'Slow query (>5s avg). Review execution plan for table scans, large sorts, or unnecessary I/O.'\n                WHEN mq.Avg_Logical_Reads > 50000 THEN 'High reads (>50K avg). Check for missing indexes or inefficient joins.'\n                ELSE 'Review execution plan for optimization opportunities.'\n            END AS Recommendation\n        FROM MainQuery mq\n        LEFT JOIN PlanWarnings pw ON mq.plan_handle = pw.plan_handle\n            AND mq.sql_handle = pw.sql_handle\n            AND mq.statement_start_offset = pw.statement_start_offset\n    )\n    SELECT * INTO #PlanCacheResults FROM Combined;\n\n    ------------------------------------------------------------\n    -- Output based on sort order\n    ------------------------------------------------------------\n    IF @SortOrder = 'CPU'\n        SELECT TOP (@TopN) * FROM #PlanCacheResults ORDER BY Total_CPU_ms DESC;\n\n    ELSE IF @SortOrder = 'READS'\n        SELECT TOP (@TopN) * FROM #PlanCacheResults ORDER BY Total_Logical_Reads DESC;\n\n    ELSE IF @SortOrder = 'DURATION'\n        SELECT TOP (@TopN) * FROM #PlanCacheResults ORDER BY Total_Duration_ms DESC;\n\n    ELSE IF @SortOrder = 'MEMORY'\n        SELECT TOP (@TopN) * FROM #PlanCacheResults ORDER BY Avg_Memory_Grant_MB DESC;\n\n    ELSE IF @SortOrder = 'EXECUTIONS'\n        SELECT TOP (@TopN) * FROM #PlanCacheResults ORDER BY Execution_Count DESC;\n\n    ELSE IF @SortOrder = 'WRITES'\n        SELECT TOP (@TopN) * FROM #PlanCacheResults ORDER BY Total_Logical_Writes DESC;\n\n    ELSE IF @SortOrder = 'REGRESSION'\n        SELECT TOP (@TopN) * FROM #PlanCacheResults ORDER BY Avg_Duration_ms DESC;\n\n    ELSE IF @SortOrder = 'WARNING'\n    BEGIN\n        -- Summary: which warnings appear most frequently\n        SELECT N'WARNING FREQUENCY SUMMARY' AS [Section];\n        SELECT\n            Warning_Type,\n            COUNT(*) AS Occurrence_Count,\n            SUM(Total_CPU_ms) AS Combined_CPU_ms\n        FROM (\n            SELECT\n                CASE\n                    WHEN Has_KeyLookup = 1 THEN 'KEY_LOOKUP'\n                    WHEN Has_ImplicitConversion = 1 THEN 'IMPLICIT_CONVERSION'\n                    WHEN Has_ExpensiveSort = 1 THEN 'EXPENSIVE_SORT'\n                    WHEN Has_TableScan = 1 THEN 'TABLE_SCAN'\n                    WHEN Has_LargeIndexScan = 1 THEN 'LARGE_INDEX_SCAN'\n                    WHEN Has_Cursor = 1 THEN 'CURSOR'\n                    WHEN Has_SpillToTempDB = 1 THEN 'TEMPDB_SPILL'\n                    WHEN Has_CartesianJoin = 1 THEN 'CARTESIAN_JOIN'\n                    WHEN Is_PossibleParamSniff = 1 THEN 'PARAM_SNIFFING'\n                    ELSE 'NO_WARNING'\n                END AS Warning_Type,\n                Total_CPU_ms\n            FROM #PlanCacheResults\n        ) x\n        GROUP BY Warning_Type\n        ORDER BY COUNT(*) DESC;\n\n        -- Then show the top queries by warning\n        SELECT TOP (@TopN) * FROM #PlanCacheResults\n        WHERE Warnings <> ''\n        ORDER BY Total_CPU_ms DESC;\n    END;\n\n    -- Always show warning explanation\n    SELECT\n        'KEY_LOOKUP' AS Warning_Type,\n        'Non-covering index requires a key lookup to fetch additional columns. Add included columns to the index.' AS Explanation\n    UNION ALL SELECT 'IMPLICIT_CONVERSION', 'Data type mismatch forces implicit conversion, preventing index seeks. Match parameter types to column types.'\n    UNION ALL SELECT 'EXPENSIVE_SORT', 'Sort operation on >10,000 rows. Add ORDER BY supporting index or reduce rows with WHERE.'\n    UNION ALL SELECT 'TABLE_SCAN', 'Full table scan on a heap or clustered index. Add appropriate nonclustered index.'\n    UNION ALL SELECT 'LARGE_INDEX_SCAN', 'Index scan on >100,000 rows. Review selectivity — may need a more selective index.'\n    UNION ALL SELECT 'CURSOR', 'Cursor-based processing. Consider refactoring to set-based operations.'\n    UNION ALL SELECT 'TEMPDB_SPILL', 'Sort/hash operation spilled to TempDB. Increase memory grant or add covering index.'\n    UNION ALL SELECT 'CARTESIAN_JOIN', 'CRITICAL: Join without predicate. Check for missing ON/WHERE clause.'\n    UNION ALL SELECT 'PARAM_SNIFFING', 'Same query has high avg duration despite many executions. Test with OPTION(RECOMPILE).'\n    UNION ALL SELECT 'NO_WARNING', 'No anti-patterns detected in the cached plan.';\nEND;\nGO\n", "sql_server/00_Framework/sp_DBA_QueryStoreRegressions.sql": "/*\n================================================================================\nsp_DBA_QueryStoreRegressions - True plan regression detection across databases\n================================================================================\nDetects queries with multiple plans where the slowest recent plan is significantly\nworse than the best-performing plan for the same query_id.\n\nPrerequisites: Query Store enabled per database (SQL Server 2016+).\n\nUsage:\n    EXEC dbo.sp_DBA_QueryStoreRegressions;\n    EXEC dbo.sp_DBA_QueryStoreRegressions\n        @DatabaseList = N'SalesDB',\n        @RegressionPctThreshold = 50,\n        @RecentHours = 24,\n        @LookbackHours = 168,\n        @MinExecutions = 5,\n        @TopPerDatabase = 10;\n================================================================================\n*/\nIF OBJECT_ID(N'dbo.sp_DBA_QueryStoreRegressions', N'P') IS NULL\n    EXEC(N'CREATE PROCEDURE dbo.sp_DBA_QueryStoreRegressions AS RETURN 0;');\nGO\n\nALTER PROCEDURE dbo.sp_DBA_QueryStoreRegressions\n    @DatabaseList           NVARCHAR(MAX) = NULL,\n    @RegressionPctThreshold DECIMAL(10,2) = 50.0,\n    @RecentHours            INT = 24,\n    @LookbackHours          INT = 168,\n    @MinExecutions          INT = 5,\n    @TopPerDatabase         INT = 10,\n    @IncludeForcedPlans     BIT = 1\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\n    IF @RegressionPctThreshold < 0 SET @RegressionPctThreshold = 0;\n    IF @RecentHours < 1 SET @RecentHours = 1;\n    IF @LookbackHours < @RecentHours SET @LookbackHours = @RecentHours;\n    IF @MinExecutions < 1 SET @MinExecutions = 1;\n    IF @TopPerDatabase < 1 SET @TopPerDatabase = 1;\n\n    IF OBJECT_ID(N'tempdb..#QSRegression') IS NOT NULL DROP TABLE #QSRegression;\n    CREATE TABLE #QSRegression (\n        [Database_Name]             SYSNAME         NOT NULL,\n        [Query_ID]                  BIGINT          NOT NULL,\n        [Regressed_Plan_ID]         BIGINT          NOT NULL,\n        [Baseline_Plan_ID]          BIGINT          NOT NULL,\n        [Regressed_Avg_Duration_ms] DECIMAL(18,4)   NOT NULL,\n        [Baseline_Avg_Duration_ms]  DECIMAL(18,4)   NOT NULL,\n        [Regression_Pct]            DECIMAL(10,2)   NOT NULL,\n        [Regressed_Executions]      BIGINT          NOT NULL,\n        [Baseline_Executions]       BIGINT          NOT NULL,\n        [Regressed_Plan_Last_Exec]  DATETIME2(7)    NULL,\n        [Baseline_Plan_Last_Exec]   DATETIME2(7)    NULL,\n        [Query_Text]                NVARCHAR(MAX)   NULL\n    );\n\n    IF OBJECT_ID(N'tempdb..#QSDbTargets') IS NOT NULL DROP TABLE #QSDbTargets;\n    CREATE TABLE #QSDbTargets (database_id INT NOT NULL PRIMARY KEY, database_name SYSNAME NOT NULL);\n\n    IF @DatabaseList IS NOT NULL AND LTRIM(RTRIM(@DatabaseList)) <> N''\n    BEGIN\n        INSERT INTO #QSDbTargets (database_id, database_name)\n        SELECT d.database_id, d.name\n        FROM sys.databases AS d\n        INNER JOIN (\n            SELECT LTRIM(RTRIM(value)) AS database_name\n            FROM STRING_SPLIT(@DatabaseList, N',')\n            WHERE LTRIM(RTRIM(value)) <> N''\n        ) AS requested ON requested.database_name = d.name\n        WHERE d.state = 0\n          AND d.is_in_standby = 0\n          AND d.is_query_store_on = 1;\n    END\n    ELSE\n    BEGIN\n        INSERT INTO #QSDbTargets (database_id, database_name)\n        SELECT database_id, name\n        FROM sys.databases\n        WHERE state = 0\n          AND is_in_standby = 0\n          AND database_id > 4\n          AND is_query_store_on = 1;\n    END;\n\n    DECLARE @db_name SYSNAME;\n    DECLARE @SQL NVARCHAR(MAX);\n    DECLARE @RegressionFactor NVARCHAR(30) = CAST((1.0 + (@RegressionPctThreshold / 100.0)) AS NVARCHAR(30));\n\n    DECLARE db_cursor CURSOR LOCAL FAST_FORWARD FOR\n        SELECT database_name FROM #QSDbTargets ORDER BY database_name;\n\n    OPEN db_cursor;\n    FETCH NEXT FROM db_cursor INTO @db_name;\n\n    WHILE @@FETCH_STATUS = 0\n    BEGIN\n        SET @SQL = N'USE ' + QUOTENAME(@db_name) + N';\n        ;WITH PlanMetrics AS (\n            SELECT\n                q.query_id,\n                qt.query_sql_text,\n                p.plan_id,\n                SUM(rs.count_executions) AS executions,\n                AVG(CAST(rs.avg_duration AS FLOAT)) / 1000.0 AS avg_duration_ms,\n                MAX(rs.last_execution_time) AS last_execution_time\n            FROM sys.query_store_query AS q\n            INNER JOIN sys.query_store_query_text AS qt ON q.query_text_id = qt.query_text_id\n            INNER JOIN sys.query_store_plan AS p ON q.query_id = p.query_id\n            INNER JOIN sys.query_store_runtime_stats AS rs ON p.plan_id = rs.plan_id\n            INNER JOIN sys.query_store_runtime_stats_interval AS rsi\n                ON rs.runtime_stats_interval_id = rsi.runtime_stats_interval_id\n            WHERE rsi.start_time >= DATEADD(HOUR, -' + CAST(@LookbackHours AS NVARCHAR(10)) + N', SYSUTCDATETIME())\n            GROUP BY q.query_id, qt.query_sql_text, p.plan_id\n        ),\n        MultiPlan AS (\n            SELECT query_id\n            FROM PlanMetrics\n            GROUP BY query_id\n            HAVING COUNT(DISTINCT plan_id) > 1\n        ),\n        Ranked AS (\n            SELECT\n                pm.query_id,\n                pm.query_sql_text,\n                pm.plan_id,\n                pm.executions,\n                pm.avg_duration_ms,\n                pm.last_execution_time,\n                ROW_NUMBER() OVER (PARTITION BY pm.query_id ORDER BY pm.avg_duration_ms DESC, pm.last_execution_time DESC) AS slow_rank,\n                ROW_NUMBER() OVER (PARTITION BY pm.query_id ORDER BY pm.avg_duration_ms ASC, pm.executions DESC) AS fast_rank\n            FROM PlanMetrics AS pm\n            INNER JOIN MultiPlan AS mp ON pm.query_id = mp.query_id\n            WHERE pm.executions >= ' + CAST(@MinExecutions AS NVARCHAR(10)) + N'\n        ),\n        Regressed AS (\n            SELECT TOP (' + CAST(@TopPerDatabase AS NVARCHAR(10)) + N')\n                DB_NAME() AS database_name,\n                slow.query_id,\n                slow.plan_id AS regressed_plan_id,\n                fast.plan_id AS baseline_plan_id,\n                slow.avg_duration_ms AS regressed_avg_duration_ms,\n                fast.avg_duration_ms AS baseline_avg_duration_ms,\n                CAST((slow.avg_duration_ms - fast.avg_duration_ms) * 100.0 / NULLIF(fast.avg_duration_ms, 0) AS DECIMAL(10,2)) AS regression_pct,\n                slow.executions AS regressed_executions,\n                fast.executions AS baseline_executions,\n                slow.last_execution_time AS regressed_plan_last_exec,\n                fast.last_execution_time AS baseline_plan_last_exec,\n                slow.query_sql_text\n            FROM Ranked AS slow\n            INNER JOIN Ranked AS fast\n                ON slow.query_id = fast.query_id\n               AND fast.fast_rank = 1\n            WHERE slow.slow_rank = 1\n              AND slow.plan_id <> fast.plan_id\n              AND slow.avg_duration_ms > fast.avg_duration_ms * ' + @RegressionFactor + N'\n              AND slow.last_execution_time >= DATEADD(HOUR, -' + CAST(@RecentHours AS NVARCHAR(10)) + N', SYSUTCDATETIME())\n            ORDER BY regression_pct DESC\n        )\n        INSERT INTO #QSRegression\n        SELECT\n            database_name,\n            query_id,\n            regressed_plan_id,\n            baseline_plan_id,\n            regressed_avg_duration_ms,\n            baseline_avg_duration_ms,\n            regression_pct,\n            regressed_executions,\n            baseline_executions,\n            regressed_plan_last_exec,\n            baseline_plan_last_exec,\n            query_sql_text\n        FROM Regressed;';\n\n        BEGIN TRY\n            EXEC sys.sp_executesql @SQL;\n        END TRY\n        BEGIN CATCH\n            DECLARE @ErrMsg1 NVARCHAR(4000) = ERROR_MESSAGE();\n            RAISERROR(N'sp_DBA_QueryStoreRegressions: Database [%s] failed: %s', 10, 1, @db_name, @ErrMsg1);\n        END CATCH;\n\n        FETCH NEXT FROM db_cursor INTO @db_name;\n    END;\n\n    CLOSE db_cursor;\n    DEALLOCATE db_cursor;\n\n    SELECT\n        Database_Name,\n        Query_ID,\n        Regressed_Plan_ID,\n        Baseline_Plan_ID,\n        Regressed_Avg_Duration_ms,\n        Baseline_Avg_Duration_ms,\n        Regression_Pct,\n        Regressed_Executions,\n        Baseline_Executions,\n        Regressed_Plan_Last_Exec,\n        Baseline_Plan_Last_Exec,\n        Query_Text\n    FROM #QSRegression\n    ORDER BY Regression_Pct DESC, Regressed_Avg_Duration_ms DESC;\n\n    IF @IncludeForcedPlans = 1\n    BEGIN\n        SELECT N'FORCED PLANS' AS [Section];\n\n        IF OBJECT_ID(N'tempdb..#QSForced') IS NOT NULL DROP TABLE #QSForced;\n        CREATE TABLE #QSForced (\n            [Database_Name] SYSNAME NOT NULL,\n            [Query_ID] BIGINT NOT NULL,\n            [Plan_ID] BIGINT NOT NULL,\n            [Is_Forced] BIT NOT NULL,\n            [Force_Failure_Count] INT NULL,\n            [Query_Text] NVARCHAR(MAX) NULL\n        );\n\n        DECLARE @db_name2 SYSNAME;\n        DECLARE @SQL2 NVARCHAR(MAX);\n\n        DECLARE forced_cursor CURSOR LOCAL FAST_FORWARD FOR\n            SELECT database_name FROM #QSDbTargets ORDER BY database_name;\n\n        OPEN forced_cursor;\n        FETCH NEXT FROM forced_cursor INTO @db_name2;\n\n        WHILE @@FETCH_STATUS = 0\n        BEGIN\n            SET @SQL2 = N'USE ' + QUOTENAME(@db_name2) + N';\n            INSERT INTO #QSForced\n            SELECT\n                DB_NAME(),\n                q.query_id,\n                p.plan_id,\n                p.is_forced_plan,\n                p.force_failure_count,\n                qt.query_sql_text\n            FROM sys.query_store_plan AS p\n            INNER JOIN sys.query_store_query AS q ON p.query_id = q.query_id\n            INNER JOIN sys.query_store_query_text AS qt ON q.query_text_id = qt.query_text_id\n            WHERE p.is_forced_plan = 1\n               OR p.force_failure_count > 0;';\n\n            BEGIN TRY\n                EXEC sys.sp_executesql @SQL2;\n            END TRY\n            BEGIN CATCH\n                DECLARE @ErrMsg2 NVARCHAR(4000) = ERROR_MESSAGE();\n                RAISERROR(N'sp_DBA_QueryStoreRegressions forced-plan section: Database [%s] failed: %s', 10, 1, @db_name2, @ErrMsg2);\n            END CATCH;\n\n            FETCH NEXT FROM forced_cursor INTO @db_name2;\n        END;\n\n        CLOSE forced_cursor;\n        DEALLOCATE forced_cursor;\n\n        SELECT * FROM #QSForced ORDER BY Database_Name, Query_ID;\n        DROP TABLE #QSForced;\n    END;\n\n    DROP TABLE #QSRegression;\n    DROP TABLE #QSDbTargets;\nEND;\nGO\n", "sql_server/00_Framework/sp_DBA_SaveAssessmentRun.sql": "/*\n================================================================================\nsp_DBA_SaveAssessmentRun — Persist assessment results to history tables\n================================================================================\nSaves an assessment run, its findings, and dashboard metrics to the persistence\ntables for historical trending and delta comparison.\n\nUsage:\n    EXEC dbo.sp_DBA_SaveAssessmentRun\n        @ServerName = N'PROD-SQL01',\n        @Profile = N'Standard',\n        @HealthScore = 78;\n\n    -- With findings via TVP (requires SQL 2008+):\n    DECLARE @Findings dbo.AssessmentFindingTableType;\n    INSERT INTO @Findings (CheckId, Severity, Weight, Area, Finding, Impact, Recommendation)\n    VALUES (102, 'High', 20, 'CPU', 'High SQL CPU', 'Degradation', 'Review top queries');\n    EXEC dbo.sp_DBA_SaveAssessmentRun\n        @ServerName = N'PROD-SQL01',\n        @Profile = N'Standard',\n        @HealthScore = 78,\n        @Findings = @Findings;\n================================================================================\n*/\nIF OBJECT_ID(N'dbo.sp_DBA_SaveAssessmentRun', N'P') IS NULL\n    EXEC(N'CREATE PROCEDURE dbo.sp_DBA_SaveAssessmentRun AS RETURN 0;');\nGO\n\nALTER PROCEDURE dbo.sp_DBA_SaveAssessmentRun\n    @ServerName     SYSNAME,\n    @Profile        VARCHAR(20) = 'Standard',\n    @HealthScore    INT = 100,\n    @SqlVersion     VARCHAR(50) = NULL,\n    @SqlEdition     VARCHAR(100) = NULL,\n    @ToolVersion    VARCHAR(20) = NULL,\n    @Notes          NVARCHAR(500) = NULL,\n    -- Dashboard metrics\n    @SQLCPUPct      DECIMAL(5,2) = NULL,\n    @SignalWaitPct  DECIMAL(5,2) = NULL,\n    @MinPLEs        INT = NULL,\n    @TotalMemMB     DECIMAL(18,2) = NULL,\n    @TargetMemMB    DECIMAL(18,2) = NULL,\n    @InstanceStartTime DATETIME2 = NULL\nAS\nBEGIN\n    SET NOCOUNT ON;\n\n    -- Insert run record\n    DECLARE @RunId INT;\n\n    INSERT INTO dbo.AssessmentRun (\n        ServerName, Profile, HealthScore, SqlVersion, SqlEdition,\n        ToolVersion, Notes, FindingCount, CriticalCount, HighCount, MediumCount, LowCount\n    )\n    VALUES (\n        @ServerName, @Profile, @HealthScore, @SqlVersion, @SqlEdition,\n        @ToolVersion, @Notes, 0, 0, 0, 0, 0\n    );\n\n    SET @RunId = SCOPE_IDENTITY();\n\n    -- Insert dashboard metrics\n    IF @SQLCPUPct IS NOT NULL\n        INSERT INTO dbo.AssessmentMetric (RunId, MetricName, MetricValue, Unit)\n        VALUES (@RunId, 'SQL_CPU_Pct', @SQLCPUPct, '%');\n\n    IF @SignalWaitPct IS NOT NULL\n        INSERT INTO dbo.AssessmentMetric (RunId, MetricName, MetricValue, Unit)\n        VALUES (@RunId, 'Signal_Wait_Pct', @SignalWaitPct, '%');\n\n    IF @MinPLEs IS NOT NULL\n        INSERT INTO dbo.AssessmentMetric (RunId, MetricName, MetricValue, Unit)\n        VALUES (@RunId, 'Min_PLE_s', @MinPLEs, 's');\n\n    IF @TotalMemMB IS NOT NULL\n        INSERT INTO dbo.AssessmentMetric (RunId, MetricName, MetricValue, Unit)\n        VALUES (@RunId, 'Total_Mem_MB', @TotalMemMB, 'MB');\n\n    IF @TargetMemMB IS NOT NULL\n        INSERT INTO dbo.AssessmentMetric (RunId, MetricName, MetricValue, Unit)\n        VALUES (@RunId, 'Target_Mem_MB', @TargetMemMB, 'MB');\n\n    IF @InstanceStartTime IS NOT NULL\n        INSERT INTO dbo.AssessmentMetric (RunId, MetricName, MetricText)\n        VALUES (@RunId, 'Instance_Start_Time', CAST(@InstanceStartTime AS NVARCHAR(30)));\n\n    SELECT @RunId AS RunId;\nEND;\nGO\n", "sql_server/00_Framework/sp_DBA_SecurityAudit.sql": "/*\n================================================================================\nsp_DBA_SecurityAudit — Comprehensive security audit across databases\n================================================================================\nChecks for orphaned users, sysadmin members, trustworthy databases, guest\naccess, password policies, and dangerous permissions.\n\nUsage:\n    EXEC dbo.sp_DBA_SecurityAudit;\n    EXEC dbo.sp_DBA_SecurityAudit @DatabaseList = N'SalesDB';\n    EXEC dbo.sp_DBA_SecurityAudit @IncludeSysadminCheck = 1;\n================================================================================\n*/\nIF OBJECT_ID(N'dbo.sp_DBA_SecurityAudit', N'P') IS NULL\n    EXEC(N'CREATE PROCEDURE dbo.sp_DBA_SecurityAudit AS RETURN 0;');\nGO\n\nALTER PROCEDURE dbo.sp_DBA_SecurityAudit\n    @DatabaseList           NVARCHAR(MAX) = NULL,\n    @IncludeReadOnly        BIT = 0,\n    @IncludeSysadminCheck   BIT = 1\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\n    -- Section 1: Server-Level Security\n    IF @IncludeSysadminCheck = 1\n    BEGIN\n        PRINT '--- Sysadmin Members ---';\n        SELECT\n            p.name AS LoginName,\n            p.type_desc AS LoginType,\n            p.create_date,\n            p.is_disabled,\n            p.default_database_name\n        FROM sys.server_principals AS p\n        INNER JOIN sys.server_role_members AS rm ON p.principal_id = rm.member_principal_id\n        INNER JOIN sys.server_principals AS r ON rm.role_principal_id = r.principal_id\n        WHERE r.name = N'sysadmin'\n        ORDER BY p.name;\n\n        PRINT '--- SQL Logins with Weak Policies ---';\n        SELECT\n            name AS LoginName,\n            is_disabled,\n            is_policy_checked,\n            is_expiration_checked,\n            login_history.last_login\n        FROM sys.sql_logins AS sl\n        OUTER APPLY (\n            SELECT MAX(login_time) AS last_login\n            FROM sys.dm_exec_sessions\n            WHERE login_name = sl.name\n        ) AS login_history\n        WHERE sl.is_policy_checked = 0 OR sl.is_expiration_checked = 0\n        ORDER BY sl.name;\n\n        PRINT '--- Logins with sysadmin-like Permissions ---';\n        SELECT\n            p.name AS PrincipalName,\n            p.type_desc,\n            perm.permission_name,\n            perm.state_desc\n        FROM sys.server_principals AS p\n        INNER JOIN sys.server_permissions AS perm ON p.principal_id = perm.grantee_principal_id\n        WHERE perm.permission_name IN ('CONTROL SERVER','ALTER ANY DATABASE','ALTER ANY LOGIN')\n          AND p.name NOT IN ('sa')\n          AND p.type NOT IN ('R')\n        ORDER BY p.name;\n    END;\n\n    -- Section 2: Per-Database Security\n    IF OBJECT_ID(N'tempdb..#SecAuditDbs') IS NOT NULL DROP TABLE #SecAuditDbs;\n    CREATE TABLE #SecAuditDbs (database_id INT NOT NULL PRIMARY KEY, database_name SYSNAME NOT NULL);\n\n    IF @DatabaseList IS NOT NULL AND LTRIM(RTRIM(@DatabaseList)) <> N''\n    BEGIN\n        INSERT INTO #SecAuditDbs (database_id, database_name)\n        SELECT d.database_id, d.name\n        FROM sys.databases AS d\n        INNER JOIN (\n            SELECT LTRIM(RTRIM(value)) AS database_name\n            FROM STRING_SPLIT(@DatabaseList, N',')\n            WHERE LTRIM(RTRIM(value)) <> N''\n        ) AS req ON req.database_name = d.name\n        WHERE d.state = 0 AND d.is_in_standby = 0;\n    END\n    ELSE\n    BEGIN\n        INSERT INTO #SecAuditDbs (database_id, database_name)\n        SELECT database_id, name FROM sys.databases\n        WHERE state = 0 AND is_in_standby = 0 AND database_id > 4\n          AND (@IncludeReadOnly = 1 OR is_read_only = 0);\n    END;\n\n    -- Trustworthy databases\n    PRINT '--- Trustworthy Databases ---';\n    SELECT\n        d.name AS DatabaseName,\n        d.is_trustworthy_on,\n        SUSER_SNAME(d.owner_sid) AS DBOwner\n    FROM sys.databases AS d\n    WHERE d.is_trustworthy_on = 1 AND d.database_id > 4;\n\n    -- Orphaned users (per database)\n    IF OBJECT_ID(N'tempdb..#OrphanedUsers') IS NOT NULL DROP TABLE #OrphanedUsers;\n    CREATE TABLE #OrphanedUsers (\n        DatabaseName SYSNAME, UserName SYSNAME, UserType VARCHAR(20),\n        CreateDate DATETIME, LastLogin DATETIME\n    );\n\n    DECLARE @db_id INT, @db_name SYSNAME, @sql NVARCHAR(MAX);\n\n    DECLARE db_cursor CURSOR LOCAL FAST_FORWARD FOR\n        SELECT database_id, database_name FROM #SecAuditDbs ORDER BY database_name;\n\n    OPEN db_cursor;\n    FETCH NEXT FROM db_cursor INTO @db_id, @db_name;\n\n    WHILE @@FETCH_STATUS = 0\n    BEGIN\n        BEGIN TRY\n            SET @sql = N'USE ' + QUOTENAME(@db_name) + N';\n            INSERT INTO #OrphanedUsers\n            SELECT\n                DB_NAME(),\n                dp.name,\n                dp.type_desc,\n                dp.create_date,\n                NULL\n            FROM sys.database_principals AS dp\n            LEFT JOIN sys.server_principals AS sp ON dp.sid = sp.sid\n            WHERE sp.sid IS NULL\n              AND dp.type IN (''S'',''U'',''G'')\n              AND dp.name NOT IN (''guest'',''sys'',''dbo'',''INFORMATION_SCHEMA'')\n              AND dp.sid IS NOT NULL\n              AND dp.sid <> 0x00;';\n            EXEC sys.sp_executesql @sql;\n        END TRY\n        BEGIN CATCH\n        END CATCH;\n\n        FETCH NEXT FROM db_cursor INTO @db_id, @db_name;\n    END;\n\n    CLOSE db_cursor;\n    DEALLOCATE db_cursor;\n\n    PRINT '--- Orphaned Database Users ---';\n    SELECT * FROM #OrphanedUsers ORDER BY DatabaseName, UserName;\n\n    -- Guest access\n    IF OBJECT_ID(N'tempdb..#GuestAccess') IS NOT NULL DROP TABLE #GuestAccess;\n    CREATE TABLE #GuestAccess (DatabaseName SYSNAME, HasConnect BIT);\n\n    DECLARE guest_cursor CURSOR LOCAL FAST_FORWARD FOR\n        SELECT database_name FROM #SecAuditDbs ORDER BY database_name;\n\n    OPEN guest_cursor;\n    FETCH NEXT FROM guest_cursor INTO @db_name;\n\n    WHILE @@FETCH_STATUS = 0\n    BEGIN\n        BEGIN TRY\n            SET @sql = N'USE ' + QUOTENAME(@db_name) + N';\n            INSERT INTO #GuestAccess\n            SELECT DB_NAME(), CASE WHEN EXISTS (\n                SELECT 1 FROM sys.database_permissions AS p\n                INNER JOIN sys.database_principals AS pr ON p.grantee_principal_id = pr.principal_id\n                WHERE pr.name = N''guest'' AND p.permission_name = N''CONNECT'' AND p.state = N''G''\n            ) THEN 1 ELSE 0 END;';\n            EXEC sys.sp_executesql @sql;\n        END TRY\n        BEGIN CATCH\n        END CATCH;\n\n        FETCH NEXT FROM guest_cursor INTO @db_name;\n    END;\n\n    CLOSE guest_cursor;\n    DEALLOCATE guest_cursor;\n\n    PRINT '--- Guest CONNECT Access ---';\n    SELECT * FROM #GuestAccess WHERE HasConnect = 1;\n\n    -- DB owners\n    PRINT '--- Database Owners ---';\n    SELECT\n        d.name AS DatabaseName,\n        SUSER_SNAME(d.owner_sid) AS OwnerLogin,\n        d.is_trustworthy_on\n    FROM sys.databases AS d\n    INNER JOIN #SecAuditDbs AS db ON db.database_id = d.database_id\n    WHERE d.database_id > 4\n    ORDER BY d.name;\n\n    -- Cleanup\n    DROP TABLE #SecAuditDbs;\n    DROP TABLE #OrphanedUsers;\n    DROP TABLE #GuestAccess;\nEND;\nGO\n", "sql_server/00_Framework/sp_DBA_WaitAnalysis.sql": "/*\n================================================================================\nsp_DBA_WaitAnalysis — Top wait types with categories and recommendations\n================================================================================\nReturns the top N wait types with percentage calculation, category mapping,\nand expert recommendations. Uses fn_DBA_ExcludedWaitTypes for filtering.\n\nUsage:\n    EXEC dbo.sp_DBA_WaitAnalysis;\n    EXEC dbo.sp_DBA_WaitAnalysis @TopN = 30, @IncludeRecommendations = 1;\n================================================================================\n*/\nIF OBJECT_ID(N'dbo.sp_DBA_WaitAnalysis', N'P') IS NULL\n    EXEC(N'CREATE PROCEDURE dbo.sp_DBA_WaitAnalysis AS RETURN 0;');\nGO\n\nALTER PROCEDURE dbo.sp_DBA_WaitAnalysis\n    @TopN                   INT = 20,\n    @IncludeRecommendations BIT = 1,\n    @MinWaitCount           INT = 0\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\n    DECLARE @TotalWaitMs BIGINT;\n\n    SELECT @TotalWaitMs = SUM(wait_time_ms)\n    FROM sys.dm_os_wait_stats\n    WHERE wait_type NOT IN (SELECT wait_type FROM dbo.fn_DBA_ExcludedWaitTypes())\n      AND waiting_tasks_count > @MinWaitCount;\n\n    ;WITH WaitCTE AS (\n        SELECT\n            ws.wait_type,\n            ws.waiting_tasks_count AS Wait_Count,\n            ws.wait_time_ms / 1000.0 AS Total_Wait_S,\n            (ws.wait_time_ms - ws.signal_wait_time_ms) / 1000.0 AS Resource_Wait_S,\n            ws.signal_wait_time_ms / 1000.0 AS Signal_Wait_S,\n            CAST(ws.wait_time_ms * 100.0 / NULLIF(@TotalWaitMs, 0) AS DECIMAL(5,2)) AS Pct_Of_All_Waits,\n            CAST(ws.signal_wait_time_ms * 100.0 / NULLIF(ws.wait_time_ms, 0) AS DECIMAL(5,2)) AS Signal_Pct,\n            CASE\n                -- Parallelism\n                WHEN ws.wait_type IN ('CXPACKET','CXCONSUMER','CXPA','EXECSYNC')\n                    THEN 'Parallelism'\n                -- CPU / Scheduling\n                WHEN ws.wait_type IN ('SOS_SCHEDULER_YIELD','THREADPOOL','RESOURCE_POOL')\n                    THEN 'CPU'\n                -- I/O\n                WHEN ws.wait_type LIKE 'PAGEIOLATCH_%'\n                    THEN 'Disk I/O'\n                WHEN ws.wait_type IN ('WRITELOG','LOGMGR','LOGBUFFER','LOGGR池')\n                    THEN 'Transaction Log'\n                WHEN ws.wait_type IN ('ASYNC_DISKPOOL_LOCK','FILE_IO')\n                    THEN 'Disk I/O'\n                -- Memory\n                WHEN ws.wait_type IN ('RESOURCE_SEMAPHORE','RESOURCE_SEMAPHORE_POOL')\n                    THEN 'Memory'\n                WHEN ws.wait_type LIKE 'MEMORY_ALLOCATION_%'\n                    THEN 'Memory'\n                -- Locking / Blocking\n                WHEN ws.wait_type LIKE 'LCK_%'\n                    THEN 'Locking'\n                WHEN ws.wait_type IN ('PAGELATCH_%','PAGELATCH_SH','PAGELATCH_EX','PAGELATCH_UP')\n                    THEN 'In-Memory Latch'\n                -- Network\n                WHEN ws.wait_type IN ('ASYNC_NETWORK_IO','NETWAITFORREPLY','NETWORKIO')\n                    THEN 'Network / Client'\n                -- Replication / AG\n                WHEN ws.wait_type LIKE 'HADR_%'\n                    THEN 'AlwaysOn AG'\n                WHEN ws.wait_type LIKE 'REPL_%'\n                    THEN 'Replication'\n                -- TempDB\n                WHEN ws.wait_type IN ('PFS_SYNC','GAM_CONTENTION','SGAM_CONTENTION','ALLOCATE_SPACE')\n                    THEN 'TempDB Allocation'\n                ELSE 'Other'\n            END AS Wait_Category\n        FROM sys.dm_os_wait_stats AS ws\n        WHERE ws.wait_type NOT IN (SELECT wait_type FROM dbo.fn_DBA_ExcludedWaitTypes())\n          AND ws.waiting_tasks_count > @MinWaitCount\n    )\n    SELECT TOP (@TopN)\n        wait_type AS Wait_Type,\n        Wait_Count,\n        Total_Wait_S,\n        Resource_Wait_S,\n        Signal_Wait_S,\n        Pct_Of_All_Waits,\n        Signal_Pct,\n        Wait_Category,\n        CASE WHEN @IncludeRecommendations = 1 THEN\n            CASE Wait_Category\n                WHEN 'Parallelism' THEN 'Review MAXDOP and CTFP settings. Consider increasing CTFP to 50+. https://learn.microsoft.com/en-us/sql/database-engine/configure-windows/configure-the-cost-threshold-for-parallelism-server-configuration-option'\n                WHEN 'CPU' THEN 'CPU pressure. Check top queries and scheduler health. https://learn.microsoft.com/en-us/sql/relational-databases/system-dm-views/sys-dm-os-schedulers-transact-sql'\n                WHEN 'Disk I/O' THEN 'Check disk latency (disk_latency.sql) and indexing. https://learn.microsoft.com/en-us/sql/relational-databases/system-dm-views/sys-dm-io-virtual-file-stats-transact-sql'\n                WHEN 'Transaction Log' THEN 'Log I/O bottleneck. Check log file location and VLF count. https://learn.microsoft.com/en-us/sql/relational-databases/logs/manage-the-size-of-the-transaction-log-file'\n                WHEN 'Memory' THEN 'Memory grant pressure. Check memory grants and server memory config. https://learn.microsoft.com/en-us/sql/relational-databases/system-dm-views/sys-dm-exec-query-memory-grants-transact-sql'\n                WHEN 'Locking' THEN 'Blocking detected. Run blocking_and_deadlocks.sql. https://learn.microsoft.com/en-us/sql/relational-databases/system-dm-views/sys-dm-tran-locks-transact-sql'\n                WHEN 'In-Memory Latch' THEN 'In-memory contention. Often TempDB — check tempdb_configuration.sql. https://learn.microsoft.com/en-us/sql/relational-databases/system-dm-views/sys-dm-os-wait-stats-transact-sql'\n                WHEN 'Network / Client' THEN 'Client application consuming results slowly. Check app-side fetch patterns. https://learn.microsoft.com/en-us/sql/relational-databases/system-dm-views/sys-dm-exec-connections-transact-sql'\n                WHEN 'AlwaysOn AG' THEN 'AG sync or redo bottleneck. Run alwayson_ag_monitor.sql. https://learn.microsoft.com/en-us/sql/database-engine/availability-groups/windows/availability-group-listener-server-client-connectivity'\n                WHEN 'Replication' THEN 'Replication lag. Check distribution agent history. https://learn.microsoft.com/en-us/sql/relational-databases/replication/monitor/replication-monitor-overview'\n                WHEN 'TempDB Allocation' THEN 'TempDB allocation contention. Run tempdb_configuration.sql. https://learn.microsoft.com/en-us/sql/relational-databases/databases/tempdb-database'\n                ELSE 'Review wait type: https://learn.microsoft.com/en-us/sql/relational-databases/system-dm-views/sys-dm-os-wait-stats-transact-sql'\n            END\n        ELSE NULL END AS Recommendation\n    INTO #WaitResults\n    FROM WaitCTE\n    ORDER BY Total_Wait_S DESC;\n\n    SELECT * FROM #WaitResults ORDER BY Total_Wait_S DESC;\n    DROP TABLE #WaitResults;\nEND;\nGO\n", "sql_server/00_Repository/AssessmentFindingTableType.sql": "/*\n================================================================================\nAssessmentFindingTableType — Table-valued parameter for assessment findings\n================================================================================\nTable type used by sp_DBA_SaveAssessmentRun to accept findings as a TVP.\n================================================================================\n*/\nIF TYPE_ID(N'dbo.AssessmentFindingTableType') IS NULL\nBEGIN\n    CREATE TYPE dbo.AssessmentFindingTableType AS TABLE (\n        CheckId         INT NOT NULL,\n        Severity        VARCHAR(20) NOT NULL,\n        Weight          INT NOT NULL DEFAULT 0,\n        Area            VARCHAR(50) NOT NULL,\n        Finding         VARCHAR(255) NOT NULL,\n        Impact          VARCHAR(255) NULL,\n        Recommendation  VARCHAR(MAX) NULL,\n        NextStepCommand VARCHAR(MAX) NULL,\n        DatabaseName    SYSNAME NULL\n    );\n    PRINT N'Type dbo.AssessmentFindingTableType created.';\nEND\nELSE\n    PRINT N'Type dbo.AssessmentFindingTableType already exists. Skipping.';\nGO\n", "sql_server/00_Repository/CheckIdRegistry.sql": "/*\n================================================================================\nCheckIdRegistry.sql - Stable CheckId definitions for all findings\n================================================================================\nPurpose:\n    Registry of all CheckId values used by sp_DBA_HealthCheck and section\n    collectors. Stable IDs enable ticketing integration and trend analysis.\n\nUsage:\n    Deploy into DBARepository. PowerShell and SQL consumers reference this\n    table to map CheckId → human-readable description.\n================================================================================\n*/\nIF OBJECT_ID(N'dbo.CheckIdRegistry', N'U') IS NOT NULL\n    DROP TABLE dbo.CheckIdRegistry;\nGO\n\nCREATE TABLE dbo.CheckIdRegistry (\n    [CheckId]           INT             NOT NULL PRIMARY KEY,\n    [Area]              VARCHAR(50)     NOT NULL,\n    [Finding]           VARCHAR(255)    NOT NULL,\n    [Severity]          VARCHAR(20)     NOT NULL DEFAULT 'Medium',\n    [Weight]            INT             NOT NULL DEFAULT 10,\n    [Description]       VARCHAR(MAX)    NULL,\n    [Remediation]       VARCHAR(MAX)    NULL,\n    [ReferenceUrl]      VARCHAR(500)    NULL,\n    [IsActive]          BIT             NOT NULL DEFAULT 1\n);\nGO\n\n-- ============================================================================\n-- CPU Checks (100-199)\n-- ============================================================================\nINSERT INTO dbo.CheckIdRegistry (CheckId, Area, Finding, Severity, Weight, Description) VALUES\n(101, 'CPU',        'High Runnable Task Count',                      'High',     15, 'Queries waiting for CPU cycles. Check sys.dm_os_schedulers.'),\n(102, 'CPU',        'High SQL Server CPU Utilization',               'High',     20, 'Historical CPU from ring buffers exceeds 80%.'),\n(103, 'CPU',        'High External CPU Usage',                       'Medium',   10, 'Non-SQL processes consuming significant CPU.'),\n(104, 'CPU',        'High Signal Waits',                             'High',     15, 'Signal wait ratio above 25% indicates CPU scheduling pressure.'),\n(105, 'Performance', 'Plan Cache Bloat (Single-Use Adhoc)',          'Low',       5, 'Over 500MB of single-use adhoc plans in cache.');\n\n-- ============================================================================\n-- Security Checks (200-299)\n-- ============================================================================\nINSERT INTO dbo.CheckIdRegistry (CheckId, Area, Finding, Severity, Weight, Description) VALUES\n(201, 'Security',    'Trustworthy Database Enabled',                  'High',     15, 'Privilege escalation risk via TRUSTWORTHY.'),\n(202, 'Security',    'Guest User CONNECT Permission Granted',         'Medium',   10, 'Lateral movement risk if guest user has CONNECT.'),\n(203, 'Best Practice','Page Verification not CHECKSUM',              'Critical', 25, 'Undetected corruption risk. All databases should use CHECKSUM.'),\n(204, 'Best Practice','Auto-Shrink/Auto-Close Enabled',              'Critical', 20, 'Causes performance spikes and fragmentation.'),\n(205, 'Indexes',     'Unused Indexes Detected',                      'Low',       5, 'Indexes with writes but no reads since last restart.'),\n(206, 'Statistics',  'Stale Statistics Detected',                    'Medium',   10, 'Modification counter exceeds 20% of row count.'),\n(207, 'Advanced',    'Query Store in READ_ONLY Mode',                'Medium',   10, 'Query Store cannot capture new plans.'),\n(208, 'Advanced',    'High CDC Capture Latency',                     'Medium',   10, 'CDC latency exceeds 1 hour. Log may not reuse.');\n\n-- ============================================================================\n-- Configuration Checks (300-399)\n-- ============================================================================\nINSERT INTO dbo.CheckIdRegistry (CheckId, Area, Finding, Severity, Weight, Description) VALUES\n(301, 'Config',      'Default Cost Threshold for Parallelism',       'Medium',   10, 'CTFP is at default 5. Trivial queries may parallelize.'),\n(302, 'Config',      'MAXDOP is 0 (unlimited)',                      'Medium',   10, 'Single query may consume all CPU cores.'),\n(303, 'Config',      'Optimize for Ad Hoc Workloads OFF',            'Low',       5, 'Plan cache bloat risk from ad-hoc queries.'),\n(304, 'Config',      'Backup Compression Default OFF',               'Low',       5, 'Larger, slower backups without compression.'),\n(305, 'Config',      'Dedicated Admin Connection (DAC) OFF',         'Medium',   10, 'Cannot connect when instance is hung.'),\n(306, 'OS',          'Instant File Initialization DISABLED',          'Medium',   10, 'Slow file growth and restores.'),\n(307, 'OS',          'Locked Pages in Memory (LPIM) not active',     'Medium',   10, 'OS may page SQL Server memory to disk.');\n\n-- ============================================================================\n-- Memory Checks (400-499)\n-- ============================================================================\nINSERT INTO dbo.CheckIdRegistry (CheckId, Area, Finding, Severity, Weight, Description) VALUES\n(401, 'Memory',      'SQL Server not reaching Target Memory',        'High',     15, 'Possible OS memory pressure or max server memory cap.'),\n(402, 'Memory',      'Low Page Life Expectancy',                     'Medium',   10, 'Buffer pool churn. Check scans, missing indexes, memory grants.'),\n(403, 'Memory',      'Active Memory Grant Waits',                    'High',     20, 'Queries waiting for memory to execute.');\n\n-- ============================================================================\n-- Performance Checks (500-599)\n-- ============================================================================\nINSERT INTO dbo.CheckIdRegistry (CheckId, Area, Finding, Severity, Weight, Description) VALUES\n(501, 'Performance',  'High Locking/Blocking Waits',                 'Critical', 25, 'LCK waits exceed 10% of total. Application timeouts likely.'),\n(502, 'Performance',  'High Disk Read Waits (PAGEIOLATCH_SH)',       'High',     15, 'Data pages coming from disk. Check disk latency and indexing.'),\n(503, 'Memory',       'Query Memory Grant Starvation',               'High',     20, 'Large queries waiting for memory grants.');\n\n-- ============================================================================\n-- Storage Checks (600-699)\n-- ============================================================================\nINSERT INTO dbo.CheckIdRegistry (CheckId, Area, Finding, Severity, Weight, Description) VALUES\n(601, 'I/O',         'High Disk Latency Detected (>20ms)',           'High',     15, 'Slow query response due to storage latency.'),\n(602, 'Storage',     'Critical VLF Count (>=1000)',                  'High',     15, 'Slow recovery and log backups. Rebuild log structure.'),\n(603, 'Storage',     'Elevated VLF Count (200-999)',                 'Medium',   10, 'Log operations may slow. Plan maintenance.'),\n(604, 'TempDB',      'Few TempDB Data Files',                        'Medium',   10, 'Possible PAGELATCH contention with fewer than 4 files.'),\n(605, 'TempDB',      'Uneven TempDB File Growths',                   'High',     15, 'Proportional fill imbalance across TempDB files.'),\n(606, 'Storage',     'Percentage-based Autogrowth Enabled',          'Medium',   10, 'Unpredictable growth pauses. Switch to fixed MB.');\n\n-- ============================================================================\n-- Index Checks (700-799)\n-- ============================================================================\nINSERT INTO dbo.CheckIdRegistry (CheckId, Area, Finding, Severity, Weight, Description) VALUES\n(701, 'Indexes',     'High-Impact Missing Indexes Detected',         'Low',       5, 'Optimizer sees large potential gains. Validate before creating.');\n\n-- ============================================================================\n-- Backup Checks (800-899)\n-- ============================================================================\nINSERT INTO dbo.CheckIdRegistry (CheckId, Area, Finding, Severity, Weight, Description) VALUES\n(801, 'Backups',     'Databases Missing Recent Backups',             'Critical', 30, 'Data loss risk. Verify backup jobs and msdb history.');\n\n-- ============================================================================\n-- AlwaysOn Checks (900-999)\n-- ============================================================================\nINSERT INTO dbo.CheckIdRegistry (CheckId, Area, Finding, Severity, Weight, Description) VALUES\n(901, 'AlwaysOn',    'Availability Group Replica Not Healthy',       'Critical', 25, 'Failover or data loss risk. Check sync state and queues.');\n\nPRINT N'CheckIdRegistry populated with ' + CAST(@@ROWCOUNT AS VARCHAR(10)) + N' check definitions.';\nGO\n", "sql_server/00_Repository/DBARepository_Create.sql": "/*\n================================================================================\nDBARepository_Create.sql - Create the dedicated DBA administration database\n================================================================================\nPurpose:\n    Central database for all DBA framework objects, assessment history, and\n    baseline snapshots. Deploy once per SQL Server instance.\n\nUsage:\n    Execute this script in the context of master or a suitable admin database.\n    Then run DBARepository_Deploy.sql to install stored procedures and tables.\n================================================================================\n*/\nIF DB_ID(N'DBARepository') IS NOT NULL\nBEGIN\n    PRINT N'Database DBARepository already exists. Skipping creation.';\n    RETURN;\nEND;\nGO\n\nCREATE DATABASE DBARepository;\nGO\n\nALTER DATABASE DBARepository SET RECOVERY SIMPLE;\nGO\n\nALTER DATABASE DBARepository SET PAGE_VERIFY CHECKSUM;\nGO\n\nALTER DATABASE DBARepository SET AUTO_SHRINK OFF;\nGO\n\nALTER DATABASE DBARepository SET AUTO_CLOSE OFF;\nGO\n\nPRINT N'Database DBARepository created successfully.';\nGO\n", "sql_server/00_Repository/DBARepository_Deploy.sql": "/*\n================================================================================\nDBARepository_Deploy.sql — Deploy all DBA framework objects\n================================================================================\nPurpose: Installs all sp_DBA_*, fn_DBA_* into DBARepository.\n         Run after DBARepository_Create.sql.\n\nRun once per instance:\n    sqlcmd -S YourServer -d DBARepository -i \"00_Repository/DBARepository_Deploy.sql\"\n\nObjects installed (in dependency order):\n    1. fn_DBA_ExcludedWaitTypes\n    2. fn_DBA_AgentRunDurationSeconds\n    3. sp_DBA_ForEachDatabase\n    4. sp_DBA_QueryStoreRegressions\n    5. sp_DBA_HealthCheck\n    6. sp_DBA_WaitAnalysis\n    7. sp_DBA_IndexReview\n    8. sp_DBA_SecurityAudit\n    9. sp_DBA_BackupReview\n    10. sp_DBA_BaselineCapture\n    11. AssessmentFindingTableType (table type)\n    12. sp_DBA_SaveAssessmentRun\n\nThen run separately:\n    6. 00_Repository/CheckIdRegistry.sql\n    7. 00_Repository/DBARepository_Persistence.sql\n================================================================================\n*/\nUSE [DBARepository];\nGO\n\nSET NOCOUNT ON;\nGO\n\n-- ============================================================================\n-- 1. fn_DBA_ExcludedWaitTypes — table function for benign wait filtering\n-- ============================================================================\nPRINT N'Creating fn_DBA_ExcludedWaitTypes...';\nGO\n\nIF OBJECT_ID(N'dbo.fn_DBA_ExcludedWaitTypes', N'IF') IS NOT NULL\n    DROP FUNCTION dbo.fn_DBA_ExcludedWaitTypes;\nGO\n\nCREATE FUNCTION dbo.fn_DBA_ExcludedWaitTypes ()\nRETURNS TABLE\nAS\nRETURN\n(\n    SELECT wait_type FROM (VALUES\n        ('BROKER_EVENTHANDLER'),\n        ('BROKER_RECEIVE_WAITFOR'),\n        ('BROKER_TASK_STOP'),\n        ('BROKER_TO_FLUSH'),\n        ('BROKER_TRANSMITTER'),\n        ('CHECKPOINT_QUEUE'),\n        ('CHKPT'),\n        ('CLR_AUTO_EVENT'),\n        ('CLR_MANUAL_EVENT'),\n        ('CLR_SEMAPHORE'),\n        ('DBMIRROR_DBM_EVENT'),\n        ('DBMIRROR_EVENTS_QUEUE'),\n        ('DBMIRROR_WORKER_QUEUE'),\n        ('DBMIRRORING_CMD'),\n        ('DIRTY_PAGE_POLL'),\n        ('DISPATCHER_QUEUE_SEMAPHORE'),\n        ('EXECSYNC'),\n        ('FSAGENT'),\n        ('FT_IFTS_SCHEDULER_IDLE_WAIT'),\n        ('FT_IFTSHC_MUTEX'),\n        ('HADR_FILESTREAM_IOMGR_IOCOMPLETION'),\n        ('HADR_LOGCAPTURE_WAIT'),\n        ('HADR_NOTIFICATION_DEQUEUE'),\n        ('HADR_TIMER_TASK'),\n        ('HADR_WORK_QUEUE'),\n        ('LAZYWRITER_SLEEP'),\n        ('LOGMGR_QUEUE'),\n        ('MEMORY_ALLOCATION_EXT'),\n        ('ONDEMAND_TASK_QUEUE'),\n        ('PARALLEL_REDO_DRAIN_WORKER'),\n        ('PARALLEL_REDO_LOG_CACHE'),\n        ('PARALLEL_REDO_TRAN_LIST'),\n        ('PARALLEL_REDO_WORKER_SYNC'),\n        ('PARALLEL_REDO_WORKER_WAIT_WORK'),\n        ('REQUEST_FOR_DEADLOCK_SEARCH'),\n        ('RESOURCE_QUEUE'),\n        ('SERVER_IDLE_CHECK'),\n        ('SLEEP_BPOOL_FLUSH'),\n        ('SLEEP_DBSTARTUP'),\n        ('SLEEP_DCOMSTARTUP'),\n        ('SLEEP_MASTERDBREADY'),\n        ('SLEEP_MASTERMDREADY'),\n        ('SLEEP_MASTERUPGRADED'),\n        ('SLEEP_MSDBSTARTUP'),\n        ('SLEEP_SYSTEMTASK'),\n        ('SLEEP_TASK'),\n        ('SLEEP_TEMPDBSTARTUP'),\n        ('SNI_HTTP_ACCEPT'),\n        ('SP_SERVER_DIAGNOSTICS_SLEEP'),\n        ('SQLTRACE_BUFFER_FLUSH'),\n        ('SQLTRACE_INCREMENTAL_FLUSH_SLEEP'),\n        ('SQLTRACE_WAIT_ENTRIES'),\n        ('WAIT_FOR_RESULTS'),\n        ('WAITFOR_TASKSHUTDOWN'),\n        ('WAIT_XTP_CKPT_CLOSE'),\n        ('WAIT_XTP_RECOVERY'),\n        ('WAIT_XTP_HOST_WAIT'),\n        ('XE_DISPATCHER_JOIN'),\n        ('XE_DISPATCHER_WAIT'),\n        ('XE_TIMER_EVENT')\n    ) AS excluded (wait_type);\n);\nGO\n\nPRINT N'  fn_DBA_ExcludedWaitTypes created.';\nGO\n\n-- ============================================================================\n-- 2. fn_DBA_AgentRunDurationSeconds — parse HHMMSS encoded duration\n-- ============================================================================\nPRINT N'Creating fn_DBA_AgentRunDurationSeconds...';\nGO\n\nIF OBJECT_ID(N'dbo.fn_DBA_AgentRunDurationSeconds', N'FN') IS NOT NULL\n    DROP FUNCTION dbo.fn_DBA_AgentRunDurationSeconds;\nGO\n\nCREATE FUNCTION dbo.fn_DBA_AgentRunDurationSeconds (\n    @Duration INT\n)\nRETURNS INT\nAS\nBEGIN\n    DECLARE @Seconds INT;\n    SET @Seconds = (@Duration / 10000) * 3600\n                 + ((@Duration % 10000) / 100) * 60\n                 + (@Duration % 100);\n    RETURN @Seconds;\nEND;\nGO\n\nPRINT N'  fn_DBA_AgentRunDurationSeconds created.';\nGO\n\n-- ============================================================================\n-- 3. sp_DBA_ForEachDatabase — standardized cross-database execution\n-- ============================================================================\nPRINT N'Creating sp_DBA_ForEachDatabase...';\nGO\n\nIF OBJECT_ID(N'dbo.sp_DBA_ForEachDatabase', N'P') IS NOT NULL\n    DROP PROCEDURE dbo.sp_DBA_ForEachDatabase;\nGO\n\nCREATE PROCEDURE dbo.sp_DBA_ForEachDatabase\n    @SQL                NVARCHAR(MAX),\n    @UserDatabasesOnly  BIT = 1,\n    @IncludeReadOnly    BIT = 0,\n    @DatabaseList       NVARCHAR(MAX) = NULL,\n    @PrintOnly          BIT = 0\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SET QUOTED_IDENTIFIER ON;\n    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\n    DECLARE @MajorVersion INT = CAST(PARSENAME(CAST(SERVERPROPERTY(N'ProductVersion') AS NVARCHAR(128)), 4) AS INT);\n    IF @MajorVersion < 13\n    BEGIN\n        RAISERROR(N'Query Store requires SQL Server 2016+.', 16, 1);\n        RETURN;\n    END;\n\n    CREATE TABLE #QSDbs (database_name SYSNAME NOT NULL PRIMARY KEY);\n\n    IF @DatabaseList IS NOT NULL AND LTRIM(RTRIM(@DatabaseList)) <> N''\n    BEGIN\n        INSERT INTO #QSDbs (database_name)\n        SELECT DISTINCT LTRIM(RTRIM(value))\n        FROM STRING_SPLIT(@DatabaseList, N',')\n        WHERE LTRIM(RTRIM(value)) <> N'';\n    END\n    ELSE\n    BEGIN\n        INSERT INTO #QSDbs (database_name)\n        SELECT d.name\n        FROM sys.databases d\n        JOIN sys.database_query_store_options qs\n            ON qs.actual_state_desc <> 'OFF'\n        WHERE d.state = 0 AND d.database_id > 4;\n    END;\n\n    IF NOT EXISTS (SELECT 1 FROM #QSDbs)\n    BEGIN\n        PRINT N'No Query Store-enabled databases found.';\n        RETURN;\n    END;\n\n    DECLARE @db_name SYSNAME;\n    DECLARE @sql NVARCHAR(MAX);\n    DECLARE @db_cursor CURSOR;\n\n    SET @db_cursor = CURSOR LOCAL FAST_FORWARD FOR\n        SELECT database_name FROM #QSDbs ORDER BY database_name;\n\n    OPEN @db_cursor;\n    FETCH NEXT FROM @db_cursor INTO @db_name;\n\n    WHILE @@FETCH_STATUS = 0\n    BEGIN\n        SET @sql = N'\n        ;WITH RecentPlans AS (\n            SELECT\n                q.query_id,\n                q.query_hash,\n                p.plan_id,\n                AVG(rs.avg_duration) AS avg_duration,\n                SUM(rs.count_executions) AS exec_count,\n                MIN(rs.first_execution_time) AS first_seen,\n                MAX(rs.last_execution_time) AS last_seen\n            FROM sys.query_store_query q\n            JOIN sys.query_store_plan p ON p.query_id = q.query_id\n            JOIN sys.query_store_runtime_stats rs ON rs.plan_id = p.plan_id\n            JOIN sys.query_store_runtime_stats_interval ri\n                ON ri.runtime_stats_interval_id = rs.runtime_stats_interval_id\n            WHERE ri.start_time >= DATEADD(HOUR, -@RecentHours, GETUTCDATE())\n              AND rs.count_executions >= @MinExecutions\n            GROUP BY q.query_id, q.query_hash, p.plan_id\n        ),\n        HistoricalBest AS (\n            SELECT\n                query_id,\n                query_hash,\n                MIN(avg_duration) AS best_duration\n            FROM RecentPlans\n            GROUP BY query_id, query_hash\n        ),\n        Regressions AS (\n            SELECT\n                r.query_id,\n                r.query_hash,\n                r.plan_id,\n                r.avg_duration,\n                r.exec_count,\n                h.best_duration,\n                CAST((r.avg_duration - h.best_duration) * 100.0\n                    / NULLIF(h.best_duration, 0) AS DECIMAL(10,2)) AS regression_pct,\n                r.first_seen,\n                r.last_seen,\n                ROW_NUMBER() OVER (\n                    PARTITION BY r.query_id, r.query_hash\n                    ORDER BY r.avg_duration DESC\n                ) AS plan_rank\n            FROM RecentPlans r\n            JOIN HistoricalBest h\n                ON h.query_id = r.query_id\n               AND h.query_hash = r.query_hash\n            WHERE r.avg_duration > h.best_duration * (1 + @RegressionPctThreshold / 100.0)\n        )\n        SELECT TOP (' + CAST(@TopPerDatabase AS NVARCHAR(10)) + N')\n            N''' + REPLACE(@db_name, N'''', N'''''') + N''' AS DatabaseName,\n            r.query_id,\n            r.query_hash,\n            r.plan_id,\n            CAST(r.avg_duration / 1000.0 AS DECIMAL(12,2)) AS recent_avg_duration_ms,\n            CAST(r.best_duration / 1000.0 AS DECIMAL(12,2)) AS best_avg_duration_ms,\n            r.regression_pct,\n            r.exec_count,\n            r.first_seen,\n            r.last_seen,\n            t.query_sql_text\n        FROM Regressions r\n        JOIN sys.query_store_query q\n            ON q.query_id = r.query_id\n        JOIN sys.query_store_query_text t\n            ON t.query_text_id = q.query_text_id\n        WHERE r.plan_rank = 1\n        ORDER BY r.regression_pct DESC;\n        ';\n\n        BEGIN TRY\n            EXEC sp_executesql @sql,\n                N'@RecentHours INT, @MinExecutions INT, @RegressionPctThreshold DECIMAL(5,2), @TopPerDatabase INT',\n                @RecentHours, @MinExecutions, @RegressionPctThreshold, @TopPerDatabase;\n        END TRY\n        BEGIN CATCH\n            PRINT N'Error in database [' + @db_name + N']: ' + ERROR_MESSAGE();\n        END CATCH;\n\n        FETCH NEXT FROM @db_cursor INTO @db_name;\n    END;\n\n    CLOSE @db_cursor;\n    DEALLOCATE @db_cursor;\n    DROP TABLE #QSDbs;\nEND;\nGO\n\nPRINT N'  sp_DBA_QueryStoreRegressions created.';\nGO\n\n-- ============================================================================\n-- 5. sp_DBA_HealthCheck — consolidated diagnostic engine\n-- ============================================================================\nPRINT N'Creating sp_DBA_HealthCheck...';\nGO\n\nIF OBJECT_ID(N'dbo.sp_DBA_HealthCheck', N'P') IS NOT NULL\n    DROP PROCEDURE dbo.sp_DBA_HealthCheck;\nGO\n\nCREATE PROCEDURE dbo.sp_DBA_HealthCheck\n    @DeepDive           BIT = 0,\n    @DatabaseList       NVARCHAR(MAX) = NULL,\n    @IncludeReadOnly    BIT = 0,\n    @BackupHoursSLA     INT = 24\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\n    IF OBJECT_ID(N'dbo.fn_DBA_ExcludedWaitTypes', N'IF') IS NULL\n    BEGIN\n        RAISERROR(N'Run DBARepository_Deploy.sql first.', 16, 1);\n        RETURN;\n    END;\n\n    IF OBJECT_ID(N'tempdb..#DBAFindings') IS NOT NULL DROP TABLE #DBAFindings;\n    CREATE TABLE #DBAFindings (\n        CheckId         INT,\n        Severity        VARCHAR(20),\n        Weight          INT,\n        Area            VARCHAR(50),\n        Finding         VARCHAR(255),\n        Impact          VARCHAR(255),\n        Recommendation  VARCHAR(MAX),\n        NextStepCommand VARCHAR(MAX)\n    );\n\n    DECLARE @HealthScore INT = 100;\n    DECLARE @ProductVersion NVARCHAR(128) = CAST(SERVERPROPERTY(N'ProductVersion') AS NVARCHAR(128));\n    DECLARE @MajorVersion INT = CAST(LEFT(@ProductVersion, CHARINDEX(N'.', @ProductVersion) - 1) AS INT);\n\n    -- Build DB list\n    CREATE TABLE #HC_Dbs (database_id INT NOT NULL PRIMARY KEY, database_name SYSNAME NOT NULL);\n\n    IF @DatabaseList IS NOT NULL AND LTRIM(RTRIM(@DatabaseList)) <> N''\n    BEGIN\n        INSERT INTO #HC_Dbs (database_id, database_name)\n        SELE

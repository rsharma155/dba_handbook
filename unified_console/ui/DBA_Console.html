orrelate with 02_capture_live_session_waits.sql'\n    END AS [Interpretation]\nFROM sys.dm_exec_requests AS r\nINNER JOIN sys.dm_exec_sessions AS s ON r.session_id = s.session_id\nWHERE r.session_id <> @@SPID\n  AND r.status = N'suspended'\nORDER BY r.wait_time DESC;\n\nPRINT '=== TRIAGE COMPLETE ===';\nPRINT 'Next: 03_Elapsed_Time_Diagnostics/01_elapsed_vs_worker_time_gap.sql on your slow query.';\n", "sql_server/Prod_Migration/02_Upgrade_Validation/01_instance_upgrade_validation.sql": "/*\n================================================================================\nPost-Migration Instance Upgrade Validation\n================================================================================\nPurpose:\n    Validates that the instance was upgraded correctly and flags settings that\n    commonly remain wrong after attach/restore/in-place upgrade.\n\nChecks:\n    (1) Build, edition, collation, clustered status\n    (2) Last errorlog startup messages (version line)\n    (3) Database states, recovery models, Query Store status\n    (4) Orphaned database owners (breaks metadata operations in SSMS)\n    (5) Suspect/offline databases\n    (6) Server-level triggers, linked servers count\n\nInterpretation:\n    - Orphaned owner on many DBs → SSMS Object Explorer slow, metadata errors\n    - Query Store READ_WRITE with forced bad plan → run regression script\n    - Database OFFLINE/SUSPECT → expand tree hangs on those nodes\n\nNext action:\n    Orphaned owner fix (per DB, maintenance window):\n        ALTER AUTHORIZATION ON DATABASE::[DbName] TO [sa_or_login];\n    If upgrade build is RTM with no CU → check Microsoft KB for 2025 CU list.\n\nCriticality: High\n================================================================================\n*/\n\nSET NOCOUNT ON;\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\nPRINT '=== INSTANCE PROPERTIES ===';\nSELECT\n    @@SERVERNAME AS [Server_Name],\n    SERVERPROPERTY(N'IsClustered') AS [Is_Clustered],\n    SERVERPROPERTY(N'Collation') AS [Instance_Collation],\n    SERVERPROPERTY(N'Edition') AS [Edition],\n    SERVERPROPERTY(N'ProductVersion') AS [Version],\n    SERVERPROPERTY(N'ProductLevel') AS [Level],\n    SERVERPROPERTY(N'ProductUpdateLevel') AS [Update_Level],\n    SERVERPROPERTY(N'ProductBuild') AS [Build],\n    SERVERPROPERTY(N'IsHadrEnabled') AS [HADR_Enabled];\n\nPRINT '=== USER DATABASE HEALTH ===';\nSELECT\n    d.name AS [Database_Name],\n    d.state_desc AS [State],\n    d.recovery_model_desc AS [Recovery_Model],\n    d.compatibility_level AS [Compat_Level],\n    d.collation_name,\n    SUSER_SNAME(d.owner_sid) AS [Owner],\n    d.is_query_store_on AS [Query_Store_On],\n    CASE\n        WHEN SUSER_SNAME(d.owner_sid) IS NULL THEN N'FIX: ALTER AUTHORIZATION ON DATABASE'\n        WHEN d.state_desc <> N'ONLINE' THEN N'FIX: Bring database online or remove from SSMS view'\n        WHEN d.is_auto_close_on = 1 THEN N'FIX: SET AUTO_CLOSE OFF'\n        ELSE N'OK'\n    END AS [Action]\nFROM sys.databases AS d\nWHERE d.database_id > 4\nORDER BY d.state_desc, d.name;\n\nPRINT '=== QUERY STORE FORCED PLANS (carried over from pre-migration) ===';\nDECLARE @sql NVARCHAR(MAX) = N'';\nSELECT @sql = @sql + N'\nSELECT ''' + REPLACE(d.name, '''', '''''') + N''' AS [Database_Name],\n       COUNT(*) AS [Forced_Plan_Count]\nFROM [' + REPLACE(d.name, ']', ']]') + N'].sys.query_store_plan\nWHERE is_forced_plan = 1\nHAVING COUNT(*) > 0\nUNION ALL\n'\nFROM sys.databases AS d\nWHERE d.database_id > 4 AND d.state = 0 AND d.is_query_store_on = 1;\n\nIF LEN(@sql) > 0\nBEGIN\n    SET @sql = LEFT(@sql, LEN(@sql) - 11);\n    EXEC sys.sp_executesql @sql;\nEND\nELSE\n    PRINT 'No databases with Query Store enabled, or none online.';\n\nPRINT '=== ERRORLOG — RECENT STARTUP (last 20 rows) ===';\nCREATE TABLE #ErrorLog (\n    LogDate DATETIME,\n    ProcessInfo NVARCHAR(50),\n    [Text] NVARCHAR(MAX)\n);\n\nINSERT INTO #ErrorLog\nEXEC sys.xp_readerrorlog 0, 1, N'SQL Server';\n\nSELECT TOP (20) LogDate, ProcessInfo, [Text]\nFROM #ErrorLog\nORDER BY LogDate DESC;\n\nDROP TABLE #ErrorLog;\n\nPRINT '=== LINKED SERVERS / SERVER TRIGGERS (can slow distributed metadata) ===';\nSELECT name AS [Linked_Server], product, provider, is_linked FROM sys.servers WHERE is_linked = 1;\nSELECT name, is_disabled FROM sys.server_triggers;\n\nPRINT 'Next: 02_express_to_developer_limits_check.sql if prior edition was Express.';\n", "sql_server/Prod_Migration/02_Upgrade_Validation/02_express_to_developer_limits_check.sql": "/*\n================================================================================\nExpress → Standard/Developer Edition Limits Check\n================================================================================\nPurpose:\n    After migrating OFF SQL Server Express, several limits and configuration\n    artifacts remain and cause \"mysterious\" slowness:\n\n    Express limits (2019):\n    - ~1.4 GB buffer pool cap (engine enforced)\n    - 1 CPU socket / 4 cores max\n    - 10 GB per database size limit (removed when not Express)\n    - Often deployed with tiny max server memory and MAXDOP=1\n\n    After upgrade to Developer/Standard, the ENGINE limits are gone but\n    sp_configure values and Windows VM sizing may still reflect Express era.\n\nChecks:\n    (1) Current edition vs Express\n    (2) max server memory vs physical RAM\n    (3) MAXDOP, CTFP, affinity mask\n    (4) CPU count visible to SQL vs VM cores\n    (5) Buffer pool size vs target memory\n    (6) Database file sizes (historical Express 10GB concern)\n\nInterpretation:\n    - max server memory = 2048 on 32 GB VM → massive unnecessary IO/waits\n    - MAXDOP = 1 on 16-core box → not always wrong, but verify CTFP and waits\n    - committed_kb << physical RAM after Developer upgrade → increase max server memory\n\nNext action if memory capped:\n    See 07_Instance_Config/02_recommended_fixes_with_rollback.sql section 1.\n\nCriticality: High for Express → non-Express migrations\n================================================================================\n*/\n\nSET NOCOUNT ON;\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\nDECLARE @Edition NVARCHAR(256) = CAST(SERVERPROPERTY(N'Edition') AS NVARCHAR(256));\nDECLARE @EngineEdition INT = CAST(SERVERPROPERTY(N'EngineEdition') AS INT);\n-- EngineEdition: 4 = Express\n\nPRINT '=== EDITION CHECK ===';\nSELECT\n    @Edition AS [Edition],\n    @EngineEdition AS [Engine_Edition_ID],\n    CASE @EngineEdition\n        WHEN 4 THEN N'STILL EXPRESS — migration may not be complete'\n        ELSE N'Not Express — engine-level RAM/CPU caps removed'\n    END AS [Express_Status];\n\nPRINT '=== MEMORY: CONFIG vs OS vs BUFFER POOL ===';\nSELECT\n    max_mem.value_in_use AS [Max_Server_Memory_MB],\n    min_mem.value_in_use AS [Min_Server_Memory_MB],\n    os.physical_memory_kb / 1024 AS [Physical_RAM_MB],\n    os.committed_kb / 1024 AS [SQL_Committed_Memory_MB],\n    os.committed_target_kb / 1024 AS [SQL_Target_Memory_MB],\n    buf.Buffer_Pool_MB,\n    CAST(\n        CASE\n            WHEN max_mem.value_in_use < os.physical_memory_kb / 1024 * 0.4\n                THEN N'LIKELY POST-EXPRESS CAP: Increase max server memory after validating OS headroom'\n            WHEN os.committed_kb / 1024 < os.physical_memory_kb / 1024 * 0.3\n                THEN N'SQL memory under-utilized — memory setting, recent startup, or workload not warmed'\n            ELSE N'Review — compare to workload working set'\n        END AS NVARCHAR(500)\n    ) AS [Recommendation]\nFROM sys.dm_os_sys_info AS os\nCROSS JOIN (\n    SELECT value_in_use\n    FROM sys.configurations\n    WHERE name = N'max server memory (MB)'\n) AS max_mem\nCROSS JOIN (\n    SELECT value_in_use\n    FROM sys.configurations\n    WHERE name = N'min server memory (MB)'\n) AS min_mem\nCROSS JOIN (\n    SELECT SUM(pages_kb) / 1024 AS Buffer_Pool_MB\n    FROM sys.dm_os_memory_clerks\n    WHERE type = N'MEMORYCLERK_SQLBUFFERPOOL'\n) AS buf;\n\nPRINT '=== PARALLELISM SETTINGS ===';\nSELECT\n    name,\n    value_in_use AS [Current_Value],\n    CASE name\n        WHEN N'max degree of parallelism' THEN\n            CASE\n                WHEN value_in_use = 0 THEN N'0 = unlimited — often bad on OLTP; 4-8 typical'\n                WHEN value_in_use = 1 THEN N'MAXDOP 1 — fine for troubleshooting, not always for prod'\n                ELSE N'Validate against NUMA layout'\n            END\n        WHEN N'cost threshold for parallelism' THEN\n            CASE WHEN value_in_use <= 5 THEN N'Default 5 — often too low after upgrade; try 50' ELSE N'OK' END\n        ELSE N'Review'\n    END AS [Post_Migration_Note]\nFROM sys.configurations\nWHERE name IN (N'max degree of parallelism', N'cost threshold for parallelism', N'affinity mask', N'affinity64 mask');\n\nPRINT '=== CPU VISIBLE TO SQL SERVER ===';\nSELECT\n    cpu_count AS [Logical_CPUs],\n    hyperthread_ratio,\n    cpu_count / hyperthread_ratio AS [Physical_Cores_Approx],\n    scheduler_count AS [Schedulers],\n    CAST(\n        N'Express allowed 1 socket/4 cores. If VM has more but performance odd, ' +\n        N'check VM vCPU alignment and MAXDOP.'\n    AS NVARCHAR(500)) AS [Note]\nFROM sys.dm_os_sys_info;\n\nPRINT '=== DATABASE FILE SIZES (historical Express 10 GB limit) ===';\nSELECT\n    DB_NAME(database_id) AS [Database_Name],\n    type_desc AS [File_Type],\n    name AS [Logical_Name],\n    size * 8 / 1024 AS [Size_MB],\n    CASE WHEN size * 8 / 1024 > 10240 AND @EngineEdition <> 4 THEN N'Would have exceeded Express 10GB — OK on Developer'\n         ELSE N'OK'\n    END AS [Express_Limit_Note]\nFROM sys.master_files\nWHERE database_id > 4\nORDER BY size DESC;\n\nPRINT 'Next: 02_Upgrade_Validation/03_cpu_numa_topology.sql';\n", "sql_server/Prod_Migration/02_Upgrade_Validation/03_cpu_numa_topology.sql": "/*\n================================================================================\nCPU and NUMA Topology Check (Post Express → Developer)\n================================================================================\nPurpose:\n    After migrating from SQL Server Express to Developer/Standard/Enterprise,\n    SQL Server may suddenly see many more schedulers and NUMA nodes than before.\n    The workload execution model changes even when data and queries are unchanged.\n\n    Express (typical):  4 schedulers, 1 NUMA node, MAXDOP effectively constrained\n    Developer (typical): 32 schedulers, 4 NUMA nodes, full parallelism available\n\n    This shift can surface as:\n    - CXPACKET / CXCONSUMER waits (parallelism skew)\n    - PAGELATCH_* on tempdb (more concurrent allocators)\n    - SOS_SCHEDULER_YIELD (scheduler pressure)\n    - Metadata latch contention (parallel catalog scans)\n\nChecks:\n    (1) Instance-level CPU / NUMA summary (dm_os_sys_info)\n    (2) NUMA node layout and worker distribution (dm_os_nodes)\n    (3) Online schedulers per node with runnable tasks (dm_os_schedulers)\n    (4) MAXDOP vs NUMA topology alignment\n\nInterpretation:\n    - runnable_tasks_count > 0 sustained on multiple schedulers → CPU queue pressure\n    - scheduler_count >> prior Express baseline → revalidate MAXDOP, CTFP, tempdb files\n    - numa_node_count > 1 with MAXDOP = 0 or very high → cross-node parallel risk\n\nNext action:\n    MAXDOP / CTFP misaligned → 07_Instance_Config/01_post_migration_config_audit.sql\n    PAGELATCH on tempdb        → 08_Storage_OS/03_tempdb_autogrowth_audit.sql\n  Parallelism waits            → 06_Optimizer_Plans/02_query_hint_guide.sql\n\nCriticality: High for Express → non-Express migrations on multi-core VMs\n================================================================================\n*/\n\nSET NOCOUNT ON;\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\nPRINT '=== 1. INSTANCE CPU / NUMA SUMMARY (dm_os_sys_info) ===';\nIF COL_LENGTH(N'sys.dm_os_sys_info', N'socket_count') IS NOT NULL\nBEGIN\n    SELECT\n        cpu_count,\n        scheduler_count,\n        numa_node_count,\n        socket_count,\n        hyperthread_ratio,\n        cpu_count / NULLIF(hyperthread_ratio, 0) AS [Physical_Cores_Approx],\n        CAST(\n            N'Express historically exposed fewer schedulers (e.g. 4) and often 1 NUMA node. ' +\n            N'After Developer upgrade, scheduler_count and numa_node_count may jump sharply — ' +\n            N'the execution model changed; revisit MAXDOP, CTFP, and tempdb file count.'\n        AS NVARCHAR(600)) AS [Post_Migration_Note]\n    FROM sys.dm_os_sys_info;\nEND\nELSE\nBEGIN\n    SELECT\n        cpu_count,\n        scheduler_count,\n        numa_node_count,\n        CAST(NULL AS INT) AS [socket_count],\n        hyperthread_ratio,\n        cpu_count / NULLIF(hyperthread_ratio, 0) AS [Physical_Cores_Approx],\n        CAST(\n            N'socket_count requires SQL Server 2016+. ' +\n            N'Compare scheduler_count and numa_node_count to pre-migration baseline.'\n        AS NVARCHAR(500)) AS [Post_Migration_Note]\n    FROM sys.dm_os_sys_info;\nEND;\n\nPRINT '=== 2. NUMA NODES (dm_os_nodes) ===';\nSELECT\n    node_id,\n    memory_node_id,\n    online_scheduler_count,\n    active_worker_count,\n    CASE node_id\n        WHEN 64 THEN N'DAC node — ignore for capacity planning'\n        ELSE N'User schedulers mapped to this node'\n    END AS [Node_Role]\nFROM sys.dm_os_nodes\nORDER BY node_id;\n\nPRINT '=== 3. ONLINE SCHEDULERS (dm_os_schedulers) ===';\nSELECT\n    scheduler_id,\n    parent_node_id,\n    status,\n    runnable_tasks_count,\n    current_tasks_count,\n    active_workers_count,\n    CASE\n        WHEN runnable_tasks_count > 0 THEN N'CPU queue — workload waiting for scheduler'\n        WHEN current_tasks_count > active_workers_count * 2 THEN N'Review — elevated task load on scheduler'\n        ELSE N'OK at snapshot'\n    END AS [Scheduler_Status]\nFROM sys.dm_os_schedulers\nWHERE status = N'VISIBLE ONLINE'\nORDER BY parent_node_id, scheduler_id;\n\nPRINT '=== 4. MAXDOP / CTFP vs TOPOLOGY ===';\nSELECT\n    (SELECT value_in_use FROM sys.configurations WHERE name = N'max degree of parallelism') AS [MAXDOP],\n    (SELECT value_in_use FROM sys.configurations WHERE name = N'cost threshold for parallelism') AS [CTFP],\n    os.cpu_count AS [Logical_CPUs],\n    os.numa_node_count AS [NUMA_Nodes],\n    os.scheduler_count AS [Schedulers],\n    CAST(\n        CASE\n            WHEN os.numa_node_count > 1\n                 AND (SELECT value_in_use FROM sys.configurations WHERE name = N'max degree of parallelism') = 0\n                THEN N'WARNING: MAXDOP 0 (unlimited) on multi-NUMA — common post-Express surprise'\n            WHEN os.scheduler_count > 8\n                 AND (SELECT value_in_use FROM sys.configurations WHERE name = N'max degree of parallelism') = 1\n                THEN N'INFO: MAXDOP 1 on many schedulers — OK for triage; validate for production OLTP'\n            WHEN (SELECT value_in_use FROM sys.configurations WHERE name = N'cost threshold for parallelism') <= 5\n                THEN N'WARNING: CTFP default 5 — trivial queries may parallelize after core count increase'\n            ELSE N'Review MAXDOP against cores per NUMA node (often MIN(8, cores_per_node))'\n        END AS NVARCHAR(500)\n    ) AS [Recommendation]\nFROM sys.dm_os_sys_info AS os;\n\nPRINT '=== 5. EXPRESS → DEVELOPER TOPOLOGY CHANGE (reference) ===';\nSELECT\n    N'Before (Express)' AS [Phase],\n    N'~4 schedulers, 1 NUMA node, engine CPU/RAM caps' AS [Typical_Topology],\n    N'Plans and waits tuned to low parallelism' AS [Workload_Impact]\nUNION ALL\nSELECT\n    N'After (Developer)',\n    CAST(scheduler_count AS NVARCHAR(10)) + N' schedulers, '\n        + CAST(numa_node_count AS NVARCHAR(10)) + N' NUMA node(s), caps removed',\n    N'Same queries may parallelize differently — wait profile can change completely'\nFROM sys.dm_os_sys_info;\n\nPRINT 'Next: 07_Instance_Config/01_post_migration_config_audit.sql';\n", "sql_server/Prod_Migration/03_Elapsed_Time_Diagnostics/01_elapsed_vs_worker_time_gap.sql": "/*\n================================================================================\nElapsed Time vs Worker Time Gap Analysis\n================================================================================\nPurpose:\n    Diagnose the exact pattern: HIGH elapsed time, LOW CPU, LOW logical reads.\n    This means the session is WAITING, not processing data pages.\n\nHow to use:\n    1. Set @DatabaseName and optionally filter by query text fragment\n    2. Run during or immediately after slowness\n    3. Review Result Set 1 (plan cache / QS) and Result Set 2 (active requests)\n\nKey columns:\n    - total_elapsed_time / elapsed_time  → wall clock (ms)\n    - total_worker_time / cpu_time        → CPU work only (ms)\n    - total_logical_reads / logical_reads → buffer pool pages\n    - Gap_Ratio = Elapsed / NULLIF(CPU,0) → values >> 5 strongly imply waits\n\nInterpretation:\n    Gap_Ratio > 10 with low reads:\n        Session is blocked, waiting on latches, IO, compilation, or OS calls.\n        DO NOT add optimizer hints — run 02_capture_live_session_waits.sql instead.\n\n    Gap_Ratio ~ 1-3 with high reads:\n        True CPU/IO query — optimizer/index tuning territory.\n\n    Gap_Ratio high + wait_type LIKE 'LCK%':\n        Blocking — 05_Concurrency/01_blocking_and_locks.sql\n\n    Gap_Ratio high + wait_type LIKE 'PAGEIOLATCH%':\n        Storage — even \"small\" queries hit system DB pages on cold cache\n\nNext action if gap confirmed:\n    → 02_capture_live_session_waits.sql while reproducing\n    → 09_Extended_Events/01_xe_single_query_wait_capture.sql for proof\n\nCriticality: Critical — core diagnostic for reported issue\n================================================================================\n*/\n\nSET NOCOUNT ON;\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\nDECLARE @DatabaseName SYSNAME = NULL;  -- e.g. N'MyAppDB'\nDECLARE @QueryTextFilter NVARCHAR(256) = NULL;  -- e.g. N'%CustomerOrder%'\nDECLARE @TopN INT = 25;\n\nPRINT '=== 1. PLAN CACHE: QUERIES WITH ELAPSED >> CPU (since cache load) ===';\nSELECT TOP (@TopN)\n    DB_NAME(st.dbid) AS [Database_Name],\n    qs.execution_count,\n    qs.total_elapsed_time / 1000.0 AS [Total_Elapsed_Sec],\n    qs.total_worker_time / 1000.0 AS [Total_CPU_Sec],\n    qs.total_logical_reads,\n    qs.total_physical_reads,\n    CAST(qs.total_elapsed_time * 1.0 / NULLIF(qs.total_worker_time, 0) AS DECIMAL(18,2)) AS [Gap_Ratio_Elapsed_Over_CPU],\n    CAST(qs.total_elapsed_time * 1.0 / NULLIF(qs.execution_count, 0) / 1000.0 AS DECIMAL(18,3)) AS [Avg_Elapsed_Sec],\n    CAST(qs.total_worker_time * 1.0 / NULLIF(qs.execution_count, 0) / 1000.0 AS DECIMAL(18,3)) AS [Avg_CPU_Sec],\n    qs.creation_time AS [Plan_Cached_At],\n    qs.last_execution_time,\n    SUBSTRING(st.text, (qs.statement_start_offset / 2) + 1,\n        CASE WHEN qs.statement_end_offset = -1 THEN LEN(st.text)\n             ELSE (qs.statement_end_offset - qs.statement_start_offset) / 2 + 1 END) AS [Query_Text],\n    CASE\n        WHEN qs.total_elapsed_time * 1.0 / NULLIF(qs.total_worker_time, 0) > 20\n             AND qs.total_logical_reads / NULLIF(qs.execution_count, 0) < 1000\n            THEN N'WAIT-BOUND: Low work per execution, high wall time — NOT a hint problem'\n        WHEN qs.total_worker_time > qs.total_elapsed_time * 0.8\n            THEN N'CPU-BOUND: Tune plan/indexes/parallelism'\n        WHEN qs.total_physical_reads > qs.total_logical_reads * 0.1\n            THEN N'IO-BOUND: Check storage latency'\n        ELSE N'Review waits on active execution'\n    END AS [Diagnosis],\n    qp.query_plan\nFROM sys.dm_exec_query_stats AS qs\nCROSS APPLY sys.dm_exec_sql_text(qs.sql_handle) AS st\nCROSS APPLY sys.dm_exec_query_plan(qs.plan_handle) AS qp\nWHERE st.dbid IS NOT NULL\n  AND (@DatabaseName IS NULL OR DB_NAME(st.dbid) = @DatabaseName)\n  AND (@QueryTextFilter IS NULL OR st.text LIKE @QueryTextFilter)\n  AND qs.total_worker_time > 0\n  AND qs.execution_count >= 1\nORDER BY [Gap_Ratio_Elapsed_Over_CPU] DESC, qs.total_elapsed_time DESC;\n\nPRINT '=== 2. CURRENTLY RUNNING / SUSPENDED REQUESTS (live gap) ===';\nSELECT\n    r.session_id,\n    r.status,\n    r.command,\n    r.wait_type,\n    r.wait_time AS [Current_Wait_ms],\n    r.total_elapsed_time AS [Elapsed_ms],\n    r.cpu_time AS [CPU_ms],\n    r.logical_reads,\n    r.reads AS [Physical_Reads],\n    CAST(r.total_elapsed_time * 1.0 / NULLIF(r.cpu_time, 0) AS DECIMAL(18,2)) AS [Gap_Ratio],\n    s.login_name,\n    s.host_name,\n    s.program_name,\n    SUBSTRING(st.text, (r.statement_start_offset / 2) + 1,\n        CASE WHEN r.statement_end_offset = -1 THEN LEN(st.text)\n             ELSE (r.statement_end_offset - r.statement_start_offset) / 2 + 1 END) AS [Query_Text],\n    CASE\n        WHEN r.wait_type LIKE N'LCK%' THEN N'Blocked — 05_Concurrency/01_blocking_and_locks.sql'\n        WHEN r.wait_type LIKE N'LATCH%' OR r.wait_type LIKE N'PAGELATCH%' THEN N'Latch — 04_Wait_Stats/03_latch_metadata_waits.sql'\n        WHEN r.wait_type LIKE N'PAGEIOLATCH%' OR r.wait_type = N'WRITELOG' THEN N'IO — 08_Storage_OS/01_io_latency_deep_dive.sql'\n        WHEN r.wait_type LIKE N'RESOURCE_SEMAPHORE%' THEN N'Memory grant queue'\n        WHEN r.wait_type LIKE N'PREEMPTIVE%' THEN N'OS/AV/AD delay'\n        WHEN r.cpu_time = 0 AND r.total_elapsed_time > 5000 THEN N'Start blocked/waiting before work — capture XE'\n        ELSE N'Run 02_capture_live_session_waits.sql on this session_id'\n    END AS [Next_Action]\nFROM sys.dm_exec_requests AS r\nINNER JOIN sys.dm_exec_sessions AS s ON r.session_id = s.session_id\nCROSS APPLY sys.dm_exec_sql_text(r.sql_handle) AS st\nWHERE r.session_id <> @@SPID\n  AND (@DatabaseName IS NULL OR DB_NAME(st.dbid) = @DatabaseName)\n  AND r.total_elapsed_time > 100\nORDER BY [Gap_Ratio] DESC, r.total_elapsed_time DESC;\n\nPRINT '=== 3. WHY LOCAL VM EXECUTION IS STILL SLOW ===';\nSELECT\n    N'Running on the same VM only eliminates network (ASYNC_NETWORK_IO). ' +\n    N'Blocking, latches, tempdb, buffer pool pressure, disk latency, AD token resolution, ' +\n    N'and antivirus still apply to local SSMS/sqlcmd connections. ' +\n    N'If Gap_Ratio is high locally, the bottleneck is server-side waits — not app tier.' AS [Explanation];\n", "sql_server/Prod_Migration/03_Elapsed_Time_Diagnostics/02_capture_live_session_waits.sql": "/*\n================================================================================\nCapture Live Session Waits During Slow Query\n================================================================================\nPurpose:\n    Pinpoint what a SPECIFIC session is waiting on while your slow query runs.\n    Use when plan cache shows low CPU/reads but high elapsed time.\n\nHow to use:\n    1. Start your slow query in Session A (note @@SPID or use SSMS status bar)\n    2. Set @TargetSessionId to Session A's SPID\n    3. Run this script repeatedly in Session B while A is suspended/slow\n    4. Optionally run the polling loop block at bottom for 60 seconds\n\nInterpretation:\n    wait_type on dm_exec_requests = current wait (most important)\n    dm_os_waiting_tasks = lower-level task waits with resource description\n    blocking_session_id > 0 → not optimizer issue\n\nNext action by wait_type:\n    LCK_*           → 05_Concurrency/01_blocking_and_locks.sql\n    LATCH_*         → 04_Wait_Stats/03_latch_metadata_waits.sql\n    PAGEIOLATCH_*   → 08_Storage_OS/01_io_latency_deep_dive.sql\n    PREEMPTIVE_*    → 08_Storage_OS/02_os_integration_post_migration.sql\n    CXPACKET        → only if MAXDOP 1 was NOT tested at session level\n\nIf wait_type = NULL and status = running but still slow:\n    May be client-side (SSMS rendering) or async completion — use XE script.\n\nCriticality: Critical\n================================================================================\n*/\n\nSET NOCOUNT ON;\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\nDECLARE @TargetSessionId INT = NULL;  -- REQUIRED: set to slow query SPID\n\nIF @TargetSessionId IS NULL\nBEGIN\n    PRINT 'Set @TargetSessionId to the SPID running your slow query.';\n    PRINT 'Active non-system sessions:';\n    SELECT session_id, login_name, host_name, program_name, status\n    FROM sys.dm_exec_sessions\n    WHERE is_user_process = 1 AND session_id <> @@SPID\n    ORDER BY session_id;\n    RETURN;\nEND;\n\nPRINT '=== SESSION OVERVIEW ===';\nSELECT\n    s.session_id,\n    s.login_name,\n    s.host_name,\n    s.program_name,\n    s.status,\n    s.cpu_time AS [Session_CPU_ms],\n    s.memory_usage * 8 AS [Memory_KB],\n    s.total_elapsed_time AS [Session_Elapsed_ms],\n    s.reads,\n    s.writes,\n    s.logical_reads,\n    s.last_request_start_time,\n    s.last_request_end_time\nFROM sys.dm_exec_sessions AS s\nWHERE s.session_id = @TargetSessionId;\n\nPRINT '=== REQUEST-LEVEL WAITS (dm_exec_requests) ===';\nSELECT\n    r.session_id,\n    r.status,\n    r.command,\n    r.blocking_session_id,\n    r.wait_type,\n    r.wait_time AS [Wait_ms],\n    r.wait_resource,\n    r.open_transaction_count,\n    r.percent_complete,\n    r.estimated_completion_time,\n    r.cpu_time,\n    r.total_elapsed_time,\n    r.logical_reads,\n    r.reads,\n    r.writes,\n    r.dop,\n    r.granted_query_memory * 8192 / 1024 AS [Granted_Memory_KB],\n    SUBSTRING(st.text, (r.statement_start_offset / 2) + 1,\n        CASE WHEN r.statement_end_offset = -1 THEN LEN(st.text)\n             ELSE (r.statement_end_offset - r.statement_start_offset) / 2 + 1 END) AS [Current_Statement],\n    st.text AS [Full_Batch_Text]\nFROM sys.dm_exec_requests AS r\nCROSS APPLY sys.dm_exec_sql_text(r.sql_handle) AS st\nWHERE r.session_id = @TargetSessionId;\n\nPRINT '=== TASK-LEVEL WAITS (dm_os_waiting_tasks) ===';\nSELECT\n    wt.session_id,\n    wt.wait_type,\n    wt.wait_duration_ms,\n    wt.resource_description,\n    wt.blocking_session_id,\n    t.task_state,\n    t.context_switches_count,\n    t.pending_io_count\nFROM sys.dm_os_waiting_tasks AS wt\nLEFT JOIN sys.dm_os_tasks AS t ON wt.waiting_task_address = t.task_address\nWHERE wt.session_id = @TargetSessionId\nORDER BY wt.wait_duration_ms DESC;\n\nPRINT '=== BLOCKING CHAIN (if blocked) ===';\n;WITH block_chain AS (\n    SELECT\n        r.session_id,\n        r.blocking_session_id,\n        0 AS lvl,\n        CAST(r.session_id AS VARCHAR(MAX)) AS chain\n    FROM sys.dm_exec_requests AS r\n    WHERE r.session_id = @TargetSessionId\n\n    UNION ALL\n\n    SELECT\n        r.session_id,\n        r.blocking_session_id,\n        bc.lvl + 1,\n        CAST(bc.chain + N' <- ' + CAST(r.session_id AS VARCHAR(12)) AS VARCHAR(MAX))\n    FROM sys.dm_exec_requests AS r\n    INNER JOIN block_chain AS bc ON r.session_id = bc.blocking_session_id\n    WHERE bc.lvl < 20\n)\nSELECT * FROM block_chain ORDER BY lvl;\n\n/*\n-- POLLING LOOP: uncomment to sample every 2 seconds for 60 seconds\nDECLARE @i INT = 0;\nWHILE @i < 30\nBEGIN\n    SELECT SYSDATETIME() AS sample_time, wait_type, wait_time, wait_resource, status\n    FROM sys.dm_exec_requests WHERE session_id = @TargetSessionId;\n    WAITFOR DELAY '00:00:02';\n    SET @i += 1;\nEND;\n*/\n", "sql_server/Prod_Migration/04_Wait_Stats/01_wait_stats_delta_capture.sql": "/*\n================================================================================\nWait Statistics Delta Capture (Before / After Reproduction)\n================================================================================\nPurpose:\n    Instance-wide wait stats are cumulative since startup. For production\n    triage, capture a CLEAN DELTA while reproducing slowness.\n\nHow to use:\n    STEP 1: Run section A (snapshot baseline) — saves to #WaitBaseline\n    STEP 2: Reproduce the problem (run slow app query, expand SSMS databases)\n    STEP 3: Run section B (delta) within 1-5 minutes of reproduction\n\nInterpretation:\n    Focus on waits that APPEAR or SPIKE in the delta, not historical noise.\n    High Avg_Wait_ms with moderate count = chronic bottleneck\n    High Wait_Count with low avg = frequent short waits (latches)\n\nNext action:\n    Match top delta wait to 02_post_migration_wait_decoder.sql\n    If delta is empty → issue may be outside SQL (SSMS client) or very brief\n\nRollback / reset (maintenance window only):\n    DBCC SQLPERF('sys.dm_os_wait_stats', CLEAR);\n\nCriticality: High\n================================================================================\n*/\n\nSET NOCOUNT ON;\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\n-- ============================================================================\n-- SECTION A: BASELINE SNAPSHOT (run first, then reproduce issue)\n-- ============================================================================\nIF OBJECT_ID('tempdb..#WaitBaseline') IS NOT NULL DROP TABLE #WaitBaseline;\n\nSELECT\n    wait_type,\n    waiting_tasks_count,\n    wait_time_ms,\n    signal_wait_time_ms\nINTO #WaitBaseline\nFROM sys.dm_os_wait_stats;\n\nSELECT\n    SYSDATETIME() AS [Baseline_Captured_At],\n    (SELECT sqlserver_start_time FROM sys.dm_os_sys_info) AS [Instance_Start_Time],\n    COUNT(*) AS [Wait_Types_Snapshotted],\n    N'Reproduce slowness now, then run SECTION B below.' AS [Next_Step];\n\n-- ============================================================================\n-- SECTION B: DELTA (run after reproduction — paste below after GO if split)\n-- ============================================================================\n/*\n-- Uncomment and run as batch 2 after reproduction:\n\nSELECT TOP (20)\n    d.wait_type,\n    d.wait_count_delta AS [Wait_Count_Delta],\n    d.wait_time_delta_ms / 1000.0 AS [Wait_Sec_Delta],\n    d.signal_wait_delta_ms / 1000.0 AS [Signal_Sec_Delta],\n    CAST(d.wait_time_delta_ms * 1.0 / NULLIF(d.wait_count_delta, 0) AS DECIMAL(18,2)) AS [Avg_Wait_ms_Delta],\n    CASE\n        WHEN d.wait_type LIKE N'LCK%' THEN N'Blocking'\n        WHEN d.wait_type LIKE N'LATCH%' OR d.wait_type LIKE N'PAGELATCH%' OR d.wait_type LIKE N'METADATA%' THEN N'Latch/Metadata'\n        WHEN d.wait_type LIKE N'PAGEIOLATCH%' OR d.wait_type IN (N'WRITELOG', N'IO_COMPLETION') THEN N'Storage IO'\n        WHEN d.wait_type LIKE N'RESOURCE_SEMAPHORE%' THEN N'Memory/Compile'\n        WHEN d.wait_type LIKE N'PREEMPTIVE%' THEN N'OS/External'\n        WHEN d.wait_type IN (N'CXPACKET', N'CXCONSUMER') THEN N'Parallelism'\n        ELSE N'Other'\n    END AS [Category],\n    CASE\n        WHEN d.wait_type LIKE N'LCK%' THEN N'05_Concurrency/01_blocking_and_locks.sql'\n        WHEN d.wait_type LIKE N'LATCH%' OR d.wait_type LIKE N'METADATA%' THEN N'04_Wait_Stats/03_latch_metadata_waits.sql'\n        WHEN d.wait_type LIKE N'PAGEIOLATCH%' THEN N'08_Storage_OS/01_io_latency_deep_dive.sql'\n        WHEN d.wait_type LIKE N'PREEMPTIVE%' THEN N'08_Storage_OS/02_os_integration_post_migration.sql'\n        ELSE N'04_Wait_Stats/02_post_migration_wait_decoder.sql'\n    END AS [Next_Script]\nFROM (\n    SELECT\n        cur.wait_type,\n        cur.waiting_tasks_count - b.waiting_tasks_count AS wait_count_delta,\n        cur.wait_time_ms - b.wait_time_ms AS wait_time_delta_ms,\n        cur.signal_wait_time_ms - b.signal_wait_time_ms AS signal_wait_delta_ms\n    FROM sys.dm_os_wait_stats AS cur\n    INNER JOIN #WaitBaseline AS b ON cur.wait_type = b.wait_type\n    WHERE cur.waiting_tasks_count > b.waiting_tasks_count\n) AS d\nORDER BY d.wait_time_delta_ms DESC;\n*/\n\nPRINT 'Baseline captured in #WaitBaseline (session-scoped).';\nPRINT 'Reproduce issue, then run SECTION B (uncomment block above) in SAME session.';\n", "sql_server/Prod_Migration/04_Wait_Stats/02_post_migration_wait_decoder.sql": "/*\n================================================================================\nPost-Migration Wait Pattern Decoder\n================================================================================\nPurpose:\n    Maps wait types to root causes common after SQL Server version/edition\n    upgrades. Includes investigation queries and remediation pointers.\n\nUse with:\n    Output from 01_wait_stats_delta_capture.sql OR triage playbook top waits.\n\nCriticality: High\n================================================================================\n*/\n\nSET NOCOUNT ON;\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\nPRINT '=== TOP 25 ACTIONABLE WAITS WITH POST-MIGRATION CONTEXT ===';\nSELECT TOP (25)\n    ws.wait_type,\n    ws.waiting_tasks_count AS [Wait_Count],\n    ws.wait_time_ms / 1000.0 AS [Total_Wait_Sec],\n    CAST(ws.wait_time_ms * 1.0 / NULLIF(ws.waiting_tasks_count, 0) AS DECIMAL(18,2)) AS [Avg_Wait_ms],\n    CASE\n        WHEN ws.wait_type LIKE N'LCK_M_S%' THEN N'Shared lock block — reader blocked by writer or DDL'\n        WHEN ws.wait_type LIKE N'LCK_M_X%' THEN N'Exclusive lock — blocking chain; check long transactions'\n        WHEN ws.wait_type LIKE N'LCK_M_IX%' THEN N'Intent exclusive — update/delete blocking'\n        WHEN ws.wait_type LIKE N'LCK_M_SCH_%' THEN N'Schema lock — DDL or SSMS designer open'\n        WHEN ws.wait_type LIKE N'LATCH_EX%' THEN N'Exclusive latch — metadata cache, hash buckets'\n        WHEN ws.wait_type LIKE N'LATCH_SH%' THEN N'Shared latch — frequent with parallel metadata scans'\n        WHEN ws.wait_type LIKE N'PAGELATCH_%' THEN N'TempDB PFS/SGAM/GAM or allocation contention'\n        WHEN ws.wait_type LIKE N'METADATA_LATCH_%' THEN N'System catalog latch — SSMS Object Explorer'\n        WHEN ws.wait_type LIKE N'PAGEIOLATCH_SH%' THEN N'Waiting for data page read from disk (cold cache or IO slow)'\n        WHEN ws.wait_type LIKE N'PAGEIOLATCH_EX%' THEN N'Waiting for page write flush'\n        WHEN ws.wait_type = N'WRITELOG' THEN N'Transaction log write stall — check log file latency'\n        WHEN ws.wait_type = N'IO_COMPLETION' THEN N'Async IO completion — often bulk IO or backup'\n        WHEN ws.wait_type = N'RESOURCE_SEMAPHORE' THEN N'Query waiting for memory grant (sort/hash)'\n        WHEN ws.wait_type = N'RESOURCE_SEMAPHORE_QUERY_COMPILE' THEN N'Compilation throttling — plan cache pressure'\n        WHEN ws.wait_type = N'SOS_SCHEDULER_YIELD' THEN N'CPU quantum exhausted — real CPU pressure'\n        WHEN ws.wait_type = N'CXPACKET' THEN N'Parallel skew — one thread waits for others'\n        WHEN ws.wait_type = N'CXCONSUMER' THEN N'Parallel consumer wait — often with CXPACKET'\n        WHEN ws.wait_type LIKE N'PREEMPTIVE_OS_GETPROCADDRESS%' THEN N'Windows DLL call — sometimes AV hooks'\n        WHEN ws.wait_type LIKE N'PREEMPTIVE_OS_WRITEFILEGATHER%' THEN N'IFI disabled — zeroing data files during growth'\n        WHEN ws.wait_type LIKE N'PREEMPTIVE_OS_AUTHENTICATIONOPS%' THEN N'Windows auth / AD latency'\n        WHEN ws.wait_type = N'THREADPOOL' THEN N'CRITICAL: No worker threads — reduce load immediately'\n        WHEN ws.wait_type = N'ASYNC_NETWORK_IO' THEN N'Client slow fetch — unlikely if local VM only'\n        ELSE N'Look up wait type in SQL Server docs; correlate with active session'\n    END AS [Post_Migration_Meaning],\n    CASE\n        WHEN ws.wait_type LIKE N'LCK%' THEN N'05_Concurrency/01_blocking_and_locks.sql'\n        WHEN ws.wait_type LIKE N'LATCH%' OR ws.wait_type LIKE N'METADATA%' OR ws.wait_type LIKE N'PAGELATCH%' THEN N'04_Wait_Stats/03_latch_metadata_waits.sql'\n        WHEN ws.wait_type LIKE N'PAGEIOLATCH%' OR ws.wait_type IN (N'WRITELOG', N'IO_COMPLETION') THEN N'08_Storage_OS/01_io_latency_deep_dive.sql'\n        WHEN ws.wait_type LIKE N'RESOURCE_SEMAPHORE%' THEN N'07_Instance_Config/01_post_migration_config_audit.sql'\n        WHEN ws.wait_type LIKE N'PREEMPTIVE%' THEN N'08_Storage_OS/02_os_integration_post_migration.sql'\n        WHEN ws.wait_type IN (N'CXPACKET', N'CXCONSUMER') THEN N'06_Optimizer_Plans/01_compatibility_and_ce.sql'\n        ELSE N'03_Elapsed_Time_Diagnostics/02_capture_live_session_waits.sql'\n    END AS [Next_Script],\n    CASE\n        WHEN ws.wait_type LIKE N'LCK%' THEN N'Find head blocker; shorten transactions; consider RCSI; avoid SCHEMA locks in business hours'\n        WHEN ws.wait_type LIKE N'PAGELATCH_%' THEN N'Add tempdb data files (1 per core up to 8); enable TF 1118/1117 for tempdb'\n        WHEN ws.wait_type LIKE N'PAGEIOLATCH%' THEN N'Check avg disk latency; increase memory; fix indexes'\n        WHEN ws.wait_type = N'PREEMPTIVE_OS_WRITEFILEGATHER' THEN N'Enable IFI for service account'\n        WHEN ws.wait_type = N'RESOURCE_SEMAPHORE_QUERY_COMPILE' THEN N'Clear ad hoc plan bloat; optimize for ad hoc workloads=1'\n        ELSE N'See README.md wait pattern table'\n    END AS [Remediation_Summary]\nFROM sys.dm_os_wait_stats AS ws\nWHERE ws.waiting_tasks_count > 0\n  AND ws.wait_type NOT IN (N'SLEEP_TASK', N'WAIT_XTP_HOST_WAIT', N'SQLTRACE_INCREMENTAL_FLUSH_SLEEP')\nORDER BY ws.wait_time_ms DESC;\n\nPRINT '=== SIGNAL WAIT PERCENTAGE (scheduler pressure indicator) ===';\nSELECT TOP (15)\n    wait_type,\n    wait_time_ms,\n    signal_wait_time_ms,\n    CAST(100.0 * signal_wait_time_ms / NULLIF(wait_time_ms, 0) AS DECIMAL(5,2)) AS [Signal_Pct],\n    CASE WHEN signal_wait_time_ms * 1.0 / NULLIF(wait_time_ms, 0) > 0.25\n         THEN N'High signal % — CPU scheduling; check runnable tasks and MAXDOP'\n         ELSE N'Resource wait dominates — IO/lock/latch'\n    END AS [Interpretation]\nFROM sys.dm_os_wait_stats\nWHERE wait_time_ms > 1000 AND waiting_tasks_count > 0\nORDER BY signal_wait_time_ms DESC;\n", "sql_server/Prod_Migration/04_Wait_Stats/02_wait_stats_delta_after_repro.sql": "/*\n================================================================================\nWait Statistics Delta — AFTER Reproduction (Batch 2)\n================================================================================\nPurpose:\n    Run this AFTER 01_wait_stats_delta_capture.sql Section A AND reproducing\n    the slowness — in the SAME SSMS query window (same session).\n\n    #WaitBaseline is session-scoped; a new query window will not see it.\n\nIf you need cross-session delta:\n    Use 01_wait_stats_delta_capture.sql Section A, reproduce, then run this\n    in the original window without closing it.\n\nCriticality: High\n================================================================================\n*/\n\nSET NOCOUNT ON;\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\nIF OBJECT_ID('tempdb..#WaitBaseline') IS NULL\nBEGIN\n    RAISERROR(N'#WaitBaseline not found. Run Section A of 01_wait_stats_delta_capture.sql first in this session.', 16, 1);\n    RETURN;\nEND;\n\nSELECT TOP (20)\n    d.wait_type,\n    d.wait_count_delta AS [Wait_Count_Delta],\n    d.wait_time_delta_ms / 1000.0 AS [Wait_Sec_Delta],\n    d.signal_wait_delta_ms / 1000.0 AS [Signal_Sec_Delta],\n    CAST(d.wait_time_delta_ms * 1.0 / NULLIF(d.wait_count_delta, 0) AS DECIMAL(18,2)) AS [Avg_Wait_ms_Delta],\n    CASE\n        WHEN d.wait_type LIKE N'LCK%' THEN N'Blocking'\n        WHEN d.wait_type LIKE N'LATCH%' OR d.wait_type LIKE N'PAGELATCH%' OR d.wait_type LIKE N'METADATA%' THEN N'Latch/Metadata'\n        WHEN d.wait_type LIKE N'PAGEIOLATCH%' OR d.wait_type IN (N'WRITELOG', N'IO_COMPLETION') THEN N'Storage IO'\n        WHEN d.wait_type LIKE N'RESOURCE_SEMAPHORE%' THEN N'Memory/Compile'\n        WHEN d.wait_type LIKE N'PREEMPTIVE%' THEN N'OS/External'\n        WHEN d.wait_type IN (N'CXPACKET', N'CXCONSUMER') THEN N'Parallelism'\n        ELSE N'Other'\n    END AS [Category],\n    CASE\n        WHEN d.wait_type LIKE N'LCK%' THEN N'05_Concurrency/01_blocking_and_locks.sql'\n        WHEN d.wait_type LIKE N'LATCH%' OR d.wait_type LIKE N'METADATA%' THEN N'04_Wait_Stats/03_latch_metadata_waits.sql'\n        WHEN d.wait_type LIKE N'PAGEIOLATCH%' THEN N'08_Storage_OS/01_io_latency_deep_dive.sql'\n        WHEN d.wait_type LIKE N'PREEMPTIVE%' THEN N'08_Storage_OS/02_os_integration_post_migration.sql'\n        ELSE N'04_Wait_Stats/02_post_migration_wait_decoder.sql'\n    END AS [Next_Script]\nFROM (\n    SELECT\n        cur.wait_type,\n        cur.waiting_tasks_count - b.waiting_tasks_count AS wait_count_delta,\n        cur.wait_time_ms - b.wait_time_ms AS wait_time_delta_ms,\n        cur.signal_wait_time_ms - b.signal_wait_time_ms AS signal_wait_delta_ms\n    FROM sys.dm_os_wait_stats AS cur\n    INNER JOIN #WaitBaseline AS b ON cur.wait_type = b.wait_type\n    WHERE cur.waiting_tasks_count > b.waiting_tasks_count\n) AS d\nORDER BY d.wait_time_delta_ms DESC;\n", "sql_server/Prod_Migration/04_Wait_Stats/03_latch_metadata_waits.sql": "/*\n================================================================================\nLatch and Metadata Wait Deep Dive\n================================================================================\nPurpose:\n    Investigate LATCH_*, PAGELATCH_*, METADATA_LATCH_* waits — the leading\n    cause of SSMS Object Explorer slowness (expand databases) AND queries\n    with high elapsed time but minimal logical reads.\n\nWhy post-migration:\n    - More cores → more parallel metadata scans → latch contention\n    - TempDB misconfiguration surfaces under higher parallelism\n    - Security / ACL checks on database enumeration (SSMS)\n    - Plan cache / metadata cache pressure after upgrade\n\nChecks:\n    (1) Top latch waits from dm_os_latch_stats\n    (2) Waiting tasks on latch-related wait types right now\n    (3) TempDB file layout and free space\n    (4) Count of databases (large enumerations slow SSMS)\n    (5) Sessions running DBCC or DDL\n\nInterpretation:\n    PAGELATCH_EX on tempdb page 1:1:2 etc → classic tempdb allocation latch\n    LATCH_EX on ACCESS_METHODS_HOBT_COUNT → metadata heavy workload\n    Many databases + AD auth → PREEMPTIVE_OS_AUTHENTICATIONOPS may accompany\n\nNext action:\n    TempDB: 08_Storage_OS/03_tempdb_autogrowth_audit.sql\n    SSMS: 05_Concurrency/02_ssms_metadata_slowness.sql\n    IF PAGELATCH on tempdb: add evenly-sized tempdb files\n\nCriticality: High for SSMS + low-read slow queries\n================================================================================\n*/\n\nSET NOCOUNT ON;\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\nPRINT '=== TOP LATCH CLASSES (dm_os_latch_stats) ===';\nSELECT TOP (25)\n    ls.latch_class,\n    ls.wait_time_ms / 1000.0 AS [Total_Wait_Sec],\n    ls.waiting_requests_count AS [Wait_Count],\n    CAST(ls.wait_time_ms * 1.0 / NULLIF(ls.waiting_requests_count, 0) AS DECIMAL(18,2)) AS [Avg_Wait_ms],\n    CASE ls.latch_class\n        WHEN N'ACCESS_METHODS_DATASET_PARENT' THEN N'Parallel scan coordination'\n        WHEN N'ACCESS_METHODS_HOBT_COUNT' THEN N'Heap/B-tree metadata — many tables/indexes'\n        WHEN N'DBCC_MULTIOBJECT_SCANNER' THEN N'DBCC running — blocks metadata'\n        WHEN N'BUFFER' THEN N'Buffer manager latch — memory pressure'\n        WHEN N'SOS_RESERVEDMEMBLOCKLIST' THEN N'Memory object list — compile pressure'\n        ELSE N'Correlate with active queries'\n    END AS [Typical_Cause]\nFROM sys.dm_os_latch_stats AS ls\nWHERE ls.waiting_requests_count > 0\nORDER BY ls.wait_time_ms DESC;\n\nPRINT '=== ACTIVE LATCH / PAGELATCH WAITS ===';\nSELECT\n    wt.session_id,\n    wt.wait_type,\n    wt.wait_duration_ms,\n    wt.resource_description,\n    s.login_name,\n    s.host_name,\n    s.program_name,\n    SUBSTRING(st.text, 1, 200) AS [Query_Start]\nFROM sys.dm_os_waiting_tasks AS wt\nINNER JOIN sys.dm_exec_sessions AS s ON wt.session_id = s.session_id\nLEFT JOIN sys.dm_exec_requests AS r ON wt.session_id = r.session_id\nLEFT JOIN sys.dm_exec_connections AS c ON c.session_id = wt.session_id\nOUTER APPLY sys.dm_exec_sql_text(COALESCE(r.sql_handle, c.most_recent_sql_handle)) AS st\nWHERE wt.wait_type LIKE N'LATCH%'\n   OR wt.wait_type LIKE N'PAGELATCH%'\n   OR wt.wait_type LIKE N'METADATA%'\nORDER BY wt.wait_duration_ms DESC;\n\nPRINT '=== TEMPDB FILE LAYOUT ===';\nSELECT\n    name,\n    physical_name,\n    size * 8 / 1024 AS [Size_MB],\n    growth,\n    is_percent_growth\nFROM tempdb.sys.database_files\nORDER BY type_desc, file_id;\n\nPRINT '=== DATABASE COUNT (SSMS enumeration cost) ===';\nSELECT\n    COUNT(*) AS [User_Database_Count],\n    SUM(CASE WHEN state_desc <> N'ONLINE' THEN 1 ELSE 0 END) AS [Non_Online_Count],\n    CASE WHEN COUNT(*) > 100 THEN N'Large tree — SSMS expand inherently slower; test with sqlcmd'\n         ELSE N'Normal count'\n    END AS [SSMS_Note]\nFROM sys.databases\nWHERE database_id > 4;\n\nPRINT '=== SESSIONS RUNNING DBCC / DDL (metadata blockers) ===';\nSELECT\n    r.session_id,\n    r.command,\n    r.wait_type,\n    r.total_elapsed_time / 1000 AS [Elapsed_Sec],\n    s.login_name,\n    s.program_name,\n    st.text\nFROM sys.dm_exec_requests AS r\nINNER JOIN sys.dm_exec_sessions AS s ON r.session_id = s.session_id\nCROSS APPLY sys.dm_exec_sql_text(r.sql_handle) AS st\nWHERE r.command LIKE N'DBCC%'\n   OR st.text LIKE N'%ALTER%DATABASE%'\n   OR st.text LIKE N'%DROP%DATABASE%'\n   OR st.text LIKE N'%CREATE%INDEX%'\nORDER BY r.total_elapsed_time DESC;\n", "sql_server/Prod_Migration/05_Concurrency/01_blocking_and_locks.sql": "/*\n================================================================================\nBlocking, Lock Escalation, and Long Transactions\n================================================================================\nPurpose:\n    Full blocking analysis when LCK_* waits dominate or elapsed >> CPU with\n    low reads. Query hints CANNOT resolve lock waits.\n\nProvides:\n    (1) Head blockers and victims\n    (2) Blocking hierarchy tree\n    (3) Lock details per session (object-level where available)\n    (4) Open transaction count by session\n    (5) Lock escalation candidates (big scans in explicit transactions)\n\nInterpretation:\n    blocking_session_id chain → fix head blocker first\n    open_transaction_count > 0 on sleeping session → app not committing\n    Lock escalation on large table → partition strategy or ROWLOCK hints (careful)\n\nNext action if head blocker is maintenance:\n    Reschedule DBCC/index rebuild; use ONLINE index rebuild where possible\n\nIf no blocking but LCK_M_SCH_S:\n    SSMS table designer or uncommitted DDL — 02_ssms_metadata_slowness.sql\n\nCriticality: Critical\n================================================================================\n*/\n\nSET NOCOUNT ON;\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSET QUOTED_IDENTIFIER ON;\n\nPRINT '=== HEAD BLOCKERS AND VICTIMS ===';\nSELECT\n    r.session_id,\n    r.blocking_session_id,\n    r.wait_type,\n    r.wait_time AS [Wait_ms],\n    r.wait_resource,\n    r.open_transaction_count,\n    s.login_name,\n    s.host_name,\n    s.program_name,\n    s.status AS [Session_Status],\n    SUBSTRING(st.text, (r.statement_start_offset / 2) + 1,\n        CASE WHEN r.statement_end_offset = -1 THEN LEN(st.text)\n             ELSE (r.statement_end_offset - r.statement_start_offset) / 2 + 1 END) AS [Current_Statement]\nFROM sys.dm_exec_requests AS r\nINNER JOIN sys.dm_exec_sessions AS s ON r.session_id = s.session_id\nCROSS APPLY sys.dm_exec_sql_text(r.sql_handle) AS st\nWHERE r.blocking_session_id <> 0\n   OR r.session_id IN (SELECT DISTINCT blocking_session_id FROM sys.dm_exec_requests WHERE blocking_session_id <> 0)\nORDER BY r.blocking_session_id, r.wait_time DESC;\n\nPRINT '=== BLOCKING TREE ===';\n;WITH blockers AS (\n    SELECT\n        session_id,\n        blocking_session_id,\n        0 AS lvl,\n        CAST(CAST(session_id AS NVARCHAR(12)) AS NVARCHAR(MAX)) AS path\n    FROM sys.dm_exec_requests\n    WHERE blocking_session_id = 0\n      AND session_id IN (SELECT DISTINCT blocking_session_id FROM sys.dm_exec_requests WHERE blocking_session_id <> 0)\n    UNION ALL\n    SELECT\n        r.session_id,\n        r.blocking_session_id,\n        b.lvl + 1,\n        CAST(b.path + N' -> ' + CAST(r.session_id AS NVARCHAR(12)) AS NVARCHAR(MAX))\n    FROM sys.dm_exec_requests AS r\n    INNER JOIN blockers AS b ON r.blocking_session_id = b.session_id\n)\nSELECT REPLICATE(N'  ', lvl) + CAST(session_id AS VARCHAR(10)) AS [Hierarchy],\n       path AS [Block_Chain],\n       CASE WHEN lvl = 0 THEN N'HEAD BLOCKER — investigate this session' ELSE N'Victim' END AS [Role]\nFROM blockers\nORDER BY path;\n\nPRINT '=== SLEEPING SESSIONS WITH OPEN TRANSACTIONS (common app bug) ===';\nSELECT\n    s.session_id,\n    s.login_name,\n    s.host_name,\n    s.program_name,\n    s.status,\n    s.open_transaction_count,\n    DATEDIFF(SECOND, s.last_request_end_time, SYSDATETIME()) AS [Idle_Sec_Since_Last_Request],\n    st.text AS [Last_Batch_Text]\nFROM sys.dm_exec_sessions AS s\nINNER JOIN sys.dm_exec_connections AS c ON s.session_id = c.session_id\nCROSS APPLY sys.dm_exec_sql_text(c.most_recent_sql_handle) AS st\nWHERE s.is_user_process = 1\n  AND s.open_transaction_count > 0\n  AND s.status = N'sleeping'\nORDER BY s.open_transaction_count DESC, [Idle_Sec_Since_Last_Request] DESC;\n\nPRINT '=== LOCK COUNT BY SESSION (top 20) ===';\nSELECT TOP (20)\n    l.request_session_id AS [Session_ID],\n    COUNT(*) AS [Lock_Count],\n    SUM(CASE WHEN l.request_status = N'WAIT' THEN 1 ELSE 0 END) AS [Waiting_Locks],\n    MAX(l.request_mode) AS [Sample_Mode],\n    s.login_name,\n    s.program_name\nFROM sys.dm_tran_locks AS l\nINNER JOIN sys.dm_exec_sessions AS s ON l.request_session_id = s.session_id\nWHERE l.request_session_id > 50\nGROUP BY l.request_session_id, s.login_name, s.program_name\nORDER BY [Lock_Count] DESC;\n\nPRINT '=== IF BLOCKING NOT FOUND: check RCSI / snapshot isolation conflicts ===';\nSELECT\n    d.name,\n    d.snapshot_isolation_state_desc,\n    d.is_read_committed_snapshot_on AS [RCSI_Enabled]\nFROM sys.databases AS d\nWHERE d.database_id > 4;\n\nPRINT 'Remediation: Identify head blocker query plan and transaction scope.';\nPRINT 'Last resort: KILL <head_blocker_spid> — only after documenting cause.';\n", "sql_server/Prod_Migration/05_Concurrency/02_ssms_metadata_slowness.sql": "/*\n================================================================================\nSSMS Object Explorer / Metadata Slowness Diagnosis\n================================================================================\nPurpose:\n    Diagnose slow \"expand databases\" and Object Explorer timeouts after upgrade.\n    These operations query system catalogs — NOT user data — so logical reads\n    on user queries can be low while SSMS is still slow.\n\nCommon post-migration causes:\n    (1) LATCH / METADATA waits on system catalog\n    (2) Schema locks (LCK_M_SCH_*) from open table designers / DDL\n    (3) Orphaned database owners → permission resolution delays\n    (4) Very large number of objects per database\n    (5) Antivirus scanning on database file paths during metadata access\n    (6) Windows/AD authentication latency (PREEMPTIVE_OS_AUTHENTICATIONOPS)\n    (7) Policy-Based Management / audit triggers\n    (8) Always On DMVs misconfiguration\n\nTests:\n    (1) Compare sqlcmd metadata query time vs SSMS (isolates client vs server)\n    (2) Active metadata-related waits\n    (3) Database owner issues\n    (4) Synonym/view count per database (enumeration cost)\n\nHow to test server-side only (run in sqlcmd on VM):\n    SET STATISTICS TIME ON;\n    SELECT name, state_desc, recovery_model_desc FROM sys.databases;\n    SELECT COUNT(*) FROM sys.tables;\n    SET STATISTICS TIME OFF;\n    If fast in sqlcmd but slow in SSMS → client/AD/network to domain controller.\n\nNext action:\n    Orphaned owner → ALTER AUTHORIZATION ON DATABASE\n    AD latency → use SQL auth test login temporarily to compare\n    AV → 08_Storage_OS/02_os_integration_post_migration.sql\n\nCriticality: High for reported SSMS symptom\n================================================================================\n*/\n\nSET NOCOUNT ON;\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\nPRINT '=== SERVER-SIDE METADATA BASELINE (should complete in < 2 sec on healthy instance) ===';\nDECLARE @Start DATETIME2 = SYSDATETIME();\n\nSELECT name, database_id, state_desc, recovery_model_desc, compatibility_level\nFROM sys.databases\nORDER BY name;\n\nSELECT @Start = SYSDATETIME();\n-- object count from each online user DB\nDECLARE @db SYSNAME, @sql NVARCHAR(MAX);\nDECLARE dbcur CURSOR LOCAL FAST_FORWARD FOR\n    SELECT name FROM sys.databases WHERE database_id > 4 AND state = 0;\n\nCREATE TABLE #ObjCounts (Database_Name SYSNAME, Table_Count INT, View_Count INT);\n\nOPEN dbcur;\nFETCH NEXT FROM dbcur INTO @db;\nWHILE @@FETCH_STATUS = 0\nBEGIN\n    SET @sql = N'USE ' + QUOTENAME(@db) + N';\n    INSERT INTO #ObjCounts SELECT DB_NAME(), (SELECT COUNT(*) FROM sys.tables), (SELECT COUNT(*) FROM sys.views);';\n    BEGIN TRY\n        EXEC sp_executesql @sql;\n    END TRY\n    BEGIN CATCH\n        INSERT INTO #ObjCounts VALUES (@db, -1, -1);\n    END CATCH;\n    FETCH NEXT FROM dbcur INTO @db;\nEND;\nCLOSE dbcur; DEALLOCATE dbcur;\n\nSELECT * FROM #ObjCounts ORDER BY Table_Count DESC;\nDROP TABLE #ObjCounts;\n\nPRINT 'Elapsed for metadata scan — check Messages tab for duration.';\n\nPRINT '=== ORPHANED DATABASE OWNERS (breaks SSMS permission checks) ===';\nSELECT\n    name AS [Database_Name],\n    SUSER_SNAME(owner_sid) AS [Owner],\n    CASE WHEN SUSER_SNAME(owner_sid) IS NULL THEN N'FIX IMMEDIATELY' ELSE N'OK' END AS [Status]\nFROM sys.databases\nWHERE database_id > 4;\n\nPRINT '=== ACTIVE METADATA / SCHEMA WAITS ===';\nSELECT\n    r.session_id,\n    r.wait_type,\n    r.wait_time,\n    r.wait_resource,\n    s.login_name,\n    s.program_name,\n    st.text\nFROM sys.dm_exec_requests AS r\nINNER JOIN sys.dm_exec_sessions AS s ON r.session_id = s.session_id\nCROSS APPLY sys.dm_exec_sql_text(r.sql_handle) AS st\nWHERE r.wait_type LIKE N'LCK_M_SCH%'\n   OR r.wait_type LIKE N'LATCH%'\n   OR r.wait_type LIKE N'METADATA%'\n   OR r.wait_type LIKE N'PREEMPTIVE_OS_AUTHENTICATION%'\nORDER BY r.wait_time DESC;\n\nPRINT '=== SSMS / SMO SESSIONS (often hold schema locks) ===';\nSELECT\n    session_id,\n    login_name,\n    host_name,\n    program_name,\n    status,\n    open_transaction_count,\n    last_request_start_time\nFROM sys.dm_exec_sessions\nWHERE program_name LIKE N'%Management Studio%'\n   OR program_name LIKE N'%SMO%'\nORDER BY last_request_start_time DESC;\n\nPRINT '=== DAC TEST (when instance appears hung) ===';\nSELECT\n    N'Connect via Dedicated Admin Connection: ADMIN:ServerName' AS [DAC_Instruction],\n    N'If DAC is fast but normal SSMS slow → connection pool or login trigger issue' AS [Interpretation];\n\nPRINT 'If sys.databases query is slow HERE (sqlcmd), problem is server-side.';\nPRINT 'If fast here but slow in SSMS UI only, test SQL auth login vs Windows auth.';\n", "sql_server/Prod_Migration/06_Optimizer_Plans/01_compatibility_and_ce.sql": "/*\n================================================================================\nCompatibility Level and Cardinality Estimator Impact\n================================================================================\nPurpose:\n    After upgrading the SQL Server ENGINE (2019 → 2025), databases often remain\n    at compatibility level 150. The optimizer behavior depends on BOTH engine\n    version AND database compatibility_level.\n\n    Misunderstanding this leads to \"I tried RECOMPILE and hints but nothing\n    worked\" when the real issue is waits — but when CE/plan IS the issue,\n    this script identifies it.\n\nChecks:\n    (1) Compat level per database vs instance default\n    (2) Queries with multiple plans (plan instability)\n    (3) Legacy CE test instructions (QUERYTRACEON 9481 / USE HINT)\n\nCardinality Estimator versions:\n    CE 70  — SQL 2008-2014 compat\n    CE 120 — SQL 2014 compat\n    CE 150 — SQL 2017+ compat (default for 150+)\n\nTest procedure (non-prod first):\n    -- Force legacy CE on ONE statement:\n    SELECT ... FROM ... OPTION (USE HINT ('FORCE_LEGACY_CARDINALITY_ESTIMATION'));\n\n    -- Or trace flag 9481 at query level (older method):\n    -- QUERYTRACEON 9481\n\nIf legacy CE fixes performance AND waits are low:\n    Consider database scoped configuration LEGACY_CARDINALITY_ESTIMATION = ON\n    OR update statistics with FULLSCAN and test compat upgrade\n\nIf legacy CE does NOT help:\n    Problem is NOT CE — return to wait analysis.\n\nNext action:\n    06_Optimizer_Plans/03_query_store_regression.sql\n    07_Instance_Config/02_recommended_fixes_with_rollback.sql (compat change)\n\nCriticality: Medium-High\n================================================================================\n*/\n\nSET NOCOUNT ON;\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\nDECLARE @InstanceCompat INT =\n    COALESCE(CAST(SERVERPROPERTY(N'ProductMajorVersion') AS INT), 16) * 10;\n\nPRINT '=== COMPATIBILITY MATRIX ===';\nSELECT\n    d.name AS [Database_Name],\n    d.compatibility_level AS [Current_Compat],\n    @InstanceCompat AS [Instance_Max_Compat],\n    CASE d.compatibility_level\n        WHEN 150 THEN N'CE 150 (2017+) — typical after 2019 Express migration'\n        WHEN 160 THEN N'CE 160 (2022) — new estimator features'\n        WHEN 170 THEN N'CE 170 (2025) — latest'\n        ELSE N'Legacy — review before changing'\n    END AS [CE_Version],\n    CASE\n        WHEN d.compatibility_level < @InstanceCompat THEN N'Test upgrade in lower environment; capture plans before/after'\n        ELSE N'At or above typical post-migration level'\n    END AS [Recommendation]\nFROM sys.databases AS d\nWHERE d.database_id > 4 AND d.state = 0;\n\nPRINT '=== DATABASE SCOPED CONFIG (CE overrides) ===';\nDECLARE @sql NVARCHAR(MAX) = N'';\nSELECT @sql = @sql + N'\nSELECT ''' + REPLACE(name, '''', '''''') + N''' AS [Database],\n       name AS [DSC_Name], value AS [DSC_Value], value_for_secondary AS [Secondary_Value]\nFROM ' + QUOTENAME(name) + N'.sys.database_scoped_configurations\nWHERE name IN (N''LEGACY_CARDINALITY_ESTIMATION'', N''OPTIMIZE_FOR_AD_HOC_WORKLOADS'', N''MAXDOP'', N''PARAMETER_SNIFFING'');\n'\nFROM sys.databases\nWHERE database_id > 4 AND state = 0;\n\nEXEC sys.sp_executesql @sql;\n\nPRINT '=== PLAN INSTABILITY (multiple plans per query hash in cache) ===';\n;WITH PlanInstability AS (\n    SELECT\n        DB_NAME(st.dbid) AS [Database_Name],\n        qs.query_hash,\n        COUNT(DISTINCT qs.plan_handle) AS [Distinct_Plans],\n        SUM(qs.execution_count) AS [Total_Executions],\n        SUM(qs.total_elapsed_time) / 1000.0 AS [Total_Elapsed_Sec],\n        MIN(qs.total_elapsed_time * 1.0 / NULLIF(qs.execution_count, 0)) / 1000.0 AS [Min_Avg_Elapsed_Sec],\n        MAX(qs.total_elapsed_time * 1.0 / NULLIF(qs.execution_count, 0)) / 1000.0 AS [Max_Avg_Elapsed_Sec],\n        SUBSTRING(MIN(CAST(st.text AS NVARCHAR(MAX))), 1, 120) AS [Query_Sample]\n    FROM sys.dm_exec_query_stats AS qs\n    CROSS APPLY sys.dm_exec_sql_text(qs.sql_handle) AS st\n    WHERE st.dbid IS NOT NULL\n    GROUP BY DB_NAME(st.dbid), qs.query_hash\n    HAVING COUNT(DISTINCT qs.plan_handle) > 1\n)\nSELECT TOP (20)\n    Database_Name,\n    query_hash,\n    Distinct_Plans,\n    Total_Executions,\n    Total_Elapsed_Sec,\n    Min_Avg_Elapsed_Sec,\n    Max_Avg_Elapsed_Sec,\n    Query_Sample\nFROM PlanInstability\nORDER BY Max_Avg_Elapsed_Sec / NULLIF(Min_Avg_Elapsed_Sec, 0) DESC;\n\nPRINT '=== WHEN CE TEST IS WORTH IT vs WHEN TO STOP ===';\nSELECT\n    N'Run CE test ONLY if: CPU or logical reads are HIGH and waits are low.' AS [Rule_1],\n    N'Skip CE test if: elapsed >> CPU and session wait_type is LCK/LATCH/IO — hints will not help.' AS [Rule_2],\n    N'Post-migration: update statistics WITH FULLSCAN on critical tables before compat change.' AS [Rule_3];\n", "sql_server/Prod_Migration/06_Optimizer_Plans/02_query_hint_guide.sql": "/*\n================================================================================\nQuery Hints Reference — When They Work and When They Fail\n================================================================================\nPurpose:\n    Documents industry-standard query hints for post-migration tuning AND\n    explicitly lists why each hint FAILS for wait-bound queries (your scenario).\n\nYour tested hints:\n    OPTION (MAXDOP 1)     — limits parallel threads; fails on blocking/IO/latches\n    OPTION (RECOMPILE)    — new plan each execution; fails on lock waits\n    SET ARITHABORT ON     — plan cache key alignment; fails on non-compilation waits\n    OPTION (FORCE ORDER)  — join order; fails when query never gets to execution\n\nUse this script as a template — replace @SampleQuery with your problem query.\n\nCriticality: High — prevents wasted time on wrong tooling\n================================================================================\n*/\n\nSET NOCOUNT ON;\n\nPRINT '=== DECISION: HINT vs WAIT ANALYSIS ===';\nSELECT\n    Scenario,\n    Use_Hints,\n    Primary_Tool\nFROM (VALUES\n    (N'High elapsed, LOW cpu, LOW reads', N'NO — waits dominate', N'02_capture_live_session_waits.sql'),\n    (N'High cpu, high reads, slow', N'YES — plan/index', N'Actual execution plan + missing indexes'),\n    (N'CXPACKET top wait, high cpu', N'YES — MAXDOP, CTFP', N'Session MAXDOP or server MAXDOP'),\n    (N'Recent upgrade, same data, new plan', N'YES — QS force plan', N'03_query_store_regression.sql'),\n    (N'SSMS expand slow, app queries fast', N'NO', N'02_ssms_metadata_slowness.sql'),\n    (N'Parameter sniffing (variable plan times)', N'MAYBE — OPTIMIZE FOR UNKNOWN', N'Query Store + RECOMPILE test')\n) AS t(Scenario, Use_Hints, Primary_Tool);\n\nPRINT '=== HINT EXAMPLES (copy and adapt) ===';\n\n/*\n-- 1. MAXDOP — parallelism control\nSELECT ...\nFROM ...\nWHERE ...\nOPTION (MAXDOP 1);  -- or MAXDOP 4, or USE HINT ('MAXDOP', 1) in 2016+\n\nWhen it helps: CXPACKET/CXCONSUMER waits, uneven thread work\nWhen it fails:  Blocking, PAGEIOLATCH, LATCH, PREEMPTIVE waits\nNext if fail:   04_Wait_Stats/02_post_migration_wait_decoder.sql\n*/\n\n/*\n-- 2. RECOMPILE — fresh plan per execution\nSELECT ...\nFROM ...\nWHERE @p = ...\nOPTION (RECOMPILE);\n\nWhen it helps: Parameter sniffing, stale stats after migration\nWhen it fails:  Lock waits, metadata waits (plan never executes)\nSide effect:    Higher CPU compile cost — watch RESOURCE_SEMAPHORE_QUERY_COMPILE\nNext if fail:   Update statistics FULLSCAN; Query Store regression check\n*/\n\n/*\n-- 3. ARITHABORT — plan cache consistency (often set at app connection level)\nSET ARITHABORT ON;\nSET ANSI_NULLS ON;\nSET ANSI_WARNINGS ON;\nSET CONCAT_NULL_YIELDS_NULL ON;\nSET NUMERIC_ROUNDABORT OFF;\nSELECT ...\n\nWhen it helps: Same query, two plans in cache, different default connection settings\nWhen it fails:  Wait-bound queries (your reported pattern)\nNext if fail:   Compare dm_exec_query_stats plans by sql_handle; fix app connection defaults\n*/\n\n/*\n-- 4. FORCE ORDER — preserve join order from text\nSELECT ...\nFROM A\nINNER JOIN B ON ...\nINNER JOIN C ON ...\nOPTION (FORCE ORDER);\n\nWhen it helps: Optimizer reordering joins badly (nested loops vs hash)\nWhen it fails:  Blocking during join execution; small row counts with huge elapsed = waits\nNext if fail:   Live session waits capture\n*/\n\n/*\n-- 5. USE HINT — modern hint syntax (SQL 2016 SP1+)\nSELECT ...\nOPTION (USE HINT ('DISABLE_OPTIMIZER_ROWGOAL'), USE HINT ('FORCE_LEGACY_CARDINALITY_ESTIMATION'));\n\nWhen it helps: Row goal mis-estimates (TOP/EXISTS), CE regression after upgrade\nWhen it fails:  Non-optimizer bottlenecks\n*/\n\n/*\n-- 6. LOOP JOIN / HASH JOIN / MERGE JOIN — physical operator force\nSELECT ...\nOPTION (LOOP JOIN);   -- or HASH JOIN, MERGE JOIN\n\nWhen it helps: Proven wrong join operator in plan XML\nWhen it fails:  When query is blocked before join starts\n*/\n\n/*\n-- 7. OPTIMIZE FOR UNKNOWN / OPTIMIZE FOR (@p = value)\nDECLARE @p INT = 5;\nSELECT ... WHERE col = @p\nOPTION (OPTIMIZE FOR (@p UNKNOWN));\n\nWhen it helps: Parameter sniffing with volatile parameter values\n*/\n\nPRINT '=== SESSION-LEVEL TEST ISOLATION ===';\nPRINT 'Test one hint at a time. Combine MAXDOP 1 + RECOMPILE only after single-hint tests.';\nPRINT 'If ALL hints fail with elapsed >> CPU: STOP hinting — run wait delta capture.';\n\n-- Optional: list plans in cache for a query pattern\nDECLARE @Filter NVARCHAR(200) = N'%';  -- set to your table name\nSELECT TOP (10)\n    qs.execution_count,\n    qs.total_elapsed_time / NULLIF(qs.execution_count, 0) AS [Avg_Elapsed_ms],\n    qs.total_worker_time / NULLIF(qs.execution_count, 0) AS [Avg_CPU_ms],\n    qs.total_logical_reads / NULLIF(qs.execution_count, 0) AS [Avg_Logical_Reads],\n    qp.query_plan,\n    st.text\nFROM sys.dm_exec_query_stats AS qs\nCROSS APPLY sys.dm_exec_sql_text(qs.sql_handle) AS st\nCROSS APPLY sys.dm_exec_query_plan(qs.plan_handle) AS qp\nWHERE st.text LIKE @Filter\n  AND st.text NOT LIKE N'%dm_exec_query_stats%'\nORDER BY [Avg_Elapsed_ms] DESC;\n", "sql_server/Prod_Migration/06_Optimizer_Plans/03_query_store_regression.sql": "/*\n================================================================================\nQuery Store Plan Regression After Migration\n================================================================================\nPurpose:\n    Detect queries where a NEW plan after migration performs much worse than\n    the historical best plan. Forced plans from pre-migration can also hurt.\n\n    NOTE: If elapsed is high but CPU/reads are LOW, Query Store may show\n    \"fast\" plan costs but real executions wait on locks — always correlate\n    with session wait_type.\n\nChecks:\n    (1) Query Store status per database\n    (2) Top regressed queries by duration (last 24h vs prior window)\n    (3) Forced plans list\n    (4) Plan force failures\n\nRemediation:\n    -- Unforce bad plan:\n    EXEC sys.sp_query_store_unforce_plan @query_id = X, @plan_id = Y;\n\n    -- Force known good plan (after validation):\n    EXEC sys.sp_query_store_force_plan @query_id = X, @plan_id = Y;\n\nNext if unforce/force does not help:\n    Problem is likely waits not plan — 03_Elapsed_Time_Diagnostics/\n\nCriticality: High after in-place upgrade with Query Store ON\n================================================================================\n*/\n\nSET NOCOUNT ON;\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\nIF NOT EXISTS (\n    SELECT 1\n    FROM sys.databases\n    WHERE database_id > 4\n      AND state = 0\n      AND is_query_store_on = 1\n)\nBEGIN\n    PRINT N'Query Store is not enabled on any user database. Skipping regression analysis.';\n    PRINT N'Enable with: ALTER DATABASE [DbName] SET QUERY_STORE = ON;';\n    RETURN;\nEND;\n\nDECLARE @db SYSNAME;\nDECLARE @sql NVARCHAR(MAX);\n\nIF OBJECT_ID(N'tempdb..#QSStatus') IS NOT NULL DROP TABLE #QSStatus;\nCREATE TABLE #QSStatus (\n    [Database_Name] SYSNAME NOT NULL,\n    [Is_Query_Store_On] BIT NOT NULL,\n    [Actual_State] NVARCHAR(60) NULL,\n    [Desired_State] NVARCHAR(60) NULL\n);\n\nDECLARE status_cursor CURSOR LOCAL FAST_FORWARD FOR\n    SELECT name\n    FROM sys.databases\n    WHERE database_id > 4 AND state = 0\n    ORDER BY name;\n\nOPEN status_cursor;\nFETCH NEXT FROM status_cursor INTO @db;\n\nWHILE @@FETCH_STATUS = 0\nBEGIN\n    SET @sql = N'USE ' + QUOTENAME(@db) + N';\n    INSERT INTO #QSStatus (Database_Name, Is_Query_Store_On, Actual_State, Desired_State)\n    SELECT\n        DB_NAME(),\n        (SELECT is_query_store_on FROM sys.databases WHERE database_id = DB_ID()),\n        CASE WHEN EXISTS (SELECT 1 FROM sys.database_query_store_options)\n             THEN (SELECT actual_state_desc FROM sys.database_query_store_options)\n             ELSE N''OFF'' END,\n        CASE WHEN EXISTS (SELECT 1 FROM sys.database_query_store_options)\n             THEN (SELECT desired_state_desc FROM sys.database_query_store_options)\n             ELSE N''OFF'' END;';\n\n    BEGIN TRY\n        EXEC sys.sp_executesql @sql;\n    END TRY\n    BEGIN CATCH\n        INSERT INTO #QSStatus (Database_Name, Is_Query_Store_On, Actual_State, Desired_State)\n        VALUES (@db, 0, N'ERROR', LEFT(ERROR_MESSAGE(), 60));\n    END CATCH;\n\n    FETCH NEXT FROM status_cursor INTO @db;\nEND;\n\nCLOSE status_cursor;\nDEALLOCATE status_cursor;\n\nPRINT '=== QUERY STORE STATUS ===';\nSELECT\n    Database_Name,\n    Is_Query_Store_On,\n    Actual_State AS [QS_Actual_State],\n    Desired_State AS [QS_Desired_State],\n    CASE\n        WHEN Is_Query_Store_On = 0 THEN N'OFF — skipped in regression scan'\n        WHEN Actual_State = N'READ_ONLY' THEN N'WARNING — QS read-only; check storage'\n        WHEN Actual_State <> Desired_State THEN N'STATE_MISMATCH — run SET QUERY_STORE = ON'\n        ELSE N'OK — included below'\n    END AS [Status]\nFROM #QSStatus\nORDER BY Database_Name;\n\nDECLARE db_cursor CURSOR LOCAL FAST_FORWARD FOR\n    SELECT name\n    FROM sys.databases\n    WHERE database_id > 4 AND state = 0 AND is_query_store_on = 1;\n\nOPEN db_cursor;\nFETCH NEXT FROM db_cursor INTO @db;\n\nWHILE @@FETCH_STATUS = 0\nBEGIN\n    PRINT '--- Database: ' + @db + ' ---';\n\n    SET @sql = N'\n    USE ' + QUOTENAME(@db) + N';\n\n    -- Forced plans\n    SELECT q.query_id, p.plan_id, q.object_id, LEFT(qt.query_sql_text, 200) AS query_text\n    FROM sys.query_store_plan AS p\n    INNER JOIN sys.query_store_query AS q ON p.query_id = q.query_id\n    INNER JOIN sys.query_store_query_text AS qt ON q.query_text_id = qt.query_text_id\n    WHERE p.is_forced_plan = 1;\n\n    -- Duration regression: recent avg vs historical min\n    ;WITH PlanStats AS (\n        SELECT\n            q.query_id,\n            p.plan_id,\n            SUM(rs.count_executions) AS exec_count,\n            SUM(rs.avg_duration * rs.count_executions) / NULLIF(SUM(rs.count_executions), 0) AS avg_duration_us\n        FROM sys.query_store_runtime_stats AS rs\n        INNER JOIN sys.query_store_plan AS p ON rs.plan_id = p.plan_id\n        INNER JOIN sys.query_store_query AS q ON p.query_id = q.query_id\n        WHERE rs.last_execution_time >= DATEADD(HOUR, -24, SYSDATETIME())\n        GROUP BY q.query_id, p.plan_id\n    ),\n    Ranked AS (\n        SELECT\n            query_id,\n            plan_id,\n            exec_count,\n            avg_duration_us,\n            MIN(avg_duration_us) OVER (PARTITION BY query_id) AS best_avg_us,\n            MAX(avg_duration_us) OVER (PARTITION BY query_id) AS worst_avg_us\n        FROM PlanStats\n    )\n    SELECT TOP (15)\n        r.query_id,\n        r.plan_id,\n        r.exec_count,\n        r.avg_duration_us / 1000.0 AS [Avg_Duration_ms],\n        r.best_avg_us / 1000.0 AS [Best_Plan_Avg_ms],\n        CAST(100.0 * (r.avg_duration_us - r.best_avg_us) / NULLIF(r.best_avg_us, 0) AS DECIMAL(10,1)) AS [Regression_Pct],\n        LEFT(qt.query_sql_text, 300) AS [Query_Text]\n    FROM Ranked AS r\n    INNER JOIN sys.query_store_query AS q ON r.query_id = q.query_id\n    INNER JOIN sys.query_store_query_text AS qt ON q.query_text_id = qt.query_text_id\n    WHERE r.worst_avg_us > r.best_avg_us * 1.5\n      AND r.exec_count >= 5\n    ORDER BY [Regression_Pct] DESC;\n    ';\n    BEGIN TRY\n        EXEC sp_executesql @sql;\n    END TRY\n    BEGIN CATCH\n        PRINT 'Error on ' + @db + ': ' + ERROR_MESSAGE();\n    END CATCH;\n\n    FETCH NEXT FROM db_cursor INTO @db;\nEND;\n\nCLOSE db_cursor;\nDEALLOCATE db_cursor;\n\nDROP TABLE #QSStatus;\n\nPRINT '=== INTERPRET WITH ELAPSED vs CPU ===';\nSELECT\n    N'Query Store avg_duration includes WAIT time.' AS [Note],\n    N'If QS shows low duration but SSMS/client shows high elapsed, check ASYNC_NETWORK_IO or app tier.' AS [Note2],\n    N'If QS duration high but dm_exec shows low CPU per exec, prioritize wait analysis over plan force.' AS [Note3];\n", "sql_server/Prod_Migration/07_Instance_Config/01_post_migration_config_audit.sql": "/*\n================================================================================\nPost-Migration Instance Configuration Audit\n================================================================================\nPurpose:\n    Audits instance settings that commonly cause systemic slowness after\n    migrating from Express 2019 to Developer 2025 (or any version jump).\n\nValidates:\n    max/min server memory, MAXDOP, CTFP, optimize for ad hoc workloads,\n    backup defaults, remote admin connections, blocked process threshold,\n    priority boost, affinity masks, max worker threads, TF status\n\nInterpretation:\n    Follow Status column — Critical/Warning items first.\n\nNext action:\n    07_Instance_Config/02_recommended_fixes_with_rollback.sql\n\nCriticality: High\n================================================================================\n*/\n\nSET NOCOUNT ON;\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\nDECLARE @RAM_MB BIGINT = (SELECT physical_memory_kb / 1024 FROM sys.dm_os_sys_info);\nDECLARE @CPU INT = (SELECT cpu_count FROM sys.dm_os_sys_info);\n\n;WITH ConfigAudit AS (\n    SELECT\n        c.name AS [Setting],\n        c.value AS [Configured],\n        c.value_in_use AS [Running_Value],\n        c.is_dynamic,\n        c.is_advanced,\n        CASE c.name\n            WHEN N'max server memory (MB)' THEN\n                CASE\n                    WHEN c.value_in_use < @RAM_MB * 0.4 THEN N'CRITICAL — likely Express-era cap'\n                    WHEN c.value_in_use > @RAM_MB * 0.95 THEN N'WARNING — may starve OS'\n                    ELSE N'OK — validate ~80-90% RAM on dedicated server'\n                END\n            WHEN N'max degree of parallelism' THEN\n                CASE\n                    WHEN c.value_in_use = 0 THEN N'WARNING — unlimited parallelism on OLTP'\n                    WHEN c.value_in_use = 1 THEN N'INFO — OK for test; verify CTFP if prod'\n                    ELSE N'OK'\n                END\n            WHEN N'cost threshold for parallelism' THEN\n                CASE WHEN c.value_in_use <= 5 THEN N'CRITICAL — default 5, raise to 50 for OLTP' ELSE N'OK' END\n            WHEN N'optimize for ad hoc workloads' THEN\n                CASE WHEN c.value_in_use = 0 THEN N'WARNING — plan cache bloat risk' ELSE N'OK' END\n            WHEN N'priority boost' THEN\n                CASE WHEN c.value_in_use = 1 THEN N'CRITICAL — set to 0' ELSE N'OK' END\n            WHEN N'remote admin connections' THEN\n                CASE WHEN c.value_in_use = 0 THEN N'WARNING — enable DAC for hung instance' ELSE N'OK' END\n            WHEN N'blocked process threshold (s)' THEN\n                CASE WHEN c.value_in_use = 0 THEN N'INFO — set 5-10 for XE blocking capture' ELSE N'OK' END\n            ELSE N'Review'\n        END AS [Status],\n        CASE c.name\n            WHEN N'max server memory (MB)' THEN N'Leave 4-8 GB for OS; increase gradually after upgrade'\n            WHEN N'max degree of parallelism' THEN N'Common: MIN(8, cores per NUMA node)'\n            WHEN N'cost threshold for parallelism' THEN N'Set 50 for OLTP; lower only for reporting workloads'\n            WHEN N'optimize for ad hoc workloads' THEN N'Enable if many single-use ad hoc queries'\n            ELSE N'See 02_recommended_fixes_with_rollback.sql'\n        END AS [Expert_Rationale]\n    FROM sys.configurations AS c\n    WHERE c.name IN (\n        N'max server memory (MB)', N'min server memory (MB)', N'max degree of parallelism',\n        N'cost threshold for parallelism', N'optimize for ad hoc workloads', N'backup compression default',\n        N'backup checksum default', N'remote admin connections', N'priority boost', N'fill factor (%)',\n        N'blocked process threshold (s)', N'max worker threads', N'affinity mask', N'affinity64 mask',\n        N'clr enabled', N'contained database authentication'\n    )\n)\nSELECT\n    Setting,\n    Configured,\n    Running_Value,\n    is_dynamic,\n    is_advanced,\n    Status,\n    Expert_Rationale\nFROM ConfigAudit\nORDER BY\n    CASE\n        WHEN Status LIKE N'CRITICAL%' THEN 1\n        WHEN Status LIKE N'WARNING%' THEN 2\n        ELSE 3\n    END,\n    Setting;\n\nPRINT '=== GLOBAL TRACE FLAGS ===';\nDBCC TRACESTATUS(-1);\n\nPRINT '=== TF 4199 (optimizer hotfixes) — on by default in recent versions ===';\nSELECT\n    N'TF 4199 enables incremental optimizer fixes. After major upgrade, verify no conflicting legacy TFs.' AS [Note];\n\nPRINT '=== IFI STATUS ===';\nIF COL_LENGTH(N'sys.dm_server_services', N'instant_file_initialization_enabled') IS NOT NULL\n    SELECT servicename, instant_file_initialization_enabled FROM sys.dm_server_services\n    WHERE servicename LIKE N'SQL Server (%';\n", "sql_server/Prod_Migration/07_Instance_Config/02_recommended_fixes_with_rollback.sql": "/*\n================================================================================\nRecommended Post-Migration Fixes (with Rollback Notes)\n================================================================================\nPurpose:\n    Actionable remediation templates. DO NOT run entire script blindly.\n    Uncomment ONLY the section you need after triage confirms root cause.\n\nEach section includes:\n    - When to apply\n    - Command\n    - Rollback\n    - What to do if fix fails\n\nCriticality: High — change control required\n================================================================================\n*/\n\nSET NOCOUNT ON;\n\nPRINT '=== SECTION 1: INCREASE MAX SERVER MEMORY (after Express migration) ===';\nPRINT 'When: 02_express_to_developer_limits_check shows memory << physical RAM';\nPRINT 'Rollback: sp_configure max server memory back to prior value';\n/*\nDECLARE @NewMax INT = (SELECT physical_memory_kb / 1024 * 0.85 FROM sys.dm_os_sys_info);\nEXEC sp_configure 'show advanced options', 1; RECONFIGURE;\nEXEC sp_configure 'max server memory (MB)', @NewMax; RECONFIGURE;\n-- If still slow: NOT a memory issue — return to wait stats\n*/\n\nPRINT '=== SECTION 2: MAXDOP AND COST THRESHOLD (OLTP defaults) ===';\nPRINT 'When: CXPACKET waits + high CPU; NOT when LCK/LATCH/IO dominate';\nPRINT 'Rollback: restore prior sp_configure values';\n/*\nEXEC sp_configure 'show advanced options', 1; RECONFIGURE;\nEXEC sp_configure 'max degree of parallelism', 4; RECONFIGURE;\nEXEC sp_configure 'cost threshold for parallelism', 50; RECONFIGURE;\n-- If fail: waits unchanged — problem is not parallelism\n*/\n\nPRINT '=== SECTION 3: OPTIMIZE FOR AD HOC WORKLOADS ===';\nPRINT 'When: RESOURCE_SEMAPHORE_QUERY_COMPILE or huge plan cache ad hoc';\n/*\nEXEC sp_configure 'optimize for ad hoc workloads', 1; RECONFIGURE;\n-- If fail: check compilation-heavy single procedure instead\n*/\n\nPRINT '=== SECTION 4: TEMPDB — ADD DATA FILES ===';\nPRINT 'When: PAGELATCH_* on tempdb in wait decoder';\nPRINT 'Rollback: files cannot be removed easily — test count in non-prod';\n/*\nDECLARE @files INT = (SELECT COUNT(*) FROM tempdb.sys.database_files WHERE type = 0);\nDECLARE @cores INT = (SELECT cpu_count FROM sys.dm_os_sys_info);\nDECLARE @target INT = CASE WHEN @cores > 8 THEN 8 ELSE @cores END;\n-- Add files via SSMS or ALTER DATABASE tempdb ADD FILE ... equal size to file 1\n*/\n\nPRINT '=== SECTION 5: DISABLE AUTO_CLOSE / AUTO_SHRINK ===';\nPRINT 'When: upgrade validation flags these ON';\n/*\nALTER DATABASE [YourDB] SET AUTO_CLOSE OFF, AUTO_SHRINK OFF;\n*/\n\nPRINT '=== SECTION 6: FIX ORPHANED DATABASE OWNER ===';\nPRINT 'When: SSMS metadata slow; owner_sid orphaned';\n/*\nALTER AUTHORIZATION ON DATABASE::[YourDB] TO [sa];  -- or appropriate login\n*/\n\nPRINT '=== SECTION 7: QUERY STORE — UNFORCE BAD PLAN ===';\nPRINT 'When: 03_query_store_regression identifies forced bad plan';\n/*\nUSE [YourDB];\nEXEC sys.sp_query_store_unforce_plan @query_id = 0, @plan_id = 0;  -- replace ids\n*/\n\nPRINT '=== SECTION 8: COMPATIBILITY LEVEL UPGRADE ===';\nPRINT 'When: CE testing proves benefit in lower environment ONLY';\nPRINT 'Rollback: ALTER DATABASE SET COMPATIBILITY_LEVEL = 150;';\n/*\nALTER DATABASE [YourDB] SET COMPATIBILITY_LEVEL = 160;  -- or 170 for 2025\n-- Run FULLSCAN stats update after change\n*/\n\nPRINT '=== SECTION 9: LEGACY CE (database scoped) ===';\nPRINT 'When: USE HINT FORCE_LEGACY_CARDINALITY_ESTIMATION fixes plan in test';\n/*\nALTER DATABASE SCOPED CONFIGURATION SET LEGACY_CARDINALITY_ESTIMATION = ON;\n-- Rollback: ... SET LEGACY_CARDINALITY_ESTIMATION = OFF;\n*/\n\nPRINT '=== SECTION 10: CLEAR WAIT STATS BASELINE (maintenance only) ===';\nPRINT 'When: need clean wait delta after major fix';\n/*\nDBCC SQLPERF('sys.dm_os_wait_stats', CLEAR);\n-- Document time of clear for future RCA\n*/\n\nPRINT '=== SECTION 11: FREEPROCCACHE (last resort, maintenance window) ===';\nPRINT 'When: confirmed plan corruption; NOT f
